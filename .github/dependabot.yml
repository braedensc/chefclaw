# Dependabot — the sanctioned way to bump the SHA-pinned third-party GitHub
# Actions in .github/workflows/*.yml. NEVER hand-edit an action's pin: let a
# Dependabot PR raise the 40-hex SHA (and its trailing `# vX.Y.Z` comment)
# together, so the pin and the human-readable version can never drift apart.
#
# Scope: github-actions only for now. Add npm / uv / docker ecosystems here
# later if we want dependency PRs for the app itself.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"                 # scans .github/workflows/ + .github/actions/
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"              # conventional-commit prefix (CLAUDE.md)
    labels:
      - "dependencies"
      - "github-actions"
