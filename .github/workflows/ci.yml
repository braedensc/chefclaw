name: CI

# ══════════════════════════════════════════════════════════════════════════════
# chefclaw app CI — activated at bootstrap from the claude-project-kit template
# (templates/workflows/ci.yml, distilled from todoclaw's ci.yml — the gate for
# every PR of a live production build, 2026-06-23 → 2026-07-03).
#
# Layer 3 of the security/quality model — the unbypassable gate (--no-verify
# can't skip it).
#
# PHASED ACTIVATION (merge-then-require, docs/LESSONS.md):
#   Phase 0: "Secret scan + forbidden paths" — carries the kit-CI steps forward
#     (hook battery, JSON/YAML validation, placeholder regression). The ONLY
#     required context until the Phase-1 jobs have reported green on main.
#   Phase 1 (landed with the walking skeleton): Backend (ruff + pytest),
#     Lint / Typecheck / Test (frontend), OpenAPI drift (both toolchains),
#     E2E (smoke) — smoke stays NON-required by design (docs/TESTING.md).
#     Flip each to required only AFTER it has reported green on main:
#       gh api -X POST repos/<owner>/<repo>/branches/main/protection/required_status_checks/contexts \
#         -f 'contexts[]=<job name>'
#
# Two rules that bite if you skip them:
# 1. Each job's `name:` IS the required-status-check context string.
# 2. Merge THEN require — requiring a context that has never reported wedges
#    every open PR (docs/LESSONS.md).
# ══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch — so stacked PRs (base != main)
  # are gated too, not just PRs that target main directly.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-and-paths:
    name: Secret scan + forbidden paths
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # The hook battery ships as a permanent CI step (needs only python3 + git,
      # both preinstalled) — every edit to .claude/hooks/pre-tool-use.py is
      # regression-gated forever.
      - name: Hook battery (block/allow)
        run: python3 .claude/hooks/test_hooks.py

      - name: Validate all tracked JSON/YAML
        run: |
          python3 -m pip install --quiet pyyaml
          git ls-files '*.json' '*.yml' '*.yaml' | python3 -c '
          import json, sys, yaml
          bad = []
          for f in sys.stdin.read().split():
              try:
                  with open(f) as fh:
                      if f.endswith(".json"):
                          json.load(fh)
                      else:
                          list(yaml.safe_load_all(fh))
              except Exception as e:
                  bad.append(f + ": " + str(e))
          print("\n".join(bad) if bad else "all tracked JSON/YAML parse OK")
          sys.exit(1 if bad else 0)
          '

      # --bootstrapped: asserts zero {{…}} tokens remain anywhere in the repo.
      - name: Placeholder regression (zero tokens remain)
        run: python3 scripts/check_placeholders.py --bootstrapped

      - name: Block forbidden paths (planning/, real .env, key material, cookies)
        run: |
          FORBIDDEN=$(git ls-files \
            | grep -E '^planning/|(^|/)\.env|\.pem$|\.key$|(^|/)cookies[^/]*$|\.cookies$' \
            | grep -v -E '(^|/)\.env\.example$' \
            || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files are tracked in git:"
            echo "$FORBIDDEN"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: secretlint (scan all tracked files)
        run: git ls-files -z | xargs -0 npx secretlint --secretlintrc .secretlintrc.json

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: ruff
        run: uv run ruff check .

      - name: pytest (no database — unit tier only; docs/TESTING.md)
        run: uv run pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc -b
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit + component tests (Vitest)
        run: npm test

  # The end-to-end typed-client contract: the backend's exported openapi.json and
  # the committed generated client must both be reproducible byte-for-byte. If
  # either drifts from the code, this fails — regenerate and commit
  # (`uv run python -m chefclaw.export_openapi openapi.json` in backend/, then
  # `npm run generate:client -w frontend`).
  drift:
    name: OpenAPI drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (both toolchains)
        run: |
          npm ci
          cd backend && uv sync --frozen

      - name: Re-export OpenAPI schema
        run: cd backend && uv run python -m chefclaw.export_openapi openapi.json

      - name: Regenerate typed client
        run: npm run generate:client -w frontend

      - name: Committed schema + client must match the code
        run: git diff --exit-code -- backend/openapi.json frontend/src/client

  # E2E smoke. Deliberately NOT a required check (promote once proven stable) so
  # a flaky browser run can't wedge main. Boots the built app with DUMMY env —
  # no database, no secrets (docs/TESTING.md: smoke-in-CI vs golden-local-only).
  e2e:
    name: E2E (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: npm run test:e2e
