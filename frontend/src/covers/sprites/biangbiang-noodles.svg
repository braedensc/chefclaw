<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="bbBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="bbbowl" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="bbbelt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0dca0"/><stop offset="50%" stop-color="#dcbf80"/><stop offset="100%" stop-color="#b9975a"/>
    </linearGradient>
    <radialGradient id="bboil" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ef5520"/><stop offset="50%" stop-color="#b02408"/><stop offset="100%" stop-color="#7a1305"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bbbg)"/>
  <!-- steam -->
  <path d="M122 56 C112 38 132 30 122 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bbBlur3)"/>
  <path d="M202 52 C194 36 212 28 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#bbBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
