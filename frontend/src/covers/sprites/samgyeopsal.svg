<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="sgBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="sgbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="sgpan" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1c1c22"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="sgmeat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6b48a"/><stop offset="45%" stop-color="#cf8a58"/><stop offset="100%" stop-color="#a5602f"/>
    </linearGradient>
    <linearGradient id="sgsear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5602f"/><stop offset="100%" stop-color="#6e2f0d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sgbg)"/>
  <!-- sizzle steam -->
  <path d="M116 54 C106 36 126 28 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#sgBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#sgBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- cast-iron skillet with handle -->
  <rect x="252" y="122" width="66" height="14" rx="7" fill="#17171c"/>
  <rect x="252" y="122" width="66" height="14" rx="7" fill="none" stroke="#2c2c34" stroke-width="2"/>
  <ellipse cx="150" cy="130" rx="132" ry="48" fill="url(#sgpan)"/>
  <ellipse cx="150" cy="130" rx="132" ry="48" fill="none" stroke="#2c2c34" stroke-width="3"/>
  <ellipse cx="150" cy="130" rx="118" ry="40" fill="#0d0d10"/>
  <!-- neon steam arc (warm) -->
  <path d="M44 114 Q98 82 162 80" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- grilled pork-belly strips: layered fat + meat bands, browned edges -->
  <!-- strip 1 -->
  <g transform="translate(70 104) rotate(-8)">
    <rect width="70" height="20" rx="6" fill="url(#sgsear)"/>
    <rect y="3" width="70" height="4.5" rx="2" fill="#f2d5b0" opacity=".9"/>
    <rect y="10" width="70" height="4.5" rx="2" fill="#f2d5b0" opacity=".85"/>
    <rect width="70" height="20" rx="6" fill="none" stroke="#4a1e08" stroke-width="1.3" opacity=".6"/>
    <path d="M8 2 L14 18 M26 2 L32 18 M46 2 L52 18" stroke="#3a1606" stroke-width="2.4" opacity=".45" stroke-linecap="round"/>
  </g>
  <!-- strip 2 -->
  <g transform="translate(120 118) rotate(6)">
    <rect width="76" height="21" rx="6" fill="url(#sgmeat)"/>
    <rect y="3.5" width="76" height="4.5" rx="2" fill="#f6ddba" opacity=".9"/>
    <rect y="11" width="76" height="4.5" rx="2" fill="#f6ddba" opacity=".85"/>
    <rect width="76" height="21" rx="6" fill="none" stroke="#5a2612" stroke-width="1.3" opacity=".6"/>
    <path d="M10 2 L16 19 M30 2 L36 19 M52 2 L58 19" stroke="#4a1e08" stroke-width="2.4" opacity=".4" stroke-linecap="round"/>
    <ellipse cx="30" cy="6" rx="14" ry="3" fill="#fff" opacity=".22"/>
  </g>
  <!-- strip 3 (front, brightest, curled end) -->
  <g transform="translate(88 132) rotate(-3)">
    <rect width="82" height="22" rx="7" fill="url(#sgmeat)"/>
    <rect y="4" width="82" height="5" rx="2.4" fill="#f6ddba" opacity=".92"/>
    <rect y="12" width="82" height="5" rx="2.4" fill="#f6ddba" opacity=".88"/>
    <rect width="82" height="22" rx="7" fill="none" stroke="#5a2612" stroke-width="1.4" opacity=".6"/>
    <path d="M12 2 L18 20 M34 2 L40 20 M58 2 L64 20" stroke="#4a1e08" stroke-width="2.6" opacity=".42" stroke-linecap="round"/>
    <ellipse cx="34" cy="6" rx="16" ry="3.4" fill="#fff" opacity=".24"/>
  </g>
  <!-- kimchi mound + garlic slice sizzling alongside -->
  <path d="M196 120 C204 112 218 114 220 124 C224 132 214 140 204 138 C194 138 190 128 196 120 Z" fill="#c0341a"/>
  <path d="M200 122 C206 118 214 120 214 126" stroke="#e05a34" stroke-width="2" fill="none" opacity=".6" stroke-linecap="round"/>
  <ellipse cx="210" cy="132" rx="5" ry="2.6" fill="#f2ddb0" transform="rotate(-14 210 132)"/>
  <ellipse cx="222" cy="126" rx="4.4" ry="2.4" fill="#f8e6c8" transform="rotate(10 222 126)"/>
  <!-- fresh lettuce wrap leaf tucked at the rim (green) -->
  <path d="M40 130 C34 118 46 108 62 110 C74 108 82 118 76 128 C82 130 76 142 62 142 C48 144 42 138 40 130 Z" fill="#4a9c38"/>
  <path d="M46 128 C54 120 66 120 72 126" stroke="#6abf5a" stroke-width="2" fill="none" opacity=".6" stroke-linecap="round"/>
  <path d="M58 114 L58 138" stroke="#2f7d2b" stroke-width="1.6" opacity=".5"/>
  <!-- scallion + sesame garnish -->
  <rect x="150" y="112" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 153 113)"/>
  <rect x="176" y="126" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 179 127)"/>
  <g fill="#f8eed6">
    <ellipse cx="130" cy="118" rx="2" ry="1.2" transform="rotate(18 130 118)"/>
    <ellipse cx="164" cy="130" rx="2" ry="1.2" transform="rotate(-14 164 130)"/>
  </g>
  <!-- oily gloss dots -->
  <circle cx="110" cy="120" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="150" cy="134" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="204" cy="126" r="1.2" fill="#fff" opacity=".5"/>
</svg>
