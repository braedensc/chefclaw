  <g stroke="#c9b487" stroke-width="1.1">
    <path d="M116 100 C110 94 120 88 130 92 C138 88 144 96 140 102 C142 108 132 112 124 108 C116 110 112 104 116 100 Z" fill="#f0e6cc"/>
    <ellipse cx="124" cy="94" rx="6" ry="2.4" fill="#fbf5e4" opacity=".7"/>
  </g>
  <g stroke="#c9b487" stroke-width="1.1">
    <path d="M182 104 C176 98 186 92 196 96 C204 92 210 100 206 106 C208 112 198 116 190 112 C182 114 178 108 182 104 Z" fill="#ece1c4"/>
    <ellipse cx="190" cy="98" rx="6" ry="2.4" fill="#fbf5e4" opacity=".7"/>
  </g>
  <!-- Thai eggplant / pea-eggplant balls (small green spheres) -->
  <g>
    <circle cx="146" cy="98" r="6.5" fill="#8fb34c"/>
    <circle cx="146" cy="98" r="6.5" fill="none" stroke="#5f8a38" stroke-width="1"/>
    <ellipse cx="144" cy="95.5" rx="2.4" ry="1.4" fill="#d3e28f" opacity=".8"/>
    <circle cx="168" cy="112" r="5.5" fill="#a2c257"/>
    <circle cx="168" cy="112" r="5.5" fill="none" stroke="#5f8a38" stroke-width="1"/>
    <ellipse cx="166" cy="110" rx="2" ry="1.2" fill="#d3e28f" opacity=".8"/>
    <circle cx="204" cy="100" r="4.6" fill="#8fb34c"/>
    <circle cx="204" cy="100" r="4.6" fill="none" stroke="#5f8a38" stroke-width="1"/>
  </g>
  <!-- red chili slivers floating (color pop) -->
  <g>
    <path d="M128 116 C138 113 148 115 154 118 C148 121 138 121 128 118 Z" fill="#e0341f" transform="rotate(-10 140 117)"/>
    <path d="M172 118 C182 115 192 117 198 120 C192 123 182 123 172 120 Z" fill="#c31f12" transform="rotate(12 184 119)"/>
