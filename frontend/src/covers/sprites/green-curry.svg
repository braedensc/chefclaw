<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="gcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="gcbowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="gccurry" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#b7cf78"/><stop offset="48%" stop-color="#8bb050"/><stop offset="100%" stop-color="#5f8a38"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gcbg)"/>
  <!-- steam -->
  <path d="M116 62 C106 44 126 36 116 16" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M202 58 C194 42 212 34 204 14" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="158" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl -->
  <path d="M50 106 C50 154 102 178 160 178 C218 178 270 154 270 106 Z" fill="url(#gcbowl)"/>
  <ellipse cx="160" cy="106" rx="112" ry="30" fill="#0d0d10"/>
  <ellipse cx="160" cy="106" rx="112" ry="30" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="106" rx="100" ry="24" fill="#0c1210"/>
