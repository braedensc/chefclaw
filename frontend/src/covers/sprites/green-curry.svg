  <path d="M92 106 C120 98 150 116 190 106 C214 100 232 108 240 104" stroke="#eef4d6" stroke-width="2.6" fill="none" opacity=".55" stroke-linecap="round"/>
  <path d="M108 116 C132 110 156 122 186 114" stroke="#f4f8e2" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- red-oil sheen droplets on the coconut surface -->
  <ellipse cx="124" cy="102" rx="9" ry="3.6" fill="#e0621f" opacity=".55" transform="rotate(-8 124 102)"/>
  <ellipse cx="196" cy="112" rx="7" ry="3" fill="#e0621f" opacity=".5" transform="rotate(6 196 112)"/>
  <circle cx="150" cy="116" r="2.6" fill="#e8791f" opacity=".55"/>
