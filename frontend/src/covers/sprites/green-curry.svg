  <!-- Thai basil leaves (pointed dark-green, on top) -->
  <g>
    <path d="M134 104 C130 96 138 90 146 94 C150 100 144 108 136 108 C134 107 133 106 134 104 Z" fill="#2f7d2b"/>
    <path d="M140 96 L138 106" stroke="#5ecb4e" stroke-width="1" opacity=".6"/>
    <path d="M180 108 C176 100 184 94 192 98 C196 104 190 112 182 112 C180 111 179 110 180 108 Z" fill="#3f9c37"/>
    <path d="M186 100 L184 110" stroke="#6abf5a" stroke-width="1" opacity=".6"/>
    <path d="M158 118 C154 111 162 106 169 110 C172 115 166 121 159 121 C157 120 157 119 158 118 Z" fill="#2f7d2b"/>
  </g>
  <!-- kaffir-lime / scallion sliver flecks -->
  <rect x="150" y="100" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-16 153 101)"/>
  <rect x="196" y="110" width="6" height="2.2" rx="1.1" fill="#3f9c37" transform="rotate(18 199 111)"/>
  <!-- oil gloss dots -->
  <circle cx="126" cy="100" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="104" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="158" cy="112" r="1.2" fill="#fff" opacity=".5"/>
</svg>
