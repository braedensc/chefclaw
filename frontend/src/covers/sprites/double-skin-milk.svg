<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="dsm-bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="dsm-bowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="dsm-milk" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fffdf6"/><stop offset="55%" stop-color="#fbf3e0"/><stop offset="100%" stop-color="#efe0c4"/>
    </radialGradient>
    <linearGradient id="dsm-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/><stop offset="100%" stop-color="#f2e4c6"/>
    </linearGradient>
    <linearGradient id="dsm-bowlwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141018"/><stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dsm-bg)"/>
  <ellipse cx="160" cy="188" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- shallow wide dessert bowl -->
  <!-- outer rim ring -->
  <ellipse cx="160" cy="112" rx="110" ry="42" fill="url(#dsm-bowl)"/>
  <ellipse cx="160" cy="112" rx="110" ry="42" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- bowl wall descending -->
  <path d="M56 112 C56 150 96 172 160 172 C224 172 264 150 264 112 C264 138 224 150 160 150 C96 150 56 138 56 112 Z" fill="url(#dsm-bowlwall)"/>
  <path d="M56 112 C56 150 96 172 160 172 C224 172 264 150 264 112" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <!-- cold condensation sheen arc (rose, subtle — chilled dessert) -->
  <path d="M74 96 Q120 70 176 72" stroke="#ff4d6d" stroke-width="2.2" fill="none" opacity=".28" stroke-linecap="round"/>
  <!-- inner milk pudding surface -->
  <ellipse cx="160" cy="110" rx="96" ry="34" fill="url(#dsm-milk)"/>
  <!-- the wrinkled "double skin" — the film on top, slightly puckered -->
  <ellipse cx="160" cy="110" rx="96" ry="34" fill="url(#dsm-skin)" opacity=".9"/>
  <!-- skin wrinkle lines -->
  <g fill="none" stroke="#e6d3ac" stroke-width="1.3" opacity=".55" stroke-linecap="round">
    <path d="M84 108 C110 100 150 100 176 104"/>
    <path d="M100 120 C130 114 178 114 214 122"/>
    <path d="M120 96 C150 92 186 96 210 104"/>
  </g>
  <!-- soft central dimple/puckered skin -->
  <ellipse cx="158" cy="108" rx="30" ry="12" fill="#fbf1dc" opacity=".7"/>
  <ellipse cx="158" cy="108" rx="30" ry="12" fill="none" stroke="#ecdcb8" stroke-width="1" opacity=".5"/>
  <!-- rim highlight of the pudding surface -->
  <path d="M72 106 C96 92 130 86 160 86 C190 86 224 92 248 106" fill="none" stroke="#fffdf6" stroke-width="2" opacity=".6" stroke-linecap="round"/>
  <!-- glossy cold sheen patch -->
  <ellipse cx="132" cy="98" rx="22" ry="7" fill="#ffffff" opacity=".55"/>
  <!-- red-bean garnish dots (classic topping) -->
  <ellipse cx="170" cy="106" rx="4.2" ry="3" fill="#7a2418"/>
  <ellipse cx="182" cy="112" rx="4" ry="2.8" fill="#8a2c1c"/>
  <ellipse cx="162" cy="116" rx="3.6" ry="2.6" fill="#6e1f14"/>
  <ellipse cx="176" cy="120" rx="3.8" ry="2.7" fill="#8a2c1c"/>
  <ellipse cx="150" cy="118" rx="3.4" ry="2.5" fill="#7a2418"/>
  <ellipse cx="171" cy="105" rx="1.4" ry="1" fill="#c96" opacity=".7"/>
  <ellipse cx="177" cy="119" rx="1.3" ry="1" fill="#c96" opacity=".7"/>
  <!-- chilled sparkle/condensation -->
  <circle cx="118" cy="100" r="1.5" fill="#fff" opacity=".65"/>
  <circle cx="200" cy="104" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="146" cy="122" r="1.2" fill="#fff" opacity=".5"/>
  <path d="M104 92 l2 -3 M106 92 l-2 -1" stroke="#fff" stroke-width="1" opacity=".5" stroke-linecap="round"/>
  <path d="M218 98 l2 -3 M220 98 l-2 -1" stroke="#fff" stroke-width="1" opacity=".45" stroke-linecap="round"/>
</svg>
