<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="bs1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bs1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="bs1bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="bs1broth" cx="50%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#7e1c10"/><stop offset="52%" stop-color="#571007"/><stop offset="100%" stop-color="#340904"/>
    </radialGradient>
    <linearGradient id="bs1beef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3a20"/><stop offset="100%" stop-color="#4a1f10"/>
    </linearGradient>
    <radialGradient id="bs1carrot" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#f59a3c"/><stop offset="100%" stop-color="#c25c14"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bs1bg)"/>
  <!-- steam -->
  <path d="M118 58 C108 40 128 32 118 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bs1Blur3)"/>
  <path d="M200 54 C192 38 210 30 202 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#bs1Blur3)"/>
  <ellipse cx="160" cy="188" rx="158" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl -->
  <path d="M44 106 C44 154 100 180 160 180 C220 180 276 154 276 106 Z" fill="url(#bs1bowl)"/>
  <ellipse cx="160" cy="106" rx="120" ry="32" fill="#0d0d10"/>
  <ellipse cx="160" cy="106" rx="120" ry="32" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="106" rx="108" ry="26" fill="#120a0c"/>
  <!-- neon steam arc (rose) -->
  <path d="M56 98 Q104 72 166 70" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- rich red-wine broth -->
  <ellipse cx="160" cy="108" rx="101" ry="23" fill="url(#bs1broth)"/>
  <!-- broth sheen -->
  <ellipse cx="132" cy="100" rx="30" ry="6" fill="#a5361f" opacity=".4" transform="rotate(-8 132 100)"/>
  <ellipse cx="192" cy="112" rx="24" ry="5" fill="#8a2414" opacity=".5"/>
  <!-- glossy fat drops on the surface -->
  <circle cx="118" cy="112" r="3.4" fill="#c86a2c" opacity=".55"/>
  <circle cx="176" cy="102" r="3" fill="#c86a2c" opacity=".5"/>
  <circle cx="150" cy="116" r="2.6" fill="#e08a3e" opacity=".45"/>
  <!-- braised beef chunks (irregular, glossy) -->
  <g transform="translate(104 100) rotate(-8)">
    <path d="M0 0 C-3 -9 8 -13 16 -10 C24 -12 30 -4 26 3 C30 10 20 15 12 12 C3 14 -2 8 0 0 Z" fill="url(#bs1beef)" stroke="#2c130a" stroke-width="1.3"/>
    <ellipse cx="10" cy="-4" rx="7" ry="3" fill="#b5764a" opacity=".55"/>
  </g>
  <g transform="translate(166 96) rotate(12)">
    <path d="M0 0 C-3 -9 8 -13 16 -10 C24 -12 30 -4 26 3 C30 10 20 15 12 12 C3 14 -2 8 0 0 Z" fill="url(#bs1beef)" stroke="#2c130a" stroke-width="1.3"/>
    <ellipse cx="10" cy="-4" rx="7" ry="3" fill="#b5764a" opacity=".5"/>
  </g>
  <g transform="translate(138 116) rotate(-4)">
    <path d="M0 0 C-3 -8 7 -12 15 -9 C22 -11 28 -3 24 3 C28 9 19 14 11 11 C3 13 -1 7 0 0 Z" fill="url(#bs1beef)" stroke="#2c130a" stroke-width="1.3"/>
    <ellipse cx="9" cy="-3" rx="6" ry="2.6" fill="#b5764a" opacity=".5"/>
  </g>
  <!-- carrot chunks -->
  <g transform="translate(196 108) rotate(18)"><ellipse rx="9" ry="6" fill="url(#bs1carrot)"/><ellipse rx="9" ry="6" fill="none" stroke="#9a4610" stroke-width="1.1"/><ellipse cx="0" cy="0" rx="4" ry="2.6" fill="#f7b866" opacity=".7"/></g>
  <g transform="translate(120 122) rotate(-10)"><ellipse rx="8" ry="5.4" fill="url(#bs1carrot)"/><ellipse rx="8" ry="5.4" fill="none" stroke="#9a4610" stroke-width="1"/><ellipse cx="0" cy="0" rx="3.4" ry="2.2" fill="#f7b866" opacity=".65"/></g>
  <!-- pearl onion -->
  <g transform="translate(150 100)"><ellipse rx="8" ry="7" fill="#f0e4c8"/><ellipse rx="8" ry="7" fill="none" stroke="#c9b487" stroke-width="1"/><path d="M-5 -3 C0 -6 5 -3 4 3" stroke="#d8c8a0" stroke-width="1" fill="none" opacity=".7"/></g>
  <!-- mushroom half -->
  <g transform="translate(178 122) rotate(-6)"><path d="M-9 2 C-9 -6 9 -6 9 2 Z" fill="#8a6a48"/><path d="M-9 2 C-6 6 6 6 9 2 Z" fill="#6b4d30"/><rect x="-3" y="1" width="6" height="6" rx="2" fill="#d8c8a8"/></g>
  <!-- thyme / parsley flecks -->
  <rect x="128" y="104" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-18 131 105)"/>
  <rect x="158" y="112" width="6" height="2.4" rx="1.2" fill="#2f7d2b" transform="rotate(16 161 113)"/>
  <rect x="184" y="98" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-8 187 99)"/>
  <rect x="108" y="118" width="5" height="2.2" rx="1.1" fill="#58c14a" transform="rotate(24 110 119)"/>
  <!-- gloss dots -->
  <circle cx="124" cy="98" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="106" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="152" cy="118" r="1.2" fill="#fff" opacity=".5"/>
</svg>
