<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="sspBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="sspbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="ssppork" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8632a"/><stop offset="50%" stop-color="#c33f14"/><stop offset="100%" stop-color="#8a2409"/>
    </linearGradient>
    <linearGradient id="ssppine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe07a"/><stop offset="55%" stop-color="#f6bc2a"/><stop offset="100%" stop-color="#d18e14"/>
    </linearGradient>
    <radialGradient id="sspglaze" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#d9491c" stop-opacity=".55"/><stop offset="100%" stop-color="#7a1305" stop-opacity=".15"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sspbg)"/>
  <!-- steam -->
  <path d="M116 54 C106 36 126 28 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#sspBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#sspBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="144" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="132" rx="144" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="130" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (rose family) -->
  <path d="M48 116 Q100 84 164 82" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy sweet-sour glaze pool -->
  <ellipse cx="160" cy="128" rx="112" ry="30" fill="url(#sspglaze)"/>
  <!-- BACK LAYER units (smaller, dimmer) -->
  <g opacity=".92">
    <!-- pineapple wedge back -->
    <g transform="translate(210 106) rotate(14) scale(.82)">
      <path d="M0 0 L22 -4 L26 12 L4 16 Z" fill="url(#ssppine)" stroke="#c98a1a" stroke-width="1.2"/>
      <path d="M6 4 L18 2 M8 9 L20 7" stroke="#e0a422" stroke-width="1" opacity=".7"/>
    </g>
    <!-- pork cube back -->
    <g transform="translate(96 104) rotate(-12) scale(.82)">
      <path d="M0 6 L14 0 L26 6 L26 20 L12 26 L0 20 Z" fill="url(#ssppork)" stroke="#7a1305" stroke-width="1.2"/>
      <path d="M0 6 L14 0 L26 6 L12 12 Z" fill="#f0713a" opacity=".55"/>
    </g>
    <!-- green bell pepper back -->
    <g transform="translate(180 108) rotate(-8) scale(.82)">
      <path d="M0 4 C6 -2 20 -2 24 6 C20 12 6 12 0 6 Z" fill="#3f9c37" stroke="#276e22" stroke-width="1.1"/>
      <path d="M4 2 C10 0 18 0 22 4" stroke="#6abf5a" stroke-width="1.1" fill="none" opacity=".7"/>
    </g>
  </g>
  <!-- FRONT LAYER hero units (larger, brighter) -->
  <!-- pork cube 1 -->
  <g transform="translate(112 118) rotate(-6)">
    <path d="M0 8 L18 0 L34 8 L34 26 L16 34 L0 26 Z" fill="url(#ssppork)" stroke="#7a1305" stroke-width="1.4"/>
    <path d="M0 8 L18 0 L34 8 L16 16 Z" fill="#f0713a" opacity=".6"/>
    <ellipse cx="14" cy="6" rx="7" ry="2.6" fill="#ffb27a" opacity=".7"/>
  </g>
  <!-- pineapple wedge front -->
  <g transform="translate(158 108) rotate(10)">
    <path d="M0 0 L30 -6 L36 16 L6 22 Z" fill="url(#ssppine)" stroke="#c98a1a" stroke-width="1.4"/>
    <path d="M8 5 L26 2 M10 11 L28 8 M12 17 L30 14" stroke="#e0a422" stroke-width="1.1" opacity=".7"/>
    <ellipse cx="16" cy="2" rx="9" ry="2.6" fill="#fff3b0" opacity=".7"/>
  </g>
  <!-- pork cube 2 -->
  <g transform="translate(196 120) rotate(12)">
    <path d="M0 8 L18 0 L34 8 L34 26 L16 34 L0 26 Z" fill="url(#ssppork)" stroke="#7a1305" stroke-width="1.4"/>
    <path d="M0 8 L18 0 L34 8 L16 16 Z" fill="#f0713a" opacity=".6"/>
    <ellipse cx="14" cy="6" rx="7" ry="2.6" fill="#ffb27a" opacity=".7"/>
  </g>
  <!-- pork cube 3 (lower center) -->
  <g transform="translate(140 132) rotate(4)">
    <path d="M0 7 L16 0 L30 7 L30 22 L14 29 L0 22 Z" fill="url(#ssppork)" stroke="#7a1305" stroke-width="1.4"/>
    <path d="M0 7 L16 0 L30 7 L14 14 Z" fill="#f0713a" opacity=".6"/>
    <ellipse cx="12" cy="5" rx="6" ry="2.4" fill="#ffb27a" opacity=".7"/>
  </g>
  <!-- red bell pepper front -->
  <g transform="translate(96 130) rotate(-14)">
    <path d="M0 5 C7 -3 24 -3 30 7 C24 15 7 15 0 7 Z" fill="#e0341f" stroke="#a01808" stroke-width="1.3"/>
    <path d="M5 2 C12 -1 22 -1 27 4" stroke="#ff7350" stroke-width="1.2" fill="none" opacity=".7"/>
  </g>
  <!-- garnish: scallion + sesame + gloss -->
  <rect x="150" y="146" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 153 147)"/>
  <rect x="182" y="144" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 185 145)"/>
  <circle cx="130" cy="112" r="1.2" fill="#f8eed6"/><circle cx="176" cy="128" r="1.2" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="126" cy="118" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="170" cy="110" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="204" cy="122" r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="148" cy="134" r="1.2" fill="#fff" opacity=".5"/>
</svg>
