<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="lp1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="lp1bowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="lp1oil" cx="48%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ef5520"/><stop offset="52%" stop-color="#b02408"/><stop offset="100%" stop-color="#7a1305"/>
    </radialGradient>
    <linearGradient id="lp1skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7ecc9"/><stop offset="100%" stop-color="#e3cd9a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#lp1bg)"/>
  <!-- steam -->
  <path d="M118 58 C108 42 128 34 118 14" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <path d="M202 54 C194 38 210 30 204 12" stroke="#fff" stroke-width="6" fill="none" opacity=".06" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl -->
  <path d="M56 116 C56 156 104 178 160 178 C216 178 264 156 264 116 Z" fill="url(#lp1bowl)"/>
  <ellipse cx="160" cy="116" rx="112" ry="30" fill="#0d0d10"/>
  <ellipse cx="160" cy="116" rx="112" ry="30" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="116" rx="100" ry="25" fill="#170a0b"/>
  <!-- neon steam arc -->
  <path d="M56 108 Q104 82 166 80" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- glossy red chili-oil pool -->
  <ellipse cx="160" cy="118" rx="95" ry="22" fill="url(#lp1oil)"/>
  <ellipse cx="134" cy="110" rx="30" ry="7" fill="#ff8a3a" opacity=".3" transform="rotate(-8 134 110)"/>
  <!-- broad flat liangpi ribbons, pale, translucent, draped in the oil -->
  <g stroke="#c9ad72" stroke-width="1.2" stroke-linejoin="round">
    <path d="M78 112 C104 100 150 100 176 106 C168 116 156 120 140 118 C112 122 88 120 78 112 Z" fill="url(#lp1skin)" opacity=".95"/>
    <path d="M150 104 C176 96 220 98 244 108 C232 118 216 120 198 116 C172 118 156 112 150 104 Z" fill="url(#lp1skin)" opacity=".95"/>
    <path d="M92 124 C118 116 160 116 188 122 C178 132 160 134 142 130 C118 132 100 130 92 124 Z" fill="url(#lp1skin)" opacity=".9"/>
    <path d="M170 122 C196 116 232 118 250 126 C240 134 222 134 206 130 C186 130 176 128 170 122 Z" fill="url(#lp1skin)" opacity=".9"/>
  </g>
  <!-- ribbon highlight edges -->
  <path d="M82 110 C108 100 150 100 172 106" stroke="#fff3d8" stroke-width="1.4" fill="none" opacity=".45" stroke-linecap="round"/>
  <path d="M154 104 C180 97 220 99 240 107" stroke="#fff3d8" stroke-width="1.4" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- red chili oil laps over the ribbons -->
  <path d="M100 118 C130 126 190 126 220 118" stroke="#c42a0a" stroke-width="4" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- cucumber slivers (julienne) -->
  <rect x="112" y="106" width="16" height="3" rx="1.5" fill="#6abf5a" transform="rotate(-12 120 107)"/>
  <rect x="164" y="102" width="16" height="3" rx="1.5" fill="#58c14a" transform="rotate(8 172 103)"/>
  <rect x="196" y="112" width="15" height="3" rx="1.5" fill="#6abf5a" transform="rotate(-6 203 113)"/>
  <rect x="130" y="122" width="14" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(16 137 123)"/>
  <!-- gluten cubes (面筋), spongy pale -->
  <g transform="translate(146 116) rotate(-8)"><rect x="-6" y="-6" width="12" height="12" rx="2" fill="#e8d9a8"/><circle cx="-2" cy="-1" r="1.2" fill="#c9b47e"/><circle cx="2" cy="2" r="1.2" fill="#c9b47e"/></g>
  <g transform="translate(206 124) rotate(12)"><rect x="-5.5" y="-5.5" width="11" height="11" rx="2" fill="#e0cf9c"/><circle cx="-1.5" cy="-1" r="1.1" fill="#c9b47e"/><circle cx="1.8" cy="1.6" r="1.1" fill="#c9b47e"/></g>
  <!-- bean sprouts hint -->
  <path d="M118 126 q6 -4 12 -2 M180 118 q6 -4 12 -1" stroke="#f4ecd0" stroke-width="2" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- sesame + garlic dots -->
  <ellipse cx="128" cy="114" rx="1.4" ry="1" fill="#f8eed6"/><ellipse cx="176" cy="112" rx="1.4" ry="1" fill="#f8eed6"/>
  <ellipse cx="210" cy="118" rx="1.4" ry="1" fill="#f8eed6"/>
  <circle cx="150" cy="110" r="1.8" fill="#f2ddb0"/><circle cx="192" cy="120" r="1.6" fill="#f2ddb0"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="116" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="152" cy="124" r="1.2" fill="#fff" opacity=".5"/>
</svg>
