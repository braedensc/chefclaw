<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ds1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ds1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="ds1sauce" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#6b4a1e"/><stop offset="55%" stop-color="#472e0f"/><stop offset="100%" stop-color="#2a1a08"/>
    </radialGradient>
    <linearGradient id="ds1pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6cf6a"/><stop offset="55%" stop-color="#e2a838"/><stop offset="100%" stop-color="#b4761d"/>
    </linearGradient>
    <linearGradient id="ds1egg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4a68"/><stop offset="50%" stop-color="#4e2846"/><stop offset="100%" stop-color="#2e1530"/>
    </linearGradient>
    <linearGradient id="ds1pep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ed957"/><stop offset="50%" stop-color="#4faa33"/><stop offset="100%" stop-color="#2f7d2b"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ds1bg)"/>
  <!-- steam -->
  <path d="M120 52 C110 34 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ds1Blur3)"/>
  <path d="M198 50 C190 34 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ds1Blur3)"/>
