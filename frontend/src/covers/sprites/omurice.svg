<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="omBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ombg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="omegg" cx="42%" cy="28%" r="82%">
      <stop offset="0%" stop-color="#ffe28a"/><stop offset="52%" stop-color="#fbc23a"/><stop offset="100%" stop-color="#e8971c"/>
    </radialGradient>
    <linearGradient id="omplate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0d0d10"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ombg)"/>
  <!-- rising steam (hot comfort dish) -->
  <path d="M122 54 C112 36 132 28 122 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#omBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#omBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="134" rx="146" ry="46" fill="url(#omplate)"/>
  <ellipse cx="160" cy="134" rx="146" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="132" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (rose/tomato) -->
  <path d="M52 118 Q106 84 168 82" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- rice peeking at the base edge of the omelette (a warm rim) -->
  <path d="M74 132 C82 146 118 156 160 156 C202 156 238 146 246 132 C238 148 200 160 160 160 C120 160 82 148 74 132 Z" fill="#e9d3a0" opacity=".55"/>
  <!-- omelette blanket: glossy football/dome shape draped over rice mound -->
  <path d="M72 124 C72 100 108 84 160 84 C212 84 248 100 248 124 C238 146 200 158 160 158 C120 158 82 146 72 124 Z" fill="url(#omegg)"/>
  <!-- omelette top highlight sheen -->
  <path d="M92 108 C120 92 200 92 228 108 C204 100 116 100 92 108 Z" fill="#fff0b0" opacity=".55"/>
  <path d="M84 120 C120 104 200 104 236 120" stroke="#fff3c8" stroke-width="2" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- soft egg folds/wrinkles for the wrapped look -->
  <path d="M108 96 C112 118 110 140 116 152" stroke="#e0971c" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <path d="M158 88 C160 116 158 142 160 156" stroke="#e0971c" stroke-width="2" fill="none" opacity=".38" stroke-linecap="round"/>
  <path d="M210 96 C208 118 210 140 206 152" stroke="#e0971c" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- omelette outline -->
  <path d="M72 124 C72 100 108 84 160 84 C212 84 248 100 248 124 C238 146 200 158 160 158 C120 158 82 146 72 124 Z" fill="none" stroke="#c47a12" stroke-width="1.4" opacity=".5"/>
  <!-- signature ketchup zig-zag squiggle on top -->
  <path d="M96 118 L118 106 L134 122 L152 106 L170 122 L188 106 L206 122 L224 108" stroke="#d3271a" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M96 118 L118 106 L134 122 L152 106 L170 122 L188 106 L206 122 L224 108" stroke="#ff5a3c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
  <!-- ketchup gloss highlights -->
  <circle cx="118" cy="107" r="1.3" fill="#ff9d7d" opacity=".8"/>
  <circle cx="170" cy="121" r="1.3" fill="#ff9d7d" opacity=".7"/>
  <circle cx="206" cy="121" r="1.2" fill="#ff9d7d" opacity=".7"/>
  <!-- parsley sprig garnish + egg gloss dots -->
  <path d="M232 138 C236 132 244 132 246 138 C242 140 236 142 232 138 Z" fill="#3f9c37"/>
  <path d="M238 134 l0 -4 M234 137 l-3 -2 M243 137 l3 -2" stroke="#58c14a" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="128" cy="98" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="98" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="102" r="1.3" fill="#fff" opacity=".5"/>
</svg>
