<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="gnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="gnbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="gnbowl" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="gnchip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d485"/><stop offset="60%" stop-color="#e2b054"/><stop offset="100%" stop-color="#bd8531"/>
    </linearGradient>
    <radialGradient id="gnguac" cx="42%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#bcd870"/><stop offset="100%" stop-color="#7ba03c"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gnbg)"/>
  <!-- steam (light — nachos are drier, keep subtle) -->
  <path d="M118 56 C108 40 128 32 118 14" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#gnBlur3)"/>
  <path d="M204 52 C196 38 212 30 204 12" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#gnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- shallow serving bowl -->
  <ellipse cx="160" cy="132" rx="140" ry="48" fill="url(#gnbowl)"/>
  <ellipse cx="160" cy="132" rx="140" ry="48" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="126" ry="40" fill="#0d0b10"/>
  <!-- neon steam arc -->
  <path d="M52 116 Q104 88 168 86" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- mounded pile of triangular tortilla chips (fanned, overlapping) -->
  <g stroke="#8f5f1c" stroke-width="1.3" stroke-linejoin="round">
    <!-- back row -->
    <path d="M70 118 L94 96 L104 122 Z" fill="url(#gnchip)" opacity=".92"/>
    <path d="M100 112 L126 90 L136 118 Z" fill="url(#gnchip)"/>
    <path d="M132 108 L158 88 L166 116 Z" fill="url(#gnchip)"/>
    <path d="M162 110 L190 90 L196 118 Z" fill="url(#gnchip)"/>
    <path d="M194 114 L222 96 L226 122 Z" fill="url(#gnchip)" opacity=".92"/>
    <!-- front row -->
    <path d="M78 138 L100 116 L116 142 Z" fill="url(#gnchip)"/>
    <path d="M110 140 L134 118 L148 146 Z" fill="url(#gnchip)"/>
    <path d="M144 142 L170 120 L182 148 Z" fill="url(#gnchip)"/>
    <path d="M178 140 L204 120 L214 146 Z" fill="url(#gnchip)"/>
    <path d="M210 136 L232 118 L244 142 Z" fill="url(#gnchip)" opacity=".95"/>
  </g>
  <!-- toasted-edge highlights on a few chips -->
  <path d="M94 96 L104 122" stroke="#fff0c4" stroke-width="1.2" opacity=".55"/>
  <path d="M158 88 L166 116" stroke="#fff0c4" stroke-width="1.2" opacity=".55"/>
  <path d="M170 120 L182 148" stroke="#fff0c4" stroke-width="1.2" opacity=".5"/>
  <!-- toasted brown speckles -->
  <circle cx="98" cy="108" r="1.4" fill="#9a6420" opacity=".6"/>
  <circle cx="150" cy="102" r="1.4" fill="#9a6420" opacity=".6"/>
  <circle cx="198" cy="106" r="1.3" fill="#9a6420" opacity=".55"/>
  <circle cx="132" cy="132" r="1.4" fill="#9a6420" opacity=".6"/>
  <!-- melted cheese drizzle across the pile -->
  <path d="M76 118 C112 108 200 110 236 120 C210 128 128 128 88 126 Z" fill="#f7b733" opacity=".78"/>
  <path d="M92 116 C130 110 196 112 228 120" stroke="#ffd873" stroke-width="2" fill="none" opacity=".7" stroke-linecap="round"/>
  <path d="M120 124 C150 130 190 130 214 124" stroke="#f7b733" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- big guacamole dollop (hero, center-front) -->
  <g transform="translate(150 128)">
    <path d="M-26 -4 C-28 -16 -10 -18 2 -14 C16 -18 30 -12 28 -2 C28 8 12 14 -2 12 C-16 12 -26 6 -26 -4 Z" fill="url(#gnguac)"/>
    <path d="M-26 -4 C-28 -16 -10 -18 2 -14 C16 -18 30 -12 28 -2" fill="none" stroke="#9dc056" stroke-width="1.4" opacity=".7"/>
    <path d="M-16 -4 q6 -4 12 0 M0 -8 q6 -3 12 1 M-10 4 q6 -3 12 1" stroke="#6b8f32" stroke-width="1.4" fill="none" opacity=".5"/>
    <ellipse cx="-4" cy="-8" rx="8" ry="3.2" fill="#d3e88f" opacity=".7"/>
    <!-- diced tomato + onion on the guac -->
    <rect x="6" y="-2" width="4.5" height="4" rx="1.2" fill="#e0341f" transform="rotate(14 8 0)"/>
    <rect x="-12" y="0" width="4" height="3.4" rx="1" fill="#f4ead0" transform="rotate(-12 -10 1)"/>
  </g>
  <!-- salsa dollops + jalapeño rings scattered -->
  <circle cx="108" cy="120" r="5" fill="#d8300f" opacity=".9"/>
  <circle cx="108" cy="120" r="2" fill="#ff6a45" opacity=".7"/>
  <circle cx="214" cy="118" r="5" fill="#c31f12" opacity=".9"/>
  <circle cx="214" cy="118" r="2" fill="#ff6a45" opacity=".7"/>
  <!-- jalapeño rings -->
  <g fill="none" stroke="#4f9e3a" stroke-width="2.4">
    <circle cx="128" cy="112" r="4"/>
    <circle cx="188" cy="112" r="4"/>
  </g>
  <circle cx="128" cy="112" r="1.6" fill="#2a2214"/>
  <circle cx="188" cy="112" r="1.6" fill="#2a2214"/>
  <!-- cilantro flecks -->
  <rect x="140" y="112" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-18 143 113)"/>
  <rect x="170" y="118" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(16 173 119)"/>
  <!-- gloss dots -->
  <circle cx="120" cy="104" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="104" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="124" r="1.2" fill="#fff" opacity=".5"/>
</svg>
