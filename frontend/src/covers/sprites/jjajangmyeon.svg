  <g stroke-linecap="round">
    <path d="M214 66 L152 128" stroke="#b98a4e" stroke-width="5"/>
    <path d="M226 74 L164 134" stroke="#a67a40" stroke-width="5"/>
    <path d="M214 66 L152 128" stroke="#d8b47f" stroke-width="1.4" opacity=".5"/>
  </g>
  <!-- a couple noodle strands lifted by the chopsticks -->
  <path d="M158 124 C160 138 150 146 156 152" stroke="#e6cf9d" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M164 128 C166 140 158 148 162 154" stroke="#3d2f28" stroke-width="3" fill="none" stroke-linecap="round" opacity=".8"/>
  <!-- oil gloss dots -->
  <circle cx="138" cy="102" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="188" cy="106" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="158" cy="120" r="1.2" fill="#fff" opacity=".5"/>
