  <ellipse cx="160" cy="132" rx="128" ry="38" fill="#0e0d11"/>
  <!-- neon steam arc (warm) -->
  <path d="M52 116 Q104 84 168 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
