  <rect x="146" y="94" width="30" height="4" rx="2" fill="#5ecb4e" transform="rotate(-6 161 96)"/>
  <rect x="150" y="98" width="26" height="3.4" rx="1.7" fill="#3f9c37" transform="rotate(-6 163 100)"/>
  <rect x="152" y="90" width="24" height="3.4" rx="1.7" fill="#6abf5a" transform="rotate(-4 164 92)"/>
