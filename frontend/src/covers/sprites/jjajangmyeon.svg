<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="jjmBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="jjmbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="jjmplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="jjmnest" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#f3e0ac"/><stop offset="60%" stop-color="#e0c485"/><stop offset="100%" stop-color="#c6a45f"/>
    </radialGradient>
    <radialGradient id="jjmsauce" cx="46%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#3d2f28"/><stop offset="52%" stop-color="#241a15"/><stop offset="100%" stop-color="#120b08"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#jjmbg)"/>
  <!-- rising steam wisps -->
  <path d="M126 52 C118 36 134 28 126 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#jjmBlur3)"/>
  <path d="M198 50 C190 34 206 26 198 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#jjmBlur3)"/>
  <!-- cast shadow -->
