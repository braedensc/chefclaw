  <path d="M66 128 C72 100 108 90 160 90 C212 90 248 100 254 128 C228 148 196 154 160 154 C124 154 92 148 66 128 Z" fill="url(#jjmnest)"/>
  <g stroke-linecap="round" fill="none">
    <path d="M74 128 C104 112 150 110 186 118" stroke="#8a5a1e" stroke-width="6" opacity=".55"/>
    <path d="M78 124 C110 108 154 106 196 114" stroke="#e6cf9d" stroke-width="6"/>
    <path d="M84 134 C118 122 160 120 208 126" stroke="#d9bd85" stroke-width="6"/>
    <path d="M92 118 C122 104 162 102 202 108" stroke="#f3e2b0" stroke-width="5"/>
    <path d="M100 138 C132 128 172 128 214 132" stroke="#cdb078" stroke-width="6"/>
    <path d="M86 124 C116 110 156 108 194 114" stroke="#fff1c9" stroke-width="2" opacity=".8"/>
    <path d="M96 132 C128 122 166 120 206 126" stroke="#fff1c9" stroke-width="2" opacity=".6"/>
  </g>
  <!-- glossy black-bean sauce pooled/draped ON TOP of the noodles -->
  <path d="M96 108 C90 96 118 90 140 92 C164 88 196 92 210 104 C224 116 214 132 190 138 C162 144 128 142 108 132 C92 124 90 116 96 108 Z" fill="url(#jjmsauce)"/>
  <path d="M96 108 C90 96 118 90 140 92 C164 88 196 92 210 104 C224 116 214 132 190 138 C162 144 128 142 108 132 C92 124 90 116 96 108 Z" fill="none" stroke="#0a0605" stroke-width="1.4" opacity=".6"/>
  <!-- glossy sauce highlights -->
  <ellipse cx="132" cy="106" rx="18" ry="6" fill="#5a463a" opacity=".55"/>
  <ellipse cx="182" cy="112" rx="14" ry="5" fill="#4a382d" opacity=".5"/>
  <ellipse cx="150" cy="124" rx="16" ry="5" fill="#3a2c23" opacity=".5"/>
  <!-- diced pork + onion chunks in the sauce -->
  <rect x="118" y="104" width="9" height="8" rx="2.4" fill="#5e2410" transform="rotate(-12 122 108)"/>
  <rect x="150" y="100" width="9" height="8" rx="2.4" fill="#6b2f16" transform="rotate(10 154 104)"/>
  <rect x="184" y="108" width="8" height="7" rx="2.2" fill="#5e2410" transform="rotate(-8 188 111)"/>
  <rect x="132" y="122" width="8" height="7" rx="2.2" fill="#7c3a20" transform="rotate(16 136 125)"/>
  <rect x="170" y="124" width="8" height="7" rx="2.2" fill="#5e2410" transform="rotate(-14 174 127)"/>
  <!-- translucent onion dice highlights -->
  <rect x="140" y="112" width="7" height="6" rx="2" fill="#e7d8bf" opacity=".45" transform="rotate(8 143 115)"/>
  <rect x="164" y="106" width="7" height="6" rx="2" fill="#e7d8bf" opacity=".4" transform="rotate(-10 167 109)"/>
