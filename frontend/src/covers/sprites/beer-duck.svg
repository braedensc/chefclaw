<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="bdkBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bdkbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="bdkpot" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#3a2116"/><stop offset="60%" stop-color="#22120a"/><stop offset="100%" stop-color="#140a06"/>
    </radialGradient>
    <radialGradient id="bdksauce" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#8f2f12"/><stop offset="55%" stop-color="#5f1608"/><stop offset="100%" stop-color="#380904"/>
    </radialGradient>
    <linearGradient id="bdkskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cf5226"/><stop offset="50%" stop-color="#93340f"/><stop offset="100%" stop-color="#5e2410"/>
    </linearGradient>
    <linearGradient id="bdkfroth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2cf"/><stop offset="100%" stop-color="#f2d791"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bdkbg)"/>
  <!-- rising steam wisps -->
  <path d="M124 52 C114 34 134 28 124 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bdkBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#bdkBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="140" ry="21" fill="#000" opacity=".5"/>
  <!-- curved clay braise pot -->
  <path d="M56 108 C56 96 92 88 160 88 C228 88 264 96 264 108 L258 150 C258 168 214 180 160 180 C106 180 62 168 62 150 Z" fill="url(#bdkpot)"/>
  <path d="M56 108 C56 96 92 88 160 88 C228 88 264 96 264 108 L258 150 C258 168 214 180 160 180 C106 180 62 168 62 150 Z" fill="none" stroke="#4a2a19" stroke-width="2.5"/>
  <!-- pot rim -->
  <ellipse cx="160" cy="106" rx="104" ry="24" fill="#241209"/>
  <ellipse cx="160" cy="106" rx="104" ry="24" fill="none" stroke="#5a3320" stroke-width="2.5"/>
  <!-- neon steam arc (cyan) -->
  <path d="M52 96 Q104 64 168 66" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- braising liquid pooled inside -->
  <ellipse cx="160" cy="108" rx="94" ry="19" fill="url(#bdksauce)"/>
  <!-- beer froth / bubbles on the sauce surface -->
  <ellipse cx="108" cy="102" rx="14" ry="4.5" fill="url(#bdkfroth)" opacity=".7"/>
  <ellipse cx="212" cy="104" rx="12" ry="4" fill="url(#bdkfroth)" opacity=".6"/>
  <circle cx="118" cy="100" r="2" fill="#fff3d0" opacity=".8"/>
  <circle cx="204" cy="101" r="1.8" fill="#fff3d0" opacity=".7"/>
  <circle cx="150" cy="112" r="1.6" fill="#fff3d0" opacity=".6"/>
  <!-- back-row duck chunks (glazed skin-on, irregular) -->
  <g transform="translate(0 0)" opacity=".95">
    <g transform="translate(112 92) rotate(-8) scale(.86)">
      <path d="M0 8 C-2 -2 12 -6 20 -2 C30 -6 40 2 36 10 C40 18 28 24 16 20 C4 22 -2 16 0 8 Z" fill="url(#bdkskin)" stroke="#3a1607" stroke-width="1.3"/>
      <ellipse cx="14" cy="0" rx="8" ry="3" fill="#e88a4c" opacity=".55"/>
    </g>
    <g transform="translate(178 92) rotate(10) scale(.86)">
      <path d="M0 8 C-2 -2 12 -6 20 -2 C30 -6 40 2 36 10 C40 18 28 24 16 20 C4 22 -2 16 0 8 Z" fill="url(#bdkskin)" stroke="#3a1607" stroke-width="1.3"/>
      <ellipse cx="14" cy="0" rx="8" ry="3" fill="#e88a4c" opacity=".55"/>
    </g>
  </g>
  <!-- front-row duck chunks (larger, brighter, glossy) -->
  <g transform="translate(86 104) rotate(-12)">
    <path d="M0 10 C-3 -3 16 -8 26 -3 C39 -8 52 3 47 13 C52 23 37 31 21 26 C6 29 -3 21 0 10 Z" fill="url(#bdkskin)" stroke="#3a1607" stroke-width="1.4"/>
    <ellipse cx="18" cy="-1" rx="11" ry="4" fill="#f09656" opacity=".6"/>
    <circle cx="12" cy="4" r="1.6" fill="#fff" opacity=".6"/>
  </g>
  <g transform="translate(158 108) rotate(6)">
    <path d="M0 10 C-3 -3 16 -8 26 -3 C39 -8 52 3 47 13 C52 23 37 31 21 26 C6 29 -3 21 0 10 Z" fill="url(#bdkskin)" stroke="#3a1607" stroke-width="1.4"/>
    <ellipse cx="18" cy="-1" rx="11" ry="4" fill="#f09656" opacity=".6"/>
    <circle cx="14" cy="5" r="1.5" fill="#fff" opacity=".55"/>
  </g>
  <g transform="translate(126 116) rotate(-4)">
    <path d="M0 9 C-3 -3 15 -7 24 -3 C36 -7 48 2 44 12 C48 21 34 28 20 24 C6 27 -3 19 0 9 Z" fill="url(#bdkskin)" stroke="#3a1607" stroke-width="1.4"/>
    <ellipse cx="17" cy="-1" rx="10" ry="3.6" fill="#f09656" opacity=".55"/>
    <circle cx="30" cy="6" r="1.4" fill="#fff" opacity=".5"/>
  </g>
  <!-- ginger slices + dried chili + star anise accents -->
  <ellipse cx="98" cy="120" rx="6" ry="4" fill="#e8c98a" opacity=".9" transform="rotate(-16 98 120)"/>
  <ellipse cx="204" cy="120" rx="6" ry="4" fill="#e8c98a" opacity=".85" transform="rotate(12 204 120)"/>
  <path d="M186 116 l10 4" stroke="#d0341f" stroke-width="3" stroke-linecap="round"/>
  <path d="M120 132 l-10 3" stroke="#e0341f" stroke-width="3" stroke-linecap="round"/>
  <!-- scallion greens -->
  <rect x="150" y="122" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-14 154 123)"/>
  <rect x="172" y="128" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(18 175 129)"/>
  <rect x="112" y="126" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-22 115 127)"/>
  <!-- gloss dots -->
  <circle cx="140" cy="108" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="116" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="108" cy="112" r="1.2" fill="#fff" opacity=".5"/>
</svg>
