<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="brBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="brbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="brmound" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#fbf1d6"/><stop offset="55%" stop-color="#f0dcaa"/><stop offset="100%" stop-color="#d8b878"/>
    </radialGradient>
    <linearGradient id="brchick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9772f"/><stop offset="100%" stop-color="#94481a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#brbg)"/>
  <!-- steam -->
  <path d="M124 54 C114 36 134 28 124 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#brBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#brBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- wide oval platter -->
  <ellipse cx="160" cy="128" rx="144" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="128" rx="144" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="130" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (warm/amber) -->
  <path d="M46 116 Q98 84 164 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- saffron-streaked rice mound: shadow then lit body -->
  <path d="M52 132 C58 104 100 92 160 92 C220 92 262 104 268 132 C236 154 200 160 160 160 C120 160 84 154 52 132 Z" fill="#9a7c42" opacity=".55"/>
  <path d="M56 128 C62 100 102 88 160 88 C218 88 258 100 264 128 C234 148 200 154 160 154 C120 154 86 148 56 128 Z" fill="url(#brmound)"/>
  <path d="M56 128 C62 100 102 88 160 88 C218 88 258 100 264 128" fill="none" stroke="#fff6d8" stroke-width="1.4" opacity=".35"/>
  <!-- long basmati grains: pale strokes + saffron-orange streaked grains -->
  <g stroke-linecap="round" fill="none">
    <path d="M88 112 l12 -4" stroke="#fffbe8" stroke-width="2.6"/>
    <path d="M110 122 l12 4" stroke="#e8cf9a" stroke-width="2.6"/>
    <path d="M132 104 l13 -3" stroke="#fffbe8" stroke-width="2.6"/>
    <path d="M156 120 l-12 4" stroke="#e8cf9a" stroke-width="2.6"/>
    <path d="M172 100 l12 4" stroke="#fffbe8" stroke-width="2.6"/>
    <path d="M192 116 l13 -4" stroke="#e8cf9a" stroke-width="2.6"/>
    <path d="M214 108 l-11 4" stroke="#fffbe8" stroke-width="2.4"/>
    <path d="M100 138 l12 3" stroke="#e8cf9a" stroke-width="2.4"/>
    <path d="M140 140 l12 -3" stroke="#fffbe8" stroke-width="2.4"/>
    <path d="M180 138 l-12 3" stroke="#e8cf9a" stroke-width="2.4"/>
    <path d="M210 134 l12 -4" stroke="#fffbe8" stroke-width="2.4"/>
    <!-- saffron-dyed grains -->
    <path d="M118 112 l11 -3" stroke="#f6ac25" stroke-width="2.6"/>
    <path d="M160 106 l12 3" stroke="#ef8c1c" stroke-width="2.6"/>
    <path d="M198 126 l-11 3" stroke="#f6ac25" stroke-width="2.4"/>
    <path d="M128 128 l11 -3" stroke="#ef8c1c" stroke-width="2.4"/>
    <path d="M96 122 l11 3" stroke="#f6ac25" stroke-width="2.2"/>
  </g>
  <!-- chicken pieces tucked in -->
  <g>
    <path d="M100 118 C94 110 106 104 118 106 C130 102 138 112 134 120 C138 128 126 134 114 130 C104 132 96 124 100 118 Z" fill="url(#brchick)" stroke="#6e2f0d" stroke-width="1.3"/>
    <ellipse cx="112" cy="112" rx="7" ry="3" fill="#e8a860" opacity=".7"/>
  </g>
  <g>
    <path d="M184 120 C178 112 190 106 202 108 C214 104 222 114 218 122 C222 130 210 136 198 132 C188 134 180 126 184 120 Z" fill="url(#brchick)" stroke="#6e2f0d" stroke-width="1.3"/>
    <ellipse cx="196" cy="114" rx="7" ry="3" fill="#e8a860" opacity=".7"/>
  </g>
  <!-- crispy fried-onion strands (birista) -->
  <g stroke-linecap="round" fill="none">
    <path d="M138 108 C146 104 154 104 160 108" stroke="#8a5a1e" stroke-width="2.4"/>
    <path d="M148 116 C156 112 166 112 172 116" stroke="#6b4a17" stroke-width="2.4"/>
    <path d="M126 122 C134 118 144 118 150 122" stroke="#8a5a1e" stroke-width="2.2"/>
  </g>
  <!-- boiled egg half -->
  <g transform="translate(150 128)">
    <ellipse rx="10" ry="7" fill="#f7efe0"/>
    <ellipse rx="10" ry="7" fill="none" stroke="#d8c9a8" stroke-width="1"/>
    <ellipse rx="4.5" ry="3.4" fill="#f6c23a"/>
    <ellipse cx="-1.4" cy="-1.2" rx="1.4" ry="1" fill="#ffe08a" opacity=".8"/>
  </g>
  <!-- cilantro + mint flecks + red chili -->
  <rect x="118" y="100" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-18 121 101)"/>
  <rect x="164" y="98" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(14 167 99)"/>
  <rect x="200" y="106" width="7" height="2.6" rx="1.3" fill="#2f7d2b" transform="rotate(-10 203 107)"/>
  <rect x="132" y="138" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 135 139)"/>
  <rect x="176" y="110" width="8" height="2.2" rx="1.1" fill="#e0341f" transform="rotate(-16 180 111)"/>
  <!-- gloss dots -->
  <circle cx="130" cy="110" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="106" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
