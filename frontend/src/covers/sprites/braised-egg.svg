<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="beBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bebg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="besauce" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#5a2410"/><stop offset="60%" stop-color="#3b1608"/><stop offset="100%" stop-color="#1c0d06"/>
    </radialGradient>
    <linearGradient id="beskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9612a"/><stop offset="50%" stop-color="#7c3a18"/><stop offset="100%" stop-color="#54230d"/>
    </linearGradient>
    <radialGradient id="bewhite" cx="42%" cy="34%" r="74%">
      <stop offset="0%" stop-color="#f3d9b0"/><stop offset="60%" stop-color="#e2bd85"/><stop offset="100%" stop-color="#c99a5c"/>
    </radialGradient>
    <radialGradient id="beyolk" cx="40%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#ffe07a"/><stop offset="50%" stop-color="#f2b52a"/><stop offset="100%" stop-color="#cf8416"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bebg)"/>
  <!-- rising steam wisps -->
  <path d="M120 54 C110 36 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#beBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#beBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="130" ry="20" fill="#000" opacity=".5"/>
  <!-- shallow side-dish bowl -->
  <ellipse cx="160" cy="136" rx="118" ry="42" fill="#161019"/>
  <ellipse cx="160" cy="136" rx="118" ry="42" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="104" ry="34" fill="#100c15"/>
  <!-- neon steam arc (cyan) -->
  <path d="M62 118 Q112 88 172 86" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- dark soy braising liquid pool -->
  <ellipse cx="160" cy="134" rx="98" ry="26" fill="url(#besauce)"/>
  <ellipse cx="150" cy="128" rx="46" ry="10" fill="#6b3016" opacity=".4"/>
  <!-- BACK whole braised eggs (glossy soy-brown ovals) -->
  <g>
    <ellipse cx="104" cy="116" rx="24" ry="19" fill="url(#beskin)" stroke="#3a1808" stroke-width="1.4"/>
    <ellipse cx="96" cy="108" rx="9" ry="5" fill="#e0a15a" opacity=".55"/>
    <ellipse cx="216" cy="116" rx="24" ry="19" fill="url(#beskin)" stroke="#3a1808" stroke-width="1.4"/>
    <ellipse cx="208" cy="108" rx="9" ry="5" fill="#e0a15a" opacity=".55"/>
  </g>
  <!-- FRONT halved eggs showing yolk (cut face up) -->
  <g transform="translate(128 122) rotate(-6)">
    <!-- glossy brown skin ring seen from cut side -->
    <ellipse cx="0" cy="0" rx="30" ry="24" fill="url(#beskin)" stroke="#3a1808" stroke-width="1.5"/>
    <!-- creamy white cut face -->
    <ellipse cx="0" cy="0" rx="24" ry="18" fill="url(#bewhite)"/>
    <!-- amber yolk -->
    <ellipse cx="-2" cy="0" rx="11" ry="10" fill="url(#beyolk)" stroke="#c07d16" stroke-width="1.1"/>
    <ellipse cx="-6" cy="-4" rx="4" ry="3" fill="#fff0b8" opacity=".8"/>
    <!-- skin highlight -->
    <ellipse cx="-16" cy="-14" rx="8" ry="4" fill="#c98a4a" opacity=".5"/>
  </g>
  <g transform="translate(196 124) rotate(8)">
    <ellipse cx="0" cy="0" rx="28" ry="23" fill="url(#beskin)" stroke="#3a1808" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="22" ry="17" fill="url(#bewhite)"/>
    <ellipse cx="2" cy="0" rx="10" ry="9" fill="url(#beyolk)" stroke="#c07d16" stroke-width="1.1"/>
    <ellipse cx="-2" cy="-4" rx="3.6" ry="2.8" fill="#fff0b8" opacity=".8"/>
    <ellipse cx="14" cy="-13" rx="7" ry="4" fill="#c98a4a" opacity=".5"/>
  </g>
  <!-- sauce sheen lapping the halves -->
  <path d="M96 146 C130 156 200 156 232 146 C202 160 128 160 96 146 Z" fill="#3b1608" opacity=".55"/>
  <!-- garnish: scallion + star-anise hint + sesame -->
  <rect x="150" y="112" width="8" height="3" rx="1.4" fill="#5ecb4e" transform="rotate(-18 154 113)"/>
  <rect x="118" y="146" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(22 121 147)"/>
  <rect x="200" y="146" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-14 203 147)"/>
  <circle cx="162" cy="118" r="1.6" fill="#f8eed6"/>
  <circle cx="140" cy="150" r="1.4" fill="#f8eed6"/>
  <circle cx="184" cy="150" r="1.4" fill="#f8eed6"/>
  <!-- gloss dots on glossy skins -->
  <circle cx="108" cy="110" r="1.6" fill="#fff" opacity=".55"/>
  <circle cx="220" cy="110" r="1.5" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="118" r="1.4" fill="#fff" opacity=".55"/>
</svg>
