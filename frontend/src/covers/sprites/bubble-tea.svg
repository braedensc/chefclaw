<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="btBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="btbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="btglass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".04"/><stop offset="18%" stop-color="#ffffff" stop-opacity=".15"/><stop offset="50%" stop-color="#ffffff" stop-opacity=".03"/><stop offset="82%" stop-color="#ffffff" stop-opacity=".10"/><stop offset="100%" stop-color="#ffffff" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="bttea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c79a"/><stop offset="45%" stop-color="#d3ab74"/><stop offset="100%" stop-color="#bd9159"/>
    </linearGradient>
    <radialGradient id="btpearl" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#6b5340"/><stop offset="55%" stop-color="#3b2a1c"/><stop offset="100%" stop-color="#1c120a"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#btbg)"/>
  <!-- rising steam/aroma wisps (cool drink, subtle) -->
  <path d="M138 46 C130 30 146 24 138 8" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#btBlur3)"/>
  <path d="M186 48 C180 32 194 26 188 10" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#btBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="118" ry="18" fill="#000" opacity=".5"/>
  <!-- neon steam arc (rose family) -->
  <path d="M96 76 Q132 50 176 52" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- dark ring base under cup -->
  <ellipse cx="160" cy="178" rx="70" ry="14" fill="#141018"/>
  <ellipse cx="160" cy="178" rx="70" ry="14" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <ellipse cx="160" cy="176" rx="54" ry="10" fill="#0c0c10"/>
  <!-- cup body: classic bubble-tea cup, slightly wider at top -->
  <path d="M118 62 L202 62 L192 170 C186 176 134 176 128 170 Z" fill="#0f0d12"/>
  <!-- milk tea fill -->
  <path d="M120 70 L200 70 L191 168 C186 173 134 173 129 168 Z" fill="url(#bttea)"/>
  <!-- lighter milk swirl near top -->
  <path d="M124 84 C142 78 178 80 196 86 C178 92 142 92 124 88 Z" fill="#f0dcbb" opacity=".55"/>
  <path d="M126 96 C150 90 176 98 194 92" stroke="#f4e6cc" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- tapioca pearls mounded at the bottom -->
  <g>
    <circle cx="140" cy="158" r="9" fill="url(#btpearl)"/>
    <circle cx="137" cy="154" r="2.4" fill="#8a7058" opacity=".8"/>
    <circle cx="160" cy="162" r="10" fill="url(#btpearl)"/>
    <circle cx="156" cy="157" r="2.6" fill="#8a7058" opacity=".8"/>
    <circle cx="181" cy="158" r="9" fill="url(#btpearl)"/>
    <circle cx="178" cy="154" r="2.4" fill="#8a7058" opacity=".8"/>
    <circle cx="150" cy="150" r="7.5" fill="url(#btpearl)"/>
    <circle cx="147" cy="147" r="2" fill="#8a7058" opacity=".8"/>
    <circle cx="171" cy="149" r="7.5" fill="url(#btpearl)"/>
    <circle cx="168" cy="146" r="2" fill="#8a7058" opacity=".8"/>
    <circle cx="132" cy="147" r="6" fill="url(#btpearl)"/>
    <circle cx="189" cy="147" r="6" fill="url(#btpearl)"/>
    <circle cx="160" cy="145" r="6.5" fill="url(#btpearl)"/>
    <circle cx="158" cy="142" r="1.8" fill="#8a7058" opacity=".8"/>
  </g>
  <!-- glass overlay sheen -->
  <path d="M118 62 L202 62 L192 170 C186 176 134 176 128 170 Z" fill="url(#btglass)"/>
  <path d="M118 62 L202 62 L192 170 C186 176 134 176 128 170 Z" fill="none" stroke="#f2d8e0" stroke-width="1.5" opacity=".3"/>
  <path d="M130 70 L127 164" stroke="#ffffff" stroke-width="3" opacity=".26" stroke-linecap="round"/>
  <path d="M190 70 L192 162" stroke="#ffffff" stroke-width="2" opacity=".16" stroke-linecap="round"/>
  <!-- domed lid -->
  <path d="M116 62 Q160 44 204 62 Z" fill="#15121b"/>
  <path d="M116 62 Q160 44 204 62" fill="none" stroke="#33283c" stroke-width="2" opacity=".8"/>
  <ellipse cx="160" cy="62" rx="44" ry="6" fill="#1a1622"/>
  <path d="M126 58 Q160 48 194 58" stroke="#c99" stroke-width="1.4" fill="none" opacity=".25" stroke-linecap="round"/>
  <!-- wide fat straw, angled, piercing the lid -->
  <path d="M182 22 L212 20 L172 176 L154 174 Z" fill="#ff4d6d" opacity=".9"/>
  <path d="M182 22 L212 20 L172 176 L154 174 Z" fill="none" stroke="#c92845" stroke-width="1.3" opacity=".7"/>
  <path d="M190 26 L164 166" stroke="#ffd0da" stroke-width="3" opacity=".5" stroke-linecap="round"/>
  <path d="M204 24 L176 168" stroke="#ff8ba0" stroke-width="2" opacity=".4" stroke-linecap="round"/>
  <!-- straw top opening -->
  <ellipse cx="197" cy="21" rx="15" ry="4.5" fill="#c92845" transform="rotate(-4 197 21)"/>
  <!-- gloss dots -->
  <circle cx="140" cy="90" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="176" cy="120" r="1.2" fill="#fff" opacity=".4"/>
  <circle cx="152" cy="153" r="1.2" fill="#fff" opacity=".5"/>
</svg>
