<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="phBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="phbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="phbroth" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#b97a2c"/><stop offset="52%" stop-color="#8a4f12"/><stop offset="100%" stop-color="#5c320a"/>
    </radialGradient>
    <linearGradient id="phbowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="phnest" cx="46%" cy="34%" r="76%">
      <stop offset="0%" stop-color="#f4e6c6"/><stop offset="60%" stop-color="#e2c893"/><stop offset="100%" stop-color="#c9a869"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#phbg)"/>
  <!-- steam -->
  <path d="M116 58 C106 40 126 32 116 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#phBlur3)"/>
  <path d="M198 54 C190 38 208 30 200 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#phBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl -->
  <path d="M40 104 C40 154 98 180 160 180 C222 180 280 154 280 104 Z" fill="url(#phbowl)"/>
  <ellipse cx="160" cy="104" rx="122" ry="32" fill="#0d0d10"/>
  <ellipse cx="160" cy="104" rx="122" ry="32" fill="none" stroke="#271b22" stroke-width="3"/>
  <ellipse cx="160" cy="104" rx="110" ry="26" fill="#120b0a"/>
  <!-- neon steam arc (warm/rose for global dish) -->
  <path d="M56 96 Q102 70 164 68" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
