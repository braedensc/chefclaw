  <ellipse cx="160" cy="106" rx="102" ry="23" fill="url(#phbroth)"/>
  <ellipse cx="130" cy="98" rx="30" ry="6" fill="#e0a24a" opacity=".3" transform="rotate(-8 130 98)"/>
  <!-- pale rice-noodle nest (strands) mounded slightly proud of broth -->
  <g stroke-linecap="round" fill="none" opacity=".92">
    <path d="M108 108 C124 96 152 96 172 104" stroke="#d9c088" stroke-width="4"/>
    <path d="M100 112 C120 102 156 102 184 110" stroke="#e6d19a" stroke-width="4"/>
    <path d="M112 116 C136 106 172 106 198 114" stroke="#cdb078" stroke-width="4"/>
    <path d="M96 108 C116 100 148 100 168 108" stroke="#efe0b0" stroke-width="3"/>
    <path d="M124 104 C144 96 176 96 200 106" stroke="#d9c088" stroke-width="3.4"/>
    <path d="M116 110 C140 102 176 102 202 110" stroke="#fff1c9" stroke-width="1.8"/>
    <path d="M104 114 C128 106 164 106 190 114" stroke="#8a5a1e" stroke-width="1.8" opacity=".7"/>
  </g>
  <!-- thin-sliced beef draped on top -->
  <g>
    <path d="M108 96 C114 90 128 90 136 94 C132 100 132 104 136 108 C126 110 114 108 108 102 Z" fill="#a94a3a"/>
    <path d="M110 98 C120 94 128 94 134 96" stroke="#d98a70" stroke-width="1.6" fill="none" opacity=".7"/>
    <path d="M110 103 C120 100 128 100 134 103" stroke="#f4d8c0" stroke-width="1.2" fill="none" opacity=".55"/>
  </g>
  <g transform="translate(48 8)">
    <path d="M108 96 C114 90 128 90 136 94 C132 100 132 104 136 108 C126 110 114 108 108 102 Z" fill="#9c4234"/>
    <path d="M110 98 C120 94 128 94 134 96" stroke="#d98a70" stroke-width="1.6" fill="none" opacity=".7"/>
    <path d="M110 103 C120 100 128 100 134 103" stroke="#f4d8c0" stroke-width="1.2" fill="none" opacity=".55"/>
  </g>
  <!-- chopsticks lifting a few strands up-right -->
  <g transform="rotate(-24 224 66)">
    <rect x="196" y="60" width="70" height="5" rx="2.5" fill="#b98a4e"/>
    <rect x="196" y="70" width="70" height="5" rx="2.5" fill="#a67a40"/>
  </g>
  <g stroke-linecap="round" fill="none" opacity=".9">
    <path d="M188 82 C196 74 202 66 206 58" stroke="#e6d19a" stroke-width="2.6"/>
    <path d="M194 86 C202 78 210 70 214 60" stroke="#efe0b0" stroke-width="2.4"/>
  </g>
  <!-- herbs: cilantro + thai basil + scallion -->
  <rect x="120" y="92" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-18 123 93)"/>
  <rect x="150" y="96" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(14 153 97)"/>
  <rect x="176" y="98" width="7" height="2.6" rx="1.3" fill="#2f7d2b" transform="rotate(-8 179 99)"/>
  <rect x="134" y="108" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(24 137 109)"/>
  <rect x="164" y="110" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-16 167 111)"/>
  <!-- red chili ring + lime hint -->
  <circle cx="140" cy="116" r="3" fill="none" stroke="#e0341f" stroke-width="1.6"/>
  <circle cx="140" cy="116" r="1" fill="#ffd9a2"/>
  <path d="M182 118 A5 5 0 0 1 190 118 Z" fill="#8fd04a" opacity=".85"/>
  <!-- bean sprouts -->
  <path d="M118 118 C122 116 126 118 128 116" stroke="#f4ead0" stroke-width="1.6" fill="none" opacity=".8"/>
  <path d="M196 108 C200 106 204 108 206 106" stroke="#f4ead0" stroke-width="1.6" fill="none" opacity=".8"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="100" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="178" cy="106" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="112" r="1.2" fill="#fff" opacity=".5"/>
</svg>
