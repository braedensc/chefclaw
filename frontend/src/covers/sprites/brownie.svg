<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="brbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="brface2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3016"/><stop offset="50%" stop-color="#3d1c0d"/><stop offset="100%" stop-color="#261006"/>
    </linearGradient>
    <linearGradient id="brtop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2410"/><stop offset="100%" stop-color="#2e1408"/>
    </linearGradient>
    <linearGradient id="brcrackle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c69a68"/><stop offset="100%" stop-color="#8a5e34"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#brbg)"/>
  <ellipse cx="160" cy="186" rx="148" ry="22" fill="#000" opacity=".5"/>
  <!-- plate -->
  <ellipse cx="160" cy="142" rx="138" ry="42" fill="#141018"/>
  <ellipse cx="160" cy="142" rx="138" ry="42" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="142" rx="124" ry="34" fill="#0f0d13"/>
  <!-- fudge brownie square (chunky dense block) -->
  <!-- front face -->
  <path d="M108 150 L108 108 L212 108 L212 150 Z" fill="url(#brface2)"/>
  <!-- right side face (slightly darker, gives 3D) -->
  <path d="M212 108 L232 100 L232 140 L212 150 Z" fill="url(#brtop)"/>
  <!-- crackly matte top -->
  <path d="M108 108 L128 100 L232 100 L212 108 Z" fill="url(#brcrackle)"/>
  <path d="M132 104 l14 2 M158 103 l10 2 M182 104 l16 1" stroke="#e6c79a" stroke-width="1.2" opacity=".55" stroke-linecap="round"/>
  <path d="M140 100 l6 3 M170 100 l8 3 M200 100 l6 3" stroke="#4a2c10" stroke-width="1" opacity=".5" stroke-linecap="round"/>
  <!-- fudgy face outline -->
  <path d="M108 150 L108 108 L212 108 L212 150 Z" fill="none" stroke="#1c0d05" stroke-width="1.4" opacity=".6"/>
  <!-- molten chocolate chunks embedded in the front face -->
  <ellipse cx="132" cy="122" rx="6" ry="5" fill="#1c0d05"/>
  <ellipse cx="131" cy="120" rx="2.4" ry="1.4" fill="#7a4a24" opacity=".7"/>
  <ellipse cx="176" cy="130" rx="7" ry="5.5" fill="#1c0d05"/>
  <ellipse cx="174" cy="128" rx="2.6" ry="1.6" fill="#7a4a24" opacity=".7"/>
  <ellipse cx="196" cy="122" rx="5" ry="4" fill="#1c0d05"/>
  <ellipse cx="150" cy="136" rx="5.5" ry="4.5" fill="#1c0d05"/>
  <ellipse cx="149" cy="134" rx="2" ry="1.2" fill="#7a4a24" opacity=".7"/>
  <!-- glossy ganache drip down the face -->
  <path d="M118 108 C122 122 118 132 122 144 C126 132 124 122 128 108 Z" fill="#1c0d05" opacity=".8"/>
  <path d="M120 114 C121 124 120 132 121 138" stroke="#7a4a24" stroke-width="1.2" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- dusting of powdered sugar on top -->
  <circle cx="150" cy="103" r="1.2" fill="#fff" opacity=".7"/>
  <circle cx="185" cy="102" r="1.1" fill="#fff" opacity=".6"/>
  <circle cx="168" cy="105" r="1" fill="#fff" opacity=".55"/>
  <!-- gloss / sparkle accents (baked dessert, no steam arc) -->
  <circle cx="160" cy="124" r="1.3" fill="#fff" opacity=".45"/>
  <circle cx="192" cy="134" r="1.1" fill="#fff" opacity=".4"/>
  <path d="M96 62 l0 6 M93 65 l6 0" stroke="#fff" stroke-width="1.2" opacity=".4" stroke-linecap="round"/>
  <path d="M228 78 l0 5 M225.5 80.5 l5 0" stroke="#ffd60a" stroke-width="1.1" opacity=".4" stroke-linecap="round"/>
</svg>
