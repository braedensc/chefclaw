<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="csbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <radialGradient id="csplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="csnest" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#eeddb0"/><stop offset="58%" stop-color="#ddc38e"/><stop offset="100%" stop-color="#c2a468"/>
    </radialGradient>
    <radialGradient id="cspaste" cx="44%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#e7c98e"/><stop offset="55%" stop-color="#c99f5e"/><stop offset="100%" stop-color="#9c7638"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#csbg)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- wide shallow cold plate -->
  <ellipse cx="160" cy="130" rx="138" ry="46" fill="url(#csplate)"/>
  <ellipse cx="160" cy="130" rx="138" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="122" ry="37" fill="#0f0d13"/>
  <!-- single cool neon arc (cold-dish cyan) -->
  <path d="M52 118 Q104 88 168 84" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- pale cold-noodle nest, flatter/looser than a hot mound -->
  <path d="M60 136 C66 112 106 100 160 100 C214 100 254 112 260 136 C232 152 196 156 160 156 C124 156 88 152 60 136 Z" fill="#9c8248" opacity=".5"/>
  <path d="M64 132 C70 108 108 96 160 96 C212 96 250 108 256 132 C230 148 196 152 160 152 C124 152 90 148 64 132 Z" fill="url(#csnest)"/>
  <!-- loose cold strands -->
  <g fill="none" stroke-linecap="round" opacity=".85">
    <path d="M78 132 C98 114 132 110 162 114" stroke="#c2a468" stroke-width="5.5"/>
    <path d="M96 140 C118 120 154 118 190 124" stroke="#eeddb0" stroke-width="5.5"/>
    <path d="M74 126 C98 110 138 106 176 110" stroke="#ddc38e" stroke-width="5.5"/>
    <path d="M116 142 C138 124 176 124 214 132" stroke="#c2a468" stroke-width="5.5"/>
    <path d="M142 138 C166 122 204 122 238 130" stroke="#eeddb0" stroke-width="5.5"/>
    <path d="M92 130 C114 114 148 112 180 116" stroke="#fff3d8" stroke-width="1.8" opacity=".6"/>
    <path d="M124 138 C148 122 186 122 220 128" stroke="#8a6a2e" stroke-width="2" opacity=".45"/>
  </g>
  <!-- creamy pale sesame-paste drizzle laced over the top (麻酱) -->
  <g fill="none" stroke-linecap="round">
    <path d="M84 122 C110 138 150 108 176 126 C202 114 222 132 244 122" stroke="#c99f5e" stroke-width="7" opacity=".92"/>
    <path d="M84 122 C110 138 150 108 176 126 C202 114 222 132 244 122" stroke="#e7c98e" stroke-width="3" opacity=".85"/>
    <path d="M92 134 C120 148 158 122 186 138 C210 126 228 140 246 132" stroke="#c99f5e" stroke-width="6" opacity=".85"/>
    <path d="M92 134 C120 148 158 122 186 138 C210 126 228 140 246 132" stroke="#e7c98e" stroke-width="2.6" opacity=".8"/>
  </g>
  <!-- a small pooled dollop of sesame paste center -->
  <ellipse cx="150" cy="120" rx="16" ry="9" fill="url(#cspaste)" opacity=".92"/>
  <ellipse cx="146" cy="117" rx="5" ry="2.6" fill="#f4e0b0" opacity=".6"/>
  <!-- fresh cucumber julienne (cold-dish signature) heaped over -->
  <rect x="98" y="112" width="30" height="3.4" rx="1.7" fill="#6abf5a" transform="rotate(-14 113 113)"/>
  <rect x="188" y="118" width="30" height="3.4" rx="1.7" fill="#58c14a" transform="rotate(10 203 119)"/>
  <rect x="122" y="102" width="26" height="3.2" rx="1.6" fill="#5ecb4e" transform="rotate(6 135 103)"/>
  <rect x="172" y="102" width="26" height="3.2" rx="1.6" fill="#3f9c37" transform="rotate(-8 185 103)"/>
  <rect x="130" y="142" width="28" height="3.2" rx="1.6" fill="#6abf5a" transform="rotate(-16 144 143)"/>
  <rect x="164" y="140" width="26" height="3" rx="1.5" fill="#58c14a" transform="rotate(12 177 141)"/>
  <!-- toasted sesame seeds sprinkled -->
  <g fill="#f8eed6">
    <circle cx="128" cy="120" r="1.4"/><circle cx="158" cy="112" r="1.4"/><circle cx="184" cy="124" r="1.4"/>
    <circle cx="142" cy="130" r="1.3"/><circle cx="200" cy="116" r="1.3"/><circle cx="112" cy="128" r="1.3"/>
    <circle cx="172" cy="134" r="1.2"/><circle cx="150" cy="106" r="1.2"/>
  </g>
  <!-- a couple of red-chili slivers + peanut crumb accent -->
  <rect x="146" y="126" width="9" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(-20 150 127)"/>
  <rect x="186" y="132" width="8" height="2.2" rx="1.1" fill="#e0341f" transform="rotate(14 190 133)"/>
  <circle cx="134" cy="124" r="2.2" fill="#d8b47f"/>
  <circle cx="176" cy="120" r="2" fill="#d8b47f"/>
  <!-- gloss dots -->
  <circle cx="152" cy="116" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="190" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="120" cy="122" r="1.2" fill="#fff" opacity=".5"/>
</svg>
