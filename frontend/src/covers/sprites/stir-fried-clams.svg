<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="sfcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="sfcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="sfcwok" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="sfcsauce" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#b8571f" stop-opacity=".6"/><stop offset="100%" stop-color="#6e2f0d" stop-opacity=".3"/>
    </radialGradient>
    <radialGradient id="sfcshell" cx="46%" cy="30%" r="88%">
      <stop offset="0%" stop-color="#5a5560"/><stop offset="45%" stop-color="#3a3540"/><stop offset="100%" stop-color="#211d28"/>
    </radialGradient>
    <radialGradient id="sfcmeat" cx="44%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ffe7c4"/><stop offset="55%" stop-color="#f0c390"/><stop offset="100%" stop-color="#d29a5e"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sfcbg)"/>
  <!-- steam -->
  <path d="M120 52 C110 34 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#sfcBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#sfcBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- wok -->
  <ellipse cx="160" cy="130" rx="128" ry="55" fill="url(#sfcwok)"/>
  <ellipse cx="160" cy="130" rx="128" ry="55" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="112" ry="46" fill="#0c0c0f"/>
  <!-- neon steam arc (cyan) -->
  <path d="M56 112 Q106 78 172 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy garlic-chili sauce pool -->
  <ellipse cx="160" cy="130" rx="104" ry="38" fill="url(#sfcsauce)"/>
  <!-- pile of open clam shells (each = two hinged fan-shell halves + peeking meat) -->
  <!-- back-left clam -->
  <g transform="translate(104 118) scale(.82) rotate(-14)">
    <path d="M-2 0 C-22 -6 -30 6 -22 16 C-10 20 6 16 8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M2 0 C22 -6 30 6 22 16 C10 20 -6 16 -8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M-18 4 L-6 12 M-10 -1 L0 10 M-2 -2 L4 10 M10 -1 L2 10 M18 4 L6 12" stroke="#221e2a" stroke-width="1" opacity=".7"/>
    <ellipse cx="0" cy="8" rx="9" ry="5" fill="url(#sfcmeat)" stroke="#c98f56" stroke-width="1"/>
  </g>
  <!-- back-right clam -->
  <g transform="translate(216 116) scale(.84) rotate(12)">
    <path d="M-2 0 C-22 -6 -30 6 -22 16 C-10 20 6 16 8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M2 0 C22 -6 30 6 22 16 C10 20 -6 16 -8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M-18 4 L-6 12 M-10 -1 L0 10 M-2 -2 L4 10 M10 -1 L2 10 M18 4 L6 12" stroke="#221e2a" stroke-width="1" opacity=".7"/>
    <ellipse cx="0" cy="8" rx="9" ry="5" fill="url(#sfcmeat)" stroke="#c98f56" stroke-width="1"/>
  </g>
  <!-- mid-left clam -->
  <g transform="translate(126 138) scale(.92) rotate(8)">
    <path d="M-2 0 C-24 -6 -32 6 -24 17 C-11 21 6 17 8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M2 0 C24 -6 32 6 24 17 C11 21 -6 17 -8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M-20 4 L-6 13 M-11 -1 L0 11 M-2 -2 L4 11 M11 -1 L2 11 M20 4 L6 13" stroke="#221e2a" stroke-width="1" opacity=".7"/>
    <ellipse cx="0" cy="9" rx="10" ry="5.5" fill="url(#sfcmeat)" stroke="#c98f56" stroke-width="1"/>
    <ellipse cx="-3" cy="7" rx="4" ry="2" fill="#fff" opacity=".4"/>
  </g>
  <!-- mid-right clam -->
  <g transform="translate(196 140) scale(.9) rotate(-10)">
    <path d="M-2 0 C-24 -6 -32 6 -24 17 C-11 21 6 17 8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M2 0 C24 -6 32 6 24 17 C11 21 -6 17 -8 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.2"/>
    <path d="M-20 4 L-6 13 M-11 -1 L0 11 M-2 -2 L4 11 M11 -1 L2 11 M20 4 L6 13" stroke="#221e2a" stroke-width="1" opacity=".7"/>
    <ellipse cx="0" cy="9" rx="10" ry="5.5" fill="url(#sfcmeat)" stroke="#c98f56" stroke-width="1"/>
    <ellipse cx="-3" cy="7" rx="4" ry="2" fill="#fff" opacity=".4"/>
  </g>
  <!-- front-center clam (largest, hero, wide open) -->
  <g transform="translate(160 132) scale(1.14)">
    <path d="M-2 0 C-26 -7 -35 7 -26 19 C-12 23 7 19 9 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.3"/>
    <path d="M2 0 C26 -7 35 7 26 19 C12 23 -7 19 -9 4 Z" fill="url(#sfcshell)" stroke="#141018" stroke-width="1.3"/>
    <path d="M-22 4 L-7 14 M-12 -1 L0 12 M-2 -3 L4 12 M12 -1 L2 12 M22 4 L7 14" stroke="#221e2a" stroke-width="1.1" opacity=".7"/>
    <path d="M-30 8 C-32 4 -28 1 -24 1 M30 8 C32 4 28 1 24 1" stroke="#6a6472" stroke-width="1.2" opacity=".5" fill="none"/>
    <!-- plump clam meat -->
    <ellipse cx="0" cy="9" rx="12" ry="6.5" fill="url(#sfcmeat)" stroke="#c98f56" stroke-width="1.1"/>
    <ellipse cx="-4" cy="6" rx="5" ry="2.4" fill="#fff" opacity=".5"/>
    <!-- minced garlic + chili in the shell -->
    <circle cx="6" cy="8" r="1.8" fill="#f2ddb0"/>
    <circle cx="-6" cy="11" r="1.6" fill="#f2ddb0"/>
    <circle cx="2" cy="12" r="1.6" fill="#e0341f"/>
  </g>
  <!-- dried red chili slices + garlic scattered over the toss -->
  <path d="M112 122 C122 118 132 120 136 126 C128 126 120 126 112 124 Z" fill="#c31f12" stroke="#7a1305" stroke-width="1"/>
  <path d="M200 120 C210 116 222 118 226 124 C216 124 208 124 200 122 Z" fill="#d0271a" stroke="#7a1305" stroke-width="1"/>
  <circle cx="132" cy="118" r="1.8" fill="#f2ddb0"/>
  <circle cx="188" cy="120" r="1.8" fill="#f2ddb0"/>
  <circle cx="150" cy="150" r="1.8" fill="#e0341f"/>
  <!-- scallion / cilantro garnish -->
  <rect x="118" y="150" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 121 151)"/>
  <rect x="176" y="116" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(20 179 117)"/>
  <rect x="204" y="148" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 207 149)"/>
  <!-- gloss dots -->
  <circle cx="130" cy="128" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="192" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="122" r="1.3" fill="#fff" opacity=".5"/>
</svg>
