<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ksbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="kspot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="ksbroth" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#e24418"/><stop offset="50%" stop-color="#b0220b"/><stop offset="100%" stop-color="#78130a"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ksbg)"/>
  <!-- steam -->
  <path d="M116 62 C106 44 126 36 116 16" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M202 58 C194 42 212 34 204 14" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="158" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl (black earthenware) -->
  <path d="M50 106 C50 154 102 178 160 178 C218 178 270 154 270 106 Z" fill="url(#kspot)"/>
  <ellipse cx="160" cy="106" rx="112" ry="30" fill="#0d0d10"/>
  <ellipse cx="160" cy="106" rx="112" ry="30" fill="none" stroke="#271b22" stroke-width="3"/>
  <ellipse cx="160" cy="106" rx="100" ry="24" fill="#160b0d"/>
  <!-- neon steam arc -->
  <path d="M56 98 Q104 72 164 70" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- bubbling red kimchi broth -->
  <ellipse cx="160" cy="108" rx="95" ry="21" fill="url(#ksbroth)"/>
  <ellipse cx="134" cy="100" rx="28" ry="6" fill="#ff7a3a" opacity=".3" transform="rotate(-8 134 100)"/>
  <!-- oily surface bubbles -->
  <circle cx="106" cy="112" r="5" fill="#c53a0d" opacity=".7"/>
  <circle cx="106" cy="112" r="5" fill="none" stroke="#ff7a3a" stroke-width="1.2" opacity=".6"/>
  <circle cx="200" cy="114" r="5.5" fill="#c53a0d" opacity=".7"/>
  <circle cx="200" cy="114" r="5.5" fill="none" stroke="#ff7a3a" stroke-width="1.2" opacity=".6"/>
  <circle cx="150" cy="118" r="3.6" fill="#ff8a3a" opacity=".5"/>
  <circle cx="176" cy="102" r="3" fill="#ff8a3a" opacity=".5"/>
  <!-- soft tofu blocks (pale cream cubes, half-submerged) -->
  <g stroke="#c9b487" stroke-width="1.2">
    <path d="M118 96 l20 -5 l6 10 l-20 5 Z" fill="#f7f0dc"/>
    <path d="M138 91 l6 10 l-4 9 l-6 -10 Z" fill="#e6d9ba"/>
  </g>
  <g stroke="#c9b487" stroke-width="1.2">
    <path d="M176 100 l19 -4 l5 9 l-19 4 Z" fill="#f7f0dc"/>
    <path d="M195 96 l5 9 l-4 8 l-5 -9 Z" fill="#e6d9ba"/>
  </g>
  <!-- kimchi leaf pieces (crinkled red-orange cabbage) -->
  <g transform="translate(146 106) rotate(-6)">
    <path d="M-14 -4 C-8 -12 8 -14 16 -8 C22 -3 20 6 12 9 C2 12 -12 8 -16 2 C-17 -1 -16 -3 -14 -4 Z" fill="#c22a10"/>
    <path d="M-10 -3 C-4 -8 8 -9 13 -5 M-12 3 C-4 7 8 7 13 3" stroke="#ff6a30" stroke-width="1.3" fill="none" opacity=".7"/>
    <path d="M-14 -4 L-15 4 M-4 -9 L-3 10 M8 -9 L9 9" stroke="#8a1c08" stroke-width="1" opacity=".5"/>
  </g>
  <g transform="translate(196 110) rotate(10)">
    <path d="M-12 -4 C-6 -11 8 -12 15 -7 C20 -2 18 6 11 8 C1 11 -11 7 -14 1 C-15 -1 -14 -3 -12 -4 Z" fill="#a8220e"/>
    <path d="M-8 -3 C-2 -7 8 -8 12 -4 M-10 3 C-2 6 8 6 12 2" stroke="#ff6a30" stroke-width="1.2" fill="none" opacity=".6"/>
  </g>
  <!-- pork slices (thin curled strips) -->
  <g transform="translate(122 118) rotate(6)">
    <path d="M-12 0 Q0 -7 12 -1 Q0 5 -12 0 Z" fill="#8f3826"/>
    <path d="M-10 -1 Q0 -5 10 0" stroke="#e6b49a" stroke-width="1.6" fill="none" opacity=".7"/>
    <path d="M-9 2 Q0 0 9 3" stroke="#f4d8c0" stroke-width="1.3" fill="none" opacity=".6"/>
  </g>
  <!-- scallion rounds + green fleck -->
  <g>
    <circle cx="160" cy="104" r="3.4" fill="#4f9c3a"/>
    <circle cx="160" cy="104" r="1.4" fill="#eaf6d4"/>
    <circle cx="182" cy="98" r="3" fill="#4f9c3a"/>
    <circle cx="182" cy="98" r="1.2" fill="#eaf6d4"/>
    <circle cx="130" cy="106" r="3" fill="#3f9c37"/>
    <circle cx="130" cy="106" r="1.2" fill="#eaf6d4"/>
  </g>
  <rect x="150" y="118" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-16 153 119)"/>
  <rect x="204" y="122" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(18 207 123)"/>
  <!-- chili flake accents -->
  <circle cx="140" cy="114" r="1.6" fill="#e0341f"/>
  <circle cx="188" cy="120" r="1.6" fill="#e0341f"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="102" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="108" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="152" cy="114" r="1.2" fill="#fff" opacity=".5"/>
</svg>
