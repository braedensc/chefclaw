<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="hcrBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="hcrbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="hcrbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="hcrrice" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff6e2"/><stop offset="58%" stop-color="#f3e3bf"/><stop offset="100%" stop-color="#dcc493"/>
    </radialGradient>
    <linearGradient id="hcrchk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf3e4"/><stop offset="55%" stop-color="#f4e1c3"/><stop offset="100%" stop-color="#e6c79c"/>
    </linearGradient>
    <linearGradient id="hcrskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e7ba"/><stop offset="100%" stop-color="#e5c785"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#hcrbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 36 128 28 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#hcrBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#hcrBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- deep rounded rice bowl -->
  <path d="M56 118 C56 156 100 176 160 176 C220 176 264 156 264 118 Z" fill="url(#hcrbowl)"/>
  <path d="M56 118 C56 156 100 176 160 176 C220 176 264 156 264 118" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="118" rx="104" ry="30" fill="#0d0d10"/>
  <ellipse cx="160" cy="118" rx="104" ry="30" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <!-- neon steam arc (cyan) -->
  <path d="M58 106 Q108 76 172 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- fragrant rice mound -->
  <ellipse cx="160" cy="116" rx="98" ry="27" fill="url(#hcrrice)"/>
  <path d="M64 112 C74 96 110 90 160 90 C210 90 246 96 256 112" fill="none" stroke="#fff6d8" stroke-width="1.4" opacity=".35"/>
  <g stroke-linecap="round" fill="none">
    <path d="M96 108 l6 -3" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M112 118 l6 3" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M130 106 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M212 108 l6 -3" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M226 116 l-6 3" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M84 116 l6 2" stroke="#dcc088" stroke-width="2"/>
    <path d="M242 112 l-6 2" stroke="#fffbe8" stroke-width="2"/>
  </g>
  <!-- POACHED CHICKEN SLICES fanned across the top (pale white with golden skin edge) -->
  <g stroke="#c9a869" stroke-width="1.2">
    <g transform="translate(96 92) rotate(-8)"><path d="M0 6 C0 -2 12 -6 26 -6 C40 -6 50 -2 50 6 C50 14 40 18 26 18 C12 18 0 14 0 6 Z" fill="url(#hcrchk)"/><path d="M0 6 C0 0 8 -4 26 -4" fill="none" stroke="url(#hcrskin)" stroke-width="3"/></g>
    <g transform="translate(126 100) rotate(6)"><path d="M0 6 C0 -2 12 -6 26 -6 C40 -6 50 -2 50 6 C50 14 40 18 26 18 C12 18 0 14 0 6 Z" fill="url(#hcrchk)"/><path d="M0 6 C0 0 8 -4 26 -4" fill="none" stroke="url(#hcrskin)" stroke-width="3"/></g>
    <g transform="translate(160 90) rotate(-4)"><path d="M0 6 C0 -2 12 -6 26 -6 C40 -6 50 -2 50 6 C50 14 40 18 26 18 C12 18 0 14 0 6 Z" fill="url(#hcrchk)"/><path d="M0 6 C0 0 8 -4 26 -4" fill="none" stroke="url(#hcrskin)" stroke-width="3"/></g>
    <g transform="translate(190 100) rotate(8)"><path d="M0 6 C0 -2 12 -6 26 -6 C40 -6 50 -2 50 6 C50 14 40 18 26 18 C12 18 0 14 0 6 Z" fill="url(#hcrchk)"/><path d="M0 6 C0 0 8 -4 26 -4" fill="none" stroke="url(#hcrskin)" stroke-width="3"/></g>
  </g>
  <!-- glossy sheen on chicken -->
  <ellipse cx="118" cy="94" rx="12" ry="3" fill="#fff" opacity=".4"/>
  <ellipse cx="184" cy="94" rx="12" ry="3" fill="#fff" opacity=".4"/>
  <!-- cucumber slice garnish + ginger-scallion oil dab -->
  <ellipse cx="92" cy="122" rx="9" ry="4" fill="#3f9c37"/><ellipse cx="92" cy="122" rx="5" ry="2.2" fill="#a7d68c"/>
  <ellipse cx="232" cy="120" rx="9" ry="4" fill="#3f9c37"/><ellipse cx="232" cy="120" rx="5" ry="2.2" fill="#a7d68c"/>
  <!-- scallion oil flecks -->
  <rect x="140" y="110" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 143 111)"/>
  <rect x="170" y="112" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 173 113)"/>
  <rect x="152" y="120" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 155 121)"/>
  <circle cx="160" cy="116" r="1.8" fill="#e0341f"/>
  <!-- gloss dots -->
  <circle cx="130" cy="100" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="178" cy="106" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="98" r="1.2" fill="#fff" opacity=".5"/>
