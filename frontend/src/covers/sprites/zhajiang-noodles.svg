  <circle cx="118" cy="120" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="188" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="156" cy="112" r="1.2" fill="#fff" opacity=".5"/>
