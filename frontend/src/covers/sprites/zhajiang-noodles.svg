<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="zjBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="zjbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="zjbowl" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="zjnest" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#e6cf9d"/><stop offset="58%" stop-color="#d9bd85"/><stop offset="100%" stop-color="#bd9c5f"/>
    </radialGradient>
    <radialGradient id="zjpaste" cx="44%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#6b4029"/><stop offset="55%" stop-color="#3d2113"/><stop offset="100%" stop-color="#1c0d06"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#zjbg)"/>
  <!-- steam -->
  <path d="M124 56 C114 38 134 30 124 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#zjBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#zjBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
