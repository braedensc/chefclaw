    <path d="M100 138 C120 116 156 114 190 120" stroke="#e6cf9d" stroke-width="6"/>
    <path d="M76 122 C100 104 140 100 178 104" stroke="#d9bd85" stroke-width="6"/>
    <path d="M118 142 C140 122 178 122 214 130" stroke="#cdb078" stroke-width="6"/>
    <path d="M144 138 C168 120 206 120 240 128" stroke="#e6cf9d" stroke-width="6"/>
