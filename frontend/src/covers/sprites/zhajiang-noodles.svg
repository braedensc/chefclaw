  <rect x="98" y="112" width="26" height="3.2" rx="1.6" fill="#6abf5a" transform="rotate(-14 111 113)"/>
  <rect x="196" y="118" width="26" height="3.2" rx="1.6" fill="#58c14a" transform="rotate(10 209 119)"/>
  <rect x="120" y="98" width="22" height="3" rx="1.5" fill="#5ecb4e" transform="rotate(6 131 99)"/>
  <rect x="176" y="98" width="22" height="3" rx="1.5" fill="#3f9c37" transform="rotate(-8 187 99)"/>
  <rect x="132" y="140" width="24" height="3" rx="1.5" fill="#6abf5a" transform="rotate(-18 144 141)"/>
  <!-- chopsticks lifting strands from upper right -->
  <g transform="rotate(-26 246 60)">
    <rect x="196" y="52" width="72" height="5" rx="2.5" fill="#b98a4e"/>
    <rect x="196" y="62" width="72" height="5" rx="2.5" fill="#a67a40"/>
  </g>
  <!-- lifted noodle strand off the chopsticks -->
  <path d="M212 80 C214 96 210 106 200 112" stroke="#e6cf9d" stroke-width="5" fill="none" opacity=".9" stroke-linecap="round"/>
  <path d="M222 78 C226 94 224 104 216 110" stroke="#d9bd85" stroke-width="5" fill="none" opacity=".9" stroke-linecap="round"/>
