    <rect x="150" y="100" width="12" height="10" rx="2.5" fill="#9c6636" transform="rotate(8 156 105)"/>
    <rect x="170" y="112" width="12" height="10" rx="2.5" fill="#7c4a24" transform="rotate(-6 176 117)"/>
    <rect x="138" y="122" width="12" height="10" rx="2.5" fill="#9c6636" transform="rotate(14 144 127)"/>
    <rect x="164" y="126" width="11" height="9" rx="2.4" fill="#8a5a2e" transform="rotate(-16 169 130)"/>
    <rect x="184" y="118" width="11" height="9" rx="2.4" fill="#7c4a24" transform="rotate(6 189 122)"/>
  </g>
  <!-- paste gloss highlights -->
  <ellipse cx="132" cy="106" rx="4" ry="2" fill="#c98a52" opacity=".55"/>
  <ellipse cx="176" cy="108" rx="4" ry="2" fill="#c98a52" opacity=".5"/>
  <ellipse cx="150" cy="128" rx="3.4" ry="1.8" fill="#c98a52" opacity=".5"/>
