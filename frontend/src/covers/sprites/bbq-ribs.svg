<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="rbBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="rbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#38101e"/><stop offset="45%" stop-color="#0b0908"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="rbmeat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cf5226"/><stop offset="48%" stop-color="#9c2b10"/><stop offset="100%" stop-color="#5e1808"/>
    </linearGradient>
    <linearGradient id="rbbone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6ddb2"/><stop offset="100%" stop-color="#d0ac74"/>
    </linearGradient>
    <linearGradient id="rbboard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#231610"/><stop offset="50%" stop-color="#33231a"/><stop offset="100%" stop-color="#1c120c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#rbbg)"/>
  <!-- steam -->
  <path d="M112 58 C102 40 122 32 112 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#rbBlur3)"/>
  <path d="M206 54 C198 38 216 30 208 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#rbBlur3)"/>
  <ellipse cx="160" cy="186" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- wooden serving board -->
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="url(#rbboard)"/>
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="none" stroke="#3d2a1e" stroke-width="3"/>
  <path d="M34 122 Q160 108 286 122" stroke="#4a3324" stroke-width="1.2" fill="none" opacity=".5"/>
  <path d="M40 142 Q160 156 280 142" stroke="#1a1009" stroke-width="1.2" fill="none" opacity=".5"/>
  <!-- neon steam arc -->
  <path d="M52 116 Q104 86 168 82" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- rack of ribs: a connected slab with 5 bone divisions, glossy glaze -->
  <g>
    <!-- meat slab -->
    <path d="M46 118 C58 92 100 82 160 82 C220 82 262 92 274 118 C262 144 220 152 160 152 C100 152 58 144 46 118 Z" fill="url(#rbmeat)" stroke="#3d0f04" stroke-width="1.5"/>
    <!-- top glazed sheen band -->
    <path d="M64 104 C104 88 216 88 256 104" stroke="#e8763a" stroke-width="4" fill="none" opacity=".55" stroke-linecap="round"/>
    <path d="M78 98 C112 86 208 86 242 98" stroke="#ffb072" stroke-width="2.4" fill="none" opacity=".45" stroke-linecap="round"/>
    <!-- bone-end knuckles peeking on the right edge -->
    <ellipse cx="272" cy="102" rx="9" ry="7" fill="url(#rbbone)" stroke="#b08a52" stroke-width="1.1"/>
    <ellipse cx="276" cy="120" rx="9" ry="7" fill="url(#rbbone)" stroke="#b08a52" stroke-width="1.1"/>
    <ellipse cx="272" cy="138" rx="8" ry="6" fill="url(#rbbone)" stroke="#b08a52" stroke-width="1.1"/>
    <!-- rib separations: dark grooves splitting the slab into 5 ribs -->
    <path d="M262 100 C210 96 130 96 66 106" stroke="#3a0d03" stroke-width="3" fill="none" opacity=".85"/>
    <path d="M266 116 C214 114 128 114 60 118" stroke="#3a0d03" stroke-width="3.2" fill="none" opacity=".85"/>
    <path d="M264 132 C214 132 128 132 64 130" stroke="#3a0d03" stroke-width="3" fill="none" opacity=".8"/>
    <path d="M258 146 C210 150 130 150 74 142" stroke="#3a0d03" stroke-width="2.6" fill="none" opacity=".7"/>
    <!-- caramelized char spots -->
    <ellipse cx="112" cy="106" rx="6" ry="3.4" fill="#5e1c07" opacity=".7"/>
    <ellipse cx="176" cy="100" rx="7" ry="3.6" fill="#5e1c07" opacity=".6"/>
    <ellipse cx="146" cy="124" rx="6" ry="3.4" fill="#5e1c07" opacity=".6"/>
    <ellipse cx="206" cy="120" rx="6" ry="3.2" fill="#5e1c07" opacity=".55"/>
    <ellipse cx="96" cy="128" rx="5" ry="3" fill="#5e1c07" opacity=".55"/>
    <!-- sticky glaze drips at bottom edge -->
    <path d="M96 150 q2 8 4 0 M140 152 q2 9 4 0 M188 151 q2 8 4 0 M224 148 q2 7 4 0" stroke="#7a1d09" stroke-width="3" fill="none" opacity=".6" stroke-linecap="round"/>
  </g>
  <!-- sesame + chili flecks scattered on glaze -->
  <ellipse cx="120" cy="98" rx="2.2" ry="1.3" fill="#f8eed6" transform="rotate(20 120 98)"/>
  <ellipse cx="168" cy="112" rx="2.2" ry="1.3" fill="#f8eed6" transform="rotate(-14 168 112)"/>
  <ellipse cx="210" cy="106" rx="2" ry="1.2" fill="#f8eed6" transform="rotate(8 210 106)"/>
  <ellipse cx="140" cy="112" rx="2" ry="1.2" fill="#f8eed6" transform="rotate(-6 140 112)"/>
  <rect x="132" y="94" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-16 135 95)"/>
  <rect x="192" y="126" width="6" height="2.2" rx="1.1" fill="#3f9c37" transform="rotate(22 195 127)"/>
  <rect x="100" y="118" width="6" height="2.2" rx="1.1" fill="#e0341f" transform="rotate(-24 103 119)"/>
  <!-- oil gloss dots -->
  <circle cx="130" cy="100" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="106" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="158" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
