<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ps1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="ps1bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="ps1soup" cx="46%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#ffb347"/><stop offset="52%" stop-color="#f08a1e"/><stop offset="100%" stop-color="#c25e0e"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ps1bg)"/>
  <!-- steam -->
  <path d="M126 58 C116 40 136 32 126 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M198 54 C190 38 208 30 200 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl -->
  <path d="M52 112 C52 156 102 178 160 178 C218 178 268 156 268 112 Z" fill="url(#ps1bowl)"/>
  <ellipse cx="160" cy="112" rx="112" ry="30" fill="#0d0d10"/>
  <ellipse cx="160" cy="112" rx="112" ry="30" fill="none" stroke="#271b22" stroke-width="3"/>
  <ellipse cx="160" cy="112" rx="100" ry="24" fill="#160e08"/>
  <!-- neon steam arc -->
  <path d="M58 104 Q104 76 164 74" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- creamy pumpkin surface -->
  <ellipse cx="160" cy="112" rx="98" ry="23" fill="url(#ps1soup)"/>
  <!-- warm lit patch near the top for depth -->
  <ellipse cx="138" cy="104" rx="34" ry="8" fill="#ffcf7a" opacity=".4" transform="rotate(-6 138 104)"/>
  <!-- swirled cream ribbon -->
  <path d="M96 112 C120 100 150 124 178 108 C202 96 224 116 236 108" stroke="#fbeede" stroke-width="4" fill="none" opacity=".9" stroke-linecap="round"/>
  <path d="M108 118 C132 110 158 122 188 114" stroke="#f6e6ca" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- a dollop of cream -->
  <ellipse cx="160" cy="110" rx="10" ry="6" fill="#fbf3e6"/>
  <ellipse cx="157" cy="108" rx="4" ry="2.4" fill="#fff" opacity=".8"/>
  <!-- toasted pumpkin seeds (pepitas) clustered center -->
  <g fill="#8fae4e" stroke="#5f7d2e" stroke-width="1" stroke-linejoin="round">
    <path d="M138 106 C142 102 148 104 148 109 C148 113 142 114 138 111 Z" transform="rotate(-16 143 108)"/>
    <path d="M170 104 C174 100 180 102 180 107 C180 111 174 112 170 109 Z" transform="rotate(12 175 106)"/>
    <path d="M152 116 C156 112 162 114 162 119 C162 123 156 124 152 121 Z" transform="rotate(-6 157 118)"/>
    <path d="M186 114 C190 110 196 112 196 117 C196 121 190 122 186 119 Z" transform="rotate(20 191 116)"/>
    <path d="M124 116 C128 112 134 114 134 119 C134 123 128 124 124 121 Z" transform="rotate(8 129 118)"/>
  </g>
  <!-- seed sheen highlights -->
  <ellipse cx="144" cy="107" rx="2.4" ry="1.2" fill="#e8f0c0" opacity=".7"/>
  <ellipse cx="176" cy="105" rx="2.4" ry="1.2" fill="#e8f0c0" opacity=".7"/>
  <ellipse cx="158" cy="117" rx="2.2" ry="1.1" fill="#e8f0c0" opacity=".6"/>
  <!-- chive/parsley fleck garnish + drizzle -->
  <rect x="112" y="106" width="7" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-18 115 107)"/>
  <rect x="200" y="108" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(14 203 109)"/>
  <path d="M118 122 C140 116 180 116 202 122" stroke="#c25e0e" stroke-width="1.6" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- cracked pepper + nutmeg dots -->
  <circle cx="146" cy="120" r="1.2" fill="#260903"/>
  <circle cx="184" cy="122" r="1.1" fill="#3a1a08"/>
  <!-- cream/oil gloss dots -->
  <circle cx="126" cy="102" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="188" cy="102" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
