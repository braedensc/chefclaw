<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="kbBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="kbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="kbboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4a28"/><stop offset="55%" stop-color="#4e341c"/><stop offset="100%" stop-color="#33220f"/>
    </linearGradient>
    <linearGradient id="kbmeat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a4a24"/><stop offset="50%" stop-color="#5e2c12"/><stop offset="100%" stop-color="#3d1808"/>
    </linearGradient>
    <linearGradient id="kbchar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a35a2a"/><stop offset="100%" stop-color="#6e2f0d"/>
    </linearGradient>
    <linearGradient id="kbpep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e03528"/><stop offset="100%" stop-color="#a01810"/>
    </linearGradient>
    <linearGradient id="kbgpep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ea23a"/><stop offset="100%" stop-color="#357020"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kbbg)"/>
  <!-- steam -->
  <path d="M118 48 C110 32 126 24 118 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#kbBlur3)"/>
  <path d="M200 50 C194 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#kbBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (warm/local) -->
  <path d="M50 112 Q104 80 168 78" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- wooden serving board -->
  <ellipse cx="160" cy="140" rx="146" ry="42" fill="url(#kbboard)"/>
  <ellipse cx="160" cy="140" rx="146" ry="42" fill="none" stroke="#2a1c0e" stroke-width="2.5"/>
  <path d="M40 132 C90 124 230 124 280 132" stroke="#3a2712" stroke-width="1.4" fill="none" opacity=".6"/>
  <path d="M44 148 C96 156 224 156 276 148" stroke="#3a2712" stroke-width="1.4" fill="none" opacity=".5"/>
  <!-- three skewers laid across the board, splayed like a fan -->
  <!-- skewer stick 1 -->
  <g transform="rotate(-8 160 120)">
    <line x1="54" y1="112" x2="266" y2="112" stroke="#c9a25e" stroke-width="4" stroke-linecap="round"/>
    <line x1="54" y1="112" x2="266" y2="112" stroke="#e0bf82" stroke-width="1.4" stroke-linecap="round" opacity=".6"/>
    <g stroke="#240a03" stroke-width="1.2" stroke-opacity=".5">
      <g transform="translate(96 112)"><rect x="-14" y="-11" width="28" height="22" rx="6" fill="url(#kbmeat)"/><path d="M-14 -8 C-6 -12 6 -12 14 -8 C6 -4 -6 -4 -14 -8 Z" fill="url(#kbchar)"/><ellipse cx="-4" cy="-4" rx="6" ry="2.6" fill="#b56a34" opacity=".6"/></g>
      <g transform="translate(132 112)"><ellipse cx="0" cy="0" rx="10" ry="9" fill="url(#kbpep)"/><ellipse cx="-3" cy="-3" rx="3" ry="2.4" fill="#ff7a5a" opacity=".55"/></g>
      <g transform="translate(166 112)"><rect x="-14" y="-11" width="28" height="22" rx="6" fill="url(#kbmeat)"/><path d="M-14 -8 C-6 -12 6 -12 14 -8 C6 -4 -6 -4 -14 -8 Z" fill="url(#kbchar)"/><ellipse cx="-4" cy="-4" rx="6" ry="2.6" fill="#b56a34" opacity=".6"/></g>
      <g transform="translate(200 112)"><ellipse cx="0" cy="0" rx="10" ry="9" fill="url(#kbgpep)"/><ellipse cx="-3" cy="-3" rx="3" ry="2.4" fill="#8fc45a" opacity=".55"/></g>
      <g transform="translate(232 112)"><rect x="-13" y="-10" width="26" height="20" rx="6" fill="url(#kbmeat)"/><ellipse cx="-4" cy="-4" rx="5" ry="2.4" fill="#b56a34" opacity=".55"/></g>
    </g>
  </g>
  <!-- skewer stick 2 -->
  <g transform="rotate(4 160 134)">
    <line x1="52" y1="134" x2="268" y2="134" stroke="#c9a25e" stroke-width="4" stroke-linecap="round"/>
    <line x1="52" y1="134" x2="268" y2="134" stroke="#e0bf82" stroke-width="1.4" stroke-linecap="round" opacity=".6"/>
    <g stroke="#240a03" stroke-width="1.2" stroke-opacity=".5">
      <g transform="translate(90 134)"><rect x="-14" y="-11" width="28" height="22" rx="6" fill="url(#kbmeat)"/><path d="M-14 -8 C-6 -12 6 -12 14 -8 C6 -4 -6 -4 -14 -8 Z" fill="url(#kbchar)"/><ellipse cx="-4" cy="-4" rx="6" ry="2.6" fill="#b56a34" opacity=".6"/></g>
      <g transform="translate(126 134)"><ellipse cx="0" cy="0" rx="9" ry="9" fill="#f4e6cc"/><ellipse cx="0" cy="0" rx="4.4" ry="4.4" fill="#cbb388"/></g>
      <g transform="translate(160 134)"><rect x="-14" y="-11" width="28" height="22" rx="6" fill="url(#kbmeat)"/><path d="M-14 -8 C-6 -12 6 -12 14 -8 C6 -4 -6 -4 -14 -8 Z" fill="url(#kbchar)"/><ellipse cx="-4" cy="-4" rx="6" ry="2.6" fill="#b56a34" opacity=".6"/></g>
      <g transform="translate(194 134)"><ellipse cx="0" cy="0" rx="10" ry="9" fill="url(#kbpep)"/><ellipse cx="-3" cy="-3" rx="3" ry="2.4" fill="#ff7a5a" opacity=".55"/></g>
      <g transform="translate(228 134)"><rect x="-13" y="-10" width="26" height="20" rx="6" fill="url(#kbmeat)"/><ellipse cx="-4" cy="-4" rx="5" ry="2.4" fill="#b56a34" opacity=".55"/></g>
    </g>
  </g>
  <!-- skewer stick 3 -->
  <g transform="rotate(15 160 154)">
    <line x1="58" y1="154" x2="262" y2="154" stroke="#c9a25e" stroke-width="4" stroke-linecap="round"/>
    <line x1="58" y1="154" x2="262" y2="154" stroke="#e0bf82" stroke-width="1.4" stroke-linecap="round" opacity=".6"/>
    <g stroke="#240a03" stroke-width="1.2" stroke-opacity=".5">
      <g transform="translate(100 154)"><rect x="-13" y="-10" width="26" height="20" rx="6" fill="url(#kbmeat)"/><path d="M-13 -7 C-5 -11 5 -11 13 -7 C5 -3 -5 -3 -13 -7 Z" fill="url(#kbchar)"/><ellipse cx="-4" cy="-4" rx="5" ry="2.4" fill="#b56a34" opacity=".55"/></g>
      <g transform="translate(134 154)"><ellipse cx="0" cy="0" rx="9" ry="8.5" fill="url(#kbgpep)"/><ellipse cx="-3" cy="-3" rx="3" ry="2.4" fill="#8fc45a" opacity=".55"/></g>
      <g transform="translate(166 154)"><rect x="-13" y="-10" width="26" height="20" rx="6" fill="url(#kbmeat)"/><path d="M-13 -7 C-5 -11 5 -11 13 -7 C5 -3 -5 -3 -13 -7 Z" fill="url(#kbchar)"/><ellipse cx="-4" cy="-4" rx="5" ry="2.4" fill="#b56a34" opacity=".55"/></g>
      <g transform="translate(200 154)"><ellipse cx="0" cy="0" rx="9" ry="8.5" fill="url(#kbpep)"/><ellipse cx="-3" cy="-3" rx="3" ry="2.4" fill="#ff7a5a" opacity=".55"/></g>
    </g>
  </g>
  <!-- char-grill lines on nearest meat + parsley scatter -->
  <path d="M158 128 l10 4 M164 126 l10 4" stroke="#1c0d06" stroke-width="1.6" opacity=".4" stroke-linecap="round"/>
  <rect x="118" y="120" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-20 121 121)"/>
  <rect x="210" y="124" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(18 213 125)"/>
  <rect x="150" y="160" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-12 153 161)"/>
  <!-- lemon wedge on the board -->
  <g transform="translate(70 132) rotate(-16)">
    <path d="M0 0 C10 -6 22 -6 30 0 C22 5 10 5 0 0 Z" fill="#f6d24a" stroke="#c99a1a" stroke-width="1.2"/>
    <path d="M4 0 C12 -3 20 -3 26 0" stroke="#fff0a0" stroke-width="1.4" fill="none" opacity=".7"/>
  </g>
  <!-- oil gloss dots -->
  <circle cx="112" cy="108" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="176" cy="130" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="204" cy="150" r="1.2" fill="#fff" opacity=".5"/>
</svg>
