<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="bwgBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bwgbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="bwgwing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5f26"/><stop offset="50%" stop-color="#cf3d12"/><stop offset="100%" stop-color="#9a2408"/>
    </linearGradient>
    <linearGradient id="bwgwing2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2521c"/><stop offset="50%" stop-color="#b8320d"/><stop offset="100%" stop-color="#851d06"/>
    </linearGradient>
    <radialGradient id="bwgbowl" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bwgbg)"/>
  <!-- steam -->
  <path d="M122 52 C112 36 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bwgBlur3)"/>
  <path d="M200 52 C192 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#bwgBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- deep serving bowl -->
  <ellipse cx="160" cy="126" rx="128" ry="52" fill="url(#bwgbowl)"/>
  <ellipse cx="160" cy="126" rx="128" ry="52" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="126" rx="112" ry="44" fill="#0d0b11"/>
  <!-- neon steam arc (rose family) -->
  <path d="M52 114 Q104 82 168 80" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- pooled buffalo sauce sheen at bottom of bowl -->
  <ellipse cx="160" cy="132" rx="96" ry="30" fill="#8a1f08" opacity=".55"/>
  <!-- pile of saucy drumettes (each = plump body + bone knuckle) -->
  <g stroke="#6e1a06" stroke-width="1.4">
    <!-- back layer -->
    <g transform="translate(96 96) rotate(-14)">
      <path d="M0 12 C-4 2 8 -4 20 -2 C34 -4 42 6 38 16 C42 26 30 32 18 30 C6 32 -4 24 0 12 Z" fill="url(#bwgwing2)"/>
      <ellipse cx="41" cy="12" rx="5" ry="7" fill="#e8d9b8"/>
    </g>
    <g transform="translate(150 92) rotate(8)">
      <path d="M0 12 C-4 2 8 -4 20 -2 C34 -4 42 6 38 16 C42 26 30 32 18 30 C6 32 -4 24 0 12 Z" fill="url(#bwgwing2)"/>
      <ellipse cx="41" cy="12" rx="5" ry="7" fill="#e8d9b8"/>
    </g>
    <g transform="translate(202 100) rotate(-6)">
      <path d="M0 12 C-4 2 8 -4 20 -2 C34 -4 42 6 38 16 C42 26 30 32 18 30 C6 32 -4 24 0 12 Z" fill="url(#bwgwing2)"/>
      <ellipse cx="41" cy="12" rx="5" ry="7" fill="#e8d9b8"/>
    </g>
    <!-- front layer (larger, brighter) -->
    <g transform="translate(78 122) rotate(10)">
      <path d="M0 14 C-5 3 9 -5 24 -3 C40 -5 50 7 45 19 C50 31 36 38 22 35 C8 38 -5 28 0 14 Z" fill="url(#bwgwing)"/>
      <ellipse cx="49" cy="14" rx="6" ry="8" fill="#f0e2c2"/>
      <ellipse cx="18" cy="6" rx="12" ry="4" fill="#ff8a4a" opacity=".5"/>
    </g>
    <g transform="translate(136 126) rotate(-12)">
      <path d="M0 14 C-5 3 9 -5 24 -3 C40 -5 50 7 45 19 C50 31 36 38 22 35 C8 38 -5 28 0 14 Z" fill="url(#bwgwing)"/>
      <ellipse cx="49" cy="14" rx="6" ry="8" fill="#f0e2c2"/>
      <ellipse cx="18" cy="6" rx="12" ry="4" fill="#ff8a4a" opacity=".5"/>
    </g>
    <g transform="translate(194 122) rotate(14)">
      <path d="M0 14 C-5 3 9 -5 24 -3 C40 -5 50 7 45 19 C50 31 36 38 22 35 C8 38 -5 28 0 14 Z" fill="url(#bwgwing)"/>
      <ellipse cx="49" cy="14" rx="6" ry="8" fill="#f0e2c2"/>
      <ellipse cx="18" cy="6" rx="12" ry="4" fill="#ff8a4a" opacity=".5"/>
    </g>
  </g>
  <!-- glossy sauce highlights -->
  <g fill="#ff9d5e" opacity=".45">
    <ellipse cx="104" cy="128" rx="10" ry="3.4"/>
    <ellipse cx="158" cy="132" rx="11" ry="3.6"/>
    <ellipse cx="212" cy="128" rx="10" ry="3.4"/>
  </g>
  <!-- celery sticks tucked at the side -->
  <g stroke="#2f7d2b" stroke-width="1" stroke-linejoin="round">
    <path d="M232 108 L262 96 L266 102 L236 114 Z" fill="#8fce6a"/>
    <path d="M234 120 L264 110 L267 116 L237 126 Z" fill="#7cc257"/>
    <path d="M234 108 L262 97" stroke="#c7e9a8" stroke-width="1.2" opacity=".6"/>
  </g>
  <!-- blue-cheese dip drizzle + crumbles -->
  <path d="M60 118 q10 -4 18 2 q10 -5 18 2" stroke="#f4f0e2" stroke-width="2.6" fill="none" opacity=".85" stroke-linecap="round"/>
  <g fill="#eef0e0">
    <rect x="90" y="150" width="4.5" height="3.6" rx="1.1" transform="rotate(12 92 152)"/>
    <rect x="160" y="150" width="4.5" height="3.6" rx="1.1" transform="rotate(-10 162 152)"/>
    <rect x="126" y="152" width="4" height="3.2" rx="1" transform="rotate(20 128 154)"/>
  </g>
  <!-- scallion/chili garnish + gloss -->
  <rect x="120" y="112" width="6" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 123 113)"/>
  <rect x="178" y="110" width="6" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 181 111)"/>
  <circle cx="146" cy="116" r="2" fill="#e0341f"/>
  <circle cx="196" cy="118" r="2" fill="#e0341f"/>
  <circle cx="120" cy="122" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="176" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="216" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
