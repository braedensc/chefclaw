    <path d="M92 118 l7 -3" stroke="#f6dca0" stroke-width="2.4"/>
    <path d="M110 128 l6 3" stroke="#a5721f" stroke-width="2.4"/>
    <path d="M126 112 l7 -2" stroke="#f6dca0" stroke-width="2.4"/>
    <path d="M144 124 l-6 3" stroke="#b98432" stroke-width="2.4"/>
    <path d="M160 108 l6 3" stroke="#f6dca0" stroke-width="2.4"/>
    <path d="M178 122 l7 -3" stroke="#a5721f" stroke-width="2.4"/>
    <path d="M196 112 l-6 3" stroke="#f6dca0" stroke-width="2.4"/>
    <path d="M214 126 l7 2" stroke="#b98432" stroke-width="2.4"/>
    <path d="M228 118 l-6 -3" stroke="#f6dca0" stroke-width="2.4"/>
    <path d="M100 140 l7 2" stroke="#b98432" stroke-width="2.4"/>
    <path d="M138 144 l6 -2" stroke="#f6dca0" stroke-width="2.4"/>
    <path d="M206 142 l6 -3" stroke="#a5721f" stroke-width="2.4"/>
    <path d="M118 134 l6 3" stroke="#f6dca0" stroke-width="2.2"/>
    <path d="M188 132 l-6 3" stroke="#b98432" stroke-width="2.2"/>
    <path d="M84 128 l6 2" stroke="#f6dca0" stroke-width="2.2"/>
    <path d="M240 128 l-6 3" stroke="#f6dca0" stroke-width="2.2"/>
    <path d="M114 100 l6 3" stroke="#a5721f" stroke-width="2.2"/>
    <path d="M204 100 l6 -2" stroke="#f6dca0" stroke-width="2.2"/>
  </g>
  <!-- fried egg (telur mata sapi) crowning the mound -->
  <g transform="translate(158 108)">
    <path d="M-30 6 C-36 -6 -22 -16 -8 -14 C-4 -20 12 -20 18 -12 C32 -14 40 -2 32 8 C38 16 26 24 12 20 C4 26 -14 24 -20 16 C-32 18 -36 12 -30 6 Z" fill="url(#ngwhite)" stroke="#e4d3ad" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="12" ry="11" fill="url(#ngyolk)" stroke="#e07f0c" stroke-width="1"/>
    <ellipse cx="-4" cy="-4" rx="4" ry="3" fill="#ffe79a" opacity=".85"/>
  </g>
  <!-- prawn cracker (kerupuk) tucked at the back-left -->
  <path d="M70 100 C64 88 78 80 92 84 C104 82 110 92 104 100 C110 108 96 116 84 110 C74 112 66 106 70 100 Z" fill="#f8e6c8" stroke="#d9b880" stroke-width="1.2" opacity=".95"/>
  <circle cx="82" cy="94" r="1.4" fill="#e8d0a0"/>
  <circle cx="94" cy="100" r="1.2" fill="#e8d0a0"/>
  <!-- garnish: scallion, red chili, cucumber slice -->
  <rect x="110" y="120" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 113 121)"/>
  <rect x="200" y="118" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 203 119)"/>
  <rect x="132" y="142" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 135 143)"/>
  <rect x="188" y="140" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-14 191 141)"/>
  <!-- diced red chili flecks -->
  <rect x="126" y="126" width="6" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(20 129 127)"/>
  <rect x="196" y="128" width="6" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(-12 199 129)"/>
  <!-- cucumber slice on the plate rim -->
  <circle cx="234" cy="146" r="9" fill="#7bbf4a"/>
  <circle cx="234" cy="146" r="6" fill="#d6ebb0"/>
  <circle cx="234" cy="146" r="2.4" fill="#eef6dc"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="200" cy="110" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="140" r="1.2" fill="#fff" opacity=".5"/>
