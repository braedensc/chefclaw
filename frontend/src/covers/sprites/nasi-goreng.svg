<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ngBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ngbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="ngmound" cx="46%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#e8b86a"/><stop offset="55%" stop-color="#cd9642"/><stop offset="100%" stop-color="#a5721f"/>
    </radialGradient>
    <linearGradient id="ngwhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf6"/><stop offset="100%" stop-color="#f0e4cc"/>
    </linearGradient>
    <radialGradient id="ngyolk" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffd94a"/><stop offset="60%" stop-color="#ffab1a"/><stop offset="100%" stop-color="#f0850c"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ngbg)"/>
  <!-- rising steam wisps -->
  <path d="M116 52 C106 36 126 28 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ngBlur3)"/>
  <path d="M196 50 C188 34 206 26 198 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ngBlur3)"/>
  <ellipse cx="160" cy="188" rx="154" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (warm) -->
  <path d="M50 114 Q104 82 168 80" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- oval plate -->
