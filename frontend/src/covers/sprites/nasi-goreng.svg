  <ellipse cx="160" cy="132" rx="144" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="130" ry="38" fill="#0f0d13"/>
  <!-- fried-rice mound (dark caramel from kecap manis + sambal) -->
  <path d="M62 138 C68 108 108 96 160 96 C212 96 252 108 258 138 C230 158 196 162 160 162 C124 162 90 158 62 138 Z" fill="#7a561f" opacity=".6"/>
  <path d="M66 134 C72 104 110 90 160 90 C210 90 248 104 254 134 C228 152 196 158 160 158 C124 158 92 152 66 134 Z" fill="url(#ngmound)"/>
  <path d="M66 134 C72 104 110 90 160 90 C210 90 248 104 254 134" fill="none" stroke="#f4c878" stroke-width="1.4" opacity=".35"/>
  <!-- rice-grain texture (caramelized + pale grains) -->
