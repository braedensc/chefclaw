<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="paBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="pabg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="pasauce" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#ff7350"/><stop offset="55%" stop-color="#dd3320"/><stop offset="100%" stop-color="#9c1c10"/>
    </radialGradient>
    <linearGradient id="papenne" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6ddb2"/><stop offset="55%" stop-color="#e6c184"/><stop offset="100%" stop-color="#cf9f5a"/>
    </linearGradient>
    <radialGradient id="pabowl" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pabg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 26 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#paBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#paBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- deep pasta bowl -->
  <ellipse cx="160" cy="130" rx="128" ry="52" fill="url(#pabowl)"/>
  <ellipse cx="160" cy="130" rx="128" ry="52" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="112" ry="44" fill="#0f0d13"/>
  <!-- neon steam arc (rose family) -->
  <path d="M52 114 Q104 82 168 80" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- glossy arrabbiata sauce pool -->
  <path d="M66 126 C72 100 108 90 160 90 C212 90 248 100 254 126 C230 148 196 152 160 152 C124 152 90 148 66 126 Z" fill="url(#pasauce)"/>
  <path d="M72 118 C92 104 120 100 160 100 C200 100 228 104 248 118" stroke="#ff9d7d" stroke-width="2" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- flecks of chili + garlic in the sauce -->
  <rect x="98" y="120" width="6" height="2.6" rx="1.3" fill="#c31f12" transform="rotate(20 101 121)"/>
  <rect x="196" y="118" width="6" height="2.6" rx="1.3" fill="#c31f12" transform="rotate(-16 199 119)"/>
  <circle cx="132" cy="132" r="1.8" fill="#f2ddb0"/>
  <circle cx="184" cy="134" r="1.6" fill="#f2ddb0"/>
  <!-- PENNE: short ridged tubes with dark hollow ends, tossed -->
  <g stroke-linejoin="round">
    <!-- back layer, dimmer/smaller -->
    <g transform="translate(96 96) rotate(-22) scale(.86)"><rect width="34" height="15" rx="7.5" fill="url(#papenne)" stroke="#a3300f" stroke-width="1.2" opacity=".9"/><ellipse cx="4" cy="7.5" rx="3" ry="6" fill="#7a4c14"/></g>
    <g transform="translate(180 94) rotate(16) scale(.86)"><rect width="34" height="15" rx="7.5" fill="url(#papenne)" stroke="#a3300f" stroke-width="1.2" opacity=".9"/><ellipse cx="30" cy="7.5" rx="3" ry="6" fill="#7a4c14"/></g>
    <g transform="translate(140 92) rotate(-6) scale(.84)"><rect width="34" height="15" rx="7.5" fill="url(#papenne)" stroke="#a3300f" stroke-width="1.2" opacity=".88"/><ellipse cx="4" cy="7.5" rx="3" ry="6" fill="#7a4c14"/></g>
    <!-- front layer, brighter/larger -->
    <g transform="translate(84 118) rotate(-14)"><rect width="42" height="18" rx="9" fill="url(#papenne)" stroke="#a3300f" stroke-width="1.3"/><ellipse cx="5" cy="9" rx="3.4" ry="7.5" fill="#8a5a1e"/><rect x="10" y="3.5" width="26" height="2.4" rx="1.2" fill="#fff1c9" opacity=".6"/></g>
    <g transform="translate(126 124) rotate(8)"><rect width="44" height="18" rx="9" fill="url(#papenne)" stroke="#a3300f" stroke-width="1.3"/><ellipse cx="39" cy="9" rx="3.4" ry="7.5" fill="#8a5a1e"/><rect x="8" y="3.5" width="26" height="2.4" rx="1.2" fill="#fff1c9" opacity=".6"/></g>
    <g transform="translate(178 120) rotate(24)"><rect width="42" height="18" rx="9" fill="url(#papenne)" stroke="#a3300f" stroke-width="1.3"/><ellipse cx="5" cy="9" rx="3.4" ry="7.5" fill="#8a5a1e"/><rect x="10" y="3.5" width="24" height="2.4" rx="1.2" fill="#fff1c9" opacity=".55"/></g>
    <g transform="translate(120 106) rotate(-30)"><rect width="40" height="17" rx="8.5" fill="url(#papenne)" stroke="#a3300f" stroke-width="1.3"/><ellipse cx="36" cy="8.5" rx="3.2" ry="7" fill="#8a5a1e"/><rect x="8" y="3.2" width="24" height="2.2" rx="1.1" fill="#fff1c9" opacity=".55"/></g>
  </g>
  <!-- basil leaves + parmesan garnish on top -->
  <path d="M150 100 C154 92 164 92 166 100 C164 108 154 108 150 100 Z" fill="#3f9c37"/>
  <path d="M158 96 L158 104" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  <path d="M108 132 C112 126 120 126 122 132 C120 138 112 138 108 132 Z" fill="#58c14a"/>
  <rect x="196" y="130" width="7" height="3" rx="1.4" fill="#fff3c8" transform="rotate(-12 199 131)" opacity=".9"/>
  <rect x="132" y="146" width="7" height="3" rx="1.4" fill="#fff3c8" transform="rotate(14 135 147)" opacity=".9"/>
  <!-- oily gloss dots -->
  <circle cx="108" cy="120" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="168" cy="128" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="140" r="1.2" fill="#fff" opacity=".5"/>
</svg>
