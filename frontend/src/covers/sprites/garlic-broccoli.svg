<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="gbrBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="gbrbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <radialGradient id="gbrplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="gbrfloret" cx="42%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#5aa84a"/><stop offset="55%" stop-color="#398a2f"/><stop offset="100%" stop-color="#1f6320"/>
    </radialGradient>
    <linearGradient id="gbrstem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe0a4"/><stop offset="100%" stop-color="#a2c072"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gbrbg)"/>
  <!-- steam -->
  <path d="M116 52 C106 36 126 28 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#gbrBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#gbrBlur3)"/>
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="url(#gbrplate)"/>
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="126" ry="38" fill="#0c0c0f"/>
  <!-- neon steam arc (cyan/savory) -->
  <path d="M48 116 Q100 82 166 82" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- BROCCOLI FLORETS: little trees with pale stems + bumpy green crowns, tossed -->
  <!-- back-row florets (smaller, dimmer) -->
  <g transform="translate(96 108) scale(.82)">
    <rect x="-3" y="6" width="7" height="14" rx="3" fill="url(#gbrstem)"/>
    <circle cx="-6" cy="2" r="9" fill="url(#gbrfloret)"/><circle cx="6" cy="0" r="10" fill="url(#gbrfloret)"/><circle cx="0" cy="-8" r="9" fill="url(#gbrfloret)"/>
  </g>
  <g transform="translate(216 110) scale(.82)">
    <rect x="-3" y="6" width="7" height="14" rx="3" fill="url(#gbrstem)"/>
    <circle cx="-6" cy="2" r="9" fill="url(#gbrfloret)"/><circle cx="6" cy="0" r="10" fill="url(#gbrfloret)"/><circle cx="0" cy="-8" r="9" fill="url(#gbrfloret)"/>
  </g>
  <!-- front-row florets (larger, brighter) -->
  <g transform="translate(130 118)">
    <rect x="-4" y="8" width="9" height="18" rx="4" fill="url(#gbrstem)"/>
    <circle cx="-9" cy="3" r="11" fill="url(#gbrfloret)"/><circle cx="8" cy="1" r="12" fill="url(#gbrfloret)"/><circle cx="-1" cy="-10" r="11" fill="url(#gbrfloret)"/>
    <circle cx="-9" cy="0" r="2" fill="#7ec96a" opacity=".8"/><circle cx="7" cy="-2" r="2.2" fill="#7ec96a" opacity=".8"/><circle cx="0" cy="-12" r="2" fill="#8fd47a" opacity=".8"/>
  </g>
  <g transform="translate(190 120)">
    <rect x="-4" y="8" width="9" height="18" rx="4" fill="url(#gbrstem)"/>
    <circle cx="-9" cy="3" r="11" fill="url(#gbrfloret)"/><circle cx="8" cy="1" r="12" fill="url(#gbrfloret)"/><circle cx="-1" cy="-10" r="11" fill="url(#gbrfloret)"/>
    <circle cx="-9" cy="0" r="2" fill="#7ec96a" opacity=".8"/><circle cx="7" cy="-2" r="2.2" fill="#7ec96a" opacity=".8"/><circle cx="0" cy="-12" r="2" fill="#8fd47a" opacity=".8"/>
  </g>
  <g transform="translate(160 126)">
    <rect x="-4" y="8" width="9" height="18" rx="4" fill="url(#gbrstem)"/>
    <circle cx="-9" cy="3" r="12" fill="url(#gbrfloret)"/><circle cx="9" cy="1" r="12" fill="url(#gbrfloret)"/><circle cx="-1" cy="-11" r="12" fill="url(#gbrfloret)"/>
    <circle cx="-9" cy="0" r="2.2" fill="#8fd47a" opacity=".85"/><circle cx="8" cy="-2" r="2.2" fill="#7ec96a" opacity=".85"/><circle cx="0" cy="-13" r="2.2" fill="#8fd47a" opacity=".85"/>
  </g>
  <!-- minced garlic scattered over the top (the 蒜蓉 hero) -->
  <g fill="#f2ddb0">
    <ellipse cx="122" cy="110" rx="3" ry="2" transform="rotate(-16 122 110)"/>
    <ellipse cx="150" cy="118" rx="3.2" ry="2.1" transform="rotate(10 150 118)"/>
    <ellipse cx="176" cy="112" rx="3" ry="2" transform="rotate(-8 176 112)"/>
    <ellipse cx="200" cy="116" rx="3" ry="2" transform="rotate(18 200 116)"/>
    <ellipse cx="138" cy="130" rx="2.8" ry="1.9" transform="rotate(-12 138 130)"/>
    <ellipse cx="168" cy="132" rx="3" ry="2" transform="rotate(14 168 132)"/>
    <ellipse cx="112" cy="126" rx="2.6" ry="1.8" transform="rotate(8 112 126)"/>
    <ellipse cx="210" cy="126" rx="2.6" ry="1.8" transform="rotate(-14 210 126)"/>
  </g>
  <!-- crispy shallot / oil gloss dots -->
  <circle cx="144" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="118" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="160" cy="122" r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="130" cy="124" r="1.2" fill="#fff" opacity=".5"/>
</svg>
