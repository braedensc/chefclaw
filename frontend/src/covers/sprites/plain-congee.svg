<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="pcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="pcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="pcbowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="pccongee" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fbf7ec"/><stop offset="58%" stop-color="#eee3cd"/><stop offset="100%" stop-color="#d8c9ab"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pcbg)"/>
  <!-- steam -->
  <path d="M132 58 C122 40 142 32 132 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#pcBlur3)"/>
  <path d="M188 54 C180 38 198 30 190 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#pcBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- side saucers (behind main bowl) -->
  <g>
    <ellipse cx="46" cy="150" rx="34" ry="14" fill="#141018"/>
    <ellipse cx="46" cy="150" rx="34" ry="14" fill="none" stroke="#26262e" stroke-width="2.4"/>
    <ellipse cx="46" cy="150" rx="26" ry="9.5" fill="#0f0d13"/>
    <!-- pickled radish / yellow -->
    <rect x="34" y="146" width="9" height="3" rx="1.4" fill="#e7c23a" transform="rotate(-14 38 147)"/>
    <rect x="48" y="149" width="9" height="3" rx="1.4" fill="#efce4c" transform="rotate(10 52 150)"/>
    <rect x="40" y="152" width="8" height="2.8" rx="1.3" fill="#d9b530" transform="rotate(24 44 153)"/>
  </g>
  <g>
    <ellipse cx="274" cy="150" rx="34" ry="14" fill="#141018"/>
    <ellipse cx="274" cy="150" rx="34" ry="14" fill="none" stroke="#26262e" stroke-width="2.4"/>
    <ellipse cx="274" cy="150" rx="26" ry="9.5" fill="#0f0d13"/>
    <!-- fermented tofu / dark side -->
    <rect x="262" y="146" width="8" height="7" rx="1.6" fill="#a83a1c" transform="rotate(-8 266 149)"/>
    <rect x="272" y="149" width="7" height="6" rx="1.5" fill="#c14a24" transform="rotate(12 275 152)"/>
    <circle cx="270" cy="150" r="1.3" fill="#fff" opacity=".5"/>
  </g>
  <!-- main deep congee bowl -->
  <path d="M52 104 C52 150 100 176 160 176 C220 176 268 150 268 104 Z" fill="url(#pcbowl)"/>
  <ellipse cx="160" cy="104" rx="112" ry="30" fill="#0d0d10"/>
  <ellipse cx="160" cy="104" rx="112" ry="30" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- neon steam arc -->
  <path d="M60 96 Q108 68 168 66" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- smooth congee surface -->
  <ellipse cx="160" cy="106" rx="100" ry="24" fill="url(#pccongee)"/>
  <ellipse cx="160" cy="106" rx="100" ry="24" fill="none" stroke="#c7b58f" stroke-width="1.2" opacity=".5"/>
  <!-- soft creamy sheen ring -->
  <path d="M78 100 C110 90 210 90 242 100" stroke="#fffaf0" stroke-width="2.2" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- gentle porridge ripples -->
  <path d="M96 110 C120 116 200 116 224 110" stroke="#d3c2a0" stroke-width="1.4" fill="none" opacity=".55"/>
  <path d="M110 116 C132 120 188 120 210 116" stroke="#cbb896" stroke-width="1.2" fill="none" opacity=".5"/>
  <!-- soft rice-lump texture on surface -->
  <ellipse cx="128" cy="102" rx="6" ry="3.4" fill="#fffaf0" opacity=".6"/>
  <ellipse cx="176" cy="104" rx="6.5" ry="3.6" fill="#fffaf0" opacity=".55"/>
  <ellipse cx="150" cy="110" rx="5.4" ry="3" fill="#fffaf0" opacity=".5"/>
  <ellipse cx="198" cy="108" rx="5" ry="3" fill="#f2e8d4" opacity=".55"/>
  <ellipse cx="110" cy="108" rx="5" ry="3" fill="#f2e8d4" opacity=".5"/>
  <!-- scallion + a drizzle of oil garnish -->
  <rect x="140" y="98" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 143 99)"/>
  <rect x="166" y="100" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 169 101)"/>
  <rect x="124" y="104" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-8 127 105)"/>
  <rect x="186" y="102" width="6" height="2.4" rx="1.2" fill="#6abf5a" transform="rotate(22 189 103)"/>
  <!-- gloss dots -->
  <circle cx="134" cy="100" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="102" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="158" cy="112" r="1.2" fill="#fff" opacity=".5"/>
</svg>
