<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="kc1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="kc1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="kc1bowl" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0c0c10"/>
    </radialGradient>
    <radialGradient id="kc1broth" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#b58a48"/><stop offset="55%" stop-color="#8f6528"/><stop offset="100%" stop-color="#674618"/>
    </radialGradient>
    <linearGradient id="kc1rib" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2e0b4"/><stop offset="55%" stop-color="#e0c384"/><stop offset="100%" stop-color="#c4a25e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kc1bg)"/>
  <!-- rising steam -->
  <path d="M126 50 C116 32 136 26 126 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#kc1Blur3)"/>
  <path d="M198 52 C190 36 208 28 200 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#kc1Blur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- deep bowl -->
  <path d="M44 120 C44 110 64 102 160 102 C256 102 276 110 276 120 C276 120 258 176 240 182 C212 192 108 192 80 182 C62 176 44 120 44 120 Z" fill="url(#kc1bowl)"/>
  <ellipse cx="160" cy="120" rx="116" ry="29" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- broth surface -->
  <ellipse cx="160" cy="120" rx="112" ry="27" fill="url(#kc1broth)"/>
  <!-- neon steam arc (cyan) -->
  <path d="M54 106 Q104 78 168 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- WIDE FLAT knife-cut ribbons with pointed ends, layered/curling -->
  <g stroke-linejoin="round">
    <path d="M74 118 C96 106 128 104 150 112 L156 108 L150 118 C130 128 100 130 78 124 Z" fill="url(#kc1rib)" stroke="#a3792e" stroke-width="1.2" opacity=".95"/>
    <path d="M148 110 C172 100 202 102 224 112 L230 108 L224 118 C202 126 172 126 150 118 Z" fill="url(#kc1rib)" stroke="#a3792e" stroke-width="1.2"/>
    <path d="M92 126 C116 116 152 116 178 124 L184 120 L178 130 C152 138 116 138 94 132 Z" fill="url(#kc1rib)" stroke="#a3792e" stroke-width="1.2"/>
    <path d="M104 108 C126 98 158 98 182 106 L188 102 L182 112 C158 120 126 120 106 114 Z" fill="url(#kc1rib)" stroke="#a3792e" stroke-width="1.2" opacity=".92"/>
    <!-- highlight ridge on each ribbon -->
    <path d="M82 114 C104 104 132 104 150 111" stroke="#fff4d4" stroke-width="1.6" fill="none" opacity=".55"/>
    <path d="M154 108 C176 100 202 102 222 110" stroke="#fff4d4" stroke-width="1.6" fill="none" opacity=".55"/>
    <path d="M100 122 C124 114 156 114 178 121" stroke="#fff4d4" stroke-width="1.6" fill="none" opacity=".5"/>
  </g>
  <!-- braised meat/tomato topping cluster (Shanxi 番茄/肉臊 style) -->
  <g>
    <path d="M186 118 C180 112 190 108 202 110 C214 108 220 114 216 120 C218 126 206 130 194 126 C186 128 182 124 186 118 Z" fill="#c33320" stroke="#8a1c10" stroke-width="1.2"/>
    <ellipse cx="196" cy="114" rx="6" ry="2.4" fill="#ff7350" opacity=".7"/>
    <path d="M150 126 C144 120 154 116 166 118 C178 116 184 122 180 128 C182 134 170 138 158 134 C150 136 146 132 150 126 Z" fill="#7c3a20" stroke="#3b1508" stroke-width="1.2"/>
    <ellipse cx="160" cy="122" rx="6" ry="2.4" fill="#fff" opacity=".18"/>
  </g>
  <!-- scallion + cilantro garnish -->
  <rect x="122" y="112" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-20 125 113)"/>
  <rect x="166" y="110" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 169 111)"/>
  <rect x="138" y="128" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 141 129)"/>
  <rect x="204" y="126" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-12 207 127)"/>
  <circle cx="134" cy="120" r="1.8" fill="#e0341f"/>
  <circle cx="178" cy="122" r="1.8" fill="#e0341f"/>
  <!-- gloss dots -->
  <circle cx="126" cy="114" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="174" cy="116" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="152" cy="120" r="1.2" fill="#fff" opacity=".45"/>
</svg>
