<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tkBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tkbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="tkpanko" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a63c"/><stop offset="50%" stop-color="#cf8324"/><stop offset="100%" stop-color="#a85f14"/>
    </linearGradient>
    <linearGradient id="tkpork" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ded0"/><stop offset="100%" stop-color="#e6b8a2"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tkbg)"/>
  <!-- rising steam (hot fry) -->
  <path d="M120 56 C110 38 130 30 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#tkBlur3)"/>
  <path d="M196 54 C188 38 206 30 198 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tkBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="146" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="132" rx="146" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="132" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (warm white) -->
  <path d="M50 116 Q104 82 166 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- shredded cabbage bed under the cutlet -->
  <g stroke-linecap="round" fill="none" opacity=".9">
    <path d="M64 138 C90 128 130 128 156 136" stroke="#d8ecc4" stroke-width="2.4"/>
    <path d="M70 144 C96 136 132 138 158 144" stroke="#bfe0a4" stroke-width="2.2"/>
    <path d="M62 132 C86 124 118 124 148 130" stroke="#eaf6dc" stroke-width="2.2"/>
    <path d="M76 148 C104 142 134 144 160 148" stroke="#cfe8b4" stroke-width="2"/>
    <path d="M66 128 C88 120 116 120 142 126" stroke="#d8ecc4" stroke-width="1.8"/>
  </g>
  <!-- tonkatsu: sliced breaded pork cutlet fanned across the plate -->
  <g stroke-linejoin="round">
    <g transform="translate(96 82) rotate(-6)">
      <path d="M0 6 C0 2 6 0 14 0 L30 0 C38 0 42 2 42 8 L42 34 C42 40 38 42 30 42 L14 42 C6 42 0 40 0 36 Z" fill="url(#tkpanko)" stroke="#8a4d10" stroke-width="1.3"/>
      <!-- pork interior slab -->
      <path d="M8 12 L34 12 L34 30 L8 30 Z" fill="url(#tkpork)" stroke="#d99a82" stroke-width="1"/>
      <path d="M8 15 L34 15" stroke="#f7e9df" stroke-width="1.4" opacity=".7"/>
      <!-- panko crumb texture -->
      <circle cx="5" cy="8" r="1.3" fill="#f6cf6a" opacity=".8"/><circle cx="38" cy="6" r="1.3" fill="#f6cf6a" opacity=".8"/>
      <circle cx="4" cy="34" r="1.3" fill="#f6cf6a" opacity=".7"/><circle cx="39" cy="36" r="1.3" fill="#f6cf6a" opacity=".7"/>
    </g>
    <g transform="translate(130 80) rotate(-2)">
      <path d="M0 6 C0 2 6 0 14 0 L30 0 C38 0 42 2 42 8 L42 34 C42 40 38 42 30 42 L14 42 C6 42 0 40 0 36 Z" fill="url(#tkpanko)" stroke="#8a4d10" stroke-width="1.3"/>
      <path d="M8 12 L34 12 L34 30 L8 30 Z" fill="url(#tkpork)" stroke="#d99a82" stroke-width="1"/>
      <path d="M8 15 L34 15" stroke="#f7e9df" stroke-width="1.4" opacity=".7"/>
      <circle cx="5" cy="8" r="1.3" fill="#f6cf6a" opacity=".8"/><circle cx="38" cy="6" r="1.3" fill="#f6cf6a" opacity=".8"/>
      <circle cx="4" cy="34" r="1.3" fill="#f6cf6a" opacity=".7"/><circle cx="39" cy="36" r="1.3" fill="#f6cf6a" opacity=".7"/>
    </g>
    <g transform="translate(164 79) rotate(2)">
      <path d="M0 6 C0 2 6 0 14 0 L30 0 C38 0 42 2 42 8 L42 34 C42 40 38 42 30 42 L14 42 C6 42 0 40 0 36 Z" fill="url(#tkpanko)" stroke="#8a4d10" stroke-width="1.3"/>
      <path d="M8 12 L34 12 L34 30 L8 30 Z" fill="url(#tkpork)" stroke="#d99a82" stroke-width="1"/>
      <path d="M8 15 L34 15" stroke="#f7e9df" stroke-width="1.4" opacity=".7"/>
      <circle cx="5" cy="8" r="1.3" fill="#f6cf6a" opacity=".8"/><circle cx="38" cy="6" r="1.3" fill="#f6cf6a" opacity=".8"/>
      <circle cx="4" cy="34" r="1.3" fill="#f6cf6a" opacity=".7"/><circle cx="39" cy="36" r="1.3" fill="#f6cf6a" opacity=".7"/>
    </g>
    <g transform="translate(198 82) rotate(6)">
      <path d="M0 6 C0 2 6 0 14 0 L28 0 C36 0 40 2 40 8 L40 34 C40 40 36 42 28 42 L14 42 C6 42 0 40 0 36 Z" fill="url(#tkpanko)" stroke="#8a4d10" stroke-width="1.3"/>
      <path d="M8 12 L32 12 L32 30 L8 30 Z" fill="url(#tkpork)" stroke="#d99a82" stroke-width="1"/>
      <path d="M8 15 L32 15" stroke="#f7e9df" stroke-width="1.4" opacity=".7"/>
      <circle cx="5" cy="8" r="1.3" fill="#f6cf6a" opacity=".8"/><circle cx="36" cy="6" r="1.3" fill="#f6cf6a" opacity=".8"/>
    </g>
  </g>
  <!-- tonkatsu sauce drizzle over the crust -->
  <path d="M104 96 C124 104 150 92 168 100 C186 108 210 96 226 104" stroke="#4a2410" stroke-width="3.2" fill="none" opacity=".8" stroke-linecap="round"/>
  <path d="M110 106 C130 112 156 102 176 110 C196 116 214 108 224 114" stroke="#5e2f16" stroke-width="2.4" fill="none" opacity=".65" stroke-linecap="round"/>
  <!-- sesame + a slice of lemon garnish -->
  <ellipse cx="238" cy="132" rx="11" ry="9" fill="#f6d84a"/>
  <ellipse cx="238" cy="132" rx="11" ry="9" fill="none" stroke="#c9a81e" stroke-width="1.2"/>
  <path d="M238 123 L238 141 M229 132 L247 132 M232 126 L244 138 M244 126 L232 138" stroke="#fff2b0" stroke-width="1" opacity=".8"/>
  <ellipse cx="150" cy="90" rx="1.6" ry="0.9" fill="#f8eed6"/>
  <ellipse cx="188" cy="94" rx="1.6" ry="0.9" fill="#f8eed6"/>
  <!-- gloss dots -->
  <circle cx="130" cy="90" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="206" cy="92" r="1.3" fill="#fff" opacity=".5"/>
</svg>
