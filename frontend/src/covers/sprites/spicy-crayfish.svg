<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="cy1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cy1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="cy1oil" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#c9350f"/><stop offset="60%" stop-color="#951f07"/><stop offset="100%" stop-color="#5e1204"/>
    </radialGradient>
    <linearGradient id="cy1shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6a3a"/><stop offset="48%" stop-color="#e13e18"/><stop offset="100%" stop-color="#a2260a"/>
    </linearGradient>
    <radialGradient id="cy1pot" cx="50%" cy="34%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cy1bg)"/>
  <!-- steam -->
  <path d="M120 52 C110 34 130 26 120 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#cy1Blur3)"/>
  <path d="M198 50 C190 34 208 26 200 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#cy1Blur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- wide wok/bowl -->
  <ellipse cx="160" cy="128" rx="130" ry="56" fill="url(#cy1pot)"/>
  <ellipse cx="160" cy="128" rx="130" ry="56" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="114" ry="47" fill="#0c0c0f"/>
  <!-- neon steam arc (cyan) -->
  <path d="M52 112 Q104 80 168 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- chili-oil pool -->
  <ellipse cx="160" cy="128" rx="106" ry="42" fill="url(#cy1oil)"/>
  <ellipse cx="150" cy="120" rx="60" ry="20" fill="#e0470f" opacity=".35"/>
  <!-- one crayfish unit: curled tail + body + two claws -->
  <!-- back crayfish (smaller, dimmer) -->
  <g transform="translate(206 106) rotate(18) scale(.82)" opacity=".92">
    <path d="M0 0 C-4 -12 6 -18 16 -14 C24 -18 32 -12 30 -2 C36 4 30 14 20 12 C22 22 10 26 4 18 C-4 20 -8 10 -2 4 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.2"/>
    <path d="M4 -16 C0 -26 -8 -24 -12 -30 M12 -18 C12 -28 4 -30 2 -36" stroke="#c93314" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <ellipse cx="14" cy="-4" rx="5" ry="3" fill="#ff8a5a" opacity=".7"/>
  </g>
  <!-- front-left crayfish -->
  <g transform="translate(96 116) rotate(-14)">
    <!-- claws -->
    <path d="M-18 -8 C-30 -14 -34 -4 -26 2 C-22 -2 -24 -8 -18 -8 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.2"/>
    <path d="M-14 6 C-26 8 -26 18 -18 18 C-16 12 -18 8 -14 6 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.2"/>
    <!-- head/body -->
    <path d="M-14 -2 C-14 -14 -2 -20 10 -16 C22 -18 30 -8 26 2 C30 12 20 20 8 16 C-2 20 -14 12 -14 -2 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.3"/>
    <!-- segmented curled tail -->
    <path d="M22 -2 C34 -4 42 4 40 14 C38 24 28 26 24 18" fill="none" stroke="#e13e18" stroke-width="9" stroke-linecap="round"/>
    <path d="M22 -2 C34 -4 42 4 40 14 C38 24 28 26 24 18" fill="none" stroke="#a2260a" stroke-width="2" opacity=".6"/>
    <!-- tail fan -->
    <path d="M24 18 C22 30 34 32 40 26 C44 30 50 24 46 18 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.1"/>
    <!-- antennae -->
    <path d="M-8 -14 C-12 -26 -22 -26 -26 -34 M2 -16 C2 -28 -6 -32 -8 -40" stroke="#c93314" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- eyes + gloss -->
    <circle cx="-8" cy="-6" r="2" fill="#1c0d06"/>
    <ellipse cx="6" cy="-8" rx="7" ry="3.4" fill="#ff9d6d" opacity=".7"/>
  </g>
  <!-- front-right crayfish -->
  <g transform="translate(174 130) rotate(24)">
    <path d="M-16 -6 C-26 -12 -30 -2 -22 4 C-18 0 -20 -6 -16 -6 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.2"/>
    <path d="M-14 -2 C-14 -14 -2 -20 10 -16 C22 -18 30 -8 26 2 C30 12 20 20 8 16 C-2 20 -14 12 -14 -2 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.3"/>
    <path d="M22 -2 C34 -4 42 4 40 14 C38 24 28 26 24 18" fill="none" stroke="#e13e18" stroke-width="9" stroke-linecap="round"/>
    <path d="M24 18 C22 30 34 32 40 26 C44 30 50 24 46 18 Z" fill="url(#cy1shell)" stroke="#7a1c06" stroke-width="1.1"/>
    <path d="M-6 -14 C-10 -26 -20 -26 -24 -34" stroke="#c93314" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <ellipse cx="6" cy="-8" rx="7" ry="3.4" fill="#ff9d6d" opacity=".7"/>
  </g>
  <!-- dried red chilies scattered on top -->
  <g stroke-linecap="round">
    <path d="M112 96 C122 92 132 96 138 92" stroke="#8a1206" stroke-width="5" fill="none"/>
    <path d="M112 96 C122 92 132 96 138 92" stroke="#d0341a" stroke-width="2.2" fill="none" opacity=".7"/>
    <path d="M198 118 C208 122 218 118 226 122" stroke="#8a1206" stroke-width="5" fill="none"/>
    <path d="M198 118 C208 122 218 118 226 122" stroke="#d0341a" stroke-width="2.2" fill="none" opacity=".7"/>
    <path d="M138 138 C148 134 158 138 164 134" stroke="#8a1206" stroke-width="4.4" fill="none"/>
  </g>
  <!-- sichuan peppercorns + garlic + scallion -->
  <circle cx="128" cy="112" r="2" fill="#3a1508"/>
  <circle cx="188" cy="104" r="2" fill="#3a1508"/>
  <circle cx="150" cy="140" r="1.8" fill="#3a1508"/>
  <circle cx="206" cy="140" r="2" fill="#3a1508"/>
  <circle cx="120" cy="128" r="2.2" fill="#f2ddb0"/>
  <circle cx="200" cy="96" r="2" fill="#f2ddb0"/>
  <rect x="146" y="100" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(18 149 101)"/>
  <rect x="176" y="148" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-16 179 149)"/>
  <!-- oil gloss dots -->
  <circle cx="132" cy="118" r="1.6" fill="#fff" opacity=".55"/>
  <circle cx="182" cy="122" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="156" cy="132" r="1.3" fill="#fff" opacity=".5"/>
</svg>
