<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="sesBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="sesbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="sesbowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20202a"/><stop offset="100%" stop-color="#0c0c11"/>
    </linearGradient>
    <radialGradient id="sesbroth" cx="44%" cy="30%" r="88%">
      <stop offset="0%" stop-color="#ffedb8"/><stop offset="50%" stop-color="#f4cd74"/><stop offset="100%" stop-color="#d5a044"/>
    </radialGradient>
    <linearGradient id="sesegg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3c8"/><stop offset="100%" stop-color="#f7c94a"/>
    </linearGradient>
    <radialGradient id="sesseaweed" cx="45%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#2c5a3a"/><stop offset="55%" stop-color="#1a3d27"/><stop offset="100%" stop-color="#0c2417"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sesbg)"/>
  <!-- steam (hot soup) -->
  <path d="M124 46 C114 28 134 22 124 2" stroke="#fff" stroke-width="7" fill="none" opacity=".11" filter="url(#sesBlur3)"/>
  <path d="M168 42 C160 24 180 18 172 0" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#sesBlur3)"/>
  <path d="M204 46 C196 30 214 22 206 4" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#sesBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="190" rx="128" ry="20" fill="#000" opacity=".5"/>
  <!-- neon steam arc (cyan) -->
  <path d="M62 94 Q110 60 172 60" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- DEEP BOWL silhouette: rounded footed bowl -->
  <path d="M56 96 C56 148 96 178 160 178 C224 178 264 148 264 96 Z" fill="url(#sesbowl)"/>
  <path d="M56 96 C56 148 96 178 160 178 C224 178 264 148 264 96" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- bowl rim -->
  <ellipse cx="160" cy="96" rx="104" ry="24" fill="#17131e"/>
  <ellipse cx="160" cy="96" rx="104" ry="24" fill="none" stroke="#31283c" stroke-width="3"/>
  <!-- foot ring under the bowl -->
  <ellipse cx="160" cy="178" rx="34" ry="7" fill="#141018"/>
  <ellipse cx="160" cy="178" rx="34" ry="7" fill="none" stroke="#2c2136" stroke-width="2"/>
  <!-- broth surface (clear golden) -->
  <ellipse cx="160" cy="96" rx="96" ry="20" fill="url(#sesbroth)"/>
  <ellipse cx="160" cy="96" rx="96" ry="20" fill="none" stroke="#ffe9b8" stroke-width="1.2" opacity=".35"/>
  <!-- broth inner glow / clarity highlight -->
  <ellipse cx="128" cy="89" rx="36" ry="8" fill="#fff2cf" opacity=".4"/>
  <!-- clip the floating bits to the broth ellipse -->
  <clipPath id="sesbrothclip"><ellipse cx="160" cy="96" rx="96" ry="20"/></clipPath>
  <g clip-path="url(#sesbrothclip)">
    <!-- EGG-DROP RIBBONS: long feathery beaten-egg wisps swirling across the whole surface -->
    <path d="M74 96 C92 88 112 92 130 90 C148 88 168 94 188 91 C208 88 226 92 244 89 C226 100 206 96 188 99 C168 102 148 96 130 99 C112 102 92 98 74 96 Z" fill="url(#sesegg)" opacity=".9"/>
    <path d="M82 104 C104 99 126 103 148 100 C170 97 194 103 216 100 C198 108 176 105 152 108 C128 111 104 107 82 104 Z" fill="url(#sesegg)" opacity=".82"/>
    <path d="M96 86 C114 82 132 85 150 83 C170 81 190 85 208 83 C190 91 170 88 150 90 C132 92 114 90 96 86 Z" fill="url(#sesegg)" opacity=".78"/>
    <!-- feathery ribbon edge highlights (the wispiness of dropped egg) -->
    <path d="M78 95 C98 89 120 93 140 90 C162 87 186 93 210 90" stroke="#fff3c8" stroke-width="1.2" fill="none" opacity=".6"/>
    <path d="M90 103 C112 99 134 102 156 99 C178 96 200 101 218 99" stroke="#fff3c8" stroke-width="1" fill="none" opacity=".5"/>
    <path d="M104 87 C124 84 144 86 164 84 C184 82 200 85 214 84" stroke="#fff3c8" stroke-width="1" fill="none" opacity=".45"/>
    <!-- SEAWEED FLAKES: dark-green crinkled bits, scattered ASYMMETRICALLY (no matched pair) -->
    <path d="M100 90 C106 85 116 86 119 91 C115 97 105 97 100 94 Z" fill="url(#sesseaweed)" opacity=".92"/>
    <path d="M84 99 C89 96 96 97 98 100 C95 104 88 104 84 102 Z" fill="url(#sesseaweed)" opacity=".85"/>
    <path d="M150 88 C156 84 164 85 167 89 C163 94 155 94 150 91 Z" fill="url(#sesseaweed)" opacity=".9"/>
    <path d="M176 100 C183 96 192 97 195 101 C190 106 181 106 176 103 Z" fill="url(#sesseaweed)" opacity=".88"/>
    <path d="M214 92 C220 89 227 90 229 93 C226 97 219 97 214 95 Z" fill="url(#sesseaweed)" opacity=".82"/>
    <path d="M132 102 C137 99 143 100 145 103 C142 106 136 106 132 104 Z" fill="url(#sesseaweed)" opacity=".8"/>
    <!-- crinkle lines on seaweed -->
    <path d="M103 91 L116 92 M152 89 L164 90 M178 101 L192 102" stroke="#4d8a5e" stroke-width="1" opacity=".5" fill="none"/>
  </g>
  <!-- scallion floats + white sesame on the surface (asymmetric sprinkle) -->
  <rect x="118" y="87" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-18 121 88)"/>
  <rect x="192" y="90" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(22 195 91)"/>
  <rect x="146" y="102" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(8 149 103)"/>
  <rect x="168" y="86" width="5" height="2.2" rx="1.1" fill="#5ecb4e" transform="rotate(-8 170 87)"/>
  <circle cx="136" cy="94" r="1.4" fill="#f8eed6"/>
  <circle cx="182" cy="96" r="1.4" fill="#f8eed6"/>
  <circle cx="110" cy="98" r="1.2" fill="#f8eed6"/>
  <!-- surface sparkle (hot broth sheen) -->
  <circle cx="126" cy="89" r="1.6" fill="#fff" opacity=".7"/>
  <circle cx="164" cy="93" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="200" cy="97" r="1.2" fill="#fff" opacity=".5"/>
</svg>
