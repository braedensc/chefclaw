<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ftBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ftbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="fttoast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c274"/><stop offset="55%" stop-color="#d99a44"/><stop offset="100%" stop-color="#a86e28"/>
    </linearGradient>
    <linearGradient id="ftsyrup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b06a24"/><stop offset="100%" stop-color="#6e3d10"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ftbg)"/>
  <!-- steam -->
  <path d="M120 50 C110 34 130 26 120 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ftBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ftBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="148" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="136" rx="132" ry="50" fill="#141018"/>
  <ellipse cx="160" cy="136" rx="132" ry="50" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="136" rx="116" ry="42" fill="#0f0d13"/>
  <!-- neon steam arc (rose family, sweet dish) -->
  <path d="M52 116 Q104 84 168 82" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- STACK of thick french-toast triangles, offset -->
  <!-- bottom slice -->
  <g transform="translate(160 148) rotate(6)">
    <path d="M-78 -8 L74 -8 L60 14 C40 22 -44 22 -62 14 Z" fill="#8a5c24"/>
    <path d="M-78 -8 L74 -8 L58 8 C38 14 -44 14 -60 8 Z" fill="url(#fttoast)"/>
  </g>
  <!-- middle slice -->
  <g transform="translate(160 128) rotate(-4)">
    <path d="M-80 -12 L72 -14 L60 12 C40 20 -46 22 -64 12 Z" fill="#8a5c24"/>
    <path d="M-80 -12 L72 -14 L56 6 C36 12 -46 14 -62 6 Z" fill="url(#fttoast)"/>
    <path d="M-70 -8 C-40 -14 40 -14 60 -8" stroke="#f6d999" stroke-width="1.6" fill="none" opacity=".5"/>
  </g>
  <!-- top slice, angled to show custardy crust -->
  <g transform="translate(158 106) rotate(9)">
    <path d="M-74 -14 L70 -12 L58 12 C38 20 -46 20 -62 12 Z" fill="#8a5c24"/>
    <path d="M-74 -14 L70 -12 L54 6 C34 12 -48 12 -60 6 Z" fill="url(#fttoast)"/>
    <!-- caramelized surface sheen -->
    <path d="M-60 -8 C-30 -14 34 -14 52 -6 C36 0 -40 2 -60 -8 Z" fill="#ffdf9a" opacity=".45"/>
    <path d="M-64 -10 C-36 -16 40 -16 60 -8" stroke="#b8792e" stroke-width="1.4" fill="none" opacity=".5"/>
  </g>
  <!-- pat of melting butter on top -->
  <path d="M138 92 C142 86 158 86 162 92 C160 100 142 100 138 92 Z" fill="#ffe89a"/>
  <path d="M140 90 C146 87 156 87 160 90" stroke="#fff3c8" stroke-width="1.4" fill="none" opacity=".7"/>
  <!-- SYRUP cascading down the stack -->
  <path d="M150 96 C148 108 152 120 148 132 C146 144 150 152 146 160" stroke="url(#ftsyrup)" stroke-width="7" fill="none" opacity=".9" stroke-linecap="round"/>
  <path d="M178 100 C182 112 176 124 182 136 C186 146 182 154 186 160" stroke="url(#ftsyrup)" stroke-width="6" fill="none" opacity=".85" stroke-linecap="round"/>
  <path d="M152 98 C151 108 153 118 151 128" stroke="#e0a24e" stroke-width="2" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- syrup pool at base -->
  <ellipse cx="160" cy="164" rx="60" ry="12" fill="#8a4d18" opacity=".65"/>
  <ellipse cx="160" cy="162" rx="44" ry="7" fill="#a5652a" opacity=".6"/>
  <!-- dusting of powdered sugar + berries -->
  <circle cx="120" cy="100" r="1.5" fill="#fff" opacity=".8"/>
  <circle cx="200" cy="108" r="1.4" fill="#fff" opacity=".75"/>
  <circle cx="142" cy="88" r="1.3" fill="#fff" opacity=".8"/>
  <circle cx="182" cy="90" r="1.3" fill="#fff" opacity=".7"/>
  <circle cx="112" cy="118" r="5" fill="#b3244a"/>
  <circle cx="110" cy="116" r="1.6" fill="#ff6f8c" opacity=".7"/>
  <circle cx="208" cy="122" r="4.5" fill="#4a2870"/>
  <circle cx="206" cy="120" r="1.5" fill="#9a6fd6" opacity=".7"/>
  <!-- mint garnish -->
  <path d="M126 108 C122 104 124 98 130 98 C132 104 130 108 126 108 Z" fill="#3f9c37"/>
  <!-- gloss dots -->
  <circle cx="168" cy="110" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="124" r="1.2" fill="#fff" opacity=".5"/>
</svg>
