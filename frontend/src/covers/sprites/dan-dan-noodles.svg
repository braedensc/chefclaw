  <rect x="170" y="86" width="5" height="2.4" rx="1.2" fill="#2f4a18" transform="rotate(-22 172 87)"/>
  <rect x="158" y="102" width="4.6" height="2.2" rx="1.1" fill="#3a5a1e" transform="rotate(10 160 103)"/>
