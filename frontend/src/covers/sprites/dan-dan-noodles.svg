      <stop offset="0%" stop-color="#b06a30"/><stop offset="55%" stop-color="#894c1e"/><stop offset="100%" stop-color="#5e3212"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dd1bg)"/>
  <path d="M120 52 C112 36 128 28 120 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#dd1Blur3)"/>
  <path d="M200 50 C192 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#dd1Blur3)"/>
