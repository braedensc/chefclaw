<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="glBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="glbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="glpot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2028"/><stop offset="55%" stop-color="#181218"/><stop offset="100%" stop-color="#0b080b"/>
    </linearGradient>
    <radialGradient id="glstew" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#c73412"/><stop offset="55%" stop-color="#9c2b10"/><stop offset="100%" stop-color="#661408"/>
    </radialGradient>
    <linearGradient id="glbeef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3a20"/><stop offset="55%" stop-color="#5e2410"/><stop offset="100%" stop-color="#3d1508"/>
    </linearGradient>
    <linearGradient id="glcarrot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f08a2e"/><stop offset="100%" stop-color="#c85f14"/>
    </linearGradient>
    <linearGradient id="glpot2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6dfa0"/><stop offset="100%" stop-color="#dcb96a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#glbg)"/>
  <!-- steam -->
  <path d="M122 46 C114 30 130 22 122 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#glBlur3)"/>
  <path d="M196 48 C190 32 204 24 196 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#glBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="146" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (warm/local) -->
  <path d="M56 108 Q106 76 168 74" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- curved cast-iron pot (dutch oven) with side handles -->
  <path d="M52 96 C52 90 58 88 64 88 L256 88 C262 88 268 90 268 96 L268 100 C268 100 256 100 256 100 C256 132 224 162 160 162 C96 162 64 132 64 100 C64 100 52 100 52 100 Z" fill="url(#glpot)"/>
  <!-- side handles -->
  <path d="M48 100 C40 100 40 112 50 112" stroke="#2a2028" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M272 100 C280 100 280 112 270 112" stroke="#2a2028" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- pot rim highlight -->
  <path d="M58 94 L262 94" stroke="#463640" stroke-width="2.5" stroke-linecap="round" opacity=".8"/>
  <!-- inner stew surface (paprika-red) -->
  <ellipse cx="160" cy="100" rx="96" ry="20" fill="url(#glstew)"/>
  <ellipse cx="160" cy="98" rx="80" ry="14" fill="#b52c12" opacity=".45"/>
  <!-- glossy irregular beef chunks + veg poking out of the stew -->
  <g stroke="#240a03" stroke-width="1.3" stroke-opacity=".5">
    <g transform="translate(112 96) rotate(-8)"><path d="M-14 4 C-16 -6 -6 -12 6 -10 C16 -12 18 0 12 8 C4 14 -8 14 -14 4 Z" fill="url(#glbeef)"/><ellipse cx="-4" cy="-4" rx="6" ry="3" fill="#a35a30" opacity=".6"/></g>
    <g transform="translate(160 92) rotate(6)"><path d="M-15 3 C-17 -7 -5 -13 7 -11 C18 -12 20 2 13 9 C4 15 -9 14 -15 3 Z" fill="url(#glbeef)"/><ellipse cx="-4" cy="-5" rx="7" ry="3" fill="#a35a30" opacity=".65"/></g>
    <g transform="translate(206 96) rotate(-4)"><path d="M-13 4 C-15 -5 -5 -11 6 -9 C15 -11 17 1 11 8 C3 13 -7 13 -13 4 Z" fill="url(#glbeef)"/><ellipse cx="-3" cy="-4" rx="6" ry="3" fill="#a35a30" opacity=".6"/></g>
    <!-- carrot / potato chunks -->
    <g transform="translate(136 102) rotate(10)"><ellipse cx="0" cy="0" rx="8" ry="7" fill="url(#glcarrot)"/><ellipse cx="-2" cy="-2" rx="3" ry="2.4" fill="#ffb35a" opacity=".6"/></g>
    <g transform="translate(184 104) rotate(-6)"><ellipse cx="0" cy="0" rx="9" ry="7.5" fill="url(#glpot2)"/><ellipse cx="-2" cy="-2" rx="3.4" ry="2.6" fill="#fff0c8" opacity=".6"/></g>
    <g transform="translate(88 100) rotate(8)"><ellipse cx="0" cy="0" rx="7" ry="6" fill="url(#glcarrot)"/></g>
  </g>
  <!-- paprika oil sheen + parsley on top -->
  <path d="M100 92 C130 86 200 86 224 92" stroke="#e2531f" stroke-width="1.6" fill="none" opacity=".4" stroke-linecap="round"/>
  <rect x="128" y="90" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-18 131 91)"/>
  <rect x="176" y="94" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(16 179 95)"/>
  <circle cx="150" cy="98" r="1.6" fill="#e0341f"/>
  <!-- oil gloss dots -->
  <circle cx="116" cy="90" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="168" cy="90" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="204" cy="94" r="1.2" fill="#fff" opacity=".5"/>
</svg>
