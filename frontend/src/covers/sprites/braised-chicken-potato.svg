<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="bcpBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bcpbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="bcppot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2018"/><stop offset="50%" stop-color="#22110c"/><stop offset="100%" stop-color="#0d0605"/>
    </linearGradient>
    <radialGradient id="bcpsauce" cx="48%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#a85e1c"/><stop offset="50%" stop-color="#7a3a10"/><stop offset="100%" stop-color="#4a1f08"/>
    </radialGradient>
    <linearGradient id="bcpchicken" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c17232"/><stop offset="55%" stop-color="#94481a"/><stop offset="100%" stop-color="#6e2f0d"/>
    </linearGradient>
    <linearGradient id="bcppotato" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d488"/><stop offset="55%" stop-color="#e0b552"/><stop offset="100%" stop-color="#bd8a2d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bcpbg)"/>
  <!-- steam -->
  <path d="M122 58 C112 40 132 32 122 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bcpBlur3)"/>
  <path d="M202 54 C194 38 212 30 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#bcpBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- dark clay pot: curved-wall silhouette -->
  <path d="M40 104 C40 154 98 180 160 180 C222 180 280 154 280 104 Z" fill="url(#bcppot)"/>
  <!-- pot rim rings (clay lip) -->
  <ellipse cx="160" cy="104" rx="122" ry="32" fill="#150a07"/>
  <ellipse cx="160" cy="104" rx="122" ry="32" fill="none" stroke="#4a2a1c" stroke-width="3"/>
  <ellipse cx="160" cy="104" rx="122" ry="32" fill="none" stroke="#6b4029" stroke-width="1.2" opacity=".6"/>
  <ellipse cx="160" cy="106" rx="108" ry="26" fill="#0e0605"/>
  <!-- neon steam arc -->
  <path d="M52 96 Q100 70 166 68" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy braising sauce pool -->
  <ellipse cx="160" cy="108" rx="101" ry="23" fill="url(#bcpsauce)"/>
  <ellipse cx="128" cy="100" rx="30" ry="6" fill="#c07a2c" opacity=".35" transform="rotate(-8 128 100)"/>
  <!-- back potato wedges -->
  <g transform="translate(108 96) rotate(-12)">
    <path d="M-15 -6 L10 -12 L16 6 L-9 12 Z" fill="url(#bcppotato)" stroke="#8a5e1e" stroke-width="1.3"/>
    <path d="M-13 -4 L8 -9" stroke="#fff0c0" stroke-width="1.4" opacity=".5"/>
  </g>
  <g transform="translate(196 98) rotate(10)">
    <path d="M-15 -6 L10 -12 L16 6 L-9 12 Z" fill="url(#bcppotato)" stroke="#8a5e1e" stroke-width="1.3"/>
    <path d="M-13 -4 L8 -9" stroke="#fff0c0" stroke-width="1.4" opacity=".5"/>
  </g>
  <!-- chicken chunks (bone-in, irregular) -->
  <g transform="translate(140 108) rotate(-6)">
    <path d="M-18 -4 C-20 -14 -6 -18 6 -15 C18 -18 26 -8 22 2 C26 12 12 18 0 15 C-14 18 -22 8 -18 -4 Z" fill="url(#bcpchicken)" stroke="#4a2109" stroke-width="1.4"/>
    <ellipse cx="-4" cy="-6" rx="8" ry="4" fill="#e09a54" opacity=".55"/>
    <circle cx="-14" cy="6" r="2.6" fill="#f2e4cf" opacity=".85"/>
  </g>
  <g transform="translate(190 114) rotate(12)">
    <path d="M-16 -3 C-18 -12 -5 -16 5 -13 C16 -16 23 -7 20 2 C23 11 11 16 0 13 C-12 16 -20 7 -16 -3 Z" fill="url(#bcpchicken)" stroke="#4a2109" stroke-width="1.4"/>
    <ellipse cx="-2" cy="-5" rx="7" ry="3.4" fill="#e09a54" opacity=".55"/>
  </g>
  <g transform="translate(112 116) rotate(8)">
    <path d="M-15 -3 C-17 -11 -5 -15 4 -12 C15 -15 21 -6 18 2 C21 10 10 15 0 12 C-11 15 -19 6 -15 -3 Z" fill="url(#bcpchicken)" stroke="#4a2109" stroke-width="1.4"/>
    <ellipse cx="-2" cy="-5" rx="6.5" ry="3.2" fill="#d98a48" opacity=".5"/>
  </g>
  <!-- front potato wedge, brighter -->
  <g transform="translate(158 122) rotate(4)">
    <path d="M-17 -7 L12 -13 L18 7 L-10 13 Z" fill="url(#bcppotato)" stroke="#8a5e1e" stroke-width="1.4"/>
    <path d="M-15 -5 L9 -10" stroke="#fff0c0" stroke-width="1.6" opacity=".6"/>
  </g>
  <!-- dried chili + shiitake hint -->
  <g transform="translate(96 108) rotate(-20)"><path d="M0 0 C11 -3 20 1 26 5 C20 8 11 8 0 5 Z" fill="#b02012"/><path d="M0 0 C11 -3 20 1 26 5" stroke="#ff5a3a" stroke-width="1.1" fill="none" opacity=".6"/></g>
  <ellipse cx="176" cy="102" rx="8" ry="5" fill="#3a2414" stroke="#5a3a20" stroke-width="1" transform="rotate(-10 176 102)"/>
  <!-- scallion + garnish flecks -->
  <rect x="124" y="100" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 127 101)"/>
  <rect x="164" y="104" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 167 105)"/>
  <rect x="146" y="116" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 149 117)"/>
  <rect x="200" y="108" width="6" height="2.4" rx="1.2" fill="#2f7d2b" transform="rotate(-12 203 109)"/>
  <!-- oil gloss dots -->
  <circle cx="132" cy="104" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="108" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="156" cy="118" r="1.2" fill="#fff" opacity=".5"/>
</svg>
