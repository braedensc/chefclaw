  <circle cx="176" cy="114" r="1.3" fill="#2a1a10"/>
  <circle cx="150" cy="122" r="1.2" fill="#2a1a10"/>
  <circle cx="200" cy="110" r="1.2" fill="#2a1a10"/>
  <circle cx="108" cy="120" r="1.1" fill="#2a1a10"/>
