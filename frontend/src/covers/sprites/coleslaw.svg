  <path d="M50 122 C58 96 104 84 160 84 C216 84 262 96 270 122 C240 142 202 150 160 150 C118 150 80 142 50 122 Z" fill="#c7b184" opacity=".55"/>
  <path d="M54 118 C62 92 106 80 160 80 C214 80 258 92 266 118 C238 136 202 144 160 144 C118 144 82 136 54 118 Z" fill="url(#csldress)"/>
  <path d="M54 118 C62 92 106 80 160 80 C214 80 258 92 266 118" fill="none" stroke="#fff8e4" stroke-width="1.4" opacity=".35"/>
