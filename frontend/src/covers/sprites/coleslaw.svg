  <circle cx="118" cy="98" r="1.6" fill="#fff" opacity=".7"/>
  <circle cx="196" cy="100" r="1.5" fill="#fff" opacity=".65"/>
  <circle cx="160" cy="112" r="1.3" fill="#fff" opacity=".6"/>
  <circle cx="134" cy="128" r="1.2" fill="#fff" opacity=".55"/>
