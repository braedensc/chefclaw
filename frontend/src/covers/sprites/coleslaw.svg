  <ellipse cx="160" cy="126" rx="140" ry="52" fill="url(#cslbowl)"/>
  <ellipse cx="160" cy="126" rx="140" ry="52" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="122" rx="124" ry="44" fill="#0c0c0f"/>
