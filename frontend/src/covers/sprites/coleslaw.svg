<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="cslbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#113036"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="cslbowl" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="csldress" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#fbf3dc"/><stop offset="60%" stop-color="#f1e2bf"/><stop offset="100%" stop-color="#d8c295"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cslbg)"/>
  <ellipse cx="160" cy="188" rx="150" ry="20" fill="#000" opacity=".5"/>
  <!-- cold dish: no steam arc, subtle fresh sparkle instead (handled by gloss dots) -->
