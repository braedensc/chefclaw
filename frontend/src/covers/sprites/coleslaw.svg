    <path d="M148 124 C172 120 198 126 224 116" stroke="#f0f2e0" stroke-width="3" opacity=".8"/>
    <path d="M120 100 C138 94 156 100 176 94" stroke="#cbd8a2" stroke-width="2.6" opacity=".8"/>
    <path d="M96 112 C114 108 130 112 150 104" stroke="#f4f5e6" stroke-width="2.4" opacity=".85"/>
    <path d="M172 118 C192 114 210 120 232 112" stroke="#dde6bf" stroke-width="2.6" opacity=".75"/>
    <path d="M82 130 C104 126 126 130 148 124" stroke="#eef1dd" stroke-width="2.4" opacity=".8"/>
