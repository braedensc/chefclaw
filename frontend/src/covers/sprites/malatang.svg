<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="mtBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="mtbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="mtbowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="mtbroth" cx="50%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#ef5520"/><stop offset="50%" stop-color="#b02408"/><stop offset="100%" stop-color="#7a1305"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mtbg)"/>
  <!-- steam -->
  <path d="M120 58 C110 40 130 32 120 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#mtBlur3)"/>
  <path d="M204 54 C196 38 214 30 206 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#mtBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- skewer sticks rising OUT of the bowl (the defining malatang trait) -->
  <g stroke="#c9a25e" stroke-width="4.5" stroke-linecap="round">
    <path d="M96 118 L58 44"/>
    <path d="M138 112 L128 40"/>
    <path d="M186 112 L210 40"/>
    <path d="M226 120 L262 48"/>
  </g>
  <!-- bright neon-lit tips of the sticks -->
  <g stroke="#f0d79a" stroke-width="1.6" stroke-linecap="round" opacity=".7">
    <path d="M96 118 L58 44"/>
    <path d="M138 112 L128 40"/>
    <path d="M186 112 L210 40"/>
    <path d="M226 120 L262 48"/>
  </g>
  <!-- morsels threaded on the raised sticks -->
  <!-- stick 1: greens + meatball -->
  <ellipse cx="72" cy="72" rx="8" ry="9" fill="#3f9c37" transform="rotate(24 72 72)"/>
  <ellipse cx="69" cy="68" rx="3" ry="3.6" fill="#6abf5a" transform="rotate(24 69 68)" opacity=".7"/>
  <circle cx="84" cy="94" r="8" fill="#c17a4a"/><circle cx="81" cy="91" r="2.6" fill="#e6a97a" opacity=".7"/>
  <!-- stick 2: fishball + lotus -->
  <circle cx="132" cy="66" r="8.5" fill="#eadfc6"/><circle cx="129" cy="63" r="2.8" fill="#fff" opacity=".7"/>
  <ellipse cx="135" cy="90" rx="8" ry="6" fill="#f0e6cc"/><ellipse cx="135" cy="90" rx="8" ry="6" fill="none" stroke="#c9b487" stroke-width="1"/>
  <ellipse cx="135" cy="88.6" rx=".9" ry="1.1" fill="#7a1305"/><ellipse cx="132" cy="90.6" rx=".9" ry="1.1" fill="#7a1305"/><ellipse cx="138" cy="90.6" rx=".9" ry="1.1" fill="#7a1305"/>
  <!-- stick 3: quail egg + tofu -->
  <ellipse cx="202" cy="66" rx="8" ry="9" fill="#f6ead0"/><ellipse cx="199" cy="62" rx="2.6" ry="3" fill="#fff" opacity=".8"/>
  <rect x="188" y="84" width="14" height="13" rx="2" fill="#f2e6c8" transform="rotate(8 195 90)"/><rect x="188" y="84" width="14" height="13" rx="2" fill="none" stroke="#d8c49a" stroke-width="1" transform="rotate(8 195 90)"/>
  <!-- stick 4: greens + wide meatball -->
  <ellipse cx="252" cy="76" rx="8" ry="9" fill="#2f7d2b" transform="rotate(-22 252 76)"/>
  <ellipse cx="255" cy="72" rx="3" ry="3.6" fill="#58c14a" transform="rotate(-22 255 72)" opacity=".7"/>
  <circle cx="240" cy="98" r="8.5" fill="#c86a3a"/><circle cx="237" cy="95" r="2.6" fill="#e89a68" opacity=".7"/>
  <!-- bowl of chili broth (sticks emerge through the surface) -->
  <path d="M50 112 C50 154 102 178 160 178 C218 178 270 154 270 112 Z" fill="url(#mtbowl)"/>
  <ellipse cx="160" cy="112" rx="114" ry="30" fill="#0d0d10"/>
  <ellipse cx="160" cy="112" rx="114" ry="30" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- neon steam arc -->
  <path d="M56 104 Q104 78 166 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- boiling chili broth surface -->
  <ellipse cx="160" cy="114" rx="102" ry="22" fill="url(#mtbroth)"/>
  <ellipse cx="130" cy="106" rx="30" ry="6" fill="#ff8a3a" opacity=".3" transform="rotate(-8 130 106)"/>
  <!-- oil sheen bubbles -->
  <circle cx="106" cy="118" r="5" fill="#d8420f" opacity=".7"/><circle cx="106" cy="118" r="5" fill="none" stroke="#ff7a3a" stroke-width="1.2" opacity=".6"/>
  <circle cx="200" cy="120" r="6" fill="#d8420f" opacity=".7"/><circle cx="200" cy="120" r="6" fill="none" stroke="#ff7a3a" stroke-width="1.2" opacity=".6"/>
  <circle cx="158" cy="124" r="4" fill="#c73a0d" opacity=".7"/>
  <circle cx="176" cy="110" r="3.4" fill="#ff8a3a" opacity=".5"/>
  <circle cx="128" cy="122" r="3" fill="#ff8a3a" opacity=".5"/>
  <!-- floating dried chilis + peppercorns -->
  <g transform="translate(98 110) rotate(-20)"><path d="M0 0 C12 -3 22 1 29 5 C22 8 12 8 0 5 Z" fill="#c31f12"/><path d="M0 0 C12 -3 22 1 29 5" stroke="#ff5a3a" stroke-width="1.1" fill="none" opacity=".6"/></g>
  <g transform="translate(178 114) rotate(10)"><path d="M0 0 C12 -3 22 1 29 5 C22 8 12 8 0 5 Z" fill="#a81c0e"/><path d="M0 0 C12 -3 22 1 29 5" stroke="#ff5a3a" stroke-width="1.1" fill="none" opacity=".5"/></g>
  <circle cx="120" cy="112" r="1.4" fill="#260903"/><circle cx="150" cy="120" r="1.4" fill="#260903"/><circle cx="196" cy="112" r="1.3" fill="#260903"/>
  <!-- scallion + cilantro flecks -->
  <rect x="112" y="108" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-18 115 109)"/>
  <rect x="164" y="110" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 167 111)"/>
  <rect x="138" y="120" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(26 141 121)"/>
  <!-- gloss dots -->
  <circle cx="116" cy="110" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="114" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="152" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
