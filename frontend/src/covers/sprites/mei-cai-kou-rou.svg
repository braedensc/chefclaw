<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="mkBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="mkbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#113036"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="mkpot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4029"/><stop offset="45%" stop-color="#3d2113"/><stop offset="100%" stop-color="#1c0d06"/>
    </linearGradient>
    <linearGradient id="mkskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cf5226"/><stop offset="55%" stop-color="#a5340f"/><stop offset="100%" stop-color="#82200e"/>
    </linearGradient>
    <linearGradient id="mkfat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6ddb2"/><stop offset="100%" stop-color="#d8b47f"/>
    </linearGradient>
    <radialGradient id="mkgreens" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#4a3518"/><stop offset="55%" stop-color="#2c1e0c"/><stop offset="100%" stop-color="#160e05"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mkbg)"/>
  <!-- steam wisps -->
  <path d="M122 48 C112 30 132 22 122 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#mkBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#mkBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="146" ry="22" fill="#000" opacity=".5"/>
  <!-- deep clay bowl silhouette -->
  <path d="M50 116 C50 96 100 84 160 84 C220 84 270 96 270 116 C270 152 224 172 160 172 C96 172 50 152 50 116 Z" fill="url(#mkpot)"/>
  <path d="M50 116 C50 96 100 84 160 84 C220 84 270 96 270 116 C270 152 224 172 160 172 C96 172 50 152 50 116 Z" fill="none" stroke="#271b16" stroke-width="3"/>
  <!-- bowl inner rim -->
  <ellipse cx="160" cy="106" rx="106" ry="28" fill="#241207"/>
  <ellipse cx="160" cy="106" rx="106" ry="28" fill="none" stroke="#7c3a20" stroke-width="2" opacity=".55"/>
  <!-- neon steam arc (cyan, braise) -->
  <path d="M54 98 Q108 66 172 66" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- dark bed of preserved greens (mei cai) under the pork -->
  <ellipse cx="160" cy="118" rx="98" ry="26" fill="url(#mkgreens)"/>
  <g stroke-linecap="round" opacity=".85">
    <path d="M96 118 l10 -4 M118 124 l9 3 M150 116 l10 2 M182 122 l-9 4 M210 118 l-10 -3 M130 122 l8 -4 M168 124 l9 -3 M200 124 l-8 3" stroke="#6b5218" stroke-width="2.4"/>
    <path d="M108 122 l8 3 M140 120 l9 -3 M176 118 l8 4 M204 122 l-9 -2 M124 116 l8 3" stroke="#3d2c0e" stroke-width="2.2"/>
  </g>
  <!-- glossy braising sheen on the greens -->
  <ellipse cx="150" cy="120" rx="60" ry="12" fill="#82200e" opacity=".3"/>
  <!-- KOU ROU: fanned overlapping glazed pork-belly slices (skin / fat / lean strata) -->
  <g stroke="#5e1808" stroke-width="1.3" stroke-linejoin="round">
    <!-- back slice -->
    <g transform="translate(96 96) rotate(-16)">
      <rect width="66" height="20" rx="7" fill="url(#mkskin)"/>
      <rect y="6" width="66" height="6" rx="3" fill="url(#mkfat)"/>
      <rect y="12" width="66" height="6" rx="3" fill="#7c3a20"/>
      <rect y="2" width="66" height="2.4" rx="1.2" fill="#e07a3a" opacity=".6"/>
    </g>
    <g transform="translate(128 92) rotate(-6)">
      <rect width="70" height="20" rx="7" fill="url(#mkskin)"/>
      <rect y="6" width="70" height="6" rx="3" fill="url(#mkfat)"/>
      <rect y="12" width="70" height="6" rx="3" fill="#7c3a20"/>
      <rect y="2" width="70" height="2.4" rx="1.2" fill="#e07a3a" opacity=".6"/>
    </g>
    <g transform="translate(112 108) rotate(-10)">
      <rect width="72" height="21" rx="7" fill="url(#mkskin)"/>
      <rect y="6.5" width="72" height="6.5" rx="3.2" fill="url(#mkfat)"/>
      <rect y="13" width="72" height="6.5" rx="3.2" fill="#7c3a20"/>
      <rect y="2" width="72" height="2.6" rx="1.3" fill="#e07a3a" opacity=".65"/>
    </g>
    <!-- front hero slice (brightest, largest) -->
    <g transform="translate(126 118) rotate(-3)">
      <rect width="76" height="22" rx="8" fill="url(#mkskin)"/>
      <rect y="7" width="76" height="7" rx="3.5" fill="url(#mkfat)"/>
      <rect y="14" width="76" height="7" rx="3.5" fill="#7c3a20"/>
      <rect y="2" width="76" height="2.8" rx="1.4" fill="#ff9a52" opacity=".7"/>
      <ellipse cx="20" cy="4" rx="14" ry="2.4" fill="#ffcf90" opacity=".6"/>
    </g>
  </g>
  <!-- glaze drizzle laps + scallion -->
  <path d="M108 138 C132 144 190 144 214 136" stroke="#8a2410" stroke-width="3" fill="none" opacity=".5" stroke-linecap="round"/>
  <rect x="118" y="132" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-14 121 133)"/>
  <rect x="188" y="130" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 191 131)"/>
  <rect x="150" y="140" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 153 141)"/>
  <!-- gloss dots -->
  <circle cx="140" cy="112" r="1.6" fill="#fff" opacity=".6"/>
  <circle cx="180" cy="118" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="118" cy="124" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="196" cy="106" r="1.3" fill="#fff" opacity=".5"/>
</svg>
