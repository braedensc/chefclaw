<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tymBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tymbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="tymbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="tymbroth" cx="46%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ef6a2e"/><stop offset="52%" stop-color="#c8380f"/><stop offset="100%" stop-color="#8a1f08"/>
    </radialGradient>
    <linearGradient id="tymshrimp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a5a"/><stop offset="100%" stop-color="#e0491f"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tymbg)"/>
  <!-- rising steam wisps (hot soup) -->
  <path d="M126 50 C116 32 136 24 126 4" stroke="#fff" stroke-width="7" fill="none" opacity=".11" filter="url(#tymBlur3)"/>
  <path d="M196 48 C188 30 206 22 198 4" stroke="#fff" stroke-width="6" fill="none" opacity=".09" filter="url(#tymBlur3)"/>
  <path d="M160 44 C152 26 170 18 162 2" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tymBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (rose/hot family) -->
  <path d="M60 108 Q108 74 172 74" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- deep bowl silhouette -->
  <path d="M56 108 C56 96 264 96 264 108 C260 158 220 178 160 178 C100 178 60 158 56 108 Z" fill="url(#tymbowl)"/>
  <path d="M56 108 C56 96 264 96 264 108 C260 158 220 178 160 178 C100 178 60 158 56 108 Z" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- broth surface (upper ellipse rim) -->
  <ellipse cx="160" cy="108" rx="104" ry="30" fill="url(#tymbroth)"/>
  <ellipse cx="160" cy="108" rx="104" ry="30" fill="none" stroke="#7a1a06" stroke-width="1.6" opacity=".7"/>
  <!-- chili-oil sheen film on the broth -->
  <ellipse cx="134" cy="100" rx="30" ry="8" fill="#ff8a3a" opacity=".35"/>
  <ellipse cx="190" cy="112" rx="26" ry="7" fill="#b02408" opacity=".4"/>
  <!-- lime slice floating -->
  <g transform="translate(112 96)">
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="#c7e04a"/>
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="none" stroke="#3f7d1f" stroke-width="1.4"/>
    <ellipse cx="0" cy="0" rx="7" ry="5.5" fill="#e8f4a8" opacity=".85"/>
    <path d="M0 -5 L0 5 M-6 -3 L6 3 M-6 3 L6 -3" stroke="#a9c94a" stroke-width="1"/>
  </g>
  <!-- lemongrass stalk + kaffir lime leaves -->
  <path d="M176 88 L226 74" stroke="#8fbf4a" stroke-width="4" stroke-linecap="round"/>
  <path d="M176 88 L226 74" stroke="#c7e07a" stroke-width="1.4" opacity=".6"/>
  <path d="M150 90 C158 82 166 84 170 90 C164 94 156 94 150 90 Z" fill="#2f7d2b"/>
  <path d="M198 100 C206 92 214 94 218 100 C212 104 204 104 198 100 Z" fill="#3f9c37"/>
