  <g transform="translate(150 112) rotate(-8)">
    <path d="M-20 0 C-24 -14 -6 -22 8 -16 C22 -12 24 4 12 8 C6 -2 -6 -4 -12 2 C-16 6 -18 4 -20 0 Z" fill="url(#tymshrimp)"/>
    <path d="M-20 0 C-24 -14 -6 -22 8 -16 C22 -12 24 4 12 8" fill="none" stroke="#b0350e" stroke-width="1.4" opacity=".6"/>
    <path d="M-12 -10 L-6 -10 M-4 -14 L2 -13 M6 -14 L11 -11" stroke="#8a1f08" stroke-width="1.2" opacity=".7"/>
    <ellipse cx="2" cy="-12" rx="8" ry="3" fill="#ffb98a" opacity=".6"/>
    <circle cx="15" cy="-8" r="1.6" fill="#1c0d06"/>
  </g>
  <g transform="translate(198 118) rotate(150)">
    <path d="M-18 0 C-22 -12 -6 -20 6 -14 C18 -10 20 4 10 7 C5 -1 -5 -3 -10 2 C-14 6 -16 4 -18 0 Z" fill="url(#tymshrimp)"/>
    <path d="M-18 0 C-22 -12 -6 -20 6 -14 C18 -10 20 4 10 7" fill="none" stroke="#b0350e" stroke-width="1.4" opacity=".6"/>
    <path d="M-10 -9 L-4 -9 M-2 -12 L4 -11" stroke="#8a1f08" stroke-width="1.2" opacity=".7"/>
    <ellipse cx="0" cy="-10" rx="7" ry="3" fill="#ffb98a" opacity=".55"/>
  </g>
  <!-- straw/oyster mushrooms + tomato wedge -->
  <ellipse cx="168" cy="98" rx="9" ry="6" fill="#e8dcc4"/>
  <ellipse cx="168" cy="98" rx="9" ry="6" fill="none" stroke="#b89b6a" stroke-width="1"/>
  <path d="M132 118 C138 110 150 110 154 118 C150 124 138 124 132 118 Z" fill="#dd3320"/>
  <path d="M132 118 C138 110 150 110 154 118" fill="none" stroke="#c31f12" stroke-width="1" opacity=".7"/>
  <!-- red chili rings + cilantro floating -->
  <circle cx="122" cy="116" r="3" fill="#e0341f"/><circle cx="122" cy="116" r="1.2" fill="#ffb98a"/>
  <circle cx="182" cy="104" r="2.6" fill="#e0341f"/><circle cx="182" cy="104" r="1" fill="#ffb98a"/>
  <circle cx="146" cy="102" r="2.6" fill="#e0341f"/><circle cx="146" cy="102" r="1" fill="#ffb98a"/>
  <rect x="158" y="120" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 161 121)"/>
  <rect x="204" y="106" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 207 107)"/>
  <rect x="128" y="106" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(10 131 107)"/>
  <!-- oil gloss dots -->
  <circle cx="140" cy="98" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="190" cy="110" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="164" cy="116" r="1.2" fill="#fff" opacity=".5"/>
