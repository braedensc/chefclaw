<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="smobg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="smoglass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".04"/><stop offset="16%" stop-color="#ffffff" stop-opacity=".16"/><stop offset="50%" stop-color="#ffffff" stop-opacity=".03"/><stop offset="84%" stop-color="#ffffff" stop-opacity=".11"/><stop offset="100%" stop-color="#ffffff" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="smoberry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6f9e"/><stop offset="50%" stop-color="#e83f77"/><stop offset="100%" stop-color="#c22a5f"/>
    </linearGradient>
    <linearGradient id="smomango" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcf5c"/><stop offset="100%" stop-color="#f39a2c"/>
    </linearGradient>
    <linearGradient id="smostraw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd95c"/><stop offset="100%" stop-color="#f4a72c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#smobg)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="104" ry="17" fill="#000" opacity=".5"/>
  <!-- sparkle (cold drink, no steam) -->
  <path d="M226 44 l0 12 M220 50 l12 0" stroke="#ff8fb0" stroke-width="1.6" opacity=".5" stroke-linecap="round"/>
  <path d="M244 66 l0 8 M240 70 l8 0" stroke="#ffd0dd" stroke-width="1.4" opacity=".4" stroke-linecap="round"/>
  <!-- dark ring base under glass -->
  <ellipse cx="160" cy="180" rx="52" ry="11" fill="#141018"/>
  <ellipse cx="160" cy="180" rx="52" ry="11" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <ellipse cx="160" cy="178" rx="40" ry="8" fill="#0c0c10"/>
  <!-- tulip/mason smoothie glass silhouette: wider bowl, narrower waist, footed -->
  <path d="M126 74 C118 96 118 128 132 154 C138 172 182 172 188 154 C202 128 202 96 194 74 Z" fill="#0f0d12"/>
  <!-- layered smoothie fill: berry base, mango mid, cream top -->
  <path d="M129 128 C136 168 184 168 191 128 C176 134 144 134 129 128 Z" fill="url(#smoberry)"/>
  <path d="M126 100 C124 112 126 122 130 130 C148 136 172 136 190 130 C194 122 196 112 194 100 C172 108 148 108 126 100 Z" fill="url(#smomango)"/>
  <path d="M124 80 C122 88 123 96 127 102 C150 110 170 110 193 102 C197 96 198 88 196 80 C172 90 148 90 124 80 Z" fill="#fbe6c2"/>
  <!-- layer separators -->
  <path d="M126 100 C148 108 172 108 194 100" stroke="#c97b2a" stroke-width="1.3" fill="none" opacity=".5"/>
  <path d="M129 128 C144 134 176 134 191 128" stroke="#b23560" stroke-width="1.3" fill="none" opacity=".5"/>
  <!-- fruit chunk bits suspended -->
  <circle cx="146" cy="118" r="3" fill="#ff6f9e" opacity=".85"/>
  <circle cx="174" cy="122" r="2.6" fill="#ffcf5c" opacity=".85"/>
  <circle cx="160" cy="112" r="2.4" fill="#7fd06a" opacity=".8"/>
  <!-- glass overlay sheen -->
  <path d="M126 74 C118 96 118 128 132 154 C138 172 182 172 188 154 C202 128 202 96 194 74 Z" fill="url(#smoglass)"/>
  <path d="M126 74 C118 96 118 128 132 154 C138 172 182 172 188 154 C202 128 202 96 194 74 Z" fill="none" stroke="#f2d8e0" stroke-width="1.5" opacity=".3"/>
  <path d="M136 80 C130 104 132 138 144 158" stroke="#ffffff" stroke-width="3" opacity=".28" fill="none" stroke-linecap="round"/>
  <path d="M186 82 C190 106 188 134 180 156" stroke="#ffffff" stroke-width="2" opacity=".14" fill="none" stroke-linecap="round"/>
  <!-- glass rim -->
  <ellipse cx="160" cy="76" rx="34" ry="7" fill="#1a1622"/>
  <ellipse cx="160" cy="76" rx="34" ry="7" fill="none" stroke="#3a2e44" stroke-width="1.6"/>
  <ellipse cx="160" cy="75" rx="30" ry="5.4" fill="#fbe6c2"/>
  <!-- topping: strawberry half + mint on the rim -->
  <path d="M140 72 C136 66 148 62 152 68 C154 74 146 80 142 76 Z" fill="#e13b5f"/>
  <path d="M143 66 l3 -5 l3 5 Z" fill="#5ecb4e"/>
  <circle cx="143" cy="70" r=".7" fill="#ffe9c9"/><circle cx="147" cy="72" r=".7" fill="#ffe9c9"/><circle cx="145" cy="74" r=".7" fill="#ffe9c9"/>
  <!-- mint sprig -->
  <path d="M176 70 C182 62 190 64 190 60 C186 66 182 66 178 72 Z" fill="#3f9c37"/>
  <path d="M182 66 C186 60 192 60 194 56" stroke="#5ecb4e" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- paper straw, angled -->
  <path d="M196 34 L206 32 L184 84 L176 82 Z" fill="#ff4d6d" opacity=".9"/>
  <path d="M196 34 L206 32 L184 84 L176 82 Z" fill="none" stroke="#c92845" stroke-width="1.2" opacity=".7"/>
  <path d="M188 40 l4 -1 M185 48 l4 -1 M182 56 l4 -1 M179 64 l4 -1" stroke="#ffd0da" stroke-width="1.4" opacity=".7" stroke-linecap="round"/>
  <ellipse cx="201" cy="33" rx="5.2" ry="1.8" fill="#c92845" transform="rotate(-8 201 33)"/>
  <!-- gloss dots / condensation -->
  <circle cx="140" cy="96" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="176" cy="114" r="1.2" fill="#fff" opacity=".45"/>
  <circle cx="150" cy="146" r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="132" cy="130" r="1" fill="#fff" opacity=".4"/>
</svg>
