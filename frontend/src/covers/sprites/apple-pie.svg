<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="apbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="apface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6bd7c"/><stop offset="45%" stop-color="#cf9750"/><stop offset="100%" stop-color="#a86a2e"/>
    </linearGradient>
    <linearGradient id="apfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0913a"/><stop offset="100%" stop-color="#b56420"/>
    </linearGradient>
    <linearGradient id="aptop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2cf94"/><stop offset="100%" stop-color="#cf9a56"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#apbg)"/>
  <ellipse cx="160" cy="186" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- steam wisp (warm pie, subtle) -->
  <path d="M150 60 C142 44 158 38 150 20" stroke="#fff" stroke-width="6" fill="none" opacity=".09"/>
  <!-- plate -->
  <ellipse cx="160" cy="142" rx="140" ry="42" fill="#141018"/>
  <ellipse cx="160" cy="142" rx="140" ry="42" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="142" rx="126" ry="34" fill="#0f0d13"/>
  <!-- neon steam arc (warm white, savory-warm family) -->
  <path d="M64 108 Q112 80 172 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- APPLE PIE WEDGE: pointed slice, point toward viewer/left -->
  <!-- cut side face showing filling -->
  <path d="M96 150 L214 118 L214 150 Z" fill="url(#apfill)"/>
  <!-- chunky apple pieces in the filling -->
  <ellipse cx="120" cy="140" rx="7" ry="4" fill="#f0c072" transform="rotate(-8 120 140)"/>
  <ellipse cx="142" cy="136" rx="8" ry="4.5" fill="#e8b25e" transform="rotate(-6 142 136)"/>
  <ellipse cx="168" cy="132" rx="7.5" ry="4" fill="#f0c072" transform="rotate(-4 168 132)"/>
  <ellipse cx="192" cy="129" rx="7" ry="4" fill="#e8b25e" transform="rotate(-3 192 129)"/>
  <ellipse cx="132" cy="146" rx="6" ry="3.4" fill="#d89a48" transform="rotate(-8 132 146)"/>
  <ellipse cx="160" cy="142" rx="6.5" ry="3.6" fill="#e8b25e" transform="rotate(-5 160 142)"/>
  <!-- flaky bottom crust along the base -->
  <path d="M96 150 L214 150 L214 144 L100 144 Z" fill="#b47a34"/>
  <path d="M100 144 L214 144" stroke="#7c4a17" stroke-width="1.2" opacity=".6"/>
  <!-- golden lattice top crust (the pie surface) -->
  <path d="M96 150 L92 126 L206 96 L214 118 Z" fill="url(#aptop)"/>
  <!-- lattice strips: two diagonal families woven -->
  <g stroke="#a86a2e" stroke-width="2" opacity=".7" fill="none" stroke-linecap="round">
    <path d="M112 138 L122 100"/>
    <path d="M132 133 L142 96"/>
    <path d="M152 128 L162 92"/>
    <path d="M172 123 L182 87"/>
    <path d="M192 118 L200 84"/>
  </g>
  <g stroke="#b47a34" stroke-width="2.4" opacity=".55" fill="none" stroke-linecap="round">
    <path d="M98 132 L200 106"/>
    <path d="M100 142 L204 116"/>
  </g>
  <!-- crimped edge crust at the wide back -->
  <path d="M204 96 C210 100 214 108 214 118" fill="none" stroke="#8a5628" stroke-width="3" opacity=".7" stroke-linecap="round"/>
  <path d="M96 150 L92 126 L206 96 L214 118 Z" fill="none" stroke="#7c4a17" stroke-width="1.3" opacity=".55"/>
  <!-- top crust sheen band -->
  <path d="M110 122 C140 112 176 104 198 100" stroke="#ffe6b8" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- cinnamon-sugar sparkle + gloss dots -->
  <circle cx="150" cy="118" r="1.2" fill="#fff" opacity=".55"/>
  <circle cx="180" cy="110" r="1.1" fill="#fff" opacity=".5"/>
  <circle cx="128" cy="126" r="1" fill="#fff" opacity=".45"/>
  <circle cx="118" cy="141" r="1.1" fill="#fff" opacity=".5"/>
  <path d="M92 62 l0 6 M89 65 l6 0" stroke="#fff" stroke-width="1.2" opacity=".4" stroke-linecap="round"/>
  <path d="M230 78 l0 5 M227.5 80.5 l5 0" stroke="#ffd60a" stroke-width="1.1" opacity=".4" stroke-linecap="round"/>
</svg>
