<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="mc1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="mc1plate" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="mc1oil" cx="48%" cy="34%" r="82%">
      <stop offset="0%" stop-color="#ef5520"/><stop offset="50%" stop-color="#b02408"/><stop offset="100%" stop-color="#7a1305"/>
    </radialGradient>
    <linearGradient id="mc1skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6e2b6"/><stop offset="55%" stop-color="#e6c078"/><stop offset="100%" stop-color="#c99a4e"/>
    </linearGradient>
    <linearGradient id="mc1meat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf1e0"/><stop offset="100%" stop-color="#eddcc4"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mc1bg)"/>
  <!-- steam -->
  <path d="M120 58 C110 42 130 34 120 14" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <path d="M202 54 C194 38 210 30 204 12" stroke="#fff" stroke-width="6" fill="none" opacity=".06" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- wide shallow plate -->
  <ellipse cx="160" cy="130" rx="140" ry="46" fill="url(#mc1plate)"/>
  <ellipse cx="160" cy="130" rx="140" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="124" ry="37" fill="#0c0c0f"/>
  <!-- neon steam arc -->
  <path d="M52 118 Q102 90 166 88" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- glossy red chili-oil pool the chicken drowns in -->
  <ellipse cx="160" cy="132" rx="112" ry="27" fill="url(#mc1oil)"/>
  <ellipse cx="136" cy="124" rx="34" ry="8" fill="#ff8a3a" opacity=".3" transform="rotate(-8 136 124)"/>
  <!-- chopped bone-in chicken pieces (skin-on, poached white meat) -->
  <g stroke="#a85f22" stroke-width="1.3" stroke-linejoin="round">
    <path d="M96 116 C94 106 104 100 116 102 C128 100 134 108 132 118 C130 128 118 132 106 128 C96 128 94 122 96 116 Z" fill="url(#mc1skin)"/>
    <path d="M152 110 C150 100 160 96 172 98 C184 96 190 104 188 114 C186 124 174 128 162 124 C152 124 150 116 152 110 Z" fill="url(#mc1skin)"/>
    <path d="M206 118 C204 108 214 104 226 106 C236 104 242 112 240 122 C238 132 226 134 216 130 C207 130 205 124 206 118 Z" fill="url(#mc1skin)"/>
    <path d="M122 138 C120 128 130 124 142 126 C152 124 158 132 156 142 C154 150 142 152 132 148 C123 148 121 144 122 138 Z" fill="url(#mc1skin)"/>
    <path d="M180 138 C178 128 188 124 200 126 C210 124 216 132 214 142 C212 150 200 152 190 148 C181 148 179 144 180 138 Z" fill="url(#mc1skin)"/>
  </g>
  <!-- white poached-meat inner face on each piece -->
  <g fill="url(#mc1meat)">
    <path d="M104 110 C112 106 122 108 124 114 C120 120 108 120 104 116 Z" opacity=".95"/>
    <path d="M160 104 C168 100 178 102 180 108 C176 114 164 114 160 110 Z" opacity=".95"/>
    <path d="M214 112 C222 108 232 110 234 116 C230 122 218 122 214 118 Z" opacity=".95"/>
    <path d="M130 132 C138 128 148 130 150 136 C146 142 134 142 130 138 Z" opacity=".9"/>
    <path d="M188 132 C196 128 206 130 208 136 C204 142 192 142 188 138 Z" opacity=".9"/>
  </g>
  <!-- glossy skin-edge sheen -->
  <path d="M100 106 C108 102 120 102 126 106" stroke="#ffe6b0" stroke-width="1.6" fill="none" opacity=".6" stroke-linecap="round"/>
  <path d="M158 100 C166 96 178 96 184 100" stroke="#ffe6b0" stroke-width="1.6" fill="none" opacity=".55" stroke-linecap="round"/>
  <!-- chili-oil laps over the pieces -->
  <path d="M104 122 C136 130 190 130 220 122" stroke="#c42a0a" stroke-width="4" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- crushed peanuts (pale gold nubs) -->
  <circle cx="118" cy="122" r="2.4" fill="#e6c884"/><circle cx="150" cy="126" r="2.2" fill="#dcbc78"/>
  <circle cx="176" cy="118" r="2.4" fill="#e6c884"/><circle cx="204" cy="126" r="2.2" fill="#dcbc78"/>
  <circle cx="134" cy="114" r="2" fill="#e6c884"/><circle cx="196" cy="120" r="2" fill="#dcbc78"/>
  <!-- scallion greens scattered on top -->
  <rect x="112" y="112" width="8" height="2.8" rx="1.4" fill="#58c14a" transform="rotate(-18 116 113)"/>
  <rect x="162" y="116" width="8" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(16 166 117)"/>
  <rect x="200" y="114" width="8" height="2.8" rx="1.4" fill="#58c14a" transform="rotate(-8 204 115)"/>
  <rect x="140" y="140" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(24 143 141)"/>
  <rect x="184" y="140" width="7" height="2.6" rx="1.3" fill="#2f7d2b" transform="rotate(-22 187 141)"/>
  <!-- diced red chili + sesame -->
  <rect x="126" y="128" width="6" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(-14 129 129)"/>
  <rect x="188" y="130" width="6" height="2.4" rx="1.2" fill="#c31f12" transform="rotate(18 191 131)"/>
  <ellipse cx="140" cy="120" rx="1.4" ry="1" fill="#f8eed6"/><ellipse cx="172" cy="124" rx="1.4" ry="1" fill="#f8eed6"/>
  <ellipse cx="208" cy="122" rx="1.4" ry="1" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="110" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="114" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="132" r="1.2" fill="#fff" opacity=".5"/>
</svg>
