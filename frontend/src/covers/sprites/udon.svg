<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="udBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="udbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="udbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="udbroth" cx="46%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#c8974e"/><stop offset="60%" stop-color="#a5762f"/><stop offset="100%" stop-color="#6e4c18"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#udbg)"/>
  <!-- rising steam (hot soup) -->
  <path d="M116 48 C104 28 126 20 114 0" stroke="#fff" stroke-width="7" fill="none" opacity=".11" filter="url(#udBlur3)"/>
  <path d="M170 44 C160 26 180 18 170 -2" stroke="#fff" stroke-width="6" fill="none" opacity=".09" filter="url(#udBlur3)"/>
  <path d="M212 50 C204 32 222 24 214 4" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#udBlur3)"/>
  <ellipse cx="160" cy="190" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (warm) -->
  <path d="M58 96 Q110 66 172 66" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- DEEP soup bowl: tall rounded silhouette (foot + deep wall) -->
  <path d="M46 108 C46 152 88 182 160 182 C232 182 274 152 274 108 Z" fill="url(#udbowl)"/>
  <ellipse cx="160" cy="108" rx="114" ry="40" fill="#141018"/>
  <ellipse cx="160" cy="108" rx="114" ry="40" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- broth surface -->
  <ellipse cx="160" cy="110" rx="100" ry="33" fill="url(#udbroth)"/>
  <ellipse cx="160" cy="110" rx="100" ry="33" fill="none" stroke="#d8ab63" stroke-width="1.2" opacity=".4"/>
  <!-- glossy broth sheen -->
  <ellipse cx="132" cy="100" rx="42" ry="10" fill="#e6c088" opacity=".3"/>
  <!-- THICK PALE UDON NEST rising out of the broth (fat rounded strands) -->
  <g stroke-linecap="round" fill="none">
    <path d="M112 118 C104 100 122 92 138 96" stroke="#7a4c14" stroke-width="9" opacity=".55"/>
    <path d="M112 116 C104 98 122 90 138 94" stroke="#efe0bb" stroke-width="8"/>
    <path d="M132 122 C120 104 140 92 162 96" stroke="#7a4c14" stroke-width="9" opacity=".55"/>
    <path d="M132 120 C120 102 140 90 162 94" stroke="#f3e7c6" stroke-width="8"/>
    <path d="M158 120 C150 102 176 92 196 98" stroke="#7a4c14" stroke-width="9" opacity=".55"/>
    <path d="M158 118 C150 100 176 90 196 96" stroke="#efe0bb" stroke-width="8"/>
    <path d="M182 122 C176 104 200 96 214 104" stroke="#7a4c14" stroke-width="9" opacity=".55"/>
    <path d="M182 120 C176 102 200 94 214 102" stroke="#f3e7c6" stroke-width="8"/>
    <!-- highlight sheen on the front strands -->
    <path d="M116 112 C110 100 124 94 136 96" stroke="#fff6de" stroke-width="2" opacity=".7"/>
    <path d="M162 114 C156 102 178 94 194 98" stroke="#fff6de" stroke-width="2" opacity=".7"/>
  </g>
  <!-- TOPPINGS ON TOP: pink-swirl narutomaki, scallion rings, half a soft egg -->
  <!-- narutomaki (fish cake with pink spiral) -->
  <g transform="translate(206 100) rotate(-8)">
    <ellipse cx="0" cy="0" rx="15" ry="11" fill="#f5efe4" stroke="#d9cdb6" stroke-width="1.2"/>
    <path d="M0 0 C-6 -6 4 -9 6 -2 C8 5 -4 8 -3 0 C-2 -3 2 -3 1 0" stroke="#ff6f8f" stroke-width="2" fill="none"/>
    <ellipse cx="-5" cy="-4" rx="5" ry="2.4" fill="#fff" opacity=".5"/>
  </g>
  <!-- soft-boiled egg half (kamaboko-style topping) -->
  <g transform="translate(120 96)">
    <ellipse cx="0" cy="0" rx="16" ry="12" fill="#fbf3df" stroke="#e6d7b6" stroke-width="1.2"/>
    <ellipse cx="0" cy="1" rx="7.5" ry="6" fill="#f6ac25"/>
    <ellipse cx="-2" cy="-1" rx="3" ry="2.2" fill="#ffd873" opacity=".9"/>
  </g>
  <!-- tempura crumbs floating (agedama) -->
  <circle cx="150" cy="122" r="2" fill="#e6b552"/>
  <circle cx="178" cy="126" r="1.8" fill="#f0c86a"/>
  <circle cx="98" cy="118" r="1.6" fill="#e6b552"/>
  <!-- scallion rings scattered on broth -->
  <circle cx="140" cy="128" r="3.4" fill="none" stroke="#5ecb4e" stroke-width="2"/>
  <circle cx="188" cy="120" r="3" fill="none" stroke="#3f9c37" stroke-width="2"/>
  <circle cx="112" cy="126" r="2.8" fill="none" stroke="#58c14a" stroke-width="1.8"/>
  <circle cx="164" cy="130" r="2.6" fill="none" stroke="#6abf5a" stroke-width="1.8"/>
  <!-- chopsticks lifting a strand from upper-right -->
  <g stroke-linecap="round">
    <path d="M232 40 L182 108" stroke="#b98a4e" stroke-width="5"/>
    <path d="M244 44 L196 110" stroke="#a67a40" stroke-width="5"/>
    <!-- lifted udon strand between the tips -->
    <path d="M186 110 C176 92 176 76 182 62" stroke="#f3e7c6" stroke-width="6" fill="none"/>
    <path d="M186 108 C177 92 177 78 182 66" stroke="#fff6de" stroke-width="1.6" fill="none" opacity=".7"/>
  </g>
  <!-- gloss / seven-spice fleck -->
  <circle cx="128" cy="112" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="112" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="156" cy="118" r="1.4" fill="#e0341f" opacity=".8"/>
</svg>
