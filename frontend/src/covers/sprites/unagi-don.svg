<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="udBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="udbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="udbowl" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="udrice" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#fffaf0"/><stop offset="60%" stop-color="#f2ead6"/><stop offset="100%" stop-color="#d8c7a6"/>
    </radialGradient>
    <linearGradient id="udeel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c1701f"/><stop offset="45%" stop-color="#8a4212"/><stop offset="100%" stop-color="#5a2708"/>
    </linearGradient>
    <linearGradient id="udglaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0902f"/><stop offset="100%" stop-color="#9a4e12"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#udbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 26 118 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#udBlur3)"/>
  <path d="M196 54 C188 38 206 30 198 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#udBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (warm/local) -->
  <path d="M54 112 Q106 82 170 80" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- DONBURI bowl: deep round bowl -->
  <path d="M70 118 C70 158 108 178 160 178 C212 178 250 158 250 118 Z" fill="url(#udbowl)"/>
  <path d="M70 118 C70 158 108 178 160 178 C212 178 250 158 250 118" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- bowl rim ellipse -->
  <ellipse cx="160" cy="118" rx="90" ry="26" fill="#181320"/>
  <ellipse cx="160" cy="118" rx="90" ry="26" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="117" rx="78" ry="21" fill="#0e0c12"/>
  <!-- rice bed visible around edges -->
  <ellipse cx="160" cy="116" rx="76" ry="20" fill="url(#udrice)"/>
  <g stroke-linecap="round" opacity=".7">
    <path d="M100 114 l5 -2" stroke="#fffdf4" stroke-width="2"/>
    <path d="M120 122 l5 2" stroke="#ded0b0" stroke-width="2"/>
    <path d="M210 114 l5 -2" stroke="#fffdf4" stroke-width="2"/>
    <path d="M200 124 l-5 2" stroke="#ded0b0" stroke-width="2"/>
    <path d="M96 108 l5 2" stroke="#fffdf4" stroke-width="2"/>
    <path d="M220 110 l-5 2" stroke="#ded0b0" stroke-width="2"/>
  </g>
  <!-- GRILLED EEL fillets laid in strips across the rice (glazed, char-lined) -->
  <g>
    <!-- back fillet -->
    <path d="M104 102 L212 100 C218 100 220 108 214 110 L106 114 C100 114 98 104 104 102 Z" fill="url(#udeel)" stroke="#4a1f08" stroke-width="1.2"/>
    <path d="M108 104 L210 102" stroke="url(#udglaze)" stroke-width="2.2" opacity=".7" stroke-linecap="round"/>
    <path d="M120 103 l0 8 M140 103 l0 8 M160 102 l0 8 M180 102 l0 8 M198 101 l0 8" stroke="#3a1706" stroke-width="1.6" opacity=".6"/>
  </g>
  <g>
    <!-- front fillet -->
    <path d="M96 118 L216 116 C224 116 226 126 218 128 L98 132 C90 132 88 120 96 118 Z" fill="url(#udeel)" stroke="#4a1f08" stroke-width="1.4"/>
    <path d="M100 121 L214 119" stroke="url(#udglaze)" stroke-width="2.6" opacity=".75" stroke-linecap="round"/>
    <path d="M114 119 l0 9 M136 119 l0 9 M158 118 l0 9 M180 118 l0 9 M202 117 l0 9" stroke="#3a1706" stroke-width="1.8" opacity=".65"/>
    <!-- glossy sheen -->
    <ellipse cx="150" cy="121" rx="46" ry="3" fill="#f2ad4a" opacity=".4"/>
  </g>
  <!-- tare glaze drizzle laps -->
  <path d="M120 132 C140 138 180 138 200 132" stroke="#7a3a10" stroke-width="2.4" fill="none" opacity=".6" stroke-linecap="round"/>
  <!-- sesame seeds -->
  <g fill="#f8eed6">
    <ellipse cx="128" cy="110" rx="2" ry="1.1" transform="rotate(20 128 110)"/>
    <ellipse cx="150" cy="106" rx="2" ry="1.1" transform="rotate(-14 150 106)"/>
    <ellipse cx="172" cy="112" rx="2" ry="1.1" transform="rotate(28 172 112)"/>
    <ellipse cx="192" cy="108" rx="2" ry="1.1" transform="rotate(-20 192 108)"/>
    <ellipse cx="140" cy="124" rx="2" ry="1.1" transform="rotate(12 140 124)"/>
    <ellipse cx="184" cy="124" rx="2" ry="1.1" transform="rotate(-26 184 124)"/>
  </g>
  <!-- scallion + sansho garnish -->
  <rect x="118" y="98" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 121 99)"/>
  <rect x="200" y="126" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(16 203 127)"/>
  <!-- gloss dots -->
  <circle cx="132" cy="106" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="176" cy="120" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="206" cy="112" r="1.2" fill="#fff" opacity=".45"/>
</svg>
