<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="f1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <linearGradient id="f1body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecef"/><stop offset="42%" stop-color="#c3ccd2"/><stop offset="100%" stop-color="#8f9ba3"/>
    </linearGradient>
    <linearGradient id="f1belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf6ee"/><stop offset="100%" stop-color="#e7ddcf"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#f1bg)"/>
  <!-- steam -->
  <path d="M120 56 C110 38 130 30 120 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M204 54 C196 38 214 30 206 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- oval platter -->
  <ellipse cx="160" cy="128" rx="140" ry="44" fill="#141018"/>
  <ellipse cx="160" cy="128" rx="140" ry="44" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="126" ry="36" fill="#0f0d13"/>
  <!-- neon steam arc -->
  <path d="M46 116 Q98 86 164 84" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- soy sauce pool -->
  <ellipse cx="160" cy="132" rx="112" ry="24" fill="#2a1608" opacity=".85"/>
  <ellipse cx="132" cy="126" rx="30" ry="6" fill="#6b3a12" opacity=".4"/>
  <!-- fish body -->
  <g transform="translate(0 4)">
    <!-- tail -->
    <path d="M250 118 C268 106 286 104 292 108 C286 116 288 124 292 132 C286 136 268 134 250 122 Z" fill="url(#f1body)"/>
    <path d="M266 112 L282 110 M268 118 L286 120 M266 124 L282 130" stroke="#7a868f" stroke-width="1.3" opacity=".6"/>
    <!-- main body -->
    <path d="M52 120 C64 96 112 84 168 84 C214 84 250 98 258 120 C250 140 214 152 168 152 C112 152 64 140 52 120 Z" fill="url(#f1body)"/>
    <!-- belly highlight -->
    <path d="M70 128 C110 116 200 116 244 128 C200 146 110 146 70 128 Z" fill="url(#f1belly)" opacity=".85"/>
    <!-- top ridge shading -->
    <path d="M64 116 C104 96 210 96 250 116" stroke="#7c8790" stroke-width="2.4" fill="none" opacity=".55" stroke-linecap="round"/>
    <!-- cyan neon sheen along the back -->
    <path d="M74 112 C110 94 208 94 244 112" stroke="#8fe6ff" stroke-width="3" fill="none" opacity=".28" stroke-linecap="round"/>
    <!-- scale hints -->
    <path d="M120 104 q6 6 0 12 M136 100 q6 6 0 12 M152 98 q6 6 0 12 M168 98 q6 6 0 12 M184 100 q6 6 0 12 M200 104 q6 6 0 12" stroke="#9aa5ac" stroke-width="1.2" fill="none" opacity=".5"/>
    <!-- head -->
    <path d="M52 120 C58 106 72 98 84 96 C80 108 80 132 84 144 C72 142 58 134 52 120 Z" fill="#b4bdc3"/>
    <!-- gill line -->
    <path d="M86 100 C82 112 82 128 86 140" stroke="#6f7b84" stroke-width="1.6" fill="none" opacity=".6"/>
    <!-- eye -->
    <circle cx="70" cy="116" r="5.5" fill="#f4efe6"/>
    <circle cx="70" cy="116" r="3.2" fill="#1a1410"/>
    <circle cx="68.6" cy="114.6" r="1.1" fill="#fff" opacity=".85"/>
    <!-- top fin -->
    <path d="M120 84 C130 72 150 70 164 76 C158 82 150 84 140 84 Z" fill="#aab4bb" opacity=".9"/>
    <path d="M126 80 L128 74 M138 78 L140 72 M150 78 L152 73" stroke="#7a868f" stroke-width="1.1" opacity=".6"/>
    <path d="M52 120 C64 96 112 84 168 84 C214 84 250 98 258 120 C250 140 214 152 168 152 C112 152 64 140 52 120 Z" fill="none" stroke="#3a4148" stroke-width="1.4" opacity=".4"/>
  </g>
  <!-- heaped ginger + scallion slivers on top -->
  <g stroke-linecap="round" fill="none">
    <path d="M108 108 C118 100 132 100 144 106" stroke="#6abf5a" stroke-width="3"/>
    <path d="M130 104 C142 98 158 98 170 104" stroke="#58c14a" stroke-width="3"/>
    <path d="M152 106 C164 100 180 100 192 108" stroke="#6abf5a" stroke-width="3"/>
    <path d="M118 116 C132 110 150 110 164 116" stroke="#3f9c37" stroke-width="2.6"/>
    <path d="M160 114 C174 108 190 108 202 114" stroke="#58c14a" stroke-width="2.6"/>
  </g>
  <!-- ginger julienne (pale gold) -->
  <rect x="122" y="102" width="12" height="2.6" rx="1.3" fill="#f2d98c" transform="rotate(-14 128 103)"/>
  <rect x="150" y="100" width="12" height="2.6" rx="1.3" fill="#efd082" transform="rotate(10 156 101)"/>
  <rect x="176" y="106" width="11" height="2.6" rx="1.3" fill="#f2d98c" transform="rotate(-8 181 107)"/>
  <rect x="136" y="112" width="11" height="2.4" rx="1.2" fill="#efd082" transform="rotate(18 141 113)"/>
  <!-- red chili sliver accent -->
  <rect x="146" y="110" width="9" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(-20 150 111)"/>
  <rect x="188" y="112" width="8" height="2.2" rx="1.1" fill="#e0341f" transform="rotate(14 192 113)"/>
  <!-- soy drizzle -->
  <path d="M84 138 C130 148 210 148 244 134" stroke="#3d2510" stroke-width="2.6" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- gloss dots -->
  <circle cx="128" cy="110" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="176" cy="112" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
