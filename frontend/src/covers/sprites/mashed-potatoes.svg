<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="mpBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="mpbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="mpmound" cx="44%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff9ec"/><stop offset="55%" stop-color="#f6ecd2"/><stop offset="100%" stop-color="#e3cfa4"/>
    </radialGradient>
    <radialGradient id="mppool" cx="42%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ffe58a"/><stop offset="60%" stop-color="#f6c94a"/><stop offset="100%" stop-color="#e6a520"/>
    </radialGradient>
    <radialGradient id="mpbowl" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mpbg)"/>
  <!-- rising steam -->
  <path d="M128 50 C118 34 138 26 128 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#mpBlur3)"/>
  <path d="M196 52 C188 36 204 28 196 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#mpBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="180" rx="128" ry="18" fill="#000" opacity=".5"/>
  <!-- shallow serving bowl -->
  <ellipse cx="160" cy="140" rx="124" ry="44" fill="url(#mpbowl)"/>
  <ellipse cx="160" cy="140" rx="124" ry="44" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="138" rx="106" ry="36" fill="#0c0c0f"/>
  <!-- neon steam arc (warm) -->
  <path d="M56 108 Q108 74 170 76" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- soft base shadow of the mound -->
  <path d="M66 132 C74 100 110 84 160 84 C210 84 246 100 254 132 C226 150 196 156 160 156 C124 156 94 150 66 132 Z" fill="#b39d6e" opacity=".55"/>
  <!-- creamy mashed-potato mound -->
  <path d="M70 128 C78 94 112 78 160 78 C208 78 242 94 250 128 C224 146 196 152 160 152 C124 152 96 146 70 128 Z" fill="url(#mpmound)"/>
  <path d="M72 126 C80 96 112 82 160 82 C208 82 240 96 248 126" fill="none" stroke="#fffbf0" stroke-width="1.6" opacity=".45"/>
  <!-- swirled fork/spoon peaks and ridges for rustic texture -->
  <g fill="none" stroke-linecap="round" opacity=".8">
    <path d="M92 116 C98 106 106 104 112 112" stroke="#d8c295" stroke-width="2.6"/>
    <path d="M118 104 C124 94 134 94 138 104" stroke="#d8c295" stroke-width="2.6"/>
    <path d="M146 96 C152 86 162 86 166 96" stroke="#cbb488" stroke-width="2.6"/>
    <path d="M176 98 C182 88 192 90 196 100" stroke="#d8c295" stroke-width="2.6"/>
    <path d="M202 108 C208 100 216 102 220 112" stroke="#cbb488" stroke-width="2.6"/>
    <path d="M104 130 C112 122 122 122 128 130" stroke="#d8c295" stroke-width="2.4"/>
    <path d="M140 132 C148 124 158 124 164 132" stroke="#cbb488" stroke-width="2.4"/>
    <path d="M178 128 C186 120 196 122 202 130" stroke="#d8c295" stroke-width="2.4"/>
    <path d="M120 118 C128 112 136 112 142 118" stroke="#e6d3aa" stroke-width="2.2"/>
    <path d="M168 116 C176 110 184 110 190 116" stroke="#e6d3aa" stroke-width="2.2"/>
  </g>
  <!-- peak highlights -->
  <g fill="#fffdf6" opacity=".7">
    <ellipse cx="120" cy="98" rx="5" ry="2" transform="rotate(-16 120 98)"/>
    <ellipse cx="156" cy="90" rx="5" ry="2" transform="rotate(6 156 90)"/>
    <ellipse cx="190" cy="96" rx="4.5" ry="1.8" transform="rotate(14 190 96)"/>
  </g>
  <!-- golden butter pool melting in the crater -->
  <path d="M124 108 C138 100 182 100 196 110 C186 124 174 128 160 128 C146 128 134 124 124 108 Z" fill="url(#mppool)" opacity=".92"/>
  <ellipse cx="150" cy="110" rx="10" ry="4" fill="#fff3c8" opacity=".7"/>
  <!-- butter runnels dripping down the sides -->
  <path d="M126 116 C120 126 122 132 118 136" stroke="url(#mppool)" stroke-width="4" fill="none" opacity=".8" stroke-linecap="round"/>
  <path d="M192 112 C200 122 198 130 202 134" stroke="url(#mppool)" stroke-width="4" fill="none" opacity=".8" stroke-linecap="round"/>
  <!-- a melting butter pat + fresh chives -->
  <path d="M150 100 L172 100 L168 110 L154 110 Z" fill="#ffe58a" stroke="#e6b23a" stroke-width="1" opacity=".9"/>
  <ellipse cx="157" cy="103" rx="5" ry="2" fill="#fff8dc" opacity=".8"/>
  <rect x="132" y="112" width="8" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-14 136 113)"/>
  <rect x="176" y="114" width="8" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 180 115)"/>
  <rect x="158" y="118" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-6 161 119)"/>
  <!-- coarse black pepper flecks -->
  <circle cx="140" cy="106" r="1.1" fill="#260903"/>
  <circle cx="178" cy="108" r="1" fill="#260903"/>
  <circle cx="160" cy="114" r="1" fill="#260903"/>
  <!-- gloss dots -->
  <circle cx="146" cy="104" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="118" r="1.2" fill="#fff" opacity=".5"/>
</svg>
