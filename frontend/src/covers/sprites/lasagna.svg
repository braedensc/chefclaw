<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="lg1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="lg1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="lg1cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe9b0"/><stop offset="45%" stop-color="#f6c257"/><stop offset="100%" stop-color="#d98e2a"/>
    </linearGradient>
    <linearGradient id="lg1ragu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8341a"/><stop offset="100%" stop-color="#8a1c0c"/>
    </linearGradient>
    <linearGradient id="lg1side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f3d68a"/><stop offset="100%" stop-color="#caa254"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#lg1bg)"/>
  <!-- steam -->
  <path d="M120 52 C110 34 130 26 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#lg1Blur3)"/>
  <path d="M204 50 C196 34 214 26 206 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#lg1Blur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="21" fill="#000" opacity=".5"/>
  <!-- dark plate under the slab -->
  <ellipse cx="160" cy="150" rx="140" ry="34" fill="#141018"/>
  <ellipse cx="160" cy="150" rx="140" ry="34" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="150" rx="126" ry="27" fill="#0f0d13"/>
  <!-- neon steam arc (rose) -->
  <path d="M52 100 Q104 70 168 68" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- lasagna slab: an upright rectangular wedge showing stacked layers -->
  <!-- top (baked cheese) -->
  <path d="M84 78 L236 78 L214 96 L106 96 Z" fill="url(#lg1cheese)"/>
  <path d="M84 78 L236 78 L214 96 L106 96 Z" fill="none" stroke="#a5641d" stroke-width="1.2" opacity=".5"/>
  <!-- browned cheese blisters on top -->
  <ellipse cx="118" cy="86" rx="9" ry="4" fill="#a5551a" opacity=".55"/>
  <ellipse cx="168" cy="84" rx="11" ry="4.4" fill="#9a4d16" opacity=".5"/>
  <ellipse cx="204" cy="88" rx="8" ry="3.6" fill="#a5551a" opacity=".5"/>
  <ellipse cx="144" cy="90" rx="6" ry="2.8" fill="#ffe9b0" opacity=".7"/>
  <ellipse cx="188" cy="82" rx="6" ry="2.6" fill="#ffe9b0" opacity=".6"/>
  <!-- front face: stacked strata (pasta / ragu / bechamel / pasta / ragu) -->
  <path d="M106 96 L214 96 L212 150 L108 150 Z" fill="#3a2410"/>
  <!-- cheese lip below top -->
  <path d="M106 96 L214 96 L213 105 L107 105 Z" fill="#e9b355"/>
  <!-- pasta sheet 1 -->
  <path d="M107 105 L213 105 L212 112 L108 112 Z" fill="#e3c483"/>
  <!-- ragu layer 1 -->
  <path d="M108 112 L212 112 L211 124 L109 124 Z" fill="url(#lg1ragu)"/>
  <!-- bechamel -->
  <path d="M109 124 L211 124 L210 131 L110 131 Z" fill="#f4e6c6"/>
  <!-- pasta sheet 2 -->
  <path d="M110 131 L210 131 L209 138 L111 138 Z" fill="#dcbb7a"/>
  <!-- ragu layer 2 -->
  <path d="M111 138 L209 138 L208 150 L112 150 Z" fill="#9a2410"/>
  <!-- front face outline -->
  <path d="M106 96 L214 96 L212 150 L108 150 Z" fill="none" stroke="#240a03" stroke-width="1.3" opacity=".5"/>
  <!-- side face (lit, béchamel-dripping cut edge) -->
  <path d="M214 96 L236 78 L233 128 L212 150 Z" fill="url(#lg1side)" opacity=".92"/>
  <path d="M214 96 L236 78 L233 128 L212 150 Z" fill="none" stroke="#a5641d" stroke-width="1.1" opacity=".45"/>
  <!-- ragu peeking on the side -->
  <path d="M219 118 L232 106 L231 118 L218 130 Z" fill="#b02c14" opacity=".7"/>
  <!-- melty cheese pull off the top edge -->
  <path d="M126 78 C124 70 130 66 134 72 C136 66 142 68 140 76" stroke="#f6c257" stroke-width="3" fill="none" opacity=".8" stroke-linecap="round"/>
  <!-- basil garnish on top -->
  <path d="M150 74 C156 68 166 68 170 74 C164 78 156 78 150 74 Z" fill="#2f7d2b"/>
  <path d="M160 71 L160 78" stroke="#1f5a1c" stroke-width="1" opacity=".6"/>
  <path d="M182 76 C188 70 198 70 202 76 C196 80 188 80 182 76 Z" fill="#3f9c37"/>
  <!-- sauce pooled on the plate at the base -->
  <path d="M96 152 C130 162 200 162 226 150 C200 156 130 156 96 152 Z" fill="#7a1c0c" opacity=".7"/>
  <!-- gloss dots -->
  <circle cx="132" cy="84" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="86" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="224" cy="98" r="1.3" fill="#fff" opacity=".55"/>
</svg>
