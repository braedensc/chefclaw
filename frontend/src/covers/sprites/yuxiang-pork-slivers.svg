<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="yx1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="yx1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="yx1sauce" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#b8461a"/><stop offset="55%" stop-color="#8a2d0d"/><stop offset="100%" stop-color="#5a1706"/>
    </radialGradient>
    <linearGradient id="yx1pork" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3a20"/><stop offset="55%" stop-color="#5e2410"/><stop offset="100%" stop-color="#3d1608"/>
    </linearGradient>
    <linearGradient id="yx1egg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#96502a"/><stop offset="50%" stop-color="#7a3a4e"/><stop offset="100%" stop-color="#5c2c52"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#yx1bg)"/>
  <!-- steam -->
  <path d="M120 52 C110 34 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#yx1Blur3)"/>
  <path d="M198 50 C190 34 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#yx1Blur3)"/>
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="130" rx="140" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="130" rx="140" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="126" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (cyan) -->
  <path d="M48 114 Q102 82 166 80" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy chili-oil sauce pool -->
  <path d="M58 128 C64 108 108 96 160 96 C212 96 256 108 262 128 C236 150 200 156 160 156 C120 156 84 150 58 128 Z" fill="url(#yx1sauce)"/>
  <path d="M64 122 C72 108 110 100 160 100 C210 100 248 108 256 122" fill="none" stroke="#e06a2c" stroke-width="1.4" opacity=".4"/>
  <!-- aubergine batons (soft, purple-brown) back layer -->
  <g stroke="#3a1420" stroke-width="1.2" opacity=".55">
    <g transform="translate(96 108) rotate(-20)"><rect width="40" height="9" rx="4.5" fill="url(#yx1egg)"/></g>
    <g transform="translate(150 104) rotate(8)"><rect width="44" height="9" rx="4.5" fill="url(#yx1egg)"/></g>
    <g transform="translate(180 122) rotate(-12)"><rect width="38" height="9" rx="4.5" fill="url(#yx1egg)"/></g>
  </g>
  <!-- pork slivers (glossy warm brown) front layer, tossed -->
  <g stroke-linejoin="round">
    <g transform="translate(80 116) rotate(-16)"><rect width="46" height="7" rx="3.5" fill="url(#yx1pork)" stroke="#240a03" stroke-width="1.2"/><rect x="4" y="1.4" width="34" height="2" rx="1" fill="#c47a4a" opacity=".55"/></g>
    <g transform="translate(120 128) rotate(6)"><rect width="52" height="7" rx="3.5" fill="url(#yx1pork)" stroke="#240a03" stroke-width="1.2"/><rect x="4" y="1.4" width="40" height="2" rx="1" fill="#c47a4a" opacity=".55"/></g>
    <g transform="translate(112 106) rotate(-4)"><rect width="48" height="7" rx="3.5" fill="url(#yx1pork)" stroke="#240a03" stroke-width="1.2"/><rect x="4" y="1.4" width="36" height="2" rx="1" fill="#c47a4a" opacity=".6"/></g>
    <g transform="translate(166 116) rotate(-18)"><rect width="50" height="7" rx="3.5" fill="url(#yx1pork)" stroke="#240a03" stroke-width="1.2"/><rect x="4" y="1.4" width="38" height="2" rx="1" fill="#c47a4a" opacity=".55"/></g>
    <g transform="translate(150 134) rotate(14)"><rect width="44" height="7" rx="3.5" fill="url(#yx1pork)" stroke="#240a03" stroke-width="1.2"/><rect x="4" y="1.4" width="32" height="2" rx="1" fill="#c47a4a" opacity=".5"/></g>
    <g transform="translate(96 132) rotate(18)"><rect width="40" height="6.5" rx="3.2" fill="url(#yx1pork)" stroke="#240a03" stroke-width="1.2"/></g>
  </g>
  <!-- garnish: diced red chili + scallion + minced garlic -->
  <rect x="106" y="120" width="6" height="6" rx="1.4" fill="#e0341f" transform="rotate(12 109 123)"/>
  <rect x="176" y="110" width="6" height="6" rx="1.4" fill="#e0341f" transform="rotate(-16 179 113)"/>
  <rect x="134" y="140" width="5.5" height="5.5" rx="1.3" fill="#d0301c" transform="rotate(20 137 143)"/>
  <rect x="120" y="112" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-14 123 113)"/>
  <rect x="188" y="128" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(18 191 129)"/>
  <rect x="150" y="120" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-8 153 121)"/>
  <circle cx="128" cy="126" r="1.5" fill="#f2ddb0"/>
  <circle cx="164" cy="130" r="1.4" fill="#f2ddb0"/>
  <circle cx="100" cy="124" r="1.3" fill="#f2ddb0"/>
  <!-- oil gloss dots -->
  <circle cx="118" cy="110" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="176" cy="124" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="146" cy="138" r="1.2" fill="#fff" opacity=".5"/>
</svg>
