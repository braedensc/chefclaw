    <path d="M150 108 C146 100 156 96 168 98 C180 96 186 104 182 112 C186 120 174 124 162 120 C152 122 148 116 150 108 Z" fill="url(#cc1cuke)"/>
    <path d="M204 116 C200 108 210 104 222 106 C232 104 238 112 234 120 C238 128 226 132 214 128 C206 130 202 124 204 116 Z" fill="url(#cc1cuke)"/>
    <path d="M118 138 C114 130 124 126 136 128 C146 126 152 134 148 142 C150 150 138 152 128 148 C120 150 116 144 118 138 Z" fill="url(#cc1cuke)"/>
    <path d="M176 136 C172 128 182 124 194 126 C204 124 210 132 206 140 C208 148 196 150 186 146 C178 148 174 142 176 136 Z" fill="url(#cc1cuke)"/>
