<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cc1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="cc1plate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="cc1cuke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe66a"/><stop offset="45%" stop-color="#8fce4c"/><stop offset="100%" stop-color="#4f9a34"/>
    </linearGradient>
    <linearGradient id="cc1flesh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf6cf"/><stop offset="100%" stop-color="#c4e59a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cc1bg)"/>
  <!-- steam -->
  <path d="M122 58 C112 42 130 34 122 14" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <path d="M200 54 C192 38 208 30 202 12" stroke="#fff" stroke-width="6" fill="none" opacity=".06" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
