  <rect x="128" y="108" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-18 131 109)"/>
  <rect x="182" y="112" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 185 113)"/>
  <rect x="150" y="138" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-24 153 139)"/>
