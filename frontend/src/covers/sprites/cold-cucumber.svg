    <path d="M126 132 C132 128 142 130 144 136 C140 142 130 142 126 138 Z" fill="url(#cc1flesh)" opacity=".85"/>
    <path d="M184 130 C190 126 200 128 202 134 C198 140 188 140 184 136 Z" fill="url(#cc1flesh)" opacity=".85"/>
