  <ellipse cx="132" cy="124" rx="1.4" ry="1" fill="#f8eed6"/><ellipse cx="176" cy="126" rx="1.4" ry="1" fill="#f8eed6"/>
  <ellipse cx="204" cy="120" rx="1.4" ry="1" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="118" cy="114" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="180" cy="120" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="132" r="1.2" fill="#fff" opacity=".5"/>
