  <rect x="158" y="118" width="6" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(18 161 119)"/>
  <rect x="196" y="128" width="6" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(-10 199 129)"/>
  <rect x="138" y="140" width="5.5" height="2.4" rx="1.2" fill="#c31f12" transform="rotate(24 141 141)"/>
