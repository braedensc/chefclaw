  <!-- minced garlic dots scattered on top -->
  <circle cx="120" cy="120" r="2" fill="#f2ddb0"/><circle cx="146" cy="124" r="1.8" fill="#f2ddb0"/>
  <circle cx="172" cy="118" r="2" fill="#f2ddb0"/><circle cx="198" cy="122" r="1.8" fill="#f2ddb0"/>
  <circle cx="134" cy="112" r="1.6" fill="#f2ddb0"/><circle cx="208" cy="130" r="1.7" fill="#f2ddb0"/>
