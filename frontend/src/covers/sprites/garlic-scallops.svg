<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="gsvBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="gsvbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="gsvshell" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#f7ddb6"/><stop offset="55%" stop-color="#e6bd83"/><stop offset="100%" stop-color="#c3924f"/>
    </radialGradient>
    <radialGradient id="gsvmeat" cx="42%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#fff2e0"/><stop offset="55%" stop-color="#f6dcbf"/><stop offset="100%" stop-color="#e2b98f"/>
    </radialGradient>
    <radialGradient id="gsvgarlic" cx="45%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#fff6da"/><stop offset="60%" stop-color="#f2e0af"/><stop offset="100%" stop-color="#d8bf82"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gsvbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 28 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#gsvBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#gsvBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="144" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="132" rx="144" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="130" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (cyan) -->
  <path d="M50 116 Q104 82 168 80" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- three scallops on the half-shell, fanned across the plate -->
  <!-- back-left scallop (smaller) -->
  <g transform="translate(96 118) scale(.86)">
    <!-- shell (fluted fan) -->
    <path d="M-30 6 C-34 -8 -18 -20 0 -20 C18 -20 34 -8 30 6 C22 16 -22 16 -30 6 Z" fill="url(#gsvshell)" stroke="#a3782f" stroke-width="1.4"/>
    <path d="M-24 -6 L-2 -18 M-12 -2 L2 -19 M0 -1 L4 -20 M12 -2 L6 -19 M24 -6 L10 -18" stroke="#b78a45" stroke-width="1.2" opacity=".6"/>
    <!-- scallop meat mound -->
    <ellipse cx="0" cy="-2" rx="16" ry="10" fill="url(#gsvmeat)" stroke="#d9b184" stroke-width="1.1"/>
    <!-- garlic + vermicelli pile on top -->
    <path d="M-14 -6 C-6 -12 8 -12 15 -5" stroke="#eadfae" stroke-width="1.6" fill="none" opacity=".7" stroke-linecap="round"/>
    <path d="M-12 -2 C-4 -8 8 -8 13 -1" stroke="#f2e6bc" stroke-width="1.6" fill="none" opacity=".6" stroke-linecap="round"/>
    <circle cx="-6" cy="-5" r="2.2" fill="url(#gsvgarlic)"/>
    <circle cx="3" cy="-7" r="2.4" fill="url(#gsvgarlic)"/>
    <circle cx="8" cy="-3" r="2" fill="url(#gsvgarlic)"/>
    <ellipse cx="-5" cy="-6" rx="5" ry="2.4" fill="#fff" opacity=".4"/>
  </g>
  <!-- back-right scallop -->
  <g transform="translate(222 116) scale(.9)">
    <path d="M-30 6 C-34 -8 -18 -20 0 -20 C18 -20 34 -8 30 6 C22 16 -22 16 -30 6 Z" fill="url(#gsvshell)" stroke="#a3782f" stroke-width="1.4"/>
    <path d="M-24 -6 L-2 -18 M-12 -2 L2 -19 M0 -1 L4 -20 M12 -2 L6 -19 M24 -6 L10 -18" stroke="#b78a45" stroke-width="1.2" opacity=".6"/>
    <ellipse cx="0" cy="-2" rx="16" ry="10" fill="url(#gsvmeat)" stroke="#d9b184" stroke-width="1.1"/>
    <path d="M-14 -6 C-6 -12 8 -12 15 -5" stroke="#eadfae" stroke-width="1.6" fill="none" opacity=".7" stroke-linecap="round"/>
    <path d="M-12 -2 C-4 -8 8 -8 13 -1" stroke="#f2e6bc" stroke-width="1.6" fill="none" opacity=".6" stroke-linecap="round"/>
    <circle cx="-6" cy="-5" r="2.2" fill="url(#gsvgarlic)"/>
    <circle cx="4" cy="-7" r="2.4" fill="url(#gsvgarlic)"/>
    <circle cx="9" cy="-2" r="2" fill="url(#gsvgarlic)"/>
    <ellipse cx="-5" cy="-6" rx="5" ry="2.4" fill="#fff" opacity=".4"/>
  </g>
  <!-- front-center scallop (largest, hero) -->
  <g transform="translate(160 128) scale(1.08)">
    <!-- shell -->
    <path d="M-32 7 C-37 -10 -19 -22 0 -22 C19 -22 37 -10 32 7 C24 18 -24 18 -32 7 Z" fill="url(#gsvshell)" stroke="#a3782f" stroke-width="1.5"/>
    <!-- flute lines -->
    <path d="M-26 -6 L-2 -20 M-14 -1 L2 -21 M0 0 L4 -22 M14 -1 L6 -21 M26 -6 L10 -20" stroke="#b78a45" stroke-width="1.2" opacity=".6"/>
    <!-- shell hinge tab at bottom -->
    <path d="M-8 12 L8 12 L4 18 L-4 18 Z" fill="#d8ad6a" stroke="#a3782f" stroke-width="1"/>
    <!-- plump scallop meat -->
    <ellipse cx="0" cy="-3" rx="18" ry="11" fill="url(#gsvmeat)" stroke="#d9b184" stroke-width="1.2"/>
    <ellipse cx="-4" cy="-6" rx="7" ry="3.4" fill="#fff" opacity=".5"/>
    <!-- vermicelli nest + minced garlic mounded on top -->
    <path d="M-16 -7 C-6 -14 8 -14 17 -5" stroke="#f2e6bc" stroke-width="1.8" fill="none" opacity=".75" stroke-linecap="round"/>
    <path d="M-15 -3 C-5 -10 9 -10 15 -1" stroke="#eadfae" stroke-width="1.8" fill="none" opacity=".65" stroke-linecap="round"/>
    <path d="M-12 -8 C-4 -4 6 -4 13 -8" stroke="#f7eecb" stroke-width="1.4" fill="none" opacity=".55" stroke-linecap="round"/>
    <circle cx="-8" cy="-6" r="2.6" fill="url(#gsvgarlic)"/>
    <circle cx="-1" cy="-9" r="2.8" fill="url(#gsvgarlic)"/>
    <circle cx="6" cy="-5" r="2.4" fill="url(#gsvgarlic)"/>
    <circle cx="10" cy="-8" r="2" fill="url(#gsvgarlic)"/>
    <circle cx="-3" cy="-3" r="2.2" fill="url(#gsvgarlic)"/>
    <!-- scallion + red chili fleck garnish -->
    <rect x="-9" y="-11" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-16 -6 -10)"/>
    <rect x="4" y="-11" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(18 7 -10)"/>
    <circle cx="1" cy="-11" r="1.6" fill="#e0341f"/>
  </g>
  <!-- scattered scallion/garlic across the plate -->
  <rect x="118" y="140" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-14 121 141)"/>
  <rect x="196" y="140" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 199 141)"/>
  <circle cx="140" cy="146" r="1.6" fill="#f2ddb0"/>
  <circle cx="182" cy="147" r="1.6" fill="#f2ddb0"/>
  <!-- gloss dots -->
  <circle cx="92" cy="110" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="226" cy="108" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="120" r="1.4" fill="#fff" opacity=".6"/>
</svg>
