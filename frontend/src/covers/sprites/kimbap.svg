<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="kbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="kbboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c5a30"/><stop offset="100%" stop-color="#4d381d"/>
    </linearGradient>
    <radialGradient id="kbrice" cx="42%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#fff7e6"/><stop offset="60%" stop-color="#f3e6c8"/><stop offset="100%" stop-color="#dcc79c"/>
    </radialGradient>
    <radialGradient id="kbnori" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#26382e"/><stop offset="100%" stop-color="#0e1712"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kbbg)"/>
  <!-- cold dish: no steam arc, just condensation sparkles -->
  <!-- cast shadow -->
  <ellipse cx="160" cy="176" rx="140" ry="20" fill="#000" opacity=".5"/>
  <!-- wooden serving board -->
  <ellipse cx="160" cy="130" rx="142" ry="44" fill="url(#kbboard)"/>
  <ellipse cx="160" cy="130" rx="142" ry="44" fill="none" stroke="#33240f" stroke-width="3"/>
  <!-- wood grain lines -->
  <g stroke="#5e4320" stroke-width="1.4" fill="none" opacity=".55" stroke-linecap="round">
    <path d="M40 118 Q160 110 280 118"/>
    <path d="M44 132 Q160 126 276 132"/>
    <path d="M50 146 Q160 142 270 146"/>
  </g>
  <!-- KIMBAP PINWHEEL SLICES: nori ring, rice ring, colorful fillings -->
  <!-- slice group generator: each is dark nori disc, pale rice ring, filling core -->
  <g>
    <!-- slice 1 (back-left, smaller) -->
    <g transform="translate(96 116) scale(.86)">
      <circle r="21" fill="url(#kbnori)"/>
      <circle r="21" fill="none" stroke="#0a120d" stroke-width="1.4" opacity=".7"/>
      <circle r="16.5" fill="url(#kbrice)"/>
      <circle r="7.5" fill="#f3d24a"/>
      <rect x="-6" y="-2.4" width="12" height="4.8" rx="2" fill="#e2701f"/>
      <rect x="-2.4" y="-6" width="4.8" height="12" rx="2" fill="#4a9c38"/>
      <circle cx="4" cy="-3" r="2" fill="#d33420"/>
      <circle r="16.5" fill="none" stroke="#c9b078" stroke-width="1" opacity=".5"/>
    </g>
    <!-- slice 2 (back-right, smaller) -->
    <g transform="translate(224 116) scale(.86)">
      <circle r="21" fill="url(#kbnori)"/>
      <circle r="21" fill="none" stroke="#0a120d" stroke-width="1.4" opacity=".7"/>
      <circle r="16.5" fill="url(#kbrice)"/>
      <circle r="7" fill="#efc93e"/>
      <rect x="-6" y="-2.4" width="12" height="4.8" rx="2" fill="#3f9c37"/>
      <rect x="-2.4" y="-6" width="4.8" height="12" rx="2" fill="#e2701f"/>
      <circle cx="-4" cy="3" r="2" fill="#d33420"/>
      <circle r="16.5" fill="none" stroke="#c9b078" stroke-width="1" opacity=".5"/>
    </g>
    <!-- slice 3 (front-left) -->
    <g transform="translate(128 132)">
      <circle r="24" fill="url(#kbnori)"/>
      <circle r="24" fill="none" stroke="#0a120d" stroke-width="1.5" opacity=".75"/>
      <circle r="19" fill="url(#kbrice)"/>
      <circle r="8.5" fill="#f5d64e"/>
      <rect x="-7" y="-3" width="14" height="6" rx="2.6" fill="#e2701f"/>
      <rect x="-3" y="-7" width="6" height="14" rx="2.6" fill="#4a9c38"/>
      <circle cx="5" cy="-4" r="2.4" fill="#d33420"/>
      <circle cx="-5" cy="4" r="2" fill="#7c5230"/>
      <circle r="19" fill="none" stroke="#c9b078" stroke-width="1.1" opacity=".5"/>
      <circle cx="-8" cy="-10" r="2.4" fill="#fff" opacity=".25"/>
    </g>
    <!-- slice 4 (front-center) -->
    <g transform="translate(160 136)">
      <circle r="25" fill="url(#kbnori)"/>
      <circle r="25" fill="none" stroke="#0a120d" stroke-width="1.5" opacity=".75"/>
      <circle r="20" fill="url(#kbrice)"/>
      <circle r="9" fill="#f5d64e"/>
      <rect x="-7.5" y="-3.2" width="15" height="6.4" rx="2.8" fill="#e87524"/>
      <rect x="-3.2" y="-7.5" width="6.4" height="15" rx="2.8" fill="#3f9c37"/>
      <circle cx="6" cy="-4" r="2.6" fill="#d33420"/>
      <circle cx="-5" cy="5" r="2.2" fill="#7c5230"/>
      <circle r="20" fill="none" stroke="#c9b078" stroke-width="1.1" opacity=".5"/>
      <circle cx="-9" cy="-11" r="2.6" fill="#fff" opacity=".28"/>
    </g>
    <!-- slice 5 (front-right) -->
    <g transform="translate(196 133)">
      <circle r="23" fill="url(#kbnori)"/>
      <circle r="23" fill="none" stroke="#0a120d" stroke-width="1.5" opacity=".75"/>
      <circle r="18" fill="url(#kbrice)"/>
      <circle r="8" fill="#efc93e"/>
      <rect x="-6.5" y="-3" width="13" height="6" rx="2.6" fill="#e2701f"/>
      <rect x="-3" y="-6.5" width="6" height="13" rx="2.6" fill="#4a9c38"/>
      <circle cx="-5" cy="-3" r="2.2" fill="#d33420"/>
      <circle cx="5" cy="4" r="2" fill="#7c5230"/>
      <circle r="18" fill="none" stroke="#c9b078" stroke-width="1.1" opacity=".5"/>
      <circle cx="-7" cy="-9" r="2.2" fill="#fff" opacity=".25"/>
    </g>
  </g>
  <!-- sesame + scallion garnish scattered on the board -->
  <g fill="#f8eed6">
    <ellipse cx="112" cy="150" rx="2" ry="1.2" transform="rotate(20 112 150)"/>
    <ellipse cx="176" cy="156" rx="2" ry="1.2" transform="rotate(-16 176 156)"/>
    <ellipse cx="214" cy="150" rx="2" ry="1.2" transform="rotate(12 214 150)"/>
  </g>
  <rect x="144" y="152" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 147 153)"/>
  <rect x="184" y="150" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(22 187 151)"/>
  <!-- condensation sparkle (cold dish) -->
  <g fill="#cdeef2" opacity=".8">
    <path d="M78 62 l1.6 4 l4 1.6 l-4 1.6 l-1.6 4 l-1.6 -4 l-4 -1.6 l4 -1.6 Z"/>
    <path d="M244 70 l1.2 3 l3 1.2 l-3 1.2 l-1.2 3 l-1.2 -3 l-3 -1.2 l3 -1.2 Z"/>
  </g>
  <circle cx="150" cy="128" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="200" cy="126" r="1.2" fill="#fff" opacity=".45"/>
</svg>
