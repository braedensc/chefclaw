<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ukBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ukbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b0a0b"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="ukdome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3c46"/><stop offset="42%" stop-color="#25262e"/><stop offset="100%" stop-color="#14141a"/>
    </linearGradient>
    <linearGradient id="ukplate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2b33"/><stop offset="100%" stop-color="#16161c"/>
    </linearGradient>
    <radialGradient id="ukknob" cx="40%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#5a5c68"/><stop offset="100%" stop-color="#2a2b33"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ukbg)"/>
  <!-- rising steam wisps -->
  <path d="M128 44 C120 28 136 22 128 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ukBlur3)"/>
  <path d="M196 46 C188 30 204 24 196 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ukBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="21" fill="#000" opacity=".5"/>
  <!-- neon steam arc (cyan neutral) -->
  <path d="M58 108 Q106 80 168 78" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- plate (dark ring) -->
  <ellipse cx="160" cy="150" rx="132" ry="34" fill="url(#ukplate)"/>
  <ellipse cx="160" cy="150" rx="132" ry="34" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="148" rx="112" ry="26" fill="#101016"/>
  <!-- domed cloche cover -->
  <path d="M64 148 C64 100 104 72 160 72 C216 72 256 100 256 148 Z" fill="url(#ukdome)"/>
  <!-- dome base rim -->
  <ellipse cx="160" cy="148" rx="96" ry="18" fill="#1c1d24"/>
  <ellipse cx="160" cy="148" rx="96" ry="18" fill="none" stroke="#3a3c46" stroke-width="1.6" opacity=".7"/>
  <!-- dome outline + top sheen -->
  <path d="M64 148 C64 100 104 72 160 72 C216 72 256 100 256 148" fill="none" stroke="#454752" stroke-width="1.6" opacity=".6"/>
  <path d="M96 132 C100 104 128 86 160 86" stroke="#7d808c" stroke-width="4" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- cyan neon reflection sweep on the dome -->
  <path d="M110 128 C116 100 140 84 168 84" stroke="#8fe6ff" stroke-width="3" fill="none" opacity=".22" stroke-linecap="round"/>
  <!-- specular highlight blob -->
  <ellipse cx="132" cy="104" rx="16" ry="9" fill="#a7aab6" opacity=".22" transform="rotate(-30 132 104)"/>
  <!-- top knob handle -->
  <ellipse cx="160" cy="72" rx="4" ry="6" fill="#2a2b33"/>
  <circle cx="160" cy="66" r="8" fill="url(#ukknob)"/>
  <circle cx="160" cy="66" r="8" fill="none" stroke="#4a4c56" stroke-width="1.2" opacity=".7"/>
  <ellipse cx="157" cy="63" rx="2.6" ry="1.6" fill="#8a8d99" opacity=".7"/>
  <!-- subtle engraved "?" on the dome face -->
  <g opacity=".5">
    <path d="M150 114 C150 104 172 104 172 116 C172 124 161 124 161 132" fill="none" stroke="#6f727e" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="161" cy="142" r="3" fill="#6f727e"/>
  </g>
  <g opacity=".2">
    <path d="M151 113 C151 103 173 103 173 115 C173 123 162 123 162 131" fill="none" stroke="#aeb1bd" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <!-- plate rim gloss dots -->
  <circle cx="96" cy="150" r="1.4" fill="#fff" opacity=".4"/>
  <circle cx="224" cy="150" r="1.3" fill="#fff" opacity=".35"/>
  <circle cx="160" cy="160" r="1.2" fill="#fff" opacity=".4"/>
</svg>
