    <rect x="106" y="118" width="6.5" height="5" rx="1.6" fill="#ff7a4a" transform="rotate(-16 109 120)"/>
    <rect x="130" y="122" width="6" height="5" rx="1.6" fill="#d92c12" transform="rotate(26 133 124)"/>
    <rect x="154" y="118" width="6.5" height="5" rx="1.6" fill="#ff6a3a" transform="rotate(-30 157 120)"/>
    <rect x="178" y="122" width="6" height="5" rx="1.6" fill="#e83b18" transform="rotate(14 181 124)"/>
    <rect x="202" y="120" width="6.5" height="5" rx="1.6" fill="#ff7a4a" transform="rotate(-20 205 122)"/>
    <rect x="120" y="134" width="6" height="5" rx="1.6" fill="#d92c12" transform="rotate(22 123 136)"/>
    <rect x="150" y="136" width="6.5" height="5" rx="1.6" fill="#ff6a3a" transform="rotate(-18 153 138)"/>
    <rect x="184" y="134" width="6" height="5" rx="1.6" fill="#ff7a4a" transform="rotate(28 187 136)"/>
    <rect x="212" y="130" width="6" height="5" rx="1.6" fill="#e83b18" transform="rotate(-24 215 132)"/>
