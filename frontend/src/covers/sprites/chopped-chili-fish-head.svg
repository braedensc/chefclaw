  <path d="M158 96 C120 88 78 96 62 116 C74 138 118 150 158 146 C160 130 160 112 158 96 Z" fill="url(#fh1flesh)" stroke="#8a7048" stroke-width="1.3"/>
  <!-- right half -->
  <path d="M162 96 C200 88 242 96 258 116 C246 138 202 150 162 146 C160 130 160 112 162 96 Z" fill="url(#fh1flesh)" stroke="#8a7048" stroke-width="1.3"/>
