  <circle cx="90" cy="112" r="3" fill="#2a1608"/>
  <circle cx="88.5" cy="110.5" r="1.1" fill="#fff" opacity=".8"/>
  <circle cx="230" cy="112" r="6.5" fill="#f3ead6" stroke="#8a7048" stroke-width="1"/>
  <circle cx="230" cy="112" r="3" fill="#2a1608"/>
  <circle cx="228.5" cy="110.5" r="1.1" fill="#fff" opacity=".8"/>
