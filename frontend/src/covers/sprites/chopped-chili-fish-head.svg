<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="fh1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="fh1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="fh1flesh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9dcc6"/><stop offset="55%" stop-color="#d3bf9c"/><stop offset="100%" stop-color="#b39a70"/>
    </linearGradient>
    <radialGradient id="fh1chili" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#ff5a2d"/><stop offset="55%" stop-color="#d92c12"/><stop offset="100%" stop-color="#9c1c07"/>
    </radialGradient>
    <radialGradient id="fh1plate" cx="50%" cy="34%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#fh1bg)"/>
  <!-- steam -->
  <path d="M118 50 C108 32 128 24 118 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#fh1Blur3)"/>
  <path d="M200 50 C192 34 210 26 202 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#fh1Blur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
