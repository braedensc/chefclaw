    <circle cx="112" cy="112" r="2.2" fill="#f2ddb0"/>
    <circle cx="172" cy="110" r="2.2" fill="#f2ddb0"/>
    <circle cx="196" cy="132" r="2.2" fill="#f2ddb0"/>
