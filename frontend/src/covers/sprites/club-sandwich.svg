<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="csbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="csbread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d79a"/><stop offset="55%" stop-color="#e6b76a"/><stop offset="100%" stop-color="#c98f3e"/>
    </linearGradient>
    <linearGradient id="cscrumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbeecb"/><stop offset="100%" stop-color="#f0dca6"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#csbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 26 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".09" filter="url(#nnBlur3)"/>
  <path d="M204 50 C196 34 214 26 206 8" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="186" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="150" rx="140" ry="34" fill="#141018"/>
  <ellipse cx="160" cy="150" rx="140" ry="34" fill="none" stroke="#271b22" stroke-width="3"/>
  <ellipse cx="160" cy="150" rx="122" ry="27" fill="#0f0d13"/>
  <!-- neon steam arc (warm/local white for deli) -->
  <path d="M52 130 Q106 96 168 92" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>

  <!-- ===== LEFT triangle half (back, slightly smaller) ===== -->
  <g transform="translate(96 118) scale(.9)">
    <!-- toothpick with olive -->
    <path d="M4 -78 L10 12" stroke="#c9a25a" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="4" cy="-80" rx="7" ry="7" fill="#3d5a2a"/>
    <ellipse cx="4" cy="-80" rx="3" ry="3" fill="#b02408"/>
    <!-- stack: cut-face triangle pointing right -->
    <!-- top bread -->
    <path d="M-58 -46 L34 -46 L-58 -20 Z" fill="url(#csbread)" stroke="#9c6a2c" stroke-width="1.4"/>
    <path d="M-58 -46 L34 -46" stroke="#fbeecb" stroke-width="2" opacity=".5"/>
    <!-- lettuce ruffle -->
    <path d="M-58 -20 C-44 -28 -30 -14 -14 -22 C0 -14 14 -26 30 -18 L34 -20 L-58 -6 Z" fill="#6abf5a"/>
    <path d="M-52 -18 C-40 -24 -28 -12 -14 -19 C-2 -12 12 -22 26 -16" stroke="#3f9c37" stroke-width="1.4" fill="none" opacity=".7"/>
    <!-- tomato slice -->
    <path d="M-56 -6 L24 -6 L-56 8 Z" fill="#e0492c"/>
    <path d="M-56 -6 L24 -6" stroke="#ff8a5a" stroke-width="1.4" opacity=".6"/>
    <!-- cheese slice (drapey) -->
    <path d="M-54 4 L18 4 L-54 14 Z" fill="#f6ac25"/>
    <path d="M-40 4 L-38 12 M-22 4 L-20 11" stroke="#c9821a" stroke-width="1.2" opacity=".5"/>
    <!-- middle bread -->
    <path d="M-52 12 L14 12 L-52 26 Z" fill="url(#csbread)" stroke="#9c6a2c" stroke-width="1.2"/>
    <!-- turkey/ham layer -->
    <path d="M-50 24 C-38 20 -24 28 -10 22 C2 28 8 22 8 22 L-50 34 Z" fill="#e79a86"/>
    <path d="M-48 26 C-36 22 -24 30 -10 24" stroke="#c96a55" stroke-width="1.2" fill="none" opacity=".6"/>
    <!-- bottom bread -->
    <path d="M-48 30 L2 30 L-48 42 Z" fill="url(#csbread)" stroke="#9c6a2c" stroke-width="1.4"/>
  </g>

  <!-- ===== RIGHT triangle half (front, larger, cut-face left) ===== -->
  <g transform="translate(186 108)">
    <!-- toothpick with olive -->
    <path d="M-2 -84 L-8 8" stroke="#c9a25a" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-2" cy="-86" rx="8" ry="8" fill="#43632f"/>
    <ellipse cx="-2" cy="-86" rx="3.4" ry="3.4" fill="#b02408"/>
    <!-- top bread (cut face pointing left, crust on right) -->
    <path d="M-38 -52 L58 -52 L58 -26 Z" fill="url(#csbread)" stroke="#9c6a2c" stroke-width="1.5"/>
    <path d="M-38 -52 L58 -52" stroke="#fbeecb" stroke-width="2.2" opacity=".55"/>
    <ellipse cx="20" cy="-49" rx="30" ry="3" fill="#fff" opacity=".18"/>
    <!-- lettuce ruffle -->
    <path d="M-36 -26 C-20 -34 -4 -20 12 -28 C28 -20 44 -30 58 -24 L58 -26 L-36 -10 Z" fill="#6abf5a"/>
    <path d="M-30 -24 C-16 -30 0 -18 16 -25 C30 -18 46 -26 56 -22" stroke="#3f9c37" stroke-width="1.5" fill="none" opacity=".7"/>
    <!-- tomato slice -->
    <path d="M-36 -10 L58 -10 L58 6 Z" fill="#e0492c"/>
    <path d="M-36 -10 L58 -10" stroke="#ff8a5a" stroke-width="1.5" opacity=".6"/>
    <circle cx="6" cy="-3" r="1.6" fill="#ffd9a2" opacity=".7"/>
    <!-- cheese slice draped -->
    <path d="M-34 4 L58 4 L58 16 L52 22 Z" fill="#f6ac25"/>
    <path d="M-16 4 L-14 14 M8 4 L10 15 M32 4 L34 13" stroke="#c9821a" stroke-width="1.3" opacity=".5"/>
    <!-- middle bread -->
    <path d="M-32 14 L58 14 L58 30 Z" fill="url(#csbread)" stroke="#9c6a2c" stroke-width="1.3"/>
    <!-- turkey/deli meat ruffle -->
    <path d="M-32 28 C-16 22 2 32 20 26 C36 32 50 26 58 28 L58 40 L-32 40 Z" fill="#e79a86"/>
    <path d="M-30 30 C-14 24 4 34 22 28 C38 34 50 28 56 30" stroke="#c96a55" stroke-width="1.3" fill="none" opacity=".6"/>
    <!-- bacon strip -->
    <path d="M-30 38 C-12 34 8 42 28 36 C42 40 52 36 58 38" stroke="#a83218" stroke-width="4" fill="none" stroke-linecap="round" opacity=".9"/>
    <path d="M-24 38 C-6 35 12 41 30 37" stroke="#e6c1a0" stroke-width="1.6" fill="none" opacity=".7"/>
    <!-- bottom bread -->
    <path d="M-28 40 L58 40 L58 56 Z" fill="url(#csbread)" stroke="#9c6a2c" stroke-width="1.5"/>
  </g>

  <!-- side garnish: a few chips fan on the plate -->
  <g transform="translate(70 156)" opacity=".95">
    <path d="M0 0 C8 -6 18 -6 24 0 C18 6 8 6 0 0 Z" fill="#e0b45a" stroke="#a87d2e" stroke-width="1"/>
    <path d="M14 4 C22 -2 32 -2 38 4 C32 10 22 10 14 4 Z" fill="#d8a94f" stroke="#a87d2e" stroke-width="1"/>
  </g>
  <!-- gloss dots -->
  <circle cx="150" cy="88" r="1.6" fill="#fff" opacity=".6"/>
  <circle cx="200" cy="100" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="132" cy="150" r="1.3" fill="#fff" opacity=".45"/>
</svg>
