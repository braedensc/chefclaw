    <path d="M-20 -3 l4 -7 M-10 -6 l3 -8 M0 -7 l0 -9 M10 -6 l-3 -8 M20 -3 l-4 -7" stroke="#c9ad74" stroke-width="2" opacity=".8" stroke-linecap="round"/>
