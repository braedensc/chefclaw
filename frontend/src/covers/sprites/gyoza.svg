<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="gzBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="gzbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="gzpan" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#20202a"/><stop offset="60%" stop-color="#131318"/><stop offset="100%" stop-color="#08080a"/>
    </radialGradient>
    <linearGradient id="gzwrap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ead0"/><stop offset="55%" stop-color="#e7d3a6"/><stop offset="100%" stop-color="#cbb079"/>
    </linearGradient>
    <linearGradient id="gzbase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d68a3a"/><stop offset="100%" stop-color="#8a4712"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gzbg)"/>
  <!-- steam -->
  <path d="M118 56 C108 38 128 30 118 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#gzBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#gzBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
