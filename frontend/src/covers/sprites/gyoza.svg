  <circle cx="118" cy="118" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="122" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="158" cy="94" r="1.2" fill="#fff" opacity=".5"/>
