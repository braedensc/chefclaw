<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="rtBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="rtbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="rtdish" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="rtsauce" cx="50%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#c8331a"/><stop offset="60%" stop-color="#9c2510"/><stop offset="100%" stop-color="#6a1608"/>
    </radialGradient>
    <linearGradient id="rttom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7350"/><stop offset="60%" stop-color="#e23a22"/><stop offset="100%" stop-color="#c31f12"/>
    </linearGradient>
    <linearGradient id="rtaub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3a4e"/><stop offset="60%" stop-color="#5c2c52"/><stop offset="100%" stop-color="#3f1f3a"/>
    </linearGradient>
    <linearGradient id="rtzuc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fc45a"/><stop offset="55%" stop-color="#5ea23a"/><stop offset="100%" stop-color="#3c6f24"/>
    </linearGradient>
    <linearGradient id="rtyel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd45a"/><stop offset="100%" stop-color="#e0a028"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#rtbg)"/>
  <!-- steam -->
  <path d="M118 52 C110 36 126 28 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#rtBlur3)"/>
  <path d="M198 50 C192 34 206 26 198 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#rtBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- shallow round baking dish -->
  <ellipse cx="160" cy="130" rx="140" ry="52" fill="url(#rtdish)"/>
  <ellipse cx="160" cy="130" rx="140" ry="52" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="124" ry="43" fill="#0f0d13"/>
  <!-- neon steam arc (rose family) -->
  <path d="M50 116 Q104 84 168 82" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- tomato sauce pooled in the dish -->
  <ellipse cx="160" cy="130" rx="116" ry="38" fill="url(#rtsauce)"/>
  <ellipse cx="160" cy="122" rx="100" ry="26" fill="#b52c12" opacity=".5"/>
  <!-- fanned overlapping vegetable coins (concentric ratatouille spiral) -->
  <g stroke="#240a03" stroke-width="1.2" stroke-opacity=".5">
    <!-- back arc -->
    <g transform="translate(78 108) rotate(-16)"><ellipse cx="0" cy="0" rx="12" ry="15" fill="url(#rttom)"/><ellipse cx="-3" cy="-4" rx="4" ry="5" fill="#ff9d7d" opacity=".6"/></g>
    <g transform="translate(102 100) rotate(-10)"><ellipse cx="0" cy="0" rx="12" ry="15" fill="url(#rtaub)"/><ellipse cx="-3" cy="-4" rx="4" ry="5" fill="#96502a" opacity=".5"/></g>
    <g transform="translate(126 96) rotate(-6)"><ellipse cx="0" cy="0" rx="12" ry="15" fill="url(#rtzuc)"/><ellipse cx="0" cy="0" rx="5" ry="6" fill="#c8e39a" opacity=".55"/></g>
    <g transform="translate(150 94) rotate(0)"><ellipse cx="0" cy="0" rx="12" ry="15" fill="url(#rtyel)"/><ellipse cx="0" cy="0" rx="5" ry="6" fill="#fff0b8" opacity=".6"/></g>
    <g transform="translate(174 94) rotate(4)"><ellipse cx="0" cy="0" rx="12" ry="15" fill="url(#rttom)"/><ellipse cx="-3" cy="-4" rx="4" ry="5" fill="#ff9d7d" opacity=".6"/></g>
    <g transform="translate(198 98) rotate(8)"><ellipse cx="0" cy="0" rx="12" ry="15" fill="url(#rtaub)"/><ellipse cx="-3" cy="-4" rx="4" ry="5" fill="#96502a" opacity=".5"/></g>
    <g transform="translate(222 104) rotate(14)"><ellipse cx="0" cy="0" rx="12" ry="15" fill="url(#rtzuc)"/><ellipse cx="0" cy="0" rx="5" ry="6" fill="#c8e39a" opacity=".55"/></g>
    <!-- front arc (larger, brighter) -->
    <g transform="translate(96 128) rotate(-14)"><ellipse cx="0" cy="0" rx="13" ry="16" fill="url(#rtzuc)"/><ellipse cx="0" cy="0" rx="6" ry="7" fill="#c8e39a" opacity=".6"/></g>
    <g transform="translate(124 130) rotate(-6)"><ellipse cx="0" cy="0" rx="13" ry="16" fill="url(#rtyel)"/><ellipse cx="0" cy="0" rx="6" ry="7" fill="#fff0b8" opacity=".6"/></g>
    <g transform="translate(152 131) rotate(0)"><ellipse cx="0" cy="0" rx="13" ry="16" fill="url(#rttom)"/><ellipse cx="-4" cy="-5" rx="5" ry="6" fill="#ff9d7d" opacity=".65"/></g>
    <g transform="translate(180 130) rotate(6)"><ellipse cx="0" cy="0" rx="13" ry="16" fill="url(#rtaub)"/><ellipse cx="-4" cy="-5" rx="5" ry="6" fill="#96502a" opacity=".55"/></g>
    <g transform="translate(208 126) rotate(14)"><ellipse cx="0" cy="0" rx="13" ry="16" fill="url(#rtzuc)"/><ellipse cx="0" cy="0" rx="6" ry="7" fill="#c8e39a" opacity=".6"/></g>
  </g>
  <!-- herb sprig + garnish -->
  <path d="M150 118 l3 -8 M154 120 l5 -6 M148 122 l-4 -7" stroke="#3f9c37" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="152" cy="112" r="2.4" fill="#5ecb4e"/>
  <rect x="122" y="118" width="6" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-18 125 119)"/>
  <rect x="186" y="116" width="6" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(16 189 117)"/>
  <!-- oil gloss dots -->
  <circle cx="112" cy="118" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="168" cy="122" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="204" cy="118" r="1.2" fill="#fff" opacity=".5"/>
</svg>
