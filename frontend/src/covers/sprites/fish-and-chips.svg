<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="fcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="fcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="fcbatter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2c964"/><stop offset="50%" stop-color="#d99a34"/><stop offset="100%" stop-color="#a5661a"/>
    </linearGradient>
    <linearGradient id="fcfry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6cf6a"/><stop offset="55%" stop-color="#e2a838"/><stop offset="100%" stop-color="#b4761d"/>
    </linearGradient>
    <linearGradient id="fcboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3320"/><stop offset="100%" stop-color="#2e1f12"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#fcbg)"/>
  <!-- steam -->
  <path d="M110 54 C100 36 120 28 110 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#fcBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#fcBlur3)"/>
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- wooden serving board -->
  <ellipse cx="160" cy="134" rx="146" ry="46" fill="url(#fcboard)"/>
  <ellipse cx="160" cy="134" rx="146" ry="46" fill="none" stroke="#5a3d24" stroke-width="3"/>
  <!-- board wood-grain lines -->
  <path d="M40 128 Q160 118 280 128 M46 144 Q160 136 274 144" stroke="#2e1f12" stroke-width="1.6" fill="none" opacity=".6"/>
  <!-- neon steam arc (warm) -->
  <path d="M48 114 Q102 82 166 80" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- CHIPS: a pile of thick-cut fries on the right half -->
  <g stroke-linejoin="round">
    <g transform="translate(196 100) rotate(-28)"><rect width="16" height="56" rx="3" fill="url(#fcfry)" stroke="#9a5f16" stroke-width="1"/><rect x="2.4" width="3" height="56" rx="1.5" fill="#ffe6a0" opacity=".6"/></g>
    <g transform="translate(210 108) rotate(-8)"><rect width="16" height="58" rx="3" fill="url(#fcfry)" stroke="#9a5f16" stroke-width="1"/><rect x="2.4" width="3" height="58" rx="1.5" fill="#ffe6a0" opacity=".55"/></g>
    <g transform="translate(206 118) rotate(12)"><rect width="16" height="52" rx="3" fill="url(#fcfry)" stroke="#9a5f16" stroke-width="1"/><rect x="2.4" width="3" height="52" rx="1.5" fill="#ffe6a0" opacity=".6"/></g>
    <g transform="translate(226 116) rotate(30)"><rect width="15" height="48" rx="3" fill="url(#fcfry)" stroke="#9a5f16" stroke-width="1"/><rect x="2.4" width="3" height="48" rx="1.5" fill="#ffe6a0" opacity=".55"/></g>
    <g transform="translate(184 116) rotate(-46)"><rect width="15" height="46" rx="3" fill="url(#fcfry)" stroke="#9a5f16" stroke-width="1"/><rect x="2.4" width="3" height="46" rx="1.5" fill="#ffe6a0" opacity=".55"/></g>
  </g>
  <!-- FRIED FISH FILLET: big craggy golden battered plank on the left, angled -->
  <g transform="translate(0 4)">
    <!-- fillet body: long tapered battered fish, knobbly crust edge -->
    <path d="M40 118
             C46 100 62 90 82 92
             C96 88 112 92 126 100
             C142 106 156 112 168 116
             C162 126 150 134 134 136
             C118 142 96 144 78 142
             C58 142 42 134 40 118 Z" fill="url(#fcbatter)"/>
    <!-- craggy crust bumps along the top edge -->
    <path d="M46 112 q6 -8 14 -4 q8 -8 16 -2 q8 -8 18 -2 q10 -6 20 0 q10 -4 20 2"
          fill="none" stroke="#c9861f" stroke-width="2.2" opacity=".55" stroke-linecap="round"/>
    <!-- crispy-bubble crust speckle -->
    <g fill="#a5661a" opacity=".6"><circle cx="66" cy="112" r="2.2"/><circle cx="92" cy="108" r="2.2"/><circle cx="118" cy="112" r="2"/><circle cx="80" cy="124" r="2"/><circle cx="108" cy="126" r="2"/><circle cx="134" cy="120" r="1.8"/><circle cx="56" cy="126" r="1.8"/></g>
    <g fill="#ffe9a8" opacity=".7"><circle cx="74" cy="106" r="1.6"/><circle cx="100" cy="104" r="1.6"/><circle cx="126" cy="108" r="1.4"/><circle cx="90" cy="120" r="1.4"/></g>
    <!-- fillet outline -->
    <path d="M40 118 C46 100 62 90 82 92 C96 88 112 92 126 100 C142 106 156 112 168 116 C162 126 150 134 134 136 C118 142 96 144 78 142 C58 142 42 134 40 118 Z" fill="none" stroke="#7a4712" stroke-width="1.5" opacity=".55"/>
    <!-- broken end showing flaky white fish -->
    <path d="M156 114 C164 114 172 120 172 126 C166 132 156 132 150 128 C152 122 152 118 156 114 Z" fill="#f4ece0"/>
    <path d="M156 118 l10 3 M154 124 l12 2" stroke="#d8ccbc" stroke-width="1.3" opacity=".7"/>
    <!-- batter gloss -->
    <ellipse cx="86" cy="106" rx="22" ry="6" fill="#ffe08a" opacity=".38"/>
  </g>
  <!-- lemon wedge + peas -->
  <path d="M148 148 C152 142 162 142 166 148 C162 152 152 152 148 148 Z" fill="#f4d24a"/>
  <path d="M148 148 C152 142 162 142 166 148" fill="none" stroke="#c9a423" stroke-width="1.2" opacity=".7"/>
  <path d="M157 143 L157 148" stroke="#fff4b0" stroke-width="1.2" opacity=".7"/>
  <circle cx="180" cy="150" r="3" fill="#5ecb4e"/>
  <circle cx="188" cy="152" r="2.6" fill="#3f9c37"/>
  <circle cx="172" cy="152" r="2.4" fill="#58c14a"/>
  <!-- gloss dots -->
  <circle cx="76" cy="104" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="214" cy="110" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="120" cy="130" r="1.2" fill="#fff" opacity=".5"/>
</svg>
