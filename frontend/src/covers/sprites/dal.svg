<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="dlBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="dlbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="dlbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="dldal" cx="45%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#f6cf5a"/><stop offset="52%" stop-color="#e2a82e"/><stop offset="100%" stop-color="#bd7f18"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dlbg)"/>
  <!-- rising steam wisps (hot lentil stew) -->
  <path d="M124 50 C114 32 134 24 124 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#dlBlur3)"/>
  <path d="M196 48 C188 32 206 24 198 4" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#dlBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="130" ry="22" fill="#000" opacity=".5"/>
  <!-- deep bowl silhouette (tall rounded belly) -->
  <path d="M64 108 C64 98 100 92 160 92 C220 92 256 98 256 108 C256 152 216 178 160 178 C104 178 64 152 64 108 Z" fill="url(#dlbowl)"/>
  <path d="M64 108 C64 98 100 92 160 92 C220 92 256 98 256 108 C256 152 216 178 160 178 C104 178 64 152 64 108 Z" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- bowl rim -->
  <ellipse cx="160" cy="106" rx="96" ry="20" fill="none" stroke="#3a2c46" stroke-width="2" opacity=".7"/>
  <!-- warm-white steam arc -->
  <path d="M62 98 Q110 70 172 72" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- golden dal surface (thick lentil puree) -->
  <ellipse cx="160" cy="108" rx="90" ry="20" fill="url(#dldal)"/>
  <ellipse cx="160" cy="108" rx="90" ry="20" fill="none" stroke="#ffe08a" stroke-width="1.4" opacity=".4"/>
  <!-- mashed lentil texture: soft mound lumps -->
  <g opacity=".55">
    <ellipse cx="128" cy="104" rx="12" ry="5" fill="#f2c34a"/>
    <ellipse cx="176" cy="106" rx="14" ry="5.5" fill="#efbc40"/>
    <ellipse cx="150" cy="114" rx="11" ry="4.5" fill="#e8b038"/>
    <ellipse cx="196" cy="112" rx="10" ry="4" fill="#f2c34a"/>
    <ellipse cx="116" cy="112" rx="9" ry="4" fill="#e8b038"/>
  </g>
  <!-- ghee / tadka swirl of aromatic oil pooling on surface -->
  <path d="M108 106 C132 98 176 102 200 96" stroke="#ff9a2e" stroke-width="4" fill="none" opacity=".5" stroke-linecap="round"/>
  <path d="M122 116 C146 110 180 114 206 108" stroke="#ffb84a" stroke-width="2.6" fill="none" opacity=".45" stroke-linecap="round"/>
  <ellipse cx="146" cy="102" rx="9" ry="3.4" fill="#ffd873" opacity=".55"/>
  <ellipse cx="188" cy="108" rx="7" ry="2.8" fill="#ffd873" opacity=".5"/>
  <!-- tempering (tadka): whole cumin, dried red chilies, fried garlic on top -->
  <g>
    <!-- dried red chili pods -->
    <path d="M118 100 C126 98 134 102 138 108 C132 110 124 108 118 104 Z" fill="#c22a10"/>
    <path d="M178 98 C186 96 194 100 198 106 C192 108 184 106 178 102 Z" fill="#d1341a"/>
    <path d="M150 118 C158 116 166 120 170 126 C164 128 156 126 150 122 Z" fill="#c22a10"/>
    <!-- cumin seeds (tiny dark ovals) -->
    <ellipse cx="134" cy="110" rx="2.4" ry="1" fill="#4a2a10" transform="rotate(20 134 110)"/>
    <ellipse cx="162" cy="104" rx="2.4" ry="1" fill="#4a2a10" transform="rotate(-16 162 104)"/>
    <ellipse cx="188" cy="114" rx="2.4" ry="1" fill="#4a2a10" transform="rotate(30 188 114)"/>
    <ellipse cx="146" cy="108" rx="2.2" ry="1" fill="#5a3414" transform="rotate(-8 146 108)"/>
    <ellipse cx="172" cy="116" rx="2.2" ry="1" fill="#4a2a10" transform="rotate(12 172 116)"/>
    <!-- fried garlic bits (golden flecks) -->
    <circle cx="140" cy="98" r="2" fill="#e8c168"/>
    <circle cx="170" cy="112" r="1.8" fill="#d9b256"/>
    <circle cx="200" cy="104" r="1.8" fill="#e8c168"/>
  </g>
  <!-- cilantro garnish + ghee gloss -->
  <rect x="130" y="102" width="7" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-20 133 103)"/>
  <rect x="176" y="100" width="7" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(16 179 101)"/>
  <rect x="156" y="116" width="6" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(26 159 117)"/>
  <!-- oil gloss dots -->
  <circle cx="132" cy="100" r="1.5" fill="#fff" opacity=".65"/>
  <circle cx="184" cy="104" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="158" cy="110" r="1.2" fill="#fff" opacity=".5"/>
</svg>
