<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="lksBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="lksbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1a10"/><stop offset="45%" stop-color="#0b0908"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="lksbroth" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ff8a3a"/><stop offset="50%" stop-color="#ef5f18"/><stop offset="100%" stop-color="#b83a08"/>
    </radialGradient>
    <radialGradient id="lksbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1e1622"/><stop offset="100%" stop-color="#0c0b0f"/>
    </radialGradient>
    <linearGradient id="lksshrimp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9a6a"/><stop offset="100%" stop-color="#e2532a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#lksbg)"/>
  <!-- rising steam wisps (hot soup) -->
  <path d="M124 50 C114 32 134 24 124 6" stroke="#fff" stroke-width="7" fill="none" opacity=".11" filter="url(#lksBlur3)"/>
  <path d="M168 48 C160 30 178 22 170 4" stroke="#fff" stroke-width="6" fill="none" opacity=".09" filter="url(#lksBlur3)"/>
  <path d="M204 52 C196 36 212 28 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#lksBlur3)"/>
  <ellipse cx="160" cy="188" rx="132" ry="20" fill="#000" opacity=".5"/>
  <!-- neon steam arc (rose family) -->
  <path d="M60 96 Q108 66 172 66" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- deep noodle-soup bowl -->
  <path d="M60 108 C60 96 96 88 160 88 C224 88 260 96 260 108 C258 150 216 178 160 178 C104 178 62 150 60 108 Z" fill="url(#lksbowl)"/>
  <path d="M60 108 C60 96 96 88 160 88 C224 88 260 96 260 108 C258 150 216 178 160 178 C104 178 62 150 60 108 Z" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- coconut-curry broth surface -->
  <ellipse cx="160" cy="108" rx="98" ry="20" fill="url(#lksbroth)"/>
  <ellipse cx="160" cy="106" rx="98" ry="19" fill="url(#lksbroth)"/>
  <!-- chili-oil sheen ripples on broth -->
  <path d="M96 106 C120 100 200 100 224 106" stroke="#ffb27a" stroke-width="2" fill="none" opacity=".45" stroke-linecap="round"/>
  <circle cx="112" cy="112" r="2.4" fill="#ff7a3a" opacity=".7"/>
  <circle cx="210" cy="110" r="2" fill="#ff7a3a" opacity=".6"/>
  <circle cx="176" cy="116" r="1.6" fill="#ffb27a" opacity=".7"/>
  <!-- pale rice-noodle nest peeking through broth -->
  <g stroke-linecap="round" fill="none">
    <path d="M100 104 C120 96 150 98 168 104" stroke="#f4e6c4" stroke-width="6" opacity=".85"/>
    <path d="M108 110 C130 104 160 106 182 110" stroke="#e6d3a4" stroke-width="6" opacity=".8"/>
    <path d="M96 112 C116 108 140 110 158 114" stroke="#f4e6c4" stroke-width="5.5" opacity=".8"/>
    <path d="M104 100 C124 94 152 96 172 100" stroke="#fff1cf" stroke-width="2" opacity=".7"/>
    <path d="M112 108 C132 102 158 104 176 108" stroke="#8a5a1e" stroke-width="2" opacity=".5"/>
  </g>
  <!-- prawn curled on top -->
  <g transform="translate(118 96) rotate(-10)">
    <path d="M0 0 C18 -10 40 -6 46 10 C48 22 38 30 26 28 C34 22 34 12 26 8 C16 3 6 6 0 0 Z" fill="url(#lksshrimp)" stroke="#c23a18" stroke-width="1.2"/>
    <path d="M8 4 C20 -2 34 0 40 10" stroke="#ffd0b0" stroke-width="1.6" fill="none" opacity=".7"/>
    <path d="M12 10 l-4 -6 M20 8 l-3 -6 M28 8 l-2 -6" stroke="#c23a18" stroke-width="1.4" opacity=".6"/>
    <circle cx="6" cy="2" r="1.4" fill="#3a120a"/>
  </g>
  <!-- fried tofu puffs -->
  <g>
    <rect x="176" y="92" width="20" height="16" rx="4" fill="#e6b866" stroke="#a9701e" stroke-width="1.2" transform="rotate(-8 186 100)"/>
    <rect x="180" y="95" width="9" height="4" rx="2" fill="#f6de9e" opacity=".6" transform="rotate(-8 184 97)"/>
    <rect x="200" y="102" width="18" height="14" rx="4" fill="#e0b160" stroke="#a9701e" stroke-width="1.2" transform="rotate(6 209 109)"/>
    <rect x="203" y="105" width="8" height="3.6" rx="1.8" fill="#f6de9e" opacity=".6" transform="rotate(6 207 107)"/>
  </g>
  <!-- half boiled egg -->
  <g transform="translate(206 96)">
    <ellipse cx="0" cy="0" rx="13" ry="10" fill="#fbf3e0" stroke="#e0cfa8" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="6.5" ry="5.5" fill="#ffcf4a"/>
    <ellipse cx="-2" cy="-2" rx="2.4" ry="1.8" fill="#ffe79a" opacity=".8"/>
  </g>
  <!-- laksa leaf / cilantro + fried shallots garnish -->
  <rect x="132" y="94" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-20 136 95)"/>
  <rect x="150" y="90" width="8" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(12 154 91)"/>
  <rect x="160" y="98" width="7" height="2.6" rx="1.3" fill="#6abf5a" transform="rotate(-8 163 99)"/>
  <circle cx="140" cy="108" r="1.6" fill="#6b5420"/>
  <circle cx="168" cy="104" r="1.4" fill="#8a6a2c"/>
  <circle cx="126" cy="114" r="1.4" fill="#6b5420"/>
  <!-- diced red chili floating -->
  <rect x="188" y="118" width="6" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(18 191 119)"/>
  <rect x="120" y="120" width="6" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(-14 123 121)"/>
  <!-- oil gloss dots -->
  <circle cx="132" cy="102" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="196" cy="110" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="118" r="1.2" fill="#fff" opacity=".5"/>
</svg>
