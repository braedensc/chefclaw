<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="wcc-bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="wcc-plate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="wcc-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf2d8"/><stop offset="52%" stop-color="#f6e6b6"/><stop offset="100%" stop-color="#e6c98a"/>
    </linearGradient>
    <linearGradient id="wcc-flesh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf8ec"/><stop offset="100%" stop-color="#f0e6d0"/>
    </linearGradient>
    <radialGradient id="wcc-dip" cx="40%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#8fd06a"/><stop offset="60%" stop-color="#5aab3c"/><stop offset="100%" stop-color="#357d22"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#wcc-bg)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="130" rx="146" ry="48" fill="url(#wcc-plate)"/>
  <ellipse cx="160" cy="130" rx="146" ry="48" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="130" ry="40" fill="#0c0c0f"/>
  <!-- cold sheen arc (cyan, subtle — this is a cold dish) -->
  <path d="M52 116 Q104 88 168 84" stroke="#35e0ff" stroke-width="2.2" fill="none" opacity=".28" stroke-linecap="round"/>
  <!-- ginger-scallion dressing pooled under the chicken -->
  <ellipse cx="150" cy="132" rx="86" ry="24" fill="#3c4a24" opacity=".55"/>
  <!-- chopped chicken pieces, skin-on, arranged in a fanned row -->
  <!-- back-left piece -->
  <g transform="translate(92 108) rotate(-8)">
    <path d="M0 8 C0 -2 12 -8 26 -8 C40 -8 50 -2 50 8 C50 18 38 24 24 24 C10 24 0 18 0 8 Z" fill="url(#wcc-flesh)" stroke="#c9b688" stroke-width="1.3" opacity=".95"/>
    <path d="M0 8 C0 2 6 -2 12 -2 C10 4 12 12 20 16 C10 18 0 14 0 8 Z" fill="url(#wcc-skin)"/>
    <path d="M2 6 C6 3 10 3 14 5" stroke="#d8bf7e" stroke-width="1" fill="none" opacity=".6"/>
    <ellipse cx="30" cy="4" rx="9" ry="3.4" fill="#fff" opacity=".4"/>
  </g>
  <!-- center-back piece -->
  <g transform="translate(150 100) rotate(6)">
    <path d="M0 8 C0 -2 12 -9 27 -9 C42 -9 53 -2 53 8 C53 18 40 25 26 25 C11 25 0 18 0 8 Z" fill="url(#wcc-flesh)" stroke="#c9b688" stroke-width="1.3"/>
    <path d="M0 8 C0 1 7 -4 14 -4 C11 3 13 13 22 17 C10 19 0 15 0 8 Z" fill="url(#wcc-skin)"/>
    <path d="M3 6 C7 3 11 3 15 5" stroke="#d8bf7e" stroke-width="1" fill="none" opacity=".6"/>
    <ellipse cx="32" cy="3" rx="10" ry="3.6" fill="#fff" opacity=".42"/>
  </g>
  <!-- front-left piece -->
  <g transform="translate(96 130) rotate(4)">
    <path d="M0 8 C0 -2 13 -9 28 -9 C43 -9 54 -2 54 8 C54 19 41 26 26 26 C11 26 0 19 0 8 Z" fill="url(#wcc-flesh)" stroke="#c9b688" stroke-width="1.4"/>
    <path d="M0 8 C0 1 8 -4 15 -4 C12 4 14 14 24 18 C11 20 0 15 0 8 Z" fill="url(#wcc-skin)"/>
    <path d="M4 6 C8 3 12 3 16 5" stroke="#d8bf7e" stroke-width="1" fill="none" opacity=".6"/>
    <ellipse cx="34" cy="3" rx="11" ry="4" fill="#fff" opacity=".45"/>
  </g>
  <!-- front-right piece -->
  <g transform="translate(158 128) rotate(-6)">
    <path d="M0 8 C0 -2 13 -9 28 -9 C43 -9 54 -2 54 8 C54 19 41 26 26 26 C11 26 0 19 0 8 Z" fill="url(#wcc-flesh)" stroke="#c9b688" stroke-width="1.4"/>
    <path d="M0 8 C0 1 8 -4 15 -4 C12 4 14 14 24 18 C11 20 0 15 0 8 Z" fill="url(#wcc-skin)"/>
    <path d="M4 6 C8 3 12 3 16 5" stroke="#d8bf7e" stroke-width="1" fill="none" opacity=".6"/>
    <ellipse cx="34" cy="3" rx="11" ry="4" fill="#fff" opacity=".45"/>
  </g>
  <!-- ginger-scallion dipping dish, small, at right -->
  <ellipse cx="242" cy="128" rx="26" ry="12" fill="#14100a"/>
  <ellipse cx="242" cy="128" rx="26" ry="12" fill="none" stroke="#2c2418" stroke-width="2"/>
  <ellipse cx="242" cy="126" rx="19" ry="8" fill="url(#wcc-dip)"/>
  <rect x="234" y="122" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-16 237 123)"/>
  <rect x="246" y="126" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(20 249 127)"/>
  <circle cx="240" cy="128" r="1.4" fill="#f2ddb0"/>
  <!-- scallion + ginger garnish scattered over chicken -->
  <rect x="118" y="112" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-22 121 113)"/>
  <rect x="150" y="118" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 153 119)"/>
  <rect x="132" y="128" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(28 135 129)"/>
  <rect x="176" y="120" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-12 179 121)"/>
  <rect x="106" y="126" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(18 109 127)"/>
  <!-- minced ginger dots -->
  <circle cx="140" cy="110" r="1.6" fill="#f2ddb0"/>
  <circle cx="166" cy="128" r="1.6" fill="#f2ddb0"/>
  <circle cx="124" cy="122" r="1.4" fill="#f2ddb0"/>
  <!-- condensation / gloss sparkle (cold dish) -->
  <circle cx="128" cy="106" r="1.5" fill="#fff" opacity=".65"/>
  <circle cx="182" cy="112" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="132" r="1.2" fill="#fff" opacity=".5"/>
  <path d="M112 100 l2 -3 M114 100 l-2 -1" stroke="#fff" stroke-width="1" opacity=".5" stroke-linecap="round"/>
  <path d="M198 104 l2 -3 M200 104 l-2 -1" stroke="#fff" stroke-width="1" opacity=".45" stroke-linecap="round"/>
</svg>
