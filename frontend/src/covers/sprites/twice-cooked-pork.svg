<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tcpbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="tcpslice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b47f"/><stop offset="34%" stop-color="#cf5226"/><stop offset="100%" stop-color="#82200e"/>
    </linearGradient>
    <linearGradient id="tcpfat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6ddb2"/><stop offset="100%" stop-color="#e3c58f"/>
    </linearGradient>
    <radialGradient id="tcpplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tcpbg)"/>
  <!-- steam -->
  <path d="M122 58 C112 40 132 32 122 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M202 54 C194 38 212 30 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="130" rx="138" ry="43" fill="url(#tcpplate)"/>
  <ellipse cx="160" cy="130" rx="138" ry="43" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="123" ry="35" fill="#0f0d13"/>
  <!-- neon steam arc -->
  <path d="M50 118 Q100 88 166 84" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy doubanjiang sheen (thin, not a deep pool) -->
  <ellipse cx="160" cy="134" rx="108" ry="22" fill="#7a1c07" opacity=".38"/>
  <ellipse cx="134" cy="128" rx="30" ry="6" fill="#c33d12" opacity=".3" transform="rotate(-6 134 128)"/>
  <!-- green leek / pepper wedges (back layer) -->
  <g transform="translate(96 116) rotate(-16) scale(.9)"><path d="M0 0 C10 -8 26 -8 34 0 C26 6 10 6 0 0 Z" fill="#3f9c37"/><path d="M2 -1 C12 -6 24 -6 32 -1" stroke="#7ed86a" stroke-width="1.6" fill="none" opacity=".7"/></g>
  <g transform="translate(196 112) rotate(12) scale(.9)"><path d="M0 0 C10 -8 26 -8 34 0 C26 6 10 6 0 0 Z" fill="#2f7d2b"/><path d="M2 -1 C12 -6 24 -6 32 -1" stroke="#6abf5a" stroke-width="1.6" fill="none" opacity=".6"/></g>
  <!-- curled twice-cooked pork slices: fat rim + lean core, C-curled -->
  <g transform="translate(84 132) rotate(-8)">
    <path d="M0 4 C-4 -14 24 -22 40 -14 C54 -8 52 8 40 12 C28 16 14 16 6 12 C-2 10 -2 8 0 4 Z" fill="url(#tcpslice)" stroke="#5e2410" stroke-width="1.4" opacity=".95"/>
    <path d="M0 4 C-4 -12 22 -19 38 -12" stroke="url(#tcpfat)" stroke-width="4.5" fill="none" opacity=".95" stroke-linecap="round"/>
    <ellipse cx="20" cy="-6" rx="9" ry="3" fill="#fff" opacity=".28"/>
  </g>
  <g transform="translate(146 108) rotate(10) scale(.92)">
    <path d="M0 4 C-4 -14 24 -22 40 -14 C54 -8 52 8 40 12 C28 16 14 16 6 12 C-2 10 -2 8 0 4 Z" fill="url(#tcpslice)" stroke="#5e2410" stroke-width="1.4"/>
    <path d="M0 4 C-4 -12 22 -19 38 -12" stroke="url(#tcpfat)" stroke-width="4.5" fill="none" opacity=".95" stroke-linecap="round"/>
    <ellipse cx="20" cy="-6" rx="9" ry="3" fill="#fff" opacity=".3"/>
  </g>
  <g transform="translate(178 140) rotate(-14) scale(1.02)">
    <path d="M0 4 C-4 -14 24 -22 40 -14 C54 -8 52 8 40 12 C28 16 14 16 6 12 C-2 10 -2 8 0 4 Z" fill="url(#tcpslice)" stroke="#5e2410" stroke-width="1.4"/>
    <path d="M0 4 C-4 -12 22 -19 38 -12" stroke="url(#tcpfat)" stroke-width="5" fill="none" opacity="1" stroke-linecap="round"/>
    <ellipse cx="20" cy="-6" rx="10" ry="3.4" fill="#fff" opacity=".34"/>
  </g>
  <g transform="translate(120 148) rotate(6) scale(.96)">
    <path d="M0 4 C-4 -14 24 -22 40 -14 C54 -8 52 8 40 12 C28 16 14 16 6 12 C-2 10 -2 8 0 4 Z" fill="url(#tcpslice)" stroke="#5e2410" stroke-width="1.4"/>
    <path d="M0 4 C-4 -12 22 -19 38 -12" stroke="url(#tcpfat)" stroke-width="4.5" fill="none" opacity=".95" stroke-linecap="round"/>
    <ellipse cx="20" cy="-6" rx="9" ry="3" fill="#fff" opacity=".3"/>
  </g>
  <!-- front green wedge for pop -->
  <g transform="translate(156 150) rotate(-8)"><path d="M0 0 C11 -9 28 -9 37 0 C28 7 11 7 0 0 Z" fill="#58c14a"/><path d="M2 -1 C13 -7 26 -7 35 -1" stroke="#8be878" stroke-width="1.8" fill="none" opacity=".75"/></g>
  <!-- garnish: dried chili slivers + garlic + scallion -->
  <rect x="108" y="120" width="8" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(-22 112 121)"/>
  <rect x="188" y="126" width="8" height="2.6" rx="1.3" fill="#c31f12" transform="rotate(14 192 127)"/>
  <rect x="144" y="132" width="7" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(30 147 133)"/>
  <circle cx="132" cy="118" r="2" fill="#f2ddb0"/>
  <circle cx="172" cy="120" r="2" fill="#f2ddb0"/>
  <rect x="162" y="124" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-16 165 125)"/>
  <!-- oil gloss dots -->
  <circle cx="118" cy="124" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="132" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="140" r="1.2" fill="#fff" opacity=".5"/>
</svg>
