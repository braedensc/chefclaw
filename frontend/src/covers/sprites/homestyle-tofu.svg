<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="htBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="htbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="httofu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9f2df"/><stop offset="55%" stop-color="#eddcbb"/><stop offset="100%" stop-color="#e3cda4"/>
    </linearGradient>
    <linearGradient id="httofusear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c184"/><stop offset="100%" stop-color="#c98f45"/>
    </linearGradient>
    <linearGradient id="htpork" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3a20"/><stop offset="55%" stop-color="#5e2410"/><stop offset="100%" stop-color="#3b1608"/>
    </linearGradient>
    <radialGradient id="htsauce" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#a5340f"/><stop offset="60%" stop-color="#7a1f0a"/><stop offset="100%" stop-color="#4a1105"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#htbg)"/>
  <!-- rising steam wisps -->
  <path d="M118 54 C108 36 128 28 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#htBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#htBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="126" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (cyan) -->
  <path d="M50 116 Q104 84 168 82" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy braise sauce pool -->
  <ellipse cx="160" cy="134" rx="112" ry="30" fill="url(#htsauce)" opacity=".9"/>
  <ellipse cx="160" cy="130" rx="98" ry="22" fill="#8a2a0d" opacity=".55"/>
  <!-- BACK-LAYER tofu triangles (scaled down .82, darker) -->
  <g opacity=".92">
    <g transform="translate(96 108) rotate(-8) scale(.82)">
      <path d="M0 0 L34 0 L34 20 L0 22 Z" fill="url(#httofu)" stroke="#b8965f" stroke-width="1.3"/>
      <path d="M0 0 L34 0 L30 6 L4 6 Z" fill="url(#httofusear)"/>
    </g>
    <g transform="translate(196 106) rotate(10) scale(.82)">
      <path d="M0 0 L34 0 L34 22 L0 20 Z" fill="url(#httofu)" stroke="#b8965f" stroke-width="1.3"/>
      <path d="M0 0 L34 0 L30 6 L4 6 Z" fill="url(#httofusear)"/>
    </g>
  </g>
  <!-- pork slices tucked between (thin braised strips) -->
  <path d="M126 118 C138 112 152 114 160 120 C150 126 136 126 126 122 Z" fill="url(#htpork)" stroke="#2a0e04" stroke-width="1" opacity=".95"/>
  <path d="M172 116 C184 110 198 113 206 120 C196 125 182 124 172 120 Z" fill="url(#htpork)" stroke="#2a0e04" stroke-width="1" opacity=".95"/>
  <!-- FRONT tofu triangles (glossy pale, browned faces) -->
  <g transform="translate(70 120) rotate(-6)">
    <path d="M0 0 L40 -2 L42 24 L2 26 Z" fill="url(#httofu)" stroke="#b8965f" stroke-width="1.5"/>
    <path d="M0 0 L40 -2 L36 7 L4 8 Z" fill="url(#httofusear)"/>
    <path d="M2 26 L42 24 L38 30 L4 32 Z" fill="#c98f45" opacity=".6"/>
    <ellipse cx="16" cy="12" rx="9" ry="4" fill="#fff8e8" opacity=".55"/>
  </g>
  <g transform="translate(128 128) rotate(8)">
    <path d="M0 0 L42 0 L44 26 L2 26 Z" fill="url(#httofu)" stroke="#b8965f" stroke-width="1.5"/>
    <path d="M0 0 L42 0 L38 8 L4 8 Z" fill="url(#httofusear)"/>
    <path d="M2 26 L44 26 L40 32 L6 32 Z" fill="#c98f45" opacity=".6"/>
    <ellipse cx="18" cy="13" rx="10" ry="4" fill="#fff8e8" opacity=".55"/>
  </g>
  <g transform="translate(190 124) rotate(-4)">
    <path d="M0 -2 L40 0 L42 24 L2 26 Z" fill="url(#httofu)" stroke="#b8965f" stroke-width="1.5"/>
    <path d="M0 -2 L40 0 L36 8 L4 8 Z" fill="url(#httofusear)"/>
    <path d="M2 26 L42 24 L38 30 L4 32 Z" fill="#c98f45" opacity=".6"/>
    <ellipse cx="16" cy="12" rx="9" ry="4" fill="#fff8e8" opacity=".5"/>
  </g>
  <!-- sauce lap over the front tofu -->
  <path d="M64 138 C110 150 210 150 250 138 C214 156 106 156 64 138 Z" fill="#7a1f0a" opacity=".5"/>
  <!-- garnish: scallion greens + red chili + garlic -->
  <rect x="104" y="120" width="8" height="3" rx="1.4" fill="#5ecb4e" transform="rotate(-20 108 121)"/>
  <rect x="150" y="118" width="8" height="3" rx="1.4" fill="#3f9c37" transform="rotate(18 154 119)"/>
  <rect x="196" y="122" width="8" height="3" rx="1.4" fill="#5ecb4e" transform="rotate(-12 200 123)"/>
  <rect x="132" y="140" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(26 135 141)"/>
  <rect x="176" y="140" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-16 179 141)"/>
  <circle cx="120" cy="132" r="2.2" fill="#e0341f"/>
  <circle cx="204" cy="130" r="2" fill="#e0341f"/>
  <circle cx="150" cy="136" r="1.8" fill="#f2ddb0"/>
  <!-- gloss dots -->
  <circle cx="90" cy="128" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="150" cy="134" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="206" cy="130" r="1.3" fill="#fff" opacity=".5"/>
</svg>
