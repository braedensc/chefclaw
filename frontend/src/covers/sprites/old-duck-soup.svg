<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="odsBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="odsbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#113036"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="odsbowl" cx="50%" cy="28%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="odsbroth" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#f3ecd6"/><stop offset="58%" stop-color="#e2d3ac"/><stop offset="100%" stop-color="#c7b385"/>
    </radialGradient>
    <linearGradient id="odsduck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98f5a"/><stop offset="45%" stop-color="#9c5f34"/><stop offset="100%" stop-color="#6b3a1e"/>
    </linearGradient>
    <radialGradient id="odsradish" cx="42%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="60%" stop-color="#f2f0e6"/><stop offset="100%" stop-color="#dcd8c6"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#odsbg)"/>
  <!-- rising steam wisps (hot nourishing soup) -->
  <path d="M124 50 C114 32 134 24 124 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#odsBlur3)"/>
  <path d="M198 48 C190 32 208 24 200 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#odsBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="140" ry="20" fill="#000" opacity=".5"/>
  <!-- neon steam arc (cyan) -->
  <path d="M54 108 Q106 74 170 74" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- deep clay soup bowl silhouette (rustic, slightly heavier rim) -->
  <path d="M44 96 C44 89 62 87 160 87 C258 87 276 89 276 96 C276 140 224 174 160 174 C96 174 44 140 44 96 Z" fill="url(#odsbowl)"/>
  <path d="M44 96 C44 89 62 87 160 87 C258 87 276 89 276 96 C276 140 224 174 160 174 C96 174 44 140 44 96 Z" fill="none" stroke="#271b22" stroke-width="3"/>
  <!-- clear amber broth surface -->
  <ellipse cx="160" cy="98" rx="114" ry="26" fill="url(#odsbroth)"/>
  <ellipse cx="160" cy="98" rx="114" ry="26" fill="none" stroke="#b8ab84" stroke-width="1.4" opacity=".5"/>
  <path d="M78 92 C106 84 152 84 178 90" stroke="#fffaea" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- floating oil dots on the broth (nourishing duck fat) -->
  <circle cx="98" cy="95" r="3" fill="#f2d48a" opacity=".6"/>
  <circle cx="220" cy="96" r="2.6" fill="#f2d48a" opacity=".55"/>
  <circle cx="140" cy="92" r="2" fill="#f0cf82" opacity=".5"/>
  <!-- white radish slices (translucent thick discs) -->
  <g>
    <g transform="translate(88 106) rotate(-8)">
      <ellipse rx="17" ry="11" fill="url(#odsradish)" stroke="#c9c4b0" stroke-width="1.2"/>
      <ellipse rx="8" ry="5" fill="#fbfaf2" opacity=".7"/>
      <ellipse cx="-5" cy="-3" rx="4" ry="2.4" fill="#fff" opacity=".8"/>
    </g>
    <g transform="translate(206 110) rotate(12)">
      <ellipse rx="16" ry="10.5" fill="url(#odsradish)" stroke="#c9c4b0" stroke-width="1.2"/>
      <ellipse rx="7.5" ry="4.6" fill="#fbfaf2" opacity=".7"/>
      <ellipse cx="-5" cy="-3" rx="3.6" ry="2.2" fill="#fff" opacity=".8"/>
    </g>
  </g>
  <!-- duck pieces (bone-in, browned skin chunks) -->
  <g transform="translate(0 2)">
    <g transform="translate(126 96) rotate(-10)">
      <path d="M0 2 C-2 -8 12 -14 26 -12 C38 -10 40 2 33 9 C22 16 3 14 0 4 Z" fill="url(#odsduck)" stroke="#5a2f16" stroke-width="1.3"/>
      <path d="M4 -4 C12 -9 24 -9 32 -3" stroke="#c17232" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round"/>
      <ellipse cx="10" cy="0" rx="4" ry="3.2" fill="#e8d8c2" opacity=".85"/>
      <ellipse cx="10" cy="0" rx="1.6" ry="1.4" fill="#b89a7a"/>
      <ellipse cx="22" cy="-4" rx="5" ry="2.2" fill="#d99a58" opacity=".5"/>
    </g>
    <g transform="translate(170 112) rotate(8)">
      <path d="M0 2 C-2 -7 10 -12 22 -10 C33 -8 35 2 29 8 C19 14 3 12 0 4 Z" fill="url(#odsduck)" stroke="#5a2f16" stroke-width="1.2"/>
      <path d="M4 -3 C10 -7 20 -7 27 -2" stroke="#c17232" stroke-width="2.2" fill="none" opacity=".7" stroke-linecap="round"/>
      <ellipse cx="9" cy="0" rx="3.4" ry="2.8" fill="#e8d8c2" opacity=".85"/>
      <ellipse cx="9" cy="0" rx="1.4" ry="1.2" fill="#b89a7a"/>
    </g>
  </g>
  <!-- scallion + ginger slivers float -->
  <rect x="120" y="90" width="8" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-14 124 91)"/>
  <rect x="190" y="96" width="8" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 194 97)"/>
  <rect x="102" y="120" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(20 105 121)"/>
  <rect x="150" y="104" width="6" height="2.2" rx="1.1" fill="#e9c98a" transform="rotate(-8 153 105)"/>
  <!-- gloss dots -->
  <circle cx="130" cy="92" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="100" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="102" r="1.2" fill="#fff" opacity=".5"/>
</svg>
