<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="mcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="mcplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="mccrust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0a24a"/><stop offset="48%" stop-color="#c67e2c"/><stop offset="100%" stop-color="#9a561a"/>
    </linearGradient>
    <linearGradient id="mctop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eab758"/><stop offset="55%" stop-color="#cf8f34"/><stop offset="100%" stop-color="#a86a20"/>
    </linearGradient>
    <radialGradient id="mclotus" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#c8912f"/><stop offset="60%" stop-color="#9c6a1e"/><stop offset="100%" stop-color="#6e4712"/>
    </radialGradient>
    <radialGradient id="mcyolk" cx="40%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#ff9d3c"/><stop offset="55%" stop-color="#f0741a"/><stop offset="100%" stop-color="#c1470c"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mcbg)"/>
  <ellipse cx="160" cy="188" rx="150" ry="21" fill="#000" opacity=".5"/>
  <!-- plate -->
  <ellipse cx="160" cy="136" rx="140" ry="44" fill="url(#mcplate)"/>
  <ellipse cx="160" cy="136" rx="140" ry="44" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="136" rx="124" ry="36" fill="#0d0b10"/>

  <!-- WHOLE MOONCAKE (left) — flat-topped golden puck with molded pattern -->
  <g>
    <!-- side wall (the tall straight side of the puck) -->
    <path d="M64 116 C64 128 90 138 118 138 C146 138 172 128 172 116 L172 128 C172 141 146 151 118 151 C90 151 64 141 64 128 Z" fill="url(#mccrust)"/>
    <path d="M64 128 C64 141 90 151 118 151 C146 151 172 141 172 128" fill="none" stroke="#7a4413" stroke-width="1.4" opacity=".6"/>
    <!-- crimped rim highlights on the side wall -->
    <path d="M74 132 l0 8 M92 136 l0 9 M118 138 l0 9 M144 136 l0 9 M162 132 l0 8" stroke="#7a4413" stroke-width="1.3" opacity=".5"/>
    <!-- flat molded top -->
    <ellipse cx="118" cy="116" rx="54" ry="22" fill="url(#mctop)"/>
    <ellipse cx="118" cy="116" rx="54" ry="22" fill="none" stroke="#8a5619" stroke-width="1.4" opacity=".6"/>
    <!-- decorative pressed border ring -->
    <ellipse cx="118" cy="116" rx="46" ry="18" fill="none" stroke="#8a5619" stroke-width="1.3" opacity=".55"/>
    <!-- molded lattice pattern (imprinted lines radiating + center emblem) -->
    <g stroke="#8a5619" stroke-width="1.2" opacity=".55" fill="none" stroke-linecap="round">
      <path d="M118 100 L118 132"/>
      <path d="M80 116 L156 116"/>
      <path d="M92 104 L144 128"/>
      <path d="M92 128 L144 104"/>
    </g>
    <!-- center molded emblem -->
    <ellipse cx="118" cy="116" rx="12" ry="6" fill="#b57a28" opacity=".8"/>
    <ellipse cx="118" cy="116" rx="12" ry="6" fill="none" stroke="#7a4c14" stroke-width="1.1" opacity=".6"/>
    <path d="M114 116 l4 -4 4 4 -4 4 z" fill="#e5b155" opacity=".85"/>
    <!-- glaze sheen on top -->
    <ellipse cx="104" cy="108" rx="18" ry="6" fill="#f4d187" opacity=".4"/>
  </g>

  <!-- CUT WEDGE (right) — cross-section showing lotus paste + salted-yolk core -->
  <g transform="translate(196 96)">
    <!-- outer crust wedge -->
    <path d="M0 20 L60 6 C70 8 78 14 78 24 C78 34 70 40 60 42 L0 30 Z" fill="url(#mccrust)"/>
    <!-- pale crust cut face -->
    <path d="M0 20 L0 30 L14 28 L14 22 Z" fill="#e8c98a"/>
    <path d="M0 20 L14 22 L14 28 L0 30 Z" fill="none" stroke="#b98a44" stroke-width="1" opacity=".6"/>
    <!-- lotus-paste filling cross-section -->
    <path d="M14 22 L60 12 C66 14 70 18 70 24 C70 30 66 34 60 36 L14 28 Z" fill="url(#mclotus)"/>
    <path d="M14 22 L60 12 C66 14 70 18 70 24 C70 30 66 34 60 36 L14 28" fill="none" stroke="#5c3a0e" stroke-width="1" opacity=".5"/>
    <!-- salted egg yolk core (the round golden center) -->
    <ellipse cx="42" cy="24" rx="13" ry="12" fill="url(#mcyolk)"/>
    <ellipse cx="42" cy="24" rx="13" ry="12" fill="none" stroke="#b0430b" stroke-width="1.1" opacity=".6"/>
    <ellipse cx="38" cy="20" rx="4" ry="3" fill="#ffc98a" opacity=".7"/>
    <!-- crust top sheen -->
    <path d="M18 10 C34 6 52 6 66 12" stroke="#f4d187" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
    <!-- wedge outline -->
    <path d="M0 20 L60 6 C70 8 78 14 78 24 C78 34 70 40 60 42 L0 30 Z" fill="none" stroke="#7a4413" stroke-width="1.3" opacity=".55"/>
  </g>

  <!-- crumbs on the plate -->
  <circle cx="150" cy="150" r="1.8" fill="#c98a3a" opacity=".8"/>
  <circle cx="182" cy="152" r="1.5" fill="#b57a28" opacity=".8"/>
  <circle cx="128" cy="154" r="1.4" fill="#c98a3a" opacity=".75"/>
  <!-- cold-dessert sparkle (no steam arc) -->
  <path d="M214 44 l0 10 M209 49 l10 0" stroke="#ffe9c9" stroke-width="1.4" opacity=".5" stroke-linecap="round"/>
  <path d="M96 52 l0 7 M92.5 55.5 l7 0" stroke="#ffe9c9" stroke-width="1.2" opacity=".4" stroke-linecap="round"/>
  <circle cx="176" cy="38" r="1.5" fill="#fff" opacity=".55"/>
  <!-- gloss dots -->
  <circle cx="100" cy="106" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="230" cy="112" r="1.3" fill="#fff" opacity=".5"/>
</svg>
