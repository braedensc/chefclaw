<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="smBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="smbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="smpastry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0cb7e"/><stop offset="50%" stop-color="#d9a648"/><stop offset="100%" stop-color="#b47c26"/>
    </linearGradient>
    <linearGradient id="smpastry2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6bd6c"/><stop offset="50%" stop-color="#c99236"/><stop offset="100%" stop-color="#9c6a1c"/>
    </linearGradient>
    <linearGradient id="smboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#463320"/><stop offset="100%" stop-color="#2a1d10"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#smbg)"/>
  <!-- rising steam wisps (freshly fried) -->
  <path d="M120 54 C110 36 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#smBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#smBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="146" ry="22" fill="#000" opacity=".5"/>
  <!-- serving board -->
  <ellipse cx="160" cy="140" rx="140" ry="42" fill="url(#smboard)"/>
  <ellipse cx="160" cy="140" rx="140" ry="42" fill="none" stroke="#5a4228" stroke-width="2.5"/>
  <path d="M42 134 Q160 122 278 134" stroke="#684b2c" stroke-width="1.4" fill="none" opacity=".5"/>
  <!-- warm-white steam arc -->
  <path d="M56 110 Q110 82 174 84" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- BACK samosa (smaller, dimmer) -->
  <g transform="translate(196 108) rotate(8)">
    <path d="M-30 20 L0 -26 L30 20 C14 26 -14 26 -30 20 Z" fill="url(#smpastry2)" stroke="#7c531a" stroke-width="1.4"/>
    <path d="M0 -26 L0 22" stroke="#8a5a1c" stroke-width="1.6" opacity=".55"/>
    <path d="M-24 16 C-8 20 8 20 24 16" stroke="#f2d896" stroke-width="1.6" fill="none" opacity=".5"/>
    <ellipse cx="-8" cy="-4" rx="9" ry="4" fill="#f4d98e" opacity=".4"/>
  </g>
  <!-- FRONT-LEFT samosa (crisp triangle, hero) -->
  <g transform="translate(118 118) rotate(-10)">
    <path d="M-36 24 L0 -32 L36 24 C18 32 -18 32 -36 24 Z" fill="url(#smpastry)" stroke="#8a5a1e" stroke-width="1.6"/>
    <!-- sealed folded seam down the middle -->
    <path d="M0 -32 L0 26" stroke="#9c6a1c" stroke-width="2" opacity=".55"/>
    <!-- crimped edge highlight -->
    <path d="M-30 18 C-10 24 10 24 30 18" stroke="#ffe6b0" stroke-width="1.8" fill="none" opacity=".55"/>
    <path d="M-32 22 C-12 30 12 30 32 22" stroke="#8a5a1e" stroke-width="1.2" fill="none" opacity=".5"/>
    <!-- blistered fry bubbles -->
    <ellipse cx="-14" cy="-2" rx="10" ry="5" fill="#f6dc94" opacity=".45"/>
    <circle cx="-18" cy="6" r="2" fill="#a06a1e" opacity=".6"/>
    <circle cx="8" cy="8" r="1.8" fill="#a06a1e" opacity=".55"/>
    <circle cx="12" cy="-8" r="1.6" fill="#b47c26" opacity=".5"/>
    <!-- top crisp corner highlight -->
    <path d="M-4 -28 L2 -28" stroke="#fff0cc" stroke-width="2" opacity=".6" stroke-linecap="round"/>
  </g>
  <!-- FRONT-RIGHT smaller samosa -->
  <g transform="translate(206 138) rotate(18)">
    <path d="M-26 18 L0 -22 L26 18 C12 24 -12 24 -26 18 Z" fill="url(#smpastry)" stroke="#8a5a1e" stroke-width="1.5"/>
    <path d="M0 -22 L0 20" stroke="#9c6a1c" stroke-width="1.6" opacity=".5"/>
    <path d="M-20 12 C-6 18 6 18 20 12" stroke="#ffe6b0" stroke-width="1.6" fill="none" opacity=".5"/>
    <ellipse cx="-6" cy="0" rx="8" ry="4" fill="#f6dc94" opacity=".4"/>
  </g>
  <!-- mint/tamarind chutney dab + cilantro -->
  <ellipse cx="86" cy="150" rx="14" ry="6" fill="#3f7d2b" opacity=".85"/>
  <ellipse cx="82" cy="147" rx="5" ry="2.4" fill="#6abf5a" opacity=".7"/>
  <rect x="150" y="150" width="6" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 153 151)"/>
  <rect x="176" y="154" width="5.5" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 179 155)"/>
  <!-- oil gloss dots -->
  <circle cx="104" cy="106" r="1.6" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="126" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="132" cy="126" r="1.2" fill="#fff" opacity=".5"/>
</svg>
