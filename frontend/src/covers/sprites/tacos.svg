<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="tcshell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d98c"/><stop offset="55%" stop-color="#e8b95e"/><stop offset="100%" stop-color="#c88f36"/>
    </linearGradient>
    <linearGradient id="tcmeat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a85326"/><stop offset="100%" stop-color="#6e2f0d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tcbg)"/>
  <!-- steam -->
  <path d="M116 58 C106 40 126 32 116 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#tcBlur3)"/>
  <path d="M202 54 C194 38 212 30 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tcBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- wooden board -->
  <ellipse cx="160" cy="140" rx="144" ry="40" fill="#241611"/>
  <ellipse cx="160" cy="140" rx="144" ry="40" fill="none" stroke="#3a271c" stroke-width="3"/>
  <ellipse cx="160" cy="140" rx="130" ry="33" fill="#1c110c"/>
  <path d="M50 138 C110 132 210 132 270 138" stroke="#3a271c" stroke-width="1.4" fill="none" opacity=".5"/>
  <path d="M56 148 C110 154 210 154 264 148" stroke="#301f16" stroke-width="1.2" fill="none" opacity=".5"/>
  <!-- neon steam arc -->
  <path d="M52 118 Q104 90 168 88" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- LEFT folded taco -->
  <g transform="translate(108 124) rotate(-6)">
    <!-- shell fold (U cross-section) -->
    <path d="M-46 -6 C-46 26 -30 40 0 40 C30 40 46 26 46 -6 C46 6 30 12 0 12 C-30 12 -46 6 -46 -6 Z" fill="url(#tcshell)"/>
    <path d="M-46 -6 C-46 26 -30 40 0 40 C30 40 46 26 46 -6" fill="none" stroke="#a5711f" stroke-width="1.4" opacity=".5"/>
    <!-- toasted spots -->
    <ellipse cx="-24" cy="20" rx="5" ry="3" fill="#a5711f" opacity=".45"/>
    <ellipse cx="20" cy="24" rx="4" ry="2.6" fill="#a5711f" opacity=".4"/>
    <!-- filling opening (dark cavity) -->
    <path d="M-44 -8 C-44 -1 -28 4 0 4 C28 4 44 -1 44 -8 C44 -14 28 -18 0 -18 C-28 -18 -44 -14 -44 -8 Z" fill="#3a1c0c"/>
    <!-- meat chunks -->
    <path d="M-30 -12 h14 v8 h-14 Z" fill="url(#tcmeat)" transform="rotate(-8 -23 -8)"/>
    <path d="M-10 -14 h13 v8 h-13 Z" fill="url(#tcmeat)" transform="rotate(6 -3 -10)"/>
    <path d="M10 -12 h13 v8 h-13 Z" fill="url(#tcmeat)" transform="rotate(-4 16 -8)"/>
    <ellipse cx="-22" cy="-10" rx="4" ry="1.6" fill="#c9743a" opacity=".7"/>
    <ellipse cx="3" cy="-11" rx="4" ry="1.6" fill="#c9743a" opacity=".7"/>
    <!-- white onion dice -->
    <rect x="-18" y="-12" width="4" height="4" rx="1" fill="#f4ead0" transform="rotate(20 -16 -10)"/>
    <rect x="6" y="-13" width="4" height="4" rx="1" fill="#f4ead0" transform="rotate(-14 8 -11)"/>
    <!-- cilantro -->
    <rect x="-26" y="-15" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-18 -23 -14)"/>
    <rect x="-4" y="-16" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(14 -1 -15)"/>
    <rect x="18" y="-14" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-8 21 -13)"/>
    <!-- red salsa fleck -->
    <circle cx="-8" cy="-9" r="1.8" fill="#d8300f"/>
    <circle cx="24" cy="-10" r="1.6" fill="#d8300f"/>
  </g>
  <!-- RIGHT folded taco (slightly back/smaller) -->
  <g transform="translate(206 128) rotate(8) scale(.9)">
    <path d="M-44 -6 C-44 24 -28 38 0 38 C28 38 44 24 44 -6 C44 6 28 12 0 12 C-28 12 -44 6 -44 -6 Z" fill="url(#tcshell)"/>
    <path d="M-44 -6 C-44 24 -28 38 0 38 C28 38 44 24 44 -6" fill="none" stroke="#a5711f" stroke-width="1.4" opacity=".5"/>
    <ellipse cx="18" cy="20" rx="5" ry="3" fill="#a5711f" opacity=".45"/>
    <path d="M-42 -8 C-42 -1 -26 4 0 4 C26 4 42 -1 42 -8 C42 -14 26 -18 0 -18 C-26 -18 -42 -14 -42 -8 Z" fill="#3a1c0c"/>
    <path d="M-26 -12 h13 v8 h-13 Z" fill="url(#tcmeat)" transform="rotate(6 -19 -8)"/>
    <path d="M-6 -13 h13 v8 h-13 Z" fill="url(#tcmeat)" transform="rotate(-6 0 -9)"/>
    <path d="M14 -12 h12 v8 h-12 Z" fill="url(#tcmeat)" transform="rotate(8 20 -8)"/>
    <ellipse cx="-16" cy="-10" rx="4" ry="1.6" fill="#c9743a" opacity=".7"/>
    <rect x="-2" y="-13" width="4" height="4" rx="1" fill="#f4ead0" transform="rotate(18 0 -11)"/>
    <rect x="-22" y="-15" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-14 -19 -14)"/>
    <rect x="6" y="-16" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(16 9 -15)"/>
    <circle cx="10" cy="-9" r="1.6" fill="#d8300f"/>
  </g>
  <!-- lime wedge on board -->
  <g transform="translate(96 158) rotate(-14)">
    <path d="M0 0 A12 12 0 0 1 24 0 Z" fill="#8fce4c"/>
    <path d="M0 0 A12 12 0 0 1 24 0" fill="none" stroke="#b8e07a" stroke-width="1.4" opacity=".7"/>
    <path d="M12 0 L12 -9 M12 0 L4 -5 M12 0 L20 -5" stroke="#e9f3c8" stroke-width="1.1" opacity=".7"/>
  </g>
  <!-- gloss dots -->
  <circle cx="100" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="204" cy="116" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
