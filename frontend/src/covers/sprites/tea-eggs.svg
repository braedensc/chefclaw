<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="teBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tebg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="tebroth" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#5a3417"/><stop offset="55%" stop-color="#38200e"/><stop offset="100%" stop-color="#1c0f05"/>
    </radialGradient>
    <radialGradient id="teshell" cx="40%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#f3e3c4"/><stop offset="55%" stop-color="#dcc294"/><stop offset="100%" stop-color="#b89960"/>
    </radialGradient>
    <radialGradient id="teyolk" cx="42%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ffe38a"/><stop offset="60%" stop-color="#f6b83a"/><stop offset="100%" stop-color="#d98a1c"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tebg)"/>
  <!-- steam -->
  <path d="M124 58 C114 40 134 32 124 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#teBlur3)"/>
  <path d="M202 54 C194 38 212 30 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#teBlur3)"/>
  <ellipse cx="160" cy="188" rx="154" ry="22" fill="#000" opacity=".5"/>
  <!-- shallow marinade bowl -->
  <ellipse cx="160" cy="130" rx="132" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="130" rx="132" ry="46" fill="none" stroke="#271b22" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="118" ry="38" fill="#0f0b0c"/>
  <!-- neon steam arc -->
  <path d="M52 118 Q104 88 166 86" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- dark tea marinade pool -->
  <ellipse cx="160" cy="134" rx="106" ry="30" fill="url(#tebroth)"/>
  <ellipse cx="132" cy="126" rx="30" ry="7" fill="#7a4a1f" opacity=".35"/>
  <!-- floating star anise + tea leaves -->
  <g transform="translate(96 148) rotate(-14)" fill="#4a2a12" opacity=".8">
    <path d="M0 -6 L1.6 -1.6 L6 0 L1.6 1.6 L0 6 L-1.6 1.6 L-6 0 L-1.6 -1.6 Z"/>
  </g>
  <path d="M214 150 q4 -3 8 0" stroke="#3f6b2e" stroke-width="2" fill="none" opacity=".6"/>
  <path d="M120 152 q4 -3 8 0" stroke="#3f6b2e" stroke-width="1.8" fill="none" opacity=".5"/>
  <!-- BACK tea egg (whole, uncracked, darker) -->
  <g transform="translate(206 108) rotate(8)">
    <ellipse rx="30" ry="26" fill="url(#teshell)"/>
    <ellipse rx="30" ry="26" fill="none" stroke="#7a5a2c" stroke-width="1.4" opacity=".5"/>
    <!-- marbled cracks stained tea-brown -->
    <path d="M-18 -8 Q-6 -2 4 -12 Q12 -4 20 -10" stroke="#6b3f18" stroke-width="1.4" fill="none" opacity=".8"/>
    <path d="M-20 6 Q-8 2 -2 12 Q8 8 16 14" stroke="#7a4a1e" stroke-width="1.3" fill="none" opacity=".75"/>
    <path d="M-4 -18 Q0 -4 -8 6 Q-2 14 2 20" stroke="#6b3f18" stroke-width="1.2" fill="none" opacity=".7"/>
    <ellipse cx="-9" cy="-10" rx="8" ry="4" fill="#fff" opacity=".2"/>
  </g>
  <!-- FRONT-LEFT cracked egg, one half peeled showing marbled white + yolk -->
  <g transform="translate(116 116) rotate(-6)">
    <ellipse rx="34" ry="30" fill="url(#teshell)"/>
    <ellipse rx="34" ry="30" fill="none" stroke="#7a5a2c" stroke-width="1.4" opacity=".5"/>
    <!-- dense marble crackle -->
    <path d="M-24 -6 Q-10 0 0 -14 Q10 -4 22 -12" stroke="#5a3414" stroke-width="1.5" fill="none" opacity=".85"/>
    <path d="M-26 8 Q-12 4 -4 16 Q8 10 20 16" stroke="#6b3f18" stroke-width="1.4" fill="none" opacity=".8"/>
    <path d="M-6 -22 Q-2 -6 -12 4 Q-4 14 -2 24" stroke="#5a3414" stroke-width="1.3" fill="none" opacity=".78"/>
    <path d="M12 -18 Q8 -4 16 6 Q10 16 14 22" stroke="#6b3f18" stroke-width="1.2" fill="none" opacity=".72"/>
    <ellipse cx="-11" cy="-12" rx="9" ry="4.5" fill="#fff" opacity=".22"/>
  </g>
  <!-- FRONT-RIGHT egg cut in HALF: marbled white ring + creamy yolk (the hero) -->
  <g transform="translate(178 128) rotate(4)">
    <!-- white with tea-marble ring pattern -->
    <ellipse rx="30" ry="27" fill="#f6efdc"/>
    <ellipse rx="30" ry="27" fill="none" stroke="#c9a86a" stroke-width="1.6" opacity=".7"/>
    <!-- brown marble veins in the white -->
    <path d="M-24 -6 Q-14 2 -18 12" stroke="#8a5a28" stroke-width="1.3" fill="none" opacity=".55"/>
    <path d="M20 -10 Q26 0 18 10" stroke="#8a5a28" stroke-width="1.3" fill="none" opacity=".5"/>
    <path d="M-8 -22 Q-2 -14 -12 -8" stroke="#9c6a34" stroke-width="1.1" fill="none" opacity=".45"/>
    <path d="M6 20 Q0 12 10 8" stroke="#9c6a34" stroke-width="1.1" fill="none" opacity=".45"/>
    <!-- yolk -->
    <ellipse cx="0" cy="1" rx="15" ry="13" fill="url(#teyolk)"/>
    <ellipse cx="0" cy="1" rx="15" ry="13" fill="none" stroke="#c98418" stroke-width="1" opacity=".6"/>
    <ellipse cx="-5" cy="-4" rx="5" ry="3.4" fill="#fff2b8" opacity=".8"/>
  </g>
  <!-- garnish: chopped scallion + a chili sliver on the rim -->
  <rect x="90" y="122" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 93 123)"/>
  <rect x="230" y="118" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 233 119)"/>
  <rect x="150" y="150" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(8 153 151)"/>
  <rect x="200" y="150" width="8" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(-14 204 151)"/>
  <!-- gloss dots -->
  <circle cx="105" cy="104" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="173" cy="120" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="197" cy="100" r="1.2" fill="#fff" opacity=".5"/>
</svg>
