<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ccBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ccbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="ccbowl" cx="50%" cy="36%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="ccbroth" cx="44%" cy="34%" r="86%">
      <stop offset="0%" stop-color="#fbf3e2"/><stop offset="52%" stop-color="#f2e4c8"/><stop offset="100%" stop-color="#e0cba3"/>
    </radialGradient>
    <linearGradient id="ccpotato" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7df"/><stop offset="55%" stop-color="#f6e6b6"/><stop offset="100%" stop-color="#e6cf92"/>
    </linearGradient>
    <radialGradient id="ccshell" cx="42%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#5a4a3f"/><stop offset="55%" stop-color="#3d2f28"/><stop offset="100%" stop-color="#241a15"/>
    </radialGradient>
    <linearGradient id="cccracker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d99a"/><stop offset="100%" stop-color="#d3ad64"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ccbg)"/>
  <!-- rising steam wisps (hot soup) -->
  <path d="M120 52 C110 34 130 26 120 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ccBlur3)"/>
  <path d="M196 50 C188 34 206 26 198 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ccBlur3)"/>
  <path d="M158 44 C150 28 166 22 158 4" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#ccBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- deep soup bowl: outer wall then rim then inner well -->
  <path d="M44 118 C44 108 62 102 88 100 C160 94 232 100 244 106 C258 112 266 122 264 134 C258 168 208 184 160 184 C112 184 62 168 56 134 C50 124 44 122 44 118 Z" fill="url(#ccbowl)"/>
  <!-- bowl rim ellipse -->
  <ellipse cx="160" cy="118" rx="120" ry="42" fill="url(#ccbowl)"/>
  <ellipse cx="160" cy="118" rx="120" ry="42" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="118" rx="106" ry="35" fill="#0c0c0f"/>
  <!-- neon steam arc (cyan / savory family) -->
  <path d="M54 108 Q108 76 172 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- creamy chowder surface pooled in the well -->
  <ellipse cx="160" cy="120" rx="104" ry="33" fill="url(#ccbroth)"/>
  <ellipse cx="160" cy="120" rx="104" ry="33" fill="none" stroke="#c9ad7e" stroke-width="1.4" opacity=".45"/>
  <!-- lighter cream sheen top-left -->
  <path d="M78 110 C112 100 176 102 214 110 C176 118 112 118 78 114 Z" fill="#fff8e8" opacity=".5"/>
  <!-- gentle cream swirl -->
  <path d="M88 126 C126 118 196 122 232 116" stroke="#fff5e0" stroke-width="2" fill="none" opacity=".35" stroke-linecap="round"/>
  <!-- BACK layer chunks (smaller/dimmer) -->
  <!-- back potato cube -->
  <g transform="translate(0 0)" opacity=".9">
    <path d="M108 100 L124 96 L130 104 L114 108 Z" fill="url(#ccpotato)" stroke="#c7a458" stroke-width="1.2"/>
    <path d="M124 96 L130 104 L131 111 L125 103 Z" fill="#dcbd76" stroke="#c7a458" stroke-width="1"/>
  </g>
  <g opacity=".9">
    <path d="M198 100 L214 98 L219 106 L203 108 Z" fill="url(#ccpotato)" stroke="#c7a458" stroke-width="1.2"/>
    <path d="M214 98 L219 106 L220 113 L215 105 Z" fill="#dcbd76" stroke="#c7a458" stroke-width="1"/>
  </g>
  <!-- FRONT hero units: clam shells + potato chunks -->
  <!-- clam shell 1 (open, showing fan ridges) -->
  <g transform="translate(120 126) rotate(-8)">
    <path d="M0 0 C-18 -12 -18 6 -2 12 C10 16 22 12 24 2 C24 -8 12 -10 0 0 Z" fill="url(#ccshell)"/>
    <path d="M-14 2 L20 4 M-11 -3 L18 0 M-9 6 L14 9" stroke="#1c130e" stroke-width="1" opacity=".45"/>
    <path d="M-2 6 C4 4 12 4 18 6" stroke="#7a6552" stroke-width="1.4" fill="none" opacity=".6"/>
    <!-- clam meat nestled in shell -->
    <ellipse cx="6" cy="4" rx="8" ry="4.5" fill="#e7c9a6"/>
    <ellipse cx="4" cy="2.4" rx="4" ry="2" fill="#f5e2c8" opacity=".8"/>
    <path d="M0 0 C-18 -12 -18 6 -2 12 C10 16 22 12 24 2 C24 -8 12 -10 0 0 Z" fill="none" stroke="#1c130e" stroke-width="1.3" opacity=".5"/>
  </g>
  <!-- clam shell 2 (right, slightly rotated) -->
  <g transform="translate(196 130) rotate(12)">
    <path d="M0 0 C18 -12 18 6 2 12 C-10 16 -22 12 -24 2 C-24 -8 -12 -10 0 0 Z" fill="url(#ccshell)"/>
    <path d="M14 2 L-20 4 M11 -3 L-18 0 M9 6 L-14 9" stroke="#1c130e" stroke-width="1" opacity=".45"/>
    <ellipse cx="-6" cy="4" rx="8" ry="4.5" fill="#e7c9a6"/>
    <ellipse cx="-4" cy="2.4" rx="4" ry="2" fill="#f5e2c8" opacity=".8"/>
    <path d="M0 0 C18 -12 18 6 2 12 C-10 16 -22 12 -24 2 C-24 -8 -12 -10 0 0 Z" fill="none" stroke="#1c130e" stroke-width="1.3" opacity=".5"/>
  </g>
  <!-- front potato chunk (large, glossy) -->
  <g transform="translate(146 132) rotate(6)">
    <path d="M0 0 L18 -3 L24 7 L6 12 Z" fill="url(#ccpotato)" stroke="#c7a458" stroke-width="1.4"/>
    <path d="M18 -3 L24 7 L25 15 L19 6 Z" fill="#dcbd76" stroke="#c7a458" stroke-width="1.1"/>
    <ellipse cx="8" cy="2" rx="6" ry="2.4" fill="#fff8e0" opacity=".7"/>
  </g>
  <!-- small potato chunk left front -->
  <g transform="translate(98 132) rotate(-12)">
    <path d="M0 0 L13 -2 L17 6 L4 9 Z" fill="url(#ccpotato)" stroke="#c7a458" stroke-width="1.3"/>
    <ellipse cx="6" cy="2" rx="4.5" ry="1.8" fill="#fff8e0" opacity=".7"/>
  </g>
  <!-- oyster crackers floating on top -->
  <g transform="translate(174 112) rotate(10)">
    <rect x="-6" y="-5" width="12" height="10" rx="2.4" fill="url(#cccracker)" stroke="#b58c48" stroke-width="1"/>
    <circle cx="-2" cy="-1" r=".9" fill="#a67f3f"/><circle cx="2" cy="2" r=".9" fill="#a67f3f"/>
  </g>
  <g transform="translate(124 114) rotate(-14)">
    <rect x="-5" y="-4.5" width="10" height="9" rx="2.2" fill="url(#cccracker)" stroke="#b58c48" stroke-width="1"/>
    <circle cx="-1" cy="0" r=".8" fill="#a67f3f"/>
  </g>
  <!-- bacon bit garnish -->
  <path d="M158 108 l7 -1 l1 3 l-7 1 Z" fill="#a2402a" stroke="#6e2412" stroke-width=".8"/>
  <path d="M160 108 l5 -.6" stroke="#e0a690" stroke-width="1" opacity=".7"/>
  <!-- fresh herb / parsley flecks -->
  <rect x="112" y="108" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-18 115 109)"/>
  <rect x="182" y="126" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(18 185 127)"/>
  <rect x="150" y="118" width="5.5" height="2.2" rx="1.1" fill="#3f9c37" transform="rotate(8 153 119)"/>
  <!-- cracked-pepper specks -->
  <circle cx="136" cy="122" r="1.1" fill="#260903"/>
  <circle cx="200" cy="120" r="1" fill="#260903"/>
  <circle cx="164" cy="126" r=".9" fill="#260903"/>
  <!-- oil/cream gloss dots -->
  <circle cx="118" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="116" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="152" cy="126" r="1.2" fill="#fff" opacity=".5"/>
</svg>
