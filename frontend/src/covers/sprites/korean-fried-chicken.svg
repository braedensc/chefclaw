  <ellipse cx="138" cy="122" rx="30" ry="7" fill="#ff5a2a" opacity=".25" transform="rotate(-8 138 122)"/>
  <!-- craggy fried-chicken pieces (glazed, glossy, irregular lobes) -->
  <!-- back-left drumette -->
  <g transform="translate(102 106) scale(.86)">
    <path d="M-2 -18 C10 -26 26 -22 32 -10 C40 -4 40 12 30 20 C18 30 -2 30 -14 20 C-26 12 -24 -6 -12 -14 C-9 -18 -6 -19 -2 -18 Z" fill="url(#kfcpiece)" stroke="#5a1c06" stroke-width="1.4" opacity="1"/>
    <path d="M-10 -8 C-4 -14 8 -16 16 -12 M-14 6 C-6 12 12 14 22 8" stroke="#8a2f0c" stroke-width="1.3" fill="none" opacity=".6"/>
    <path d="M-2 -18 C10 -26 26 -22 32 -10 C36 -6 37 2 32 8 C22 4 8 2 -6 6 C-14 2 -12 -12 -2 -18 Z" fill="url(#kfcglaze)"/>
    <ellipse cx="6" cy="-10" rx="9" ry="4" fill="#ffb078" opacity=".65"/>
  </g>
  <!-- back-right wing -->
  <g transform="translate(214 108) scale(.84) rotate(12)">
