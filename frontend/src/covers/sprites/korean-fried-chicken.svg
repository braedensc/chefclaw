  <g transform="translate(212 140) scale(.72) rotate(10)">
    <path d="M-2 -16 C10 -22 24 -18 30 -8 C36 0 32 14 20 20 C8 26 -8 24 -16 14 C-24 6 -18 -8 -8 -13 C-6 -15 -4 -16 -2 -16 Z" fill="url(#kfcpiece)" stroke="#5a1c06" stroke-width="1.4"/>
    <path d="M-2 -16 C10 -22 24 -18 30 -8 C33 -3 33 3 28 8 C18 3 6 2 -6 6 C-14 1 -12 -10 -2 -16 Z" fill="url(#kfcglaze)"/>
    <ellipse cx="6" cy="-8" rx="8" ry="3.4" fill="#ffb078" opacity=".6"/>
  </g>
  <!-- toasted sesame seeds scattered on the glaze -->
  <g fill="#f8eed6">
    <ellipse cx="120" cy="112" rx="1.8" ry="1" transform="rotate(20 120 112)"/>
    <ellipse cx="150" cy="120" rx="1.8" ry="1" transform="rotate(-14 150 120)"/>
    <ellipse cx="176" cy="116" rx="1.8" ry="1" transform="rotate(30 176 116)"/>
    <ellipse cx="204" cy="118" rx="1.8" ry="1" transform="rotate(-8 204 118)"/>
    <ellipse cx="138" cy="134" rx="1.8" ry="1" transform="rotate(12 138 134)"/>
    <ellipse cx="182" cy="132" rx="1.8" ry="1" transform="rotate(-22 182 132)"/>
    <ellipse cx="160" cy="108" rx="1.8" ry="1" transform="rotate(6 160 108)"/>
