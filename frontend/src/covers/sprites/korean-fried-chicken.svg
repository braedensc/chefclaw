<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="kfcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="kfcpiece" cx="40%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#e26a1e"/><stop offset="52%" stop-color="#b8420f"/><stop offset="100%" stop-color="#7c2408"/>
    </radialGradient>
    <linearGradient id="kfcglaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5a2a" stop-opacity=".9"/><stop offset="100%" stop-color="#c11f14" stop-opacity=".9"/>
    </linearGradient>
    <radialGradient id="kfcplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kfcbg)"/>
  <!-- steam -->
  <path d="M122 58 C112 40 132 32 122 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M200 54 C192 38 210 30 202 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="186" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
