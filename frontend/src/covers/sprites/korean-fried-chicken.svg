  <!-- scallion + diced chili flecks -->
  <rect x="132" y="110" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 135 111)"/>
  <rect x="188" y="120" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 191 121)"/>
  <rect x="150" y="140" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 153 141)"/>
  <circle cx="168" cy="120" r="2" fill="#e0341f"/>
  <circle cx="118" cy="128" r="2" fill="#e0341f"/>
  <circle cx="206" cy="130" r="2" fill="#e0341f"/>
  <!-- oil gloss dots -->
  <circle cx="150" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="176" cy="122" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="132" cy="132" r="1.2" fill="#fff" opacity=".5"/>
</svg>
