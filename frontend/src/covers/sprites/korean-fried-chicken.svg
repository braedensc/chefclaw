    <path d="M-12 -6 C-4 -12 10 -14 18 -10 M-16 8 C-6 14 12 14 22 6" stroke="#8a2f0c" stroke-width="1.3" fill="none" opacity=".6"/>
    <path d="M-4 -18 C10 -24 26 -20 32 -8 C36 -3 36 4 31 9 C20 4 6 3 -8 7 C-16 2 -14 -12 -4 -18 Z" fill="url(#kfcglaze)"/>
