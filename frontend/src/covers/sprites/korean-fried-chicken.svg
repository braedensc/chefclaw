    <path d="M-16 -8 C-6 -16 12 -18 24 -12 M-22 10 C-8 18 16 20 30 10 M-12 22 C0 28 18 26 28 18" stroke="#7c2708" stroke-width="1.4" fill="none" opacity=".6"/>
    <path d="M-6 -22 C10 -30 30 -26 38 -12 C43 -5 43 6 37 12 C22 5 4 4 -12 9 C-22 3 -18 -14 -6 -22 Z" fill="url(#kfcglaze)"/>
