    <ellipse cx="-6" cy="8" rx="6" ry="2.6" fill="#ff9a5a" opacity=".5"/>
  </g>
  <!-- front-left small nugget -->
  <g transform="translate(108 138) scale(.72) rotate(-8)">
    <path d="M-2 -16 C10 -22 24 -18 30 -8 C36 0 32 14 20 20 C8 26 -8 24 -16 14 C-24 6 -18 -8 -8 -13 C-6 -15 -4 -16 -2 -16 Z" fill="url(#kfcpiece)" stroke="#5a1c06" stroke-width="1.4"/>
    <path d="M-2 -16 C10 -22 24 -18 30 -8 C33 -3 33 3 28 8 C18 3 6 2 -6 6 C-14 1 -12 -10 -2 -16 Z" fill="url(#kfcglaze)"/>
    <ellipse cx="6" cy="-8" rx="8" ry="3.4" fill="#ffb078" opacity=".6"/>
