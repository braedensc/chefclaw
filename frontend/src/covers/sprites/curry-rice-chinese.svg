<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="crcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="crcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="crcbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="crcrice" cx="42%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#fff6e2"/><stop offset="60%" stop-color="#f3e3bf"/><stop offset="100%" stop-color="#dcc493"/>
    </radialGradient>
    <linearGradient id="crccurry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a726"/><stop offset="50%" stop-color="#d97e13"/><stop offset="100%" stop-color="#a85809"/>
    </linearGradient>
    <linearGradient id="crcpot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6cf6a"/><stop offset="100%" stop-color="#c98a26"/>
    </linearGradient>
    <linearGradient id="crccar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9a3c"/><stop offset="100%" stop-color="#d9611a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#crcbg)"/>
  <!-- steam -->
  <path d="M116 52 C106 36 126 28 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#crcBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#crcBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="142" ry="22" fill="#000" opacity=".5"/>
  <!-- deep rounded rice bowl -->
  <path d="M54 118 C54 156 100 176 160 176 C220 176 266 156 266 118 Z" fill="url(#crcbowl)"/>
  <path d="M54 118 C54 156 100 176 160 176 C220 176 266 156 266 118" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="118" rx="106" ry="31" fill="#0d0d10"/>
  <ellipse cx="160" cy="118" rx="106" ry="31" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <!-- neon steam arc (cyan) -->
  <path d="M56 106 Q108 76 172 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- white rice on the LEFT half of the bowl -->
  <path d="M58 116 C68 98 100 92 132 96 C130 116 122 132 100 138 C78 138 62 130 58 116 Z" fill="url(#crcrice)"/>
  <path d="M64 112 C76 100 104 96 128 98" fill="none" stroke="#fff6d8" stroke-width="1.4" opacity=".35"/>
  <g stroke-linecap="round" fill="none">
    <path d="M78 112 l6 -3" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M96 118 l6 3" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M110 110 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M88 126 l6 2" stroke="#dcc088" stroke-width="2"/>
  </g>
  <!-- glossy golden curry sauce pooled over the RIGHT + spilling toward center -->
  <path d="M120 100 C150 90 200 92 236 104 C252 116 246 134 210 142 C170 148 132 140 116 126 C112 114 116 104 120 100 Z" fill="url(#crccurry)"/>
  <path d="M126 104 C156 96 198 98 228 108" fill="none" stroke="#ffcf6a" stroke-width="2" opacity=".55" stroke-linecap="round"/>
  <!-- curry surface sheen -->
  <ellipse cx="182" cy="112" rx="40" ry="9" fill="#ffca55" opacity=".35"/>
  <!-- potato chunks (pale gold cubes) submerged in curry -->
  <g stroke="#9a5f16" stroke-width="1.1">
    <rect x="150" y="108" width="20" height="16" rx="3" fill="url(#crcpot)" transform="rotate(-8 160 116)"/>
    <rect x="192" y="114" width="18" height="15" rx="3" fill="url(#crcpot)" transform="rotate(10 201 121)"/>
    <rect x="168" y="124" width="17" height="14" rx="3" fill="url(#crcpot)" transform="rotate(4 176 131)"/>
  </g>
  <ellipse cx="156" cy="112" rx="6" ry="2.4" fill="#fff2c8" opacity=".7"/>
  <ellipse cx="198" cy="118" rx="5" ry="2.2" fill="#fff2c8" opacity=".7"/>
  <!-- carrot dice (orange) -->
  <g stroke="#b04a12" stroke-width="1">
    <rect x="134" y="120" width="11" height="10" rx="2.4" fill="url(#crccar)" transform="rotate(-14 139 125)"/>
    <rect x="212" y="122" width="10" height="9" rx="2.2" fill="url(#crccar)" transform="rotate(18 217 126)"/>
    <rect x="184" y="134" width="10" height="9" rx="2.2" fill="url(#crccar)" transform="rotate(-6 189 138)"/>
  </g>
  <!-- pea dots + scallion fleck -->
  <circle cx="146" cy="134" r="2.6" fill="#5ecb4e"/>
  <circle cx="204" cy="134" r="2.4" fill="#4bb43e"/>
  <rect x="170" y="102" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 173 103)"/>
  <!-- gloss dots -->
  <circle cx="176" cy="106" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="214" cy="118" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="128" r="1.2" fill="#fff" opacity=".5"/>
</svg>
