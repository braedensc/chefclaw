    <radialGradient id="crsbroth" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#f4e2b0"/><stop offset="58%" stop-color="#e6c983"/><stop offset="100%" stop-color="#cba85f"/>
    </radialGradient>
