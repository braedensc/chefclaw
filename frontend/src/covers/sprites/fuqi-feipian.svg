<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="ffpbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="ffpplate" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0c0c0f"/>
    </radialGradient>
    <radialGradient id="ffpoil" cx="46%" cy="34%" r="82%">
      <stop offset="0%" stop-color="#ef5520"/><stop offset="55%" stop-color="#b02408"/><stop offset="100%" stop-color="#7a1305"/>
    </radialGradient>
    <linearGradient id="ffpbeef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a3418"/><stop offset="55%" stop-color="#5e2410"/><stop offset="100%" stop-color="#3b1408"/>
    </linearGradient>
    <linearGradient id="ffptripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9d6b4"/><stop offset="100%" stop-color="#c9ad82"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ffpbg)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oil-gloss sparkle (cold dish, no steam) -->
  <g fill="#ffe1a8" opacity=".55">
    <path d="M100 56 l1.6 4 l4 1.6 l-4 1.6 l-1.6 4 l-1.6 -4 l-4 -1.6 l4 -1.6 Z"/>
    <path d="M212 50 l1.3 3.2 l3.2 1.3 l-3.2 1.3 l-1.3 3.2 l-1.3 -3.2 l-3.2 -1.3 l3.2 -1.3 Z"/>
  </g>
  <circle cx="152" cy="46" r="1.6" fill="#fff0cf" opacity=".6"/>
  <!-- wide oval plate -->
  <ellipse cx="160" cy="130" rx="148" ry="48" fill="url(#ffpplate)"/>
  <ellipse cx="160" cy="130" rx="148" ry="48" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="132" ry="40" fill="#0f0d13"/>
  <!-- glistening red chili-oil pool the slices swim in -->
  <ellipse cx="160" cy="128" rx="122" ry="35" fill="url(#ffpoil)" opacity=".92"/>
  <ellipse cx="150" cy="122" rx="64" ry="14" fill="#ff7a3a" opacity=".3"/>
  <ellipse cx="112" cy="136" rx="20" ry="6" fill="#7a1305" opacity=".45"/>
  <ellipse cx="210" cy="134" rx="22" ry="6" fill="#7a1305" opacity=".45"/>
  <!-- TOSSED THIN SLICES: alternating beef (dark) + tripe/tongue (pale) fanned across the oil -->
  <g stroke="#2e0f04" stroke-width="1.2" stroke-linejoin="round">
    <!-- back layer, slightly smaller/dimmer -->
    <g opacity=".9" transform="translate(0 -4)">
      <path d="M84 112 C82 104 96 100 110 104 C122 100 132 108 128 116 C130 124 116 128 104 124 C92 126 86 120 84 112 Z" fill="url(#ffpbeef)"/>
      <path d="M188 108 C186 100 200 96 214 100 C226 96 236 104 232 112 C234 120 220 124 208 120 C196 122 190 116 188 108 Z" fill="url(#ffptripe)"/>
    </g>
    <!-- mid -->
    <path d="M112 116 C108 106 124 100 140 104 C154 100 164 110 158 120 C162 130 144 136 130 130 C116 132 110 124 112 116 Z" fill="url(#ffptripe)"/>
    <path d="M156 112 C152 102 168 96 184 100 C198 96 208 106 202 116 C206 126 188 132 174 126 C160 128 154 122 156 112 Z" fill="url(#ffpbeef)"/>
    <!-- front layer, larger + glossy -->
    <path d="M96 128 C92 118 108 112 124 116 C138 112 148 122 142 132 C146 142 128 148 114 142 C100 144 94 136 96 128 Z" fill="url(#ffpbeef)"/>
    <path d="M170 126 C166 116 182 110 198 114 C212 110 222 120 216 130 C220 140 202 146 188 140 C174 142 168 134 170 126 Z" fill="url(#ffptripe)"/>
  </g>
  <!-- marbling / muscle-grain streaks on the dark beef slices -->
  <g stroke="#c07840" stroke-width="1.1" fill="none" opacity=".55">
    <path d="M104 122 C114 118 124 120 132 126"/>
    <path d="M166 108 C176 104 188 106 196 112"/>
    <path d="M106 132 C116 128 128 130 136 136"/>
  </g>
  <!-- honeycomb tripe texture on the pale slices -->
  <g stroke="#a88a58" stroke-width=".8" fill="none" opacity=".6">
    <path d="M198 106 l4 3 M204 108 l3 4 M196 114 l4 2"/>
    <path d="M182 122 l4 3 M188 124 l3 4 M180 130 l4 2"/>
  </g>
  <!-- red chili-oil laps drizzled over the slices -->
  <path d="M120 118 C136 114 154 120 170 116" stroke="#c31f12" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round"/>
  <path d="M108 134 C126 130 148 136 168 132" stroke="#c31f12" stroke-width="2.2" fill="none" opacity=".65" stroke-linecap="round"/>
  <!-- GARNISH: crushed peanuts (tan chunks), toasted sesame, scallion + cilantro -->
  <g fill="#d8b06a" stroke="#a67f3e" stroke-width=".8">
    <path d="M132 108 l6 -2 l3 4 l-6 2 Z"/>
    <path d="M158 132 l6 -2 l3 4 l-6 2 Z"/>
    <path d="M100 122 l5 -2 l3 3 l-5 2 Z"/>
    <path d="M204 124 l5 -2 l3 3 l-5 2 Z"/>
    <path d="M148 118 l5 -2 l3 3 l-5 2 Z"/>
  </g>
  <rect x="118" y="106" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 121 107)"/>
  <rect x="176" y="104" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 179 105)"/>
  <rect x="140" y="134" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 143 135)"/>
  <rect x="198" y="118" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-12 201 119)"/>
  <!-- toasted sesame flecks -->
  <ellipse cx="126" cy="122" rx="2" ry="1.2" fill="#f8eed6" transform="rotate(20 126 122)"/>
  <ellipse cx="152" cy="110" rx="2" ry="1.2" fill="#f8eed6" transform="rotate(-14 152 110)"/>
  <ellipse cx="182" cy="132" rx="2" ry="1.2" fill="#f8eed6" transform="rotate(10 182 132)"/>
  <ellipse cx="108" cy="132" rx="1.8" ry="1.1" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="124" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="120" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="136" r="1.2" fill="#fff" opacity=".5"/>
</svg>
