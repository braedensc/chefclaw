<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tmBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tmbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="tmpot" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#4a2b1a"/><stop offset="60%" stop-color="#331c10"/><stop offset="100%" stop-color="#1c0e07"/>
    </radialGradient>
    <radialGradient id="tmsauce" cx="46%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#ff8a3d"/><stop offset="52%" stop-color="#e35d22"/><stop offset="100%" stop-color="#b03c14"/>
    </radialGradient>
    <linearGradient id="tmchick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c95a2a"/><stop offset="55%" stop-color="#a53f16"/><stop offset="100%" stop-color="#7c2a0d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tmbg)"/>
  <!-- rising steam wisps -->
  <path d="M124 52 C114 34 134 26 124 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#tmBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tmBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- curved clay pot / balti bowl (rounded belly) -->
  <path d="M52 116 C52 96 96 84 160 84 C224 84 268 96 268 116 C268 150 224 172 160 172 C96 172 52 150 52 116 Z" fill="url(#tmpot)"/>
  <path d="M52 116 C52 96 96 84 160 84 C224 84 268 96 268 116 C268 150 224 172 160 172 C96 172 52 150 52 116 Z" fill="none" stroke="#5a3620" stroke-width="3"/>
  <!-- pot rim highlight -->
  <path d="M62 108 C74 96 112 88 160 88 C208 88 246 96 258 108" stroke="#7c4a2c" stroke-width="2" fill="none" opacity=".6" stroke-linecap="round"/>
  <!-- neon steam arc (warm white) -->
  <path d="M56 108 Q108 78 172 78" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- creamy masala sauce pooled in the bowl -->
  <path d="M64 114 C64 100 104 92 160 92 C216 92 256 100 256 114 C256 140 216 156 160 156 C104 156 64 140 64 114 Z" fill="url(#tmsauce)"/>
  <path d="M64 114 C64 100 104 92 160 92 C216 92 256 100 256 114" fill="none" stroke="#ffb877" stroke-width="1.4" opacity=".4"/>
  <!-- cream swirls through the sauce -->
  <path d="M84 118 C112 110 150 116 176 110" stroke="#ffd9b0" stroke-width="4" fill="none" opacity=".55" stroke-linecap="round"/>
  <path d="M110 132 C140 126 176 132 208 124" stroke="#ffe6cc" stroke-width="3" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- tikka chicken chunks (charred edges), scattered -->
  <g stroke="#4a1806" stroke-width="1.3">
    <g transform="translate(100 108) rotate(-12)"><rect x="-14" y="-11" width="28" height="22" rx="6" fill="url(#tmchick)"/><path d="M-11 -8 l6 -3 M2 -9 l6 2" stroke="#3a1204" stroke-width="2" opacity=".6"/><ellipse cx="-3" cy="-3" rx="7" ry="3" fill="#e07a3c" opacity=".5"/></g>
    <g transform="translate(158 100) rotate(10)"><rect x="-15" y="-11" width="30" height="22" rx="6" fill="url(#tmchick)"/><path d="M-10 -7 l6 3 M4 -8 l5 3" stroke="#3a1204" stroke-width="2" opacity=".6"/><ellipse cx="0" cy="-3" rx="8" ry="3" fill="#e07a3c" opacity=".5"/></g>
    <g transform="translate(212 112) rotate(-8)"><rect x="-14" y="-10" width="28" height="21" rx="6" fill="url(#tmchick)"/><path d="M-9 -6 l6 -3 M3 -7 l5 2" stroke="#3a1204" stroke-width="2" opacity=".6"/><ellipse cx="-2" cy="-2" rx="7" ry="3" fill="#e07a3c" opacity=".5"/></g>
    <g transform="translate(126 132) rotate(14)"><rect x="-13" y="-10" width="26" height="20" rx="6" fill="url(#tmchick)"/><path d="M-8 -6 l5 3 M3 -6 l5 2" stroke="#3a1204" stroke-width="2" opacity=".6"/><ellipse cx="-1" cy="-2" rx="7" ry="3" fill="#e07a3c" opacity=".5"/></g>
    <g transform="translate(186 134) rotate(-6)"><rect x="-13" y="-10" width="26" height="20" rx="6" fill="url(#tmchick)"/><path d="M-8 -6 l5 -3 M3 -7 l5 2" stroke="#3a1204" stroke-width="2" opacity=".6"/><ellipse cx="-1" cy="-2" rx="7" ry="3" fill="#e07a3c" opacity=".5"/></g>
  </g>
  <!-- garnish: cilantro leaves + cream drizzle + a swirl on top -->
  <path d="M142 148 C158 142 176 144 196 140" stroke="#fff0dd" stroke-width="2.4" fill="none" opacity=".55" stroke-linecap="round"/>
  <rect x="118" y="120" width="7" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-22 121 121)"/>
  <rect x="170" y="118" width="7" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(16 173 119)"/>
  <rect x="146" y="140" width="6" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(28 149 141)"/>
  <rect x="206" y="126" width="6" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-16 209 127)"/>
  <!-- oil gloss dots -->
  <circle cx="112" cy="104" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="176" cy="112" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="128" r="1.2" fill="#fff" opacity=".5"/>
</svg>
