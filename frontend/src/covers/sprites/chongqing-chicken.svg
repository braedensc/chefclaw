  <!-- Sichuan peppercorns (麻) scattered on top -->
  <circle cx="98" cy="112" r="2.1" fill="#3a1206"/><circle cx="97.2" cy="111.2" r=".7" fill="#a05a26" opacity=".7"/>
  <circle cx="150" cy="106" r="2.1" fill="#3a1206"/><circle cx="149.2" cy="105.2" r=".7" fill="#a05a26" opacity=".7"/>
  <circle cx="200" cy="112" r="2" fill="#3a1206"/><circle cx="199.3" cy="111.3" r=".7" fill="#a05a26" opacity=".7"/>
  <circle cx="122" cy="134" r="2" fill="#3a1206"/><circle cx="121.3" cy="133.3" r=".7" fill="#a05a26" opacity=".7"/>
  <circle cx="176" cy="132" r="1.9" fill="#3a1206"/><circle cx="175.3" cy="131.3" r=".6" fill="#a05a26" opacity=".7"/>
  <!-- white sesame -->
  <ellipse cx="112" cy="120" rx="1.9" ry="1.1" fill="#f8eed6" transform="rotate(20 112 120)"/>
  <ellipse cx="164" cy="118" rx="1.9" ry="1.1" fill="#f8eed6" transform="rotate(-14 164 118)"/>
