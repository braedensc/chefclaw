    <path d="M96 122 q4 -9 13 -8 q7 -5 12 1 q9 -1 9 8 q4 7 -4 11 q-6 8 -15 4 q-11 2 -14 -6 q-6 -4 -1 -11 Z" fill="url(#cq1chik)"/>
    <path d="M150 132 q4 -9 13 -8 q7 -5 12 1 q9 -1 9 8 q4 7 -4 11 q-6 8 -15 4 q-11 2 -14 -6 q-6 -4 -1 -11 Z" fill="url(#cq1chik)"/>
    <path d="M198 124 q3 -8 11 -7 q6 -4 10 1 q8 -1 8 7 q3 6 -4 10 q-5 7 -13 3 q-9 1 -12 -5 q-5 -4 -1 -10 Z" fill="url(#cq1chik)"/>
  </g>
  <!-- craggy chicken speckle + gloss -->
  <g>
    <ellipse cx="106" cy="120" rx="5" ry="2.3" fill="#e0a556" opacity=".55"/>
    <ellipse cx="160" cy="130" rx="5" ry="2.3" fill="#e0a556" opacity=".55"/>
    <ellipse cx="207" cy="122" rx="4.4" ry="2" fill="#e0a556" opacity=".5"/>
