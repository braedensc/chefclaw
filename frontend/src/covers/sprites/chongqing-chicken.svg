      <path d="M4 4 C16 0 34 -2 48 1" stroke="#ff6a4a" stroke-width="1.5" fill="none" opacity=".65"/>
    </g>
    <g transform="translate(112 110) rotate(10)">
      <path d="M0 5 C12 -3 34 -5 50 -1 C57 1 60 5 57 9 C46 7 46 11 34 10 C20 11 8 10 0 7 Z" fill="url(#cq1chili)"/>
      <path d="M57 3 C63 2 67 5 68 10" stroke="#4a3a1a" stroke-width="2" fill="none"/>
      <path d="M4 4 C16 0 34 -2 48 1" stroke="#ff6a4a" stroke-width="1.5" fill="none" opacity=".65"/>
    </g>
    <g transform="translate(166 108) rotate(-30)">
      <path d="M0 5 C12 -3 34 -5 50 -1 C57 1 60 5 57 9 C46 7 46 11 34 10 C20 11 8 10 0 7 Z" fill="url(#cq1chili)"/>
      <path d="M57 3 C63 2 67 5 68 10" stroke="#4a3a1a" stroke-width="2" fill="none"/>
      <path d="M4 4 C16 0 34 -2 48 1" stroke="#ff6a4a" stroke-width="1.5" fill="none" opacity=".65"/>
    </g>
