<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="cq1Blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cq1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="cq1wok" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <!-- dried chili: deep glossy red, darker toward the tip -->
    <linearGradient id="cq1chili" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0%" stop-color="#d8281a"/><stop offset="52%" stop-color="#a51808"/><stop offset="100%" stop-color="#6c0f04"/>
    </linearGradient>
    <!-- craggy fried chicken: golden-brown fried crust -->
    <linearGradient id="cq1chik" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c07a2e"/><stop offset="50%" stop-color="#8a4d16"/><stop offset="100%" stop-color="#5a2f0c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cq1bg)"/>
  <!-- steam -->
  <path d="M122 52 C112 34 132 28 122 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#cq1Blur3)"/>
  <path d="M198 50 C190 34 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#cq1Blur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- wok: dark ring -->
  <ellipse cx="160" cy="128" rx="128" ry="54" fill="url(#cq1wok)"/>
  <ellipse cx="160" cy="128" rx="128" ry="54" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="112" ry="45" fill="#0c0c0f"/>
