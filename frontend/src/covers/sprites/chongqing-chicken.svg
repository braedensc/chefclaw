      <path d="M53 3 C59 2 63 5 64 10" stroke="#4a3a1a" stroke-width="2" fill="none"/>
      <path d="M4 4 C15 0 31 -2 44 1" stroke="#ff6a4a" stroke-width="1.4" fill="none" opacity=".6"/>
    </g>
    <g transform="translate(78 138) rotate(24)">
      <path d="M0 5 C12 -3 34 -5 50 -1 C57 1 60 5 57 9 C46 7 46 11 34 10 C20 11 8 10 0 7 Z" fill="url(#cq1chili)"/>
      <path d="M57 3 C63 2 67 5 68 10" stroke="#4a3a1a" stroke-width="2" fill="none"/>
      <path d="M4 4 C16 0 34 -2 48 1" stroke="#ff6a4a" stroke-width="1.5" fill="none" opacity=".6"/>
    </g>
    <g transform="translate(134 142) rotate(-12)">
      <path d="M0 5 C12 -3 34 -5 50 -1 C57 1 60 5 57 9 C46 7 46 11 34 10 C20 11 8 10 0 7 Z" fill="url(#cq1chili)"/>
      <path d="M57 3 C63 2 67 5 68 10" stroke="#4a3a1a" stroke-width="2" fill="none"/>
      <path d="M4 4 C16 0 34 -2 48 1" stroke="#ff6a4a" stroke-width="1.5" fill="none" opacity=".6"/>
    </g>
    <g transform="translate(188 140) rotate(30)">
      <path d="M0 5 C11 -3 31 -5 46 -1 C53 1 56 5 53 9 C43 7 43 11 32 10 C19 11 8 10 0 7 Z" fill="url(#cq1chili)"/>
      <path d="M53 3 C59 2 63 5 64 10" stroke="#4a3a1a" stroke-width="2" fill="none"/>
      <path d="M4 4 C15 0 31 -2 44 1" stroke="#ff6a4a" stroke-width="1.4" fill="none" opacity=".6"/>
    </g>
