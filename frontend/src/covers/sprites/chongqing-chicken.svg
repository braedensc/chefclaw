  <rect x="106" y="140" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(22 109 141)"/>
  <rect x="198" y="134" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-18 201 135)"/>
