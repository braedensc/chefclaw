  <g stroke="#5a0d03" stroke-width="1" stroke-linejoin="round" stroke-linecap="round" opacity=".9">
    <g transform="translate(74 106) rotate(-30) scale(.86)"><path d="M0 4 C10 -2 30 -4 44 0 C50 2 52 5 50 8 C40 6 40 9 30 8 C18 9 8 8 0 6 Z" fill="url(#cq1chili)"/><path d="M50 4 C55 3 58 6 59 10" stroke="#3a3016" stroke-width="1.8" fill="none"/></g>
    <g transform="translate(118 98) rotate(16) scale(.86)"><path d="M0 4 C10 -2 30 -4 44 0 C50 2 52 5 50 8 C40 6 40 9 30 8 C18 9 8 8 0 6 Z" fill="url(#cq1chili)"/><path d="M50 4 C55 3 58 6 59 10" stroke="#3a3016" stroke-width="1.8" fill="none"/></g>
    <g transform="translate(172 96) rotate(-14) scale(.86)"><path d="M0 4 C10 -2 30 -4 44 0 C50 2 52 5 50 8 C40 6 40 9 30 8 C18 9 8 8 0 6 Z" fill="url(#cq1chili)"/><path d="M50 4 C55 3 58 6 59 10" stroke="#3a3016" stroke-width="1.8" fill="none"/></g>
