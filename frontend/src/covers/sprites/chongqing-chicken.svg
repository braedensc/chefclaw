  <circle cx="128" cy="112" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="182" cy="114" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="156" cy="132" r="1.2" fill="#fff" opacity=".5"/>
