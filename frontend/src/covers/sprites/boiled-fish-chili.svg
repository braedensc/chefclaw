<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="bfcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bfcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="bfcbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="bfcoil" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ef5f24"/><stop offset="55%" stop-color="#b62b08"/><stop offset="100%" stop-color="#7a1305"/>
    </radialGradient>
    <linearGradient id="bfcfish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf1e2"/><stop offset="55%" stop-color="#f4dcc0"/><stop offset="100%" stop-color="#e2bd93"/>
    </linearGradient>
    <linearGradient id="bfcchili" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0341f"/><stop offset="100%" stop-color="#8f1408"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bfcbg)"/>
  <!-- spicy steam -->
  <path d="M116 50 C106 34 126 26 116 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bfcBlur3)"/>
  <path d="M200 48 C192 32 210 24 202 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#bfcBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="146" ry="22" fill="#000" opacity=".5"/>
  <!-- deep wide bowl brimming with chili oil -->
  <path d="M50 116 C50 158 98 180 160 180 C222 180 270 158 270 116 Z" fill="url(#bfcbowl)"/>
  <path d="M50 116 C50 158 98 180 160 180 C222 180 270 158 270 116" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="116" rx="110" ry="32" fill="#0d0d10"/>
  <ellipse cx="160" cy="116" rx="110" ry="32" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <!-- neon steam arc (cyan) -->
  <path d="M54 104 Q108 74 176 74" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- brimming chili-oil surface -->
  <ellipse cx="160" cy="116" rx="103" ry="29" fill="url(#bfcoil)"/>
  <ellipse cx="150" cy="108" rx="46" ry="11" fill="#ff7a3c" opacity=".3"/>
  <path d="M66 112 C80 100 116 94 160 94 C204 94 240 100 254 112" fill="none" stroke="#ff8a4a" stroke-width="1.5" opacity=".4"/>
  <!-- WHITE FISH FILLETS submerged, poking through the red oil -->
  <g stroke="#c99a68" stroke-width="1.2">
    <path d="M84 108 C86 100 100 96 116 98 C130 100 138 108 132 116 C124 124 100 124 90 118 C84 116 82 112 84 108 Z" fill="url(#bfcfish)"/>
    <path d="M148 104 C150 96 166 92 182 94 C196 96 204 104 198 112 C190 120 164 120 154 114 C148 112 146 108 148 104 Z" fill="url(#bfcfish)"/>
    <path d="M116 122 C118 116 132 112 148 114 C162 116 168 122 162 128 C154 134 132 134 122 130 C116 128 114 126 116 122 Z" fill="url(#bfcfish)"/>
    <path d="M196 118 C198 112 212 108 226 110 C238 112 244 118 238 124 C230 130 210 130 202 126 C196 124 194 122 196 118 Z" fill="url(#bfcfish)"/>
  </g>
  <!-- fish flake striations + gloss -->
  <g stroke="#e0c39a" stroke-width="1" opacity=".6" fill="none">
    <path d="M92 106 C104 104 118 104 126 108"/>
    <path d="M156 102 C168 100 182 100 190 104"/>
    <path d="M124 120 C136 118 148 118 156 122"/>
  </g>
  <g fill="#fff" opacity=".45"><ellipse cx="104" cy="103" rx="8" ry="2"/><ellipse cx="168" cy="99" rx="8" ry="2"/><ellipse cx="136" cy="118" rx="7" ry="1.8"/></g>
  <!-- floating DRIED RED CHILIES (curled) on the oil surface -->
  <g stroke="#7a1305" stroke-width="1">
    <path d="M100 128 C112 124 124 128 130 136 C122 138 110 136 100 132 Z" fill="url(#bfcchili)"/>
    <path d="M176 130 C188 126 200 130 206 138 C198 140 186 138 176 134 Z" fill="url(#bfcchili)"/>
    <path d="M142 132 C150 128 158 130 162 136 C156 138 148 137 142 134 Z" fill="url(#bfcchili)"/>
    <path d="M210 118 C220 116 228 120 230 126 C222 127 214 124 210 120 Z" fill="url(#bfcchili)"/>
    <path d="M78 120 C88 118 96 122 98 128 C90 129 82 126 78 122 Z" fill="url(#bfcchili)"/>
  </g>
  <!-- Sichuan peppercorns (dark specks) + sesame + scallion floating -->
  <g fill="#3a1508"><circle cx="120" cy="110" r="2"/><circle cx="150" cy="124" r="2"/><circle cx="188" cy="112" r="2"/><circle cx="108" cy="122" r="1.8"/><circle cx="200" cy="126" r="1.8"/><circle cx="166" cy="130" r="1.8"/></g>
  <g fill="#f8eed6"><circle cx="132" cy="116" r="1.2"/><circle cx="176" cy="118" r="1.2"/><circle cx="146" cy="108" r="1.1"/><circle cx="196" cy="120" r="1.1"/></g>
  <rect x="140" y="100" width="8" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 144 101)"/>
  <rect x="178" y="104" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(20 181 105)"/>
  <!-- red-oil gloss dots -->
  <circle cx="128" cy="104" r="1.5" fill="#ffb27a" opacity=".7"/>
  <circle cx="184" cy="108" r="1.3" fill="#ffb27a" opacity=".6"/>
  <circle cx="158" cy="120" r="1.2" fill="#fff" opacity=".45"/>
</svg>
