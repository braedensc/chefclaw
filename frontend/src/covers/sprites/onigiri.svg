<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="onbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="onboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/><stop offset="100%" stop-color="#241809"/>
    </linearGradient>
    <linearGradient id="onrice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/><stop offset="60%" stop-color="#f2ecdc"/><stop offset="100%" stop-color="#ddd2ba"/>
    </linearGradient>
    <linearGradient id="onnori" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3225"/><stop offset="100%" stop-color="#0e1c12"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#onbg)"/>
  <ellipse cx="160" cy="186" rx="148" ry="20" fill="#000" opacity=".5"/>
  <!-- wooden serving board -->
  <path d="M40 138 L280 138 L268 172 L52 172 Z" fill="url(#onboard)"/>
  <path d="M40 138 L280 138 L268 172 L52 172 Z" fill="none" stroke="#4a3620" stroke-width="1.6" opacity=".7"/>
  <path d="M64 150 L256 150 M60 160 L260 160" stroke="#4a3620" stroke-width="1.2" opacity=".45"/>
  <path d="M40 138 L280 138" stroke="#5c452a" stroke-width="1.4" opacity=".5"/>
  <!-- back onigiri (smaller, to the right) -->
  <g transform="translate(212 96) scale(.82)">
    <path d="M0 60 C0 20 20 -6 34 -6 C48 -6 68 20 68 60 C50 70 18 70 0 60 Z" fill="#c9bda2" opacity=".6"/>
    <path d="M-2 56 C-2 18 18 -8 34 -8 C50 -8 70 18 70 56 C50 66 16 66 -2 56 Z" fill="url(#onrice)"/>
    <path d="M-2 56 C-2 18 18 -8 34 -8 C50 -8 70 18 70 56" fill="none" stroke="#fffdf6" stroke-width="1.3" opacity=".4"/>
    <path d="M14 62 L54 62 L52 84 L16 84 Z" fill="url(#onnori)"/>
    <path d="M14 62 L54 62 L52 84 L16 84 Z" fill="none" stroke="#0a140c" stroke-width="1.2" opacity=".6"/>
  </g>
  <!-- front onigiri (hero triangle, left-center) -->
  <g transform="translate(72 66)">
    <!-- cast contact shadow -->
    <ellipse cx="52" cy="90" rx="52" ry="10" fill="#000" opacity=".35"/>
    <!-- rice triangle body (rounded corners) -->
    <path d="M4 78 C4 26 30 -8 52 -8 C74 -8 100 26 100 78 C74 92 30 92 4 78 Z" fill="#cabd9e" opacity=".6"/>
    <path d="M0 74 C0 24 26 -10 52 -10 C78 -10 104 24 104 74 C76 88 28 88 0 74 Z" fill="url(#onrice)"/>
    <path d="M0 74 C0 24 26 -10 52 -10 C78 -10 104 24 104 74" fill="none" stroke="#fffdf6" stroke-width="1.5" opacity=".5"/>
    <!-- rice-grain texture -->
    <g stroke-linecap="round" fill="none" opacity=".7">
      <path d="M28 26 l6 -2" stroke="#e6ddc6" stroke-width="2"/>
      <path d="M46 16 l5 2" stroke="#cfc4a8" stroke-width="2"/>
      <path d="M66 26 l6 -2" stroke="#e6ddc6" stroke-width="2"/>
      <path d="M22 44 l5 2" stroke="#cfc4a8" stroke-width="2"/>
      <path d="M80 44 l-5 2" stroke="#e6ddc6" stroke-width="2"/>
      <path d="M36 40 l6 -2" stroke="#cfc4a8" stroke-width="2"/>
      <path d="M62 40 l5 2" stroke="#e6ddc6" stroke-width="2"/>
      <path d="M18 60 l6 2" stroke="#cfc4a8" stroke-width="2"/>
      <path d="M86 60 l-6 2" stroke="#e6ddc6" stroke-width="2"/>
      <path d="M52 30 l5 2" stroke="#cfc4a8" stroke-width="2"/>
    </g>
    <!-- top-face sheen -->
    <ellipse cx="42" cy="22" rx="20" ry="8" fill="#ffffff" opacity=".35"/>
    <!-- nori seaweed band across the base -->
    <path d="M16 62 L88 62 L92 96 C72 104 32 104 12 96 Z" fill="url(#onnori)"/>
    <path d="M16 62 L88 62 L92 96 C72 104 32 104 12 96 Z" fill="none" stroke="#0a140c" stroke-width="1.4" opacity=".7"/>
    <!-- nori matte sheen streaks -->
    <path d="M24 70 L82 70" stroke="#2c4433" stroke-width="1.6" opacity=".5"/>
    <path d="M20 82 L88 82" stroke="#25392b" stroke-width="1.4" opacity=".4"/>
    <!-- umeboshi plum peeking at the top center -->
    <circle cx="52" cy="8" r="7" fill="#d94a4a"/>
    <circle cx="49" cy="5" r="2.2" fill="#f0857f" opacity=".85"/>
    <path d="M45 8 C50 5 56 5 60 9" stroke="#a82f2f" stroke-width="1" fill="none" opacity=".6"/>
    <!-- sesame flecks on the rice -->
    <ellipse cx="34" cy="34" rx="1.8" ry="1" fill="#e8dcc0" transform="rotate(20 34 34)"/>
    <ellipse cx="70" cy="30" rx="1.8" ry="1" fill="#7a4c14" transform="rotate(-14 70 30)"/>
    <ellipse cx="58" cy="46" rx="1.6" ry="1" fill="#e8dcc0" transform="rotate(8 58 46)"/>
    <ellipse cx="30" cy="52" rx="1.6" ry="1" fill="#7a4c14" transform="rotate(-20 30 52)"/>
  </g>
  <!-- cold-dish sparkles (no steam) -->
  <g fill="#eafcff">
    <path d="M118 40 l1.6 4 l4 1.6 l-4 1.6 l-1.6 4 l-1.6 -4 l-4 -1.6 l4 -1.6 Z" opacity=".8"/>
    <path d="M228 60 l1.2 3 l3 1.2 l-3 1.2 l-1.2 3 l-1.2 -3 l-3 -1.2 l3 -1.2 Z" opacity=".65"/>
    <path d="M182 46 l1 2.4 l2.4 1 l-2.4 1 l-1 2.4 l-1 -2.4 l-2.4 -1 l2.4 -1 Z" opacity=".55"/>
  </g>
  <!-- gloss dots -->
  <circle cx="108" cy="86" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="150" cy="98" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="238" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
