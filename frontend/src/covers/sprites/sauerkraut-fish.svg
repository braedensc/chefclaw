  <g stroke-linecap="round" fill="none" opacity=".9">
    <path d="M96 106 C104 102 116 104 122 110" stroke="#cbb352" stroke-width="3.4"/>
    <path d="M126 100 C136 98 146 102 150 108" stroke="#d8c268" stroke-width="3.4"/>
    <path d="M188 104 C198 100 208 104 214 110" stroke="#cbb352" stroke-width="3.4"/>
    <path d="M108 118 C118 116 128 118 134 122" stroke="#c2a944" stroke-width="3"/>
    <path d="M198 118 C208 114 218 118 222 122" stroke="#d8c268" stroke-width="3"/>
  </g>
  <!-- FISH FILLET SLICES: pale, glossy, curled, floating on top -->
  <g stroke="#c9b487" stroke-width="1.3" opacity="1">
    <path d="M96 108 C92 98 108 92 122 96 C134 92 144 100 140 110 C144 118 128 124 116 120 C104 122 98 116 96 108 Z" fill="url(#skffish)"/>
    <path d="M150 100 C146 90 162 84 176 88 C188 84 198 92 194 102 C198 110 182 116 170 112 C158 114 152 108 150 100 Z" fill="url(#skffish)"/>
    <path d="M124 124 C120 114 136 108 150 112 C162 108 172 116 168 126 C172 134 156 140 144 136 C132 138 126 132 124 124 Z" fill="url(#skffish)"/>
    <path d="M188 118 C184 108 200 102 214 106 C226 102 236 110 232 120 C236 128 220 134 208 130 C196 132 190 126 188 118 Z" fill="url(#skffish)"/>
  </g>
  <!-- fish translucency ridge lines -->
  <g stroke="#e9dcc0" stroke-width="1.2" fill="none" opacity=".7">
    <path d="M104 106 C114 102 128 104 134 110"/>
    <path d="M158 98 C170 94 184 96 190 102"/>
    <path d="M132 122 C144 118 158 120 164 126"/>
    <path d="M196 116 C208 112 222 114 228 120"/>
