  <path d="M52 112 Q104 78 168 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- deep bowl body -->
  <path d="M40 116 C40 108 60 104 160 104 C260 104 280 108 280 116 C278 156 232 182 160 182 C88 182 42 156 40 116 Z" fill="url(#skfbowl)"/>
  <path d="M40 116 C40 108 60 104 160 104 C260 104 280 108 280 116 C278 156 232 182 160 182 C88 182 42 156 40 116 Z" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- rim ellipse -->
