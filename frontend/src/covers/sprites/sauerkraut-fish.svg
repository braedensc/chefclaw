  <ellipse cx="160" cy="114" rx="120" ry="30" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <!-- milky sour broth surface -->
  <ellipse cx="160" cy="114" rx="112" ry="27" fill="url(#skfbroth)"/>
