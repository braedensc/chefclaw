<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="skfBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="skfbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="skfbroth" cx="46%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#fbf3df"/><stop offset="55%" stop-color="#f0e2c0"/><stop offset="100%" stop-color="#d9c398"/>
    </radialGradient>
    <radialGradient id="skfbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0c0c0f"/>
    </radialGradient>
    <linearGradient id="skffish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/><stop offset="55%" stop-color="#f2e9d6"/><stop offset="100%" stop-color="#dfceac"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#skfbg)"/>
  <!-- steam -->
  <path d="M118 50 C108 32 128 26 118 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#skfBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#skfBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="140" ry="22" fill="#000" opacity=".5"/>
