  <!-- gloss highlights on fish -->
  <ellipse cx="112" cy="104" rx="7" ry="2.6" fill="#fff" opacity=".55"/>
  <ellipse cx="168" cy="96" rx="7" ry="2.6" fill="#fff" opacity=".55"/>
  <ellipse cx="146" cy="120" rx="6" ry="2.4" fill="#fff" opacity=".5"/>
  <!-- garnish: dried chilies, sichuan pepper, cilantro, scallion -->
  <path d="M118 92 C124 90 130 92 132 96 C126 98 120 96 118 92 Z" fill="#d02c14"/>
  <path d="M178 128 C184 126 190 128 192 132 C186 134 180 132 178 128 Z" fill="#d02c14"/>
  <rect x="140" y="90" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 143 91)"/>
  <rect x="200" y="106" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(18 203 107)"/>
  <rect x="106" y="128" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 109 129)"/>
  <circle cx="130" cy="112" r="1.8" fill="#3a1206"/>
  <circle cx="182" cy="98" r="1.8" fill="#3a1206"/>
  <circle cx="160" cy="130" r="1.8" fill="#3a1206"/>
  <!-- oil gloss dots -->
  <circle cx="124" cy="104" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="120" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="132" r="1.2" fill="#fff" opacity=".5"/>
