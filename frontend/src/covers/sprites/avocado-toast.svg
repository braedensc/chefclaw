<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="atBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="atbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="attoast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c27f"/><stop offset="55%" stop-color="#d29f52"/><stop offset="100%" stop-color="#a3742c"/>
    </linearGradient>
    <linearGradient id="atmash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7cf5f"/><stop offset="55%" stop-color="#82b544"/><stop offset="100%" stop-color="#5c8a2e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#atbg)"/>
  <!-- steam (light, warm toast) -->
  <path d="M126 52 C118 38 134 30 126 12" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#atBlur3)"/>
  <path d="M196 54 C190 40 204 32 198 14" stroke="#fff" stroke-width="5" fill="none" opacity=".07" filter="url(#atBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="146" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="136" rx="130" ry="48" fill="#141018"/>
  <ellipse cx="160" cy="136" rx="130" ry="48" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="136" rx="114" ry="40" fill="#0f0d13"/>
  <!-- neon steam arc (warm white) -->
  <path d="M56 114 Q106 84 168 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- THICK slice of rustic toast, angled -->
  <g transform="translate(160 128) rotate(-7)">
    <!-- crust body -->
    <rect x="-88" y="-32" width="176" height="66" rx="16" fill="#7a531f"/>
    <!-- toasted top face -->
    <rect x="-84" y="-30" width="168" height="52" rx="13" fill="url(#attoast)"/>
    <!-- crumb pores -->
    <circle cx="-52" cy="-6" r="2.4" fill="#c79a52" opacity=".6"/>
    <circle cx="-18" cy="6" r="2.2" fill="#c79a52" opacity=".55"/>
    <circle cx="30" cy="-8" r="2.6" fill="#c79a52" opacity=".6"/>
    <circle cx="58" cy="8" r="2" fill="#c79a52" opacity=".5"/>
    <!-- SMASHED AVOCADO spread on top -->
    <path d="M-78 -20 C-70 -30 -40 -30 -14 -28 C16 -30 52 -28 78 -22 C82 -12 78 2 60 8 C30 14 -30 14 -62 8 C-80 2 -82 -12 -78 -20 Z" fill="url(#atmash)"/>
    <path d="M-70 -20 C-40 -26 20 -26 66 -18" stroke="#b6dd7a" stroke-width="2" fill="none" opacity=".5" stroke-linecap="round"/>
    <!-- fork-mash texture furrows -->
    <path d="M-56 -12 l0 14 M-32 -14 l0 16 M-6 -14 l0 16 M22 -14 l0 16 M48 -12 l0 14" stroke="#5c8a2e" stroke-width="1.6" opacity=".45" stroke-linecap="round"/>
    <!-- fanned avocado slices on top -->
    <path d="M-40 -18 C-30 -24 -18 -24 -10 -18 C-18 -14 -30 -14 -40 -18 Z" fill="#c6e08a"/>
    <path d="M-14 -16 C-4 -22 8 -22 16 -16 C8 -12 -4 -12 -14 -16 Z" fill="#b8d97a"/>
    <path d="M12 -18 C22 -24 34 -24 42 -18 C34 -14 22 -14 12 -18 Z" fill="#c6e08a"/>
    <!-- red pepper flakes + sesame -->
    <circle cx="-46" cy="-2" r="1.5" fill="#e0341f"/>
    <circle cx="4" cy="4" r="1.4" fill="#e0341f"/>
    <circle cx="40" cy="-2" r="1.4" fill="#e0341f"/>
    <ellipse cx="-22" cy="-2" rx="1.6" ry="1" fill="#f8eed6"/>
    <ellipse cx="26" cy="6" rx="1.6" ry="1" fill="#f8eed6"/>
    <ellipse cx="58" cy="-6" rx="1.6" ry="1" fill="#f8eed6"/>
  </g>
  <!-- microgreen garnish flecks -->
  <rect x="120" y="108" width="7" height="2.6" rx="1.3" fill="#6abf5a" transform="rotate(-24 123 109)"/>
  <rect x="196" y="112" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(18 199 113)"/>
  <!-- gloss dots -->
  <circle cx="132" cy="118" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="188" cy="126" r="1.2" fill="#fff" opacity=".45"/>
</svg>
