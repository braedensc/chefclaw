<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="tcwok" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="tcskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6532a"/><stop offset="42%" stop-color="#c5361b"/><stop offset="100%" stop-color="#8a1c0c"/>
    </linearGradient>
    <linearGradient id="tcskin2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d94a24"/><stop offset="45%" stop-color="#a82810"/><stop offset="100%" stop-color="#6e1608"/>
    </linearGradient>
    <linearGradient id="tcbone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6e6"/><stop offset="100%" stop-color="#e2cda2"/>
    </linearGradient>
    <linearGradient id="tclemon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe873"/><stop offset="100%" stop-color="#e0b021"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tcbg)"/>
  <!-- steam -->
  <path d="M118 54 C108 36 128 28 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#tcBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tcBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="146" ry="47" fill="url(#tcwok)"/>
  <ellipse cx="160" cy="132" rx="146" ry="47" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="130" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (rose) -->
  <path d="M50 112 Q104 80 166 78" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>

  <!-- ===== THREE SEPARATED TANDOORI DRUMSTICKS, fanned across the plate ===== -->
  <!-- Each drumstick = a thin white bone shaft (knob at the exposed end) + a bulbous
       charred red-orange meat club at the far end. Clear gaps between the three. -->

  <!-- LEFT drumstick (back layer, tilts up-left, slightly smaller/dimmer) -->
  <g transform="translate(84 118) rotate(-30)">
    <!-- bone shaft -->
    <rect x="-2" y="-4.5" width="30" height="9" rx="4.5" fill="url(#tcbone)"/>
    <rect x="-2" y="-4.5" width="30" height="9" rx="4.5" fill="none" stroke="#c9b184" stroke-width="1" opacity=".6"/>
    <!-- exposed knuckle knob at the end of the bone -->
    <circle cx="-3" cy="-2" r="6" fill="url(#tcbone)"/>
    <circle cx="-3" cy="4" r="5.4" fill="url(#tcbone)"/>
    <circle cx="-4.5" cy="-1" r="2.4" fill="#fffaf0" opacity=".85"/>
    <!-- bulbous meat club -->
    <path d="M22 0 C22 -16 34 -26 50 -26 C68 -26 78 -14 78 2 C78 18 66 28 50 28 C34 28 22 16 22 0 Z" fill="url(#tcskin2)"/>
    <path d="M22 0 C22 -16 34 -26 50 -26 C68 -26 78 -14 78 2 C78 18 66 28 50 28 C34 28 22 16 22 0 Z" fill="none" stroke="#3d0e05" stroke-width="1.4" opacity=".5"/>
    <!-- char spots -->
    <circle cx="46" cy="-12" r="3.2" fill="#2a0d05" opacity=".68"/>
    <circle cx="62" cy="6" r="3.6" fill="#2a0d05" opacity=".7"/>
    <circle cx="40" cy="14" r="2.6" fill="#2a0d05" opacity=".58"/>
    <!-- glaze highlight -->
    <ellipse cx="48" cy="-6" rx="12" ry="5" fill="#ff9166" opacity=".42"/>
    <ellipse cx="42" cy="-9" rx="4.6" ry="2.2" fill="#ffd0a0" opacity=".65"/>
  </g>

  <!-- CENTRE drumstick (foreground, biggest + brightest, tilts up) -->
  <g transform="translate(148 120) rotate(-6)">
    <rect x="-2" y="-5" width="33" height="10" rx="5" fill="url(#tcbone)"/>
    <rect x="-2" y="-5" width="33" height="10" rx="5" fill="none" stroke="#c9b184" stroke-width="1" opacity=".6"/>
    <circle cx="-3" cy="-2.5" r="6.6" fill="url(#tcbone)"/>
    <circle cx="-3" cy="4.5" r="6" fill="url(#tcbone)"/>
    <circle cx="-5" cy="-1.5" r="2.6" fill="#fffaf0" opacity=".9"/>
    <path d="M25 0 C25 -18 38 -29 56 -29 C76 -29 88 -16 88 2 C88 20 74 31 56 31 C38 31 25 18 25 0 Z" fill="url(#tcskin)"/>
    <path d="M25 0 C25 -18 38 -29 56 -29 C76 -29 88 -16 88 2 C88 20 74 31 56 31 C38 31 25 18 25 0 Z" fill="none" stroke="#3d0e05" stroke-width="1.5" opacity=".55"/>
    <circle cx="52" cy="-14" r="3.8" fill="#2a0d05" opacity=".72"/>
    <circle cx="70" cy="4" r="4" fill="#2a0d05" opacity=".72"/>
    <circle cx="46" cy="12" r="3" fill="#2a0d05" opacity=".6"/>
    <circle cx="64" cy="-8" r="2.4" fill="#2a0d05" opacity=".55"/>
    <ellipse cx="54" cy="-8" rx="14" ry="6" fill="#ff9166" opacity=".45"/>
    <ellipse cx="47" cy="-11" rx="5.4" ry="2.6" fill="#ffd0a0" opacity=".72"/>
  </g>

  <!-- RIGHT drumstick (mid layer, tilts up-right) -->
  <g transform="translate(212 116) rotate(28) scale(-1 1)">
    <rect x="-2" y="-4.8" width="31" height="9.6" rx="4.8" fill="url(#tcbone)"/>
    <rect x="-2" y="-4.8" width="31" height="9.6" rx="4.8" fill="none" stroke="#c9b184" stroke-width="1" opacity=".6"/>
    <circle cx="-3" cy="-2.2" r="6.2" fill="url(#tcbone)"/>
    <circle cx="-3" cy="4.2" r="5.6" fill="url(#tcbone)"/>
    <circle cx="-4.6" cy="-1.2" r="2.4" fill="#fffaf0" opacity=".85"/>
    <path d="M23 0 C23 -17 36 -27 52 -27 C71 -27 82 -15 82 2 C82 19 69 29 52 29 C36 29 23 17 23 0 Z" fill="url(#tcskin)"/>
    <path d="M23 0 C23 -17 36 -27 52 -27 C71 -27 82 -15 82 2 C82 19 69 29 52 29 C36 29 23 17 23 0 Z" fill="none" stroke="#3d0e05" stroke-width="1.4" opacity=".52"/>
    <circle cx="48" cy="-13" r="3.6" fill="#2a0d05" opacity=".7"/>
    <circle cx="66" cy="5" r="3.8" fill="#2a0d05" opacity=".7"/>
    <circle cx="43" cy="13" r="2.8" fill="#2a0d05" opacity=".58"/>
    <ellipse cx="50" cy="-7" rx="13" ry="5.4" fill="#ff9166" opacity=".43"/>
    <ellipse cx="44" cy="-10" rx="5" ry="2.4" fill="#ffd0a0" opacity=".68"/>
  </g>

  <!-- lemon wedge (front-right corner of the plate) -->
  <g transform="translate(236 140) rotate(16)">
    <path d="M0 0 C13 -6 28 -6 39 2 C28 8 13 8 0 2 Z" fill="url(#tclemon)"/>
    <path d="M0 0 C13 -6 28 -6 39 2 C28 8 13 8 0 2 Z" fill="none" stroke="#b8891a" stroke-width="1.2" opacity=".7"/>
    <path d="M6 1 L19 1 M21 -2 L32 0" stroke="#fff6c8" stroke-width="1.4" opacity=".6"/>
  </g>

  <!-- red-onion rings scattered on the plate -->
  <g fill="none" stroke="#b478ff" stroke-width="2.4" opacity=".7">
    <ellipse cx="104" cy="150" rx="9" ry="4"/>
    <ellipse cx="176" cy="152" rx="10" ry="4.4"/>
  </g>
  <ellipse cx="104" cy="150" rx="4.6" ry="1.8" fill="none" stroke="#c9a0ff" stroke-width="1.4" opacity=".55"/>
  <ellipse cx="176" cy="152" rx="5" ry="2" fill="none" stroke="#c9a0ff" stroke-width="1.4" opacity=".5"/>

  <!-- cilantro sprigs -->
  <rect x="128" y="88" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-24 131 89)"/>
  <rect x="150" y="84" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(18 153 85)"/>
  <rect x="196" y="90" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(30 199 91)"/>
  <rect x="140" y="146" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-12 143 147)"/>

  <!-- gloss dots -->
  <circle cx="196" cy="104" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="132" cy="100" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="264" cy="118" r="1.3" fill="#fff" opacity=".5"/>
</svg>
