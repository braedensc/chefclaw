<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="gdbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="gddough" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#e6a752"/><stop offset="60%" stop-color="#cf8734"/><stop offset="100%" stop-color="#a5641f"/>
    </radialGradient>
    <radialGradient id="gdglaze" cx="42%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff7ec"/><stop offset="55%" stop-color="#fbe8d4"/><stop offset="100%" stop-color="#eccdb0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gdbg)"/>
  <!-- cold-sweet: no steam arc; a subtle sparkle instead -->
  <ellipse cx="160" cy="186" rx="128" ry="20" fill="#000" opacity=".5"/>
  <!-- neon glaze-sheen arc (rose, faint) -->
  <path d="M78 84 Q128 56 180 60" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".34" stroke-linecap="round"/>
  <!-- plate -->
  <ellipse cx="160" cy="140" rx="130" ry="42" fill="#141018"/>
  <ellipse cx="160" cy="140" rx="130" ry="42" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="140" rx="116" ry="34" fill="#0f0d13"/>
  <!-- DONUT: fat glazed ring, torus, three-quarter view -->
  <g transform="translate(160 116)">
    <!-- dough ring underside (the fried outer torus, slightly larger, offset down) -->
    <ellipse cx="0" cy="6" rx="72" ry="44" fill="url(#gddough)"/>
    <ellipse cx="0" cy="6" rx="72" ry="44" fill="none" stroke="#8a4f16" stroke-width="1.5" opacity=".5"/>
    <!-- fried edge shadow at bottom -->
    <path d="M-64 20 C-40 40 40 40 64 20" stroke="#7a4712" stroke-width="4" fill="none" opacity=".4" stroke-linecap="round"/>
    <!-- the hole (dark plate showing through) -->
    <ellipse cx="0" cy="4" rx="24" ry="15" fill="#0d0b11"/>
    <ellipse cx="0" cy="4" rx="24" ry="15" fill="none" stroke="#8a4f16" stroke-width="1.5" opacity=".45"/>
    <!-- WHITE GLAZE poured over the top surface (torus top, sits above dough) -->
    <path d="M-72 0
             C-72 -26 -40 -40 0 -40
             C40 -40 72 -26 72 0
             C72 12 60 20 44 22
             C40 10 22 4 0 4
             C-22 4 -40 10 -44 22
             C-60 20 -72 12 -72 0 Z" fill="url(#gdglaze)"/>
    <path d="M-72 0
             C-72 -26 -40 -40 0 -40
             C40 -40 72 -26 72 0
             C72 12 60 20 44 22
             C40 10 22 4 0 4
             C-22 4 -40 10 -44 22
             C-60 20 -72 12 -72 0 Z" fill="none" stroke="#e0c3a4" stroke-width="1.4" opacity=".55"/>
    <!-- glaze drips down the outer edge -->
    <path d="M-58 14 C-60 24 -56 30 -60 34 C-64 28 -64 22 -63 14 Z" fill="#fbe8d4"/>
    <path d="M-30 20 C-32 30 -28 36 -32 40 C-36 34 -36 28 -35 20 Z" fill="#fbe8d4"/>
    <path d="M28 20 C26 30 30 36 26 40 C22 34 22 28 23 20 Z" fill="#fbe8d4"/>
    <path d="M56 14 C54 24 58 30 54 34 C50 28 50 22 51 14 Z" fill="#fbe8d4"/>
    <!-- glaze gloss highlight -->
    <ellipse cx="-24" cy="-20" rx="26" ry="10" fill="#ffffff" opacity=".55"/>
    <ellipse cx="34" cy="-14" rx="14" ry="5" fill="#ffffff" opacity=".4"/>
    <!-- inner-hole glaze rim -->
    <path d="M-24 4 C-24 -8 -12 -14 0 -14 C12 -14 24 -8 24 4" fill="none" stroke="#fbe8d4" stroke-width="4" opacity=".85" stroke-linecap="round"/>
  </g>
  <!-- sparkles (cold-sweet accent instead of steam) -->
  <g stroke="#fff" stroke-linecap="round" opacity=".85">
    <path d="M118 60 l0 8 M114 64 l8 0" stroke-width="1.6"/>
    <path d="M226 74 l0 6 M223 77 l6 0" stroke-width="1.4"/>
    <path d="M96 108 l0 5 M93.5 110.5 l5 0" stroke-width="1.2" opacity=".7"/>
  </g>
  <!-- gloss dots -->
  <circle cx="132" cy="98" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="104" r="1.3" fill="#fff" opacity=".5"/>
</svg>
