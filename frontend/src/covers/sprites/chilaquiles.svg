<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="chqBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="chqbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="chqsalsa" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#e14524"/><stop offset="55%" stop-color="#b52a10"/><stop offset="100%" stop-color="#7a1808"/>
    </radialGradient>
    <linearGradient id="chqchip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6cf6a"/><stop offset="55%" stop-color="#e2a838"/><stop offset="100%" stop-color="#b4761d"/>
    </linearGradient>
    <radialGradient id="chqyolk" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffd94f"/><stop offset="60%" stop-color="#f6ac25"/><stop offset="100%" stop-color="#dc8410"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#chqbg)"/>
  <!-- steam -->
  <path d="M124 52 C114 36 132 28 122 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#chqBlur3)"/>
  <path d="M196 50 C188 34 204 26 196 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#chqBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- round shallow plate -->
  <ellipse cx="160" cy="130" rx="128" ry="52" fill="#141018"/>
  <ellipse cx="160" cy="130" rx="128" ry="52" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="112" ry="44" fill="#0f0d13"/>
  <!-- neon steam arc (rose family) -->
  <path d="M52 116 Q104 84 168 82" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- salsa roja pool -->
  <ellipse cx="160" cy="130" rx="104" ry="40" fill="url(#chqsalsa)"/>
  <path d="M64 128 C80 110 120 106 160 106 C200 106 240 110 256 128" fill="none" stroke="#ff7d53" stroke-width="1.4" opacity=".35"/>
  <!-- saucy tortilla-chip triangles, tossed, overlapping -->
  <g stroke="#8a4a10" stroke-width="1.3" stroke-linejoin="round">
    <path d="M74 118 L104 108 L96 138 Z" fill="url(#chqchip)" transform="rotate(-8 88 121)"/>
    <path d="M112 106 L146 100 L124 130 Z" fill="url(#chqchip)" transform="rotate(6 127 112)"/>
    <path d="M150 104 L186 108 L162 134 Z" fill="url(#chqchip)" transform="rotate(-4 166 115)"/>
    <path d="M190 108 L224 118 L196 140 Z" fill="url(#chqchip)" transform="rotate(10 203 122)"/>
    <path d="M96 132 L130 126 L112 152 Z" fill="url(#chqchip)" transform="rotate(-14 112 137)"/>
    <path d="M138 130 L174 128 L152 154 Z" fill="url(#chqchip)" transform="rotate(4 154 137)"/>
    <path d="M178 128 L214 134 L188 152 Z" fill="url(#chqchip)" transform="rotate(-8 192 138)"/>
  </g>
  <!-- glossy salsa sheen on the chips -->
  <g fill="#ff9d6b" opacity=".35">
    <ellipse cx="92" cy="120" rx="8" ry="3"/>
    <ellipse cx="132" cy="114" rx="9" ry="3"/>
    <ellipse cx="170" cy="118" rx="8" ry="3"/>
    <ellipse cx="204" cy="124" rx="8" ry="3"/>
  </g>
  <!-- fried egg on top, center -->
  <path d="M128 116 C124 104 138 96 152 98 C168 94 182 102 180 116 C186 128 172 138 156 134 C140 136 126 128 128 116 Z" fill="#fff6e6"/>
  <path d="M128 116 C124 104 138 96 152 98 C168 94 182 102 180 116 C186 128 172 138 156 134 C140 136 126 128 128 116 Z" fill="none" stroke="#f0d9a6" stroke-width="1.2" opacity=".7"/>
  <circle cx="154" cy="116" r="12" fill="url(#chqyolk)"/>
  <ellipse cx="150" cy="112" rx="4.5" ry="2.6" fill="#fff0b0" opacity=".85"/>
  <!-- crema drizzle zigzag -->
  <path d="M76 124 Q92 118 100 128 Q112 122 122 130 Q136 124 146 132" stroke="#fff4e2" stroke-width="2.4" fill="none" opacity=".8" stroke-linecap="round"/>
  <path d="M180 126 Q196 120 206 130 Q220 124 232 132" stroke="#fff4e2" stroke-width="2.4" fill="none" opacity=".8" stroke-linecap="round"/>
  <!-- crumbled queso fresco + garnish -->
  <g fill="#fbf4e6">
    <rect x="108" y="140" width="5" height="4" rx="1.2" transform="rotate(14 110 142)"/>
    <rect x="140" y="146" width="5" height="4" rx="1.2" transform="rotate(-10 142 148)"/>
    <rect x="186" y="142" width="5" height="4" rx="1.2" transform="rotate(20 188 144)"/>
    <rect x="90" y="134" width="4.5" height="3.6" rx="1.1" transform="rotate(-8 92 136)"/>
  </g>
  <!-- cilantro flecks + red onion slivers -->
  <rect x="118" y="106" width="6" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-18 121 107)"/>
  <rect x="170" y="104" width="6" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(16 173 105)"/>
  <rect x="132" y="148" width="6" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(24 135 149)"/>
  <path d="M104 148 q6 -3 12 0" stroke="#b478ff" stroke-width="2.2" fill="none" opacity=".7" stroke-linecap="round"/>
  <path d="M192 148 q6 -3 12 0" stroke="#b478ff" stroke-width="2.2" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- gloss dots -->
  <circle cx="150" cy="110" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="118" cy="122" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="200" cy="118" r="1.2" fill="#fff" opacity=".5"/>
</svg>
