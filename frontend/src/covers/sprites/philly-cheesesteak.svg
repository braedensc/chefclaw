<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="pcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="pcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="pchoagie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b263"/><stop offset="55%" stop-color="#cf8c38"/><stop offset="100%" stop-color="#a3641f"/>
    </linearGradient>
    <linearGradient id="pcbeef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3a1e"/><stop offset="100%" stop-color="#4a1c0c"/>
    </linearGradient>
    <linearGradient id="pccheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe08a"/><stop offset="100%" stop-color="#f4b02e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pcbg)"/>
  <!-- rising steam -->
  <path d="M116 50 C106 34 126 26 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#pcBlur3)"/>
  <path d="M204 48 C196 32 212 24 204 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#pcBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="176" rx="140" ry="19" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="150" rx="138" ry="34" fill="#141018"/>
  <ellipse cx="160" cy="150" rx="138" ry="34" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="150" rx="122" ry="27" fill="#0f0d13"/>
  <!-- neon steam arc (warm) -->
  <path d="M52 104 Q108 70 172 72" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- BOTTOM half of the hoagie roll -->
  <path d="M40 128 C40 118 60 112 160 112 C260 112 280 118 280 128 C280 140 250 146 160 146 C70 146 40 140 40 128 Z" fill="url(#pchoagie)" stroke="#7a4514" stroke-width="1.4"/>
  <!-- overstuffed chopped beef + onions mound -->
  <g>
    <path d="M52 116 C60 96 100 90 160 90 C220 90 262 96 268 116 C240 122 200 124 160 124 C120 124 80 122 52 116 Z" fill="url(#pcbeef)"/>
    <!-- shaved beef ribbons -->
    <g stroke="#3a1508" stroke-width="1.6" fill="none" opacity=".55" stroke-linecap="round">
      <path d="M64 108 C76 100 92 100 104 106"/>
      <path d="M110 104 C124 98 140 100 152 106"/>
      <path d="M160 102 C174 96 190 98 202 104"/>
      <path d="M208 106 C222 100 238 102 250 108"/>
      <path d="M78 114 C92 110 108 112 120 116"/>
      <path d="M138 114 C152 110 168 112 180 116"/>
      <path d="M196 114 C210 110 226 112 238 116"/>
    </g>
    <!-- beef highlights (glossy griddled bits) -->
    <ellipse cx="96" cy="100" rx="10" ry="4" fill="#a1512a" opacity=".55"/>
    <ellipse cx="168" cy="98" rx="12" ry="4" fill="#a1512a" opacity=".55"/>
    <ellipse cx="228" cy="104" rx="9" ry="3.5" fill="#a1512a" opacity=".5"/>
  </g>
  <!-- softened onions + peppers peeking through -->
  <path d="M88 106 C100 102 112 104 118 110" stroke="#f2e2c0" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round"/>
  <path d="M150 104 C162 100 174 102 180 108" stroke="#f2e2c0" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round"/>
  <rect x="124" y="104" width="8" height="3" rx="1.4" fill="#3f9c37" transform="rotate(-12 128 105)"/>
  <rect x="196" y="106" width="8" height="3" rx="1.4" fill="#c93a1a" transform="rotate(14 200 107)"/>
  <rect x="108" y="112" width="7" height="2.8" rx="1.3" fill="#e0341f" transform="rotate(8 111 113)"/>
  <!-- melted cheese blanket draped over the beef with drips -->
  <path d="M58 100 C72 90 108 88 160 88 C212 88 250 90 264 100 C250 112 246 108 232 106 C224 118 216 108 206 106 C196 118 188 108 178 106 C168 116 160 108 152 106 C144 116 136 108 126 106 C116 118 108 108 98 106 C88 116 78 108 70 106 C64 108 60 106 58 100 Z" fill="url(#pccheese)" opacity=".92"/>
  <path d="M62 98 C78 90 110 90 160 90 C210 90 242 90 258 98" stroke="#fff0b8" stroke-width="1.6" fill="none" opacity=".6" stroke-linecap="round"/>
  <!-- cheese drips off the front edge -->
  <path d="M104 112 C102 122 106 128 110 124 Z M170 112 C168 124 174 130 178 126 Z M212 110 C210 120 214 126 218 122 Z" fill="url(#pccheese)"/>
  <!-- TOP half of the roll, tilted back, lid propped -->
  <g transform="translate(160 78) rotate(-3)">
    <path d="M-108 4 C-108 -14 -70 -22 0 -22 C70 -22 108 -14 108 4 C80 12 40 14 0 14 C-40 14 -80 12 -108 4 Z" fill="url(#pchoagie)" stroke="#7a4514" stroke-width="1.4"/>
    <!-- toasted sheen + sesame-free top -->
    <path d="M-96 -4 C-70 -16 -40 -18 0 -18 C40 -18 70 -16 96 -4" stroke="#f3d59a" stroke-width="2" fill="none" opacity=".5" stroke-linecap="round"/>
  </g>
  <!-- gloss dots -->
  <circle cx="118" cy="98" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="188" cy="96" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="100" r="1.2" fill="#fff" opacity=".45"/>
</svg>
