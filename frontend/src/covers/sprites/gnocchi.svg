<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="gnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="gnbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="gnpillow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdeecb"/><stop offset="55%" stop-color="#efd7a2"/><stop offset="100%" stop-color="#d8b47f"/>
    </linearGradient>
    <radialGradient id="gnplate" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="gnbutter" cx="48%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#f6cf6a" stop-opacity=".55"/><stop offset="100%" stop-color="#c8912e" stop-opacity=".25"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gnbg)"/>
  <!-- steam -->
  <path d="M116 52 C106 34 126 26 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#gnBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#gnBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- shallow oval plate -->
  <ellipse cx="160" cy="132" rx="142" ry="46" fill="url(#gnplate)"/>
  <ellipse cx="160" cy="132" rx="142" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="128" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (warm/local) -->
  <path d="M50 116 Q102 84 166 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- glossy brown-butter pool -->
  <ellipse cx="160" cy="130" rx="112" ry="34" fill="url(#gnbutter)"/>
  <path d="M70 124 C96 112 124 108 160 108 C196 108 224 112 250 124" stroke="#ffe6a0" stroke-width="1.6" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- GNOCCHI: little ridged potato pillows, tossed -->
  <g stroke-linejoin="round">
    <!-- back layer, smaller/dimmer -->
    <g transform="translate(102 98) rotate(-14) scale(.86)"><ellipse cx="0" cy="0" rx="17" ry="12" fill="url(#gnpillow)" stroke="#b78a4a" stroke-width="1.2" opacity=".9"/><path d="M-9 -3 L-9 3 M-3 -5 L-3 5 M3 -5 L3 5 M9 -3 L9 3" stroke="#c69a55" stroke-width="1.1" opacity=".6"/></g>
    <g transform="translate(160 94) rotate(8) scale(.85)"><ellipse cx="0" cy="0" rx="17" ry="12" fill="url(#gnpillow)" stroke="#b78a4a" stroke-width="1.2" opacity=".9"/><path d="M-9 -3 L-9 3 M-3 -5 L-3 5 M3 -5 L3 5 M9 -3 L9 3" stroke="#c69a55" stroke-width="1.1" opacity=".6"/></g>
    <g transform="translate(212 100) rotate(-6) scale(.84)"><ellipse cx="0" cy="0" rx="17" ry="12" fill="url(#gnpillow)" stroke="#b78a4a" stroke-width="1.2" opacity=".88"/><path d="M-9 -3 L-9 3 M-3 -5 L-3 5 M3 -5 L3 5 M9 -3 L9 3" stroke="#c69a55" stroke-width="1.1" opacity=".6"/></g>
    <!-- front layer, larger/brighter -->
    <g transform="translate(96 122) rotate(-18)"><ellipse cx="0" cy="0" rx="21" ry="15" fill="url(#gnpillow)" stroke="#b78a4a" stroke-width="1.4"/><path d="M-11 -4 L-11 4 M-4 -7 L-4 7 M4 -7 L4 7 M11 -4 L11 4" stroke="#c69a55" stroke-width="1.3" opacity=".7"/><ellipse cx="-6" cy="-6" rx="6" ry="3" fill="#fff6d8" opacity=".6"/></g>
    <g transform="translate(146 128) rotate(6)"><ellipse cx="0" cy="0" rx="22" ry="15" fill="url(#gnpillow)" stroke="#b78a4a" stroke-width="1.4"/><path d="M-11 -4 L-11 4 M-4 -7 L-4 7 M4 -7 L4 7 M11 -4 L11 4" stroke="#c69a55" stroke-width="1.3" opacity=".7"/><ellipse cx="-6" cy="-6" rx="6" ry="3" fill="#fff6d8" opacity=".6"/></g>
    <g transform="translate(200 124) rotate(20)"><ellipse cx="0" cy="0" rx="21" ry="15" fill="url(#gnpillow)" stroke="#b78a4a" stroke-width="1.4"/><path d="M-11 -4 L-11 4 M-4 -7 L-4 7 M4 -7 L4 7 M11 -4 L11 4" stroke="#c69a55" stroke-width="1.3" opacity=".7"/><ellipse cx="-6" cy="-6" rx="6" ry="3" fill="#fff6d8" opacity=".55"/></g>
    <g transform="translate(132 110) rotate(-4)"><ellipse cx="0" cy="0" rx="20" ry="14" fill="url(#gnpillow)" stroke="#b78a4a" stroke-width="1.4"/><path d="M-10 -4 L-10 4 M-3 -6 L-3 6 M4 -6 L4 6 M10 -4 L10 4" stroke="#c69a55" stroke-width="1.2" opacity=".7"/><ellipse cx="-5" cy="-5" rx="5" ry="3" fill="#fff6d8" opacity=".55"/></g>
  </g>
  <!-- fried sage leaves + parmesan garnish -->
  <path d="M110 100 C114 90 124 90 128 98 C126 108 114 110 110 100 Z" fill="#5ecb4e"/>
  <path d="M119 92 L120 106" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  <path d="M182 138 C186 130 194 130 197 137 C195 144 186 145 182 138 Z" fill="#3f9c37"/>
  <rect x="150" y="146" width="7" height="3" rx="1.4" fill="#fff3c8" transform="rotate(12 153 147)" opacity=".9"/>
  <rect x="118" y="142" width="7" height="3" rx="1.4" fill="#fff3c8" transform="rotate(-14 121 143)" opacity=".9"/>
  <circle cx="168" cy="118" r="1.6" fill="#260903"/>
  <circle cx="128" cy="132" r="1.4" fill="#260903"/>
  <!-- buttery gloss dots -->
  <circle cx="112" cy="118" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="172" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="204" cy="118" r="1.2" fill="#fff" opacity=".5"/>
</svg>
