<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="okBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="okbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="okcake" cx="44%" cy="34%" r="76%">
      <stop offset="0%" stop-color="#c98a45"/><stop offset="58%" stop-color="#a5652a"/><stop offset="100%" stop-color="#7a4517"/>
    </radialGradient>
    <linearGradient id="oksauce" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3312"/><stop offset="100%" stop-color="#41190a"/>
    </linearGradient>
    <radialGradient id="okplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#okbg)"/>
  <!-- steam -->
  <path d="M120 52 C110 34 130 26 120 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#okBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#okBlur3)"/>
  <ellipse cx="160" cy="186" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="130" rx="128" ry="52" fill="url(#okplate)"/>
  <ellipse cx="160" cy="130" rx="128" ry="52" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="112" ry="43" fill="#0c0c0f"/>
  <!-- neon steam arc (amber/warm) -->
  <path d="M56 112 Q104 80 168 76" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- savory pancake: round disc, seared crust rim -->
  <ellipse cx="160" cy="122" rx="92" ry="42" fill="#5c3413" opacity=".7"/>
  <ellipse cx="160" cy="118" rx="90" ry="40" fill="url(#okcake)"/>
  <ellipse cx="160" cy="118" rx="90" ry="40" fill="none" stroke="#4a2810" stroke-width="1.5" opacity=".6"/>
  <!-- browned/charred cabbage edge speckle -->
  <g opacity=".8">
    <circle cx="102" cy="122" r="2.4" fill="#5a3010"/>
    <circle cx="122" cy="134" r="2.2" fill="#6a3a14"/>
    <circle cx="200" cy="132" r="2.4" fill="#5a3010"/>
    <circle cx="216" cy="120" r="2.2" fill="#6a3a14"/>
    <circle cx="160" cy="140" r="2.2" fill="#5a3010"/>
    <circle cx="140" cy="100" r="2" fill="#7a4a1c"/>
    <circle cx="184" cy="102" r="2" fill="#7a4a1c"/>
  </g>
  <!-- top crust sheen -->
  <ellipse cx="146" cy="104" rx="34" ry="10" fill="#d99a52" opacity=".4"/>
  <!-- brown okonomi sauce lattice (thick zigzag) -->
  <path d="M94 112 L128 100 L94 96 L134 84" stroke="url(#oksauce)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <path d="M116 138 L152 126 L118 120 L156 108 L124 104" stroke="url(#oksauce)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <path d="M168 138 L204 126 L172 120 L210 108 L178 104" stroke="url(#oksauce)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <path d="M186 112 L224 100 L192 94 L226 84" stroke="url(#oksauce)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <!-- white kewpie-mayo zigzag drizzle on top -->
  <path d="M96 108 L130 96 L98 90 L136 80" stroke="#fbf3e0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <path d="M118 134 L154 122 L120 116 L158 104" stroke="#fbf3e0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <path d="M170 134 L206 122 L174 116 L212 104" stroke="#fbf3e0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <path d="M188 108 L226 96 L194 90 L228 80" stroke="#fbf3e0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>
  <!-- dancing bonito flakes (katsuobushi): pale curling wisps -->
  <g fill="#e9cfa4" opacity=".9">
    <path d="M132 74 C138 68 148 70 150 78 C144 80 136 80 132 74 Z"/>
    <path d="M158 70 C164 64 174 67 176 74 C170 77 162 76 158 70 Z"/>
    <path d="M180 76 C186 71 195 74 196 81 C190 83 183 81 180 76 Z"/>
    <path d="M146 84 C152 80 160 82 161 88 C155 90 149 88 146 84 Z"/>
  </g>
  <path d="M133 76 C140 71 147 73 149 78" stroke="#cdae7e" stroke-width="1" fill="none" opacity=".7"/>
  <path d="M159 72 C166 67 172 69 175 75" stroke="#cdae7e" stroke-width="1" fill="none" opacity=".7"/>
  <!-- aonori green seaweed flecks + scallion -->
  <rect x="122" y="120" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-16 125 121)"/>
  <rect x="176" y="126" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(18 179 127)"/>
  <rect x="150" y="132" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-8 153 133)"/>
  <circle cx="138" cy="116" r="1.6" fill="#2f7d2b"/>
  <circle cx="196" cy="118" r="1.6" fill="#2f7d2b"/>
  <circle cx="164" cy="124" r="1.4" fill="#5ecb4e"/>
  <!-- pink pickled ginger (beni shoga) sliver -->
  <rect x="204" y="122" width="9" height="2.6" rx="1.3" fill="#e0546f" transform="rotate(28 208 123)"/>
  <rect x="108" y="128" width="8" height="2.4" rx="1.2" fill="#e0546f" transform="rotate(-24 112 129)"/>
  <!-- gloss dots -->
  <circle cx="140" cy="102" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="112" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="162" cy="128" r="1.2" fill="#fff" opacity=".5"/>
</svg>
