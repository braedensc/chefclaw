<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="gecbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <linearGradient id="gecbaton" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a3a4e"/><stop offset="45%" stop-color="#5c2c52"/><stop offset="100%" stop-color="#3d1c38"/>
    </linearGradient>
    <linearGradient id="gecflesh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4ead6"/><stop offset="60%" stop-color="#e0d0b0"/><stop offset="100%" stop-color="#c6b088"/>
    </linearGradient>
    <radialGradient id="gecgarlic" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#fdf6e4"/><stop offset="60%" stop-color="#f2ddb0"/><stop offset="100%" stop-color="#d8bd82"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gecbg)"/>
  <!-- COLD DISH: no steam arc. condensation sparkle instead -->
  <!-- cast shadow -->
  <ellipse cx="160" cy="184" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- wide shallow bowl for cold dish -->
  <ellipse cx="160" cy="120" rx="146" ry="58" fill="#141820"/>
  <ellipse cx="160" cy="120" rx="146" ry="58" fill="none" stroke="#26343a" stroke-width="3"/>
  <ellipse cx="160" cy="122" rx="128" ry="48" fill="#0e1216"/>
  <ellipse cx="160" cy="124" rx="112" ry="40" fill="#0b0e12"/>
  <!-- faint cool rim highlight (chilled) -->
  <path d="M56 100 Q104 74 168 74" stroke="#35e0ff" stroke-width="2" fill="none" opacity=".2" stroke-linecap="round"/>
  <!-- STEAMED EGGPLANT BATONS splayed like a fan (purple skin + pale flesh, soft & glossy) -->
  <!-- back batons (dimmer, smaller) -->
  <g opacity=".9">
    <g transform="translate(84 96) rotate(-22) scale(.86)">
      <rect width="72" height="17" rx="8.5" fill="url(#gecbaton)" stroke="#3a1830" stroke-width="1.2"/>
      <rect x="4" y="4" width="64" height="7" rx="3.5" fill="url(#gecflesh)" opacity=".92"/>
    </g>
    <g transform="translate(168 92) rotate(18) scale(.86)">
      <rect width="72" height="17" rx="8.5" fill="url(#gecbaton)" stroke="#3a1830" stroke-width="1.2"/>
      <rect x="4" y="4" width="64" height="7" rx="3.5" fill="url(#gecflesh)" opacity=".92"/>
    </g>
  </g>
  <!-- front batons (larger, brighter, glossy) -->
  <g transform="translate(72 118) rotate(-12)">
    <rect width="88" height="21" rx="10.5" fill="url(#gecbaton)" stroke="#3a1830" stroke-width="1.4"/>
    <rect x="5" y="5" width="78" height="9" rx="4.5" fill="url(#gecflesh)"/>
    <path d="M8 4 L78 4" stroke="#a05c86" stroke-width="1.6" opacity=".5" stroke-linecap="round"/>
    <ellipse cx="26" cy="4" rx="12" ry="2.4" fill="#fff" opacity=".3"/>
  </g>
  <g transform="translate(158 112) rotate(8)">
    <rect width="92" height="21" rx="10.5" fill="url(#gecbaton)" stroke="#3a1830" stroke-width="1.4"/>
    <rect x="5" y="5" width="82" height="9" rx="4.5" fill="url(#gecflesh)"/>
    <path d="M8 4 L82 4" stroke="#a05c86" stroke-width="1.6" opacity=".5" stroke-linecap="round"/>
    <ellipse cx="30" cy="4" rx="12" ry="2.4" fill="#fff" opacity=".3"/>
  </g>
  <g transform="translate(104 134) rotate(2)">
    <rect width="96" height="20" rx="10" fill="url(#gecbaton)" stroke="#3a1830" stroke-width="1.4"/>
    <rect x="5" y="5" width="86" height="8" rx="4" fill="url(#gecflesh)"/>
    <path d="M8 4 L86 4" stroke="#a05c86" stroke-width="1.6" opacity=".5" stroke-linecap="round"/>
    <ellipse cx="32" cy="4" rx="13" ry="2.4" fill="#fff" opacity=".3"/>
  </g>
  <!-- MOUND of minced garlic + dressing spooned over the center -->
  <path d="M118 118 C126 108 150 106 166 110 C186 114 202 118 198 128 C190 138 150 140 132 134 C120 130 112 124 118 118 Z" fill="#3d2a1a" opacity=".4"/>
  <g>
    <ellipse cx="140" cy="120" rx="4.5" ry="3.4" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
    <ellipse cx="152" cy="116" rx="4" ry="3" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
    <ellipse cx="164" cy="120" rx="4.5" ry="3.4" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
    <ellipse cx="148" cy="124" rx="4" ry="3" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
    <ellipse cx="176" cy="118" rx="3.6" ry="2.8" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
    <ellipse cx="130" cy="122" rx="3.6" ry="2.8" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
    <ellipse cx="160" cy="126" rx="3.4" ry="2.6" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
    <ellipse cx="184" cy="124" rx="3.2" ry="2.4" fill="url(#gecgarlic)" stroke="#c9a860" stroke-width=".8"/>
  </g>
  <!-- soy-dressing sheen + red chili + scallion garnish -->
  <path d="M124 130 C144 136 176 136 194 130" stroke="#3d2413" stroke-width="2.4" fill="none" opacity=".5" stroke-linecap="round"/>
  <rect x="130" y="112" width="6" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(-18 133 113)"/>
  <rect x="172" y="126" width="6" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(16 175 127)"/>
  <rect x="150" y="132" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-8 153 133)"/>
  <rect x="118" y="126" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(24 121 127)"/>
  <circle cx="188" cy="120" r="1.6" fill="#e0341f"/>
  <!-- condensation / chilled sparkle (replaces steam for cold dish) -->
  <g fill="#dff6ff">
    <circle cx="112" cy="76" r="1.6" opacity=".7"/>
    <circle cx="210" cy="70" r="1.4" opacity=".6"/>
    <circle cx="248" cy="96" r="1.3" opacity=".5"/>
    <circle cx="72" cy="98" r="1.3" opacity=".5"/>
    <path d="M112 72 l0 8 M108 76 l8 0" stroke="#dff6ff" stroke-width="1" opacity=".6"/>
    <path d="M210 66 l0 8 M206 70 l8 0" stroke="#dff6ff" stroke-width="1" opacity=".5"/>
  </g>
  <!-- oily-dressing gloss dots -->
  <circle cx="100" cy="122" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="186" cy="116" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="140" r="1.2" fill="#fff" opacity=".45"/>
</svg>
