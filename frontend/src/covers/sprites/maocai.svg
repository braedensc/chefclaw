<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="mcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="mcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#113036"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="mcbroth" cx="46%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#ef5520"/><stop offset="55%" stop-color="#c0300c"/><stop offset="100%" stop-color="#7a1305"/>
    </radialGradient>
    <radialGradient id="mcbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1c1622"/><stop offset="100%" stop-color="#0c0c0f"/>
    </radialGradient>
    <linearGradient id="mclotus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ead0"/><stop offset="100%" stop-color="#d8c295"/>
    </linearGradient>
    <linearGradient id="mcmeat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a4a24"/><stop offset="100%" stop-color="#5a2612"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mcbg)"/>
  <!-- steam -->
  <path d="M116 48 C106 30 126 24 116 4" stroke="#fff" stroke-width="7" fill="none" opacity=".11" filter="url(#mcBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 6" stroke="#fff" stroke-width="6" fill="none" opacity=".09" filter="url(#mcBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="142" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (cyan) -->
  <path d="M50 110 Q104 76 168 74" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- deep ladle bowl -->
  <path d="M38 114 C38 106 58 102 160 102 C262 102 282 106 282 114 C280 156 232 184 160 184 C88 184 40 156 38 114 Z" fill="url(#mcbowl)"/>
  <path d="M38 114 C38 106 58 102 160 102 C262 102 282 106 282 114 C280 156 232 184 160 184 C88 184 40 156 38 114 Z" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- rim -->
  <ellipse cx="160" cy="112" rx="122" ry="30" fill="#141018"/>
  <ellipse cx="160" cy="112" rx="122" ry="30" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <!-- mala red broth surface -->
  <ellipse cx="160" cy="112" rx="114" ry="27" fill="url(#mcbroth)"/>
  <ellipse cx="150" cy="107" rx="60" ry="10" fill="#ff7a3a" opacity=".35"/>
  <!-- floating chili-oil pools -->
  <ellipse cx="96" cy="118" rx="14" ry="5" fill="#7a1305" opacity=".5"/>
  <ellipse cx="220" cy="116" rx="16" ry="5" fill="#7a1305" opacity=".5"/>
  <!-- INGREDIENTS piled poking above the broth (heaped bowl) -->
  <!-- lotus root slice (holey disc) -->
  <g>
    <ellipse cx="112" cy="98" rx="17" ry="14" fill="url(#mclotus)" stroke="#b89a5e" stroke-width="1.3"/>
    <circle cx="108" cy="94" r="2.4" fill="#8a1a06"/><circle cx="118" cy="94" r="2.4" fill="#8a1a06"/>
    <circle cx="104" cy="101" r="2.2" fill="#8a1a06"/><circle cx="120" cy="101" r="2.2" fill="#8a1a06"/>
    <circle cx="112" cy="104" r="2.2" fill="#8a1a06"/><circle cx="112" cy="90" r="2.2" fill="#8a1a06"/>
    <ellipse cx="106" cy="90" rx="5" ry="2" fill="#fff" opacity=".4"/>
  </g>
  <!-- meat slices (mala coated) -->
  <g>
    <path d="M146 96 C140 88 156 82 168 86 C180 82 188 92 182 100 C186 108 170 112 158 108 C148 110 142 104 146 96 Z" fill="url(#mcmeat)" stroke="#3a1608" stroke-width="1.3"/>
    <path d="M150 94 C160 90 172 92 178 98" stroke="#b5602e" stroke-width="1.3" fill="none" opacity=".7"/>
  </g>
  <!-- fish tofu / white cube -->
  <g>
    <rect x="196" y="90" width="24" height="22" rx="4" fill="#f2e6cd" stroke="#c9b487" stroke-width="1.3" transform="rotate(8 208 101)"/>
    <rect x="200" y="93" width="9" height="4" rx="2" fill="#fff" opacity=".5" transform="rotate(8 204 95)"/>
  </g>
  <!-- another lotus slice back-right -->
  <g opacity=".95">
    <ellipse cx="176" cy="120" rx="13" ry="10" fill="url(#mclotus)" stroke="#b89a5e" stroke-width="1.2"/>
    <circle cx="172" cy="118" r="1.8" fill="#8a1a06"/><circle cx="180" cy="118" r="1.8" fill="#8a1a06"/>
    <circle cx="176" cy="123" r="1.8" fill="#8a1a06"/>
  </g>
  <!-- potato / white wedge front-left -->
  <g>
    <path d="M120 122 C124 114 138 114 142 122 C144 130 132 136 124 132 C118 130 116 126 120 122 Z" fill="#f4ecd6" stroke="#cbbb90" stroke-width="1.2"/>
  </g>
  <!-- leafy greens (bok choy) poking up -->
  <path d="M92 108 C88 96 96 86 100 92 C102 100 100 108 96 114 Z" fill="#3f9c37"/>
  <path d="M96 110 C94 100 100 92 104 98 C106 106 102 112 98 116 Z" fill="#58c14a"/>
  <path d="M228 108 C224 96 232 88 236 94 C238 102 234 110 230 114 Z" fill="#3f9c37"/>
  <!-- wide skewer stick angled through the pile -->
  <path d="M150 78 L156 76 L146 132 L140 130 Z" fill="#b98a4e" opacity=".9"/>
  <path d="M152 80 L143 128" stroke="#d8b47f" stroke-width="1.2" opacity=".6"/>
  <!-- scattered dried chilies + sichuan peppercorns + sesame on top -->
  <path d="M130 84 C136 82 142 84 144 88 C138 90 132 88 130 84 Z" fill="#e0341f"/>
  <path d="M190 118 C196 116 202 118 204 122 C198 124 192 122 190 118 Z" fill="#e0341f"/>
  <path d="M108 128 C114 126 120 128 122 132 C116 134 110 132 108 128 Z" fill="#e0341f"/>
  <circle cx="160" cy="100" r="1.8" fill="#3a1206"/>
  <circle cx="138" cy="110" r="1.8" fill="#3a1206"/>
  <circle cx="204" cy="102" r="1.8" fill="#3a1206"/>
  <rect x="122" y="106" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-18 125 107)"/>
  <rect x="186" y="130" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(20 189 131)"/>
  <ellipse cx="150" cy="118" rx="2" ry="1.2" fill="#f8eed6"/>
  <ellipse cx="176" cy="104" rx="2" ry="1.2" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="118" cy="92" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="206" cy="98" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="160" cy="124" r="1.2" fill="#fff" opacity=".5"/>
</svg>
