<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="cmcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cmcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="cmcpot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4029"/><stop offset="55%" stop-color="#3d2113"/><stop offset="100%" stop-color="#1c0d06"/>
    </linearGradient>
    <radialGradient id="cmcrice" cx="46%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#fff6e2"/><stop offset="60%" stop-color="#f0e0ba"/><stop offset="100%" stop-color="#d6bd8a"/>
    </radialGradient>
    <linearGradient id="cmcsaus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9421e"/><stop offset="50%" stop-color="#9c2b10"/><stop offset="100%" stop-color="#661408"/>
    </linearGradient>
    <linearGradient id="cmcliv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b2718"/><stop offset="100%" stop-color="#3b0f07"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cmcbg)"/>
  <!-- steam -->
  <path d="M114 48 C104 32 124 24 114 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#cmcBlur3)"/>
  <path d="M202 46 C194 30 212 22 204 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#cmcBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- clay pot body: heavy curved-wall casserole -->
  <path d="M46 116 C46 158 96 180 160 180 C224 180 274 158 274 116 Z" fill="url(#cmcpot)"/>
  <path d="M46 116 C46 158 96 180 160 180 C224 180 274 158 274 116" fill="none" stroke="#7c4a2c" stroke-width="3"/>
  <!-- clay pot side handles -->
  <ellipse cx="40" cy="126" rx="10" ry="14" fill="none" stroke="#5a3320" stroke-width="7"/>
  <ellipse cx="280" cy="126" rx="10" ry="14" fill="none" stroke="#5a3320" stroke-width="7"/>
  <!-- pot rim -->
  <ellipse cx="160" cy="116" rx="114" ry="32" fill="#2a160c"/>
  <ellipse cx="160" cy="116" rx="114" ry="32" fill="none" stroke="#7c4a2c" stroke-width="3"/>
  <ellipse cx="160" cy="114" rx="102" ry="27" fill="#1c0d06"/>
  <!-- neon steam arc (cyan) -->
  <path d="M52 104 Q106 74 174 74" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- rice bed inside pot -->
  <ellipse cx="160" cy="114" rx="98" ry="25" fill="url(#cmcrice)"/>
  <path d="M66 110 C78 96 112 90 160 90 C208 90 242 96 254 110" fill="none" stroke="#fff6d8" stroke-width="1.3" opacity=".3"/>
  <g stroke-linecap="round" fill="none">
    <path d="M84 112 l6 -3" stroke="#fffbe8" stroke-width="2"/>
    <path d="M108 120 l6 3" stroke="#d8bd84" stroke-width="2"/>
    <path d="M226 112 l6 -3" stroke="#fffbe8" stroke-width="2"/>
    <path d="M240 118 l-6 3" stroke="#d8bd84" stroke-width="2"/>
  </g>
  <!-- LAP CHEONG cured sausage: glossy diagonal-cut oval slices fanned over rice -->
  <g stroke="#4d0f06" stroke-width="1.2">
    <ellipse cx="102" cy="104" rx="15" ry="8.5" fill="url(#cmcsaus)" transform="rotate(-26 102 104)"/>
    <ellipse cx="126" cy="112" rx="15" ry="8.5" fill="url(#cmcsaus)" transform="rotate(-14 126 112)"/>
    <ellipse cx="152" cy="116" rx="15" ry="8.5" fill="url(#cmcsaus)" transform="rotate(-4 152 116)"/>
    <ellipse cx="178" cy="114" rx="15" ry="8.5" fill="url(#cmcsaus)" transform="rotate(6 178 114)"/>
    <ellipse cx="202" cy="106" rx="15" ry="8.5" fill="url(#cmcsaus)" transform="rotate(18 202 106)"/>
  </g>
  <!-- fatty speckle + gloss on each sausage slice -->
  <g fill="#f3d0a0" opacity=".7">
    <circle cx="99" cy="101" r="1.6"/><circle cx="105" cy="107" r="1.4"/>
    <circle cx="123" cy="109" r="1.6"/><circle cx="129" cy="115" r="1.4"/>
    <circle cx="149" cy="113" r="1.6"/><circle cx="155" cy="119" r="1.4"/>
    <circle cx="175" cy="111" r="1.6"/><circle cx="181" cy="117" r="1.4"/>
    <circle cx="199" cy="103" r="1.6"/><circle cx="205" cy="109" r="1.4"/>
  </g>
  <g fill="#fff" opacity=".55">
    <ellipse cx="100" cy="100" rx="5" ry="1.6"/><ellipse cx="150" cy="112" rx="5" ry="1.6"/><ellipse cx="200" cy="102" rx="5" ry="1.6"/>
  </g>
  <!-- a couple slivers of cured liver (darker) tucked in -->
  <ellipse cx="222" cy="120" rx="11" ry="6.5" fill="url(#cmcliv)" stroke="#2a0904" stroke-width="1" transform="rotate(24 222 120)"/>
  <ellipse cx="88" cy="122" rx="11" ry="6.5" fill="url(#cmcliv)" stroke="#2a0904" stroke-width="1" transform="rotate(-22 88 122)"/>
  <!-- soy-glaze drizzle sheen over the rice + scallion -->
  <path d="M100 128 C130 134 190 134 220 128" stroke="#5a2410" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <rect x="140" y="126" width="8" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 144 127)"/>
  <rect x="172" y="126" width="8" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(18 176 127)"/>
  <rect x="156" y="130" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(6 159 131)"/>
  <!-- gloss dots -->
  <circle cx="130" cy="108" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="184" cy="110" r="1.3" fill="#fff" opacity=".5"/>
</svg>
