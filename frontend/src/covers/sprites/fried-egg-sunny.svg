<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="feBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="febg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="fewhite" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="60%" stop-color="#fbf3e2"/><stop offset="100%" stop-color="#f0e2c6"/>
    </radialGradient>
    <radialGradient id="feyolk" cx="40%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#ffe07a"/><stop offset="45%" stop-color="#ffb61f"/><stop offset="100%" stop-color="#f6941f"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#febg)"/>
  <!-- rising steam wisps -->
  <path d="M122 56 C112 38 132 30 122 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#feBlur3)"/>
  <path d="M196 54 C188 38 206 30 198 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#feBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="148" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="132" rx="132" ry="48" fill="#141018"/>
  <ellipse cx="160" cy="132" rx="132" ry="48" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="118" ry="40" fill="#0f0d13"/>
  <ellipse cx="160" cy="132" rx="104" ry="33" fill="#131018"/>
  <!-- neon steam arc (warm white) -->
  <path d="M56 116 Q108 84 170 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- fried egg white (irregular crispy edge) -->
  <path d="M92 116
           C86 100 100 90 118 92
           C124 82 146 82 152 92
           C168 86 190 92 196 108
           C214 106 224 122 214 134
           C220 150 202 160 184 154
           C176 164 152 164 144 154
           C124 162 100 156 96 140
           C80 138 78 122 92 116 Z"
        fill="url(#fewhite)" stroke="#e6d2a8" stroke-width="1.4"/>
  <!-- crispy browned lacy edge accents -->
  <path d="M88 118 C82 112 86 106 94 108 M212 130 C220 128 222 136 214 138 M144 156 C146 162 154 162 156 156"
        stroke="#d79a3e" stroke-width="2.4" fill="none" opacity=".6" stroke-linecap="round"/>
  <!-- soft shadow under raised yolk -->
  <ellipse cx="158" cy="128" rx="34" ry="24" fill="#f2d99a" opacity=".5"/>
  <!-- runny yolk dome -->
  <ellipse cx="156" cy="124" rx="30" ry="24" fill="url(#feyolk)" stroke="#e0921a" stroke-width="1.3"/>
  <!-- yolk highlight -->
  <ellipse cx="146" cy="114" rx="11" ry="7" fill="#fff3c8" opacity=".85"/>
  <circle cx="149" cy="112" r="3" fill="#ffffff" opacity=".9"/>
  <!-- ground pepper flecks + scallion -->
  <circle cx="130" cy="106" r="1.3" fill="#260903"/>
  <circle cx="182" cy="118" r="1.2" fill="#260903"/>
  <circle cx="140" cy="140" r="1.2" fill="#260903"/>
  <rect x="118" y="132" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-16 122 133)"/>
  <rect x="192" y="132" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 195 133)"/>
  <!-- gloss dots on the white -->
  <circle cx="112" cy="120" r="1.6" fill="#fff" opacity=".7"/>
  <circle cx="200" cy="122" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="128" cy="146" r="1.3" fill="#fff" opacity=".5"/>
</svg>
