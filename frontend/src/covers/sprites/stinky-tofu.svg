  <rect x="182" y="110" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 185 111)"/>
  <rect x="104" y="126" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 107 127)"/>
