  <path d="M50 116 Q102 84 166 82" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- skillet / cast-iron pan with handle (street-food fry pan) -->
  <rect x="266" y="128" width="46" height="9" rx="4.5" fill="#141018" transform="rotate(-6 289 132)"/>
