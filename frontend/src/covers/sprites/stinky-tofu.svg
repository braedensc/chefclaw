<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="stfBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="stfbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="stfplate" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="stftofu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4030"/><stop offset="45%" stop-color="#2e2718"/><stop offset="100%" stop-color="#171208"/>
    </linearGradient>
    <linearGradient id="stfface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6cf"/><stop offset="60%" stop-color="#e3cda4"/><stop offset="100%" stop-color="#caa878"/>
    </linearGradient>
    <linearGradient id="stfsauce" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5520"/><stop offset="55%" stop-color="#b02408"/><stop offset="100%" stop-color="#7a1305"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#stfbg)"/>
  <!-- rising steam wisps (fried hot street food) -->
  <path d="M120 52 C110 34 130 26 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#stfBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#stfBlur3)"/>
  <!-- cast shadow -->
