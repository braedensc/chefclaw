      <path d="M0 7 L21 14 L21 37 L0 30 Z" fill="#3f3522"/>
      <circle cx="10" cy="7" r="1.5" fill="#1a1409"/><circle cx="31" cy="8" r="1.6" fill="#1a1409"/><circle cx="10" cy="22" r="1.4" fill="#241a0c"/><circle cx="6" cy="26" r="1.2" fill="#241a0c"/>
      <ellipse cx="16" cy="7" rx="5" ry="2" fill="#fff5db" opacity=".55"/>
      <circle cx="12" cy="5" r="1.2" fill="#fff" opacity=".55"/>
    </g>
    <g transform="translate(172 118) rotate(6)">
      <path d="M0 7 L21 0 L42 7 L42 30 L21 37 L0 30 Z" fill="url(#stftofu)" stroke="#0c0803" stroke-width="1.5"/>
      <path d="M0 7 L21 0 L42 7 L21 14 Z" fill="url(#stfface)"/>
      <path d="M0 7 L21 14 L21 37 L0 30 Z" fill="#3f3522"/>
      <circle cx="10" cy="7" r="1.5" fill="#1a1409"/><circle cx="31" cy="8" r="1.6" fill="#1a1409"/><circle cx="33" cy="22" r="1.4" fill="#241a0c"/>
      <ellipse cx="16" cy="7" rx="5" ry="2" fill="#fff5db" opacity=".55"/>
      <circle cx="12" cy="5" r="1.2" fill="#fff" opacity=".55"/>
