<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="elBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="elbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="elcob" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe07a"/><stop offset="52%" stop-color="#f6c23a"/><stop offset="100%" stop-color="#d89a1e"/>
    </linearGradient>
    <linearGradient id="elboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3520"/><stop offset="100%" stop-color="#2c1e10"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#elbg)"/>
  <!-- light grill steam wisps -->
  <path d="M120 52 C112 36 128 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".09" filter="url(#elBlur3)"/>
  <path d="M198 50 C190 34 206 26 198 8" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#elBlur3)"/>
