<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="ccbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="cccook" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#e6b878"/><stop offset="55%" stop-color="#cf9450"/><stop offset="100%" stop-color="#a86a2e"/>
    </radialGradient>
    <radialGradient id="cccook2" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#d9a866"/><stop offset="55%" stop-color="#bd8442"/><stop offset="100%" stop-color="#955c26"/>
    </radialGradient>
    <radialGradient id="ccchip" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#4a2c14"/><stop offset="60%" stop-color="#2a1408"/><stop offset="100%" stop-color="#160a04"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ccbg)"/>
  <ellipse cx="160" cy="186" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- plate -->
  <ellipse cx="160" cy="138" rx="140" ry="44" fill="#141018"/>
  <ellipse cx="160" cy="138" rx="140" ry="44" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="138" rx="126" ry="36" fill="#0f0d13"/>
  <!-- back cookie (smaller, tucked behind) -->
  <g transform="translate(206 108)">
    <ellipse cx="0" cy="0" rx="30" ry="27" fill="url(#cccook2)"/>
    <ellipse cx="0" cy="0" rx="30" ry="27" fill="none" stroke="#7c4a1c" stroke-width="1.3" opacity=".6"/>
    <ellipse cx="-8" cy="-6" rx="4.5" ry="4" fill="url(#ccchip)"/>
    <ellipse cx="9" cy="2" rx="5" ry="4.4" fill="url(#ccchip)"/>
    <ellipse cx="-3" cy="10" rx="4" ry="3.6" fill="url(#ccchip)"/>
    <ellipse cx="12" cy="-9" rx="3.6" ry="3.2" fill="url(#ccchip)"/>
    <ellipse cx="-10" cy="-8" rx="1.4" ry="1.1" fill="#7a4a24" opacity=".7"/>
  </g>
  <!-- back-left cookie -->
  <g transform="translate(112 106)">
    <ellipse cx="0" cy="0" rx="30" ry="27" fill="url(#cccook2)"/>
    <ellipse cx="0" cy="0" rx="30" ry="27" fill="none" stroke="#7c4a1c" stroke-width="1.3" opacity=".6"/>
    <ellipse cx="7" cy="-7" rx="4.5" ry="4" fill="url(#ccchip)"/>
    <ellipse cx="-9" cy="3" rx="5" ry="4.4" fill="url(#ccchip)"/>
    <ellipse cx="4" cy="10" rx="4" ry="3.6" fill="url(#ccchip)"/>
    <ellipse cx="-11" cy="-8" rx="3.6" ry="3.2" fill="url(#ccchip)"/>
    <ellipse cx="9" cy="-9" rx="1.4" ry="1.1" fill="#7a4a24" opacity=".7"/>
  </g>
  <!-- HERO front cookie (large, centered, lower) -->
  <g transform="translate(160 128)">
    <!-- irregular round with bumpy edge -->
    <path d="M-42 -4 C-44 -22 -26 -36 -2 -37 C22 -38 42 -24 43 -3 C44 18 26 34 0 35 C-26 36 -40 16 -42 -4 Z" fill="url(#cccook)"/>
    <path d="M-42 -4 C-44 -22 -26 -36 -2 -37 C22 -38 42 -24 43 -3 C44 18 26 34 0 35 C-26 36 -40 16 -42 -4 Z" fill="none" stroke="#7c4a1c" stroke-width="1.4" opacity=".65"/>
    <!-- warm top-light band -->
    <path d="M-32 -20 C-16 -30 20 -30 34 -18" stroke="#f6d9a4" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
    <!-- melty chocolate chips scattered -->
    <ellipse cx="-20" cy="-14" rx="6.5" ry="5.5" fill="url(#ccchip)"/>
    <ellipse cx="-22" cy="-16" rx="2.2" ry="1.4" fill="#7a4a24" opacity=".7"/>
    <ellipse cx="12" cy="-18" rx="7" ry="6" fill="url(#ccchip)"/>
    <ellipse cx="10" cy="-20" rx="2.4" ry="1.5" fill="#7a4a24" opacity=".7"/>
    <ellipse cx="26" cy="2" rx="6" ry="5" fill="url(#ccchip)"/>
    <ellipse cx="-6" cy="6" rx="7.5" ry="6" fill="url(#ccchip)"/>
    <ellipse cx="-8" cy="4" rx="2.4" ry="1.5" fill="#7a4a24" opacity=".7"/>
    <ellipse cx="-30" cy="8" rx="5.5" ry="4.6" fill="url(#ccchip)"/>
    <ellipse cx="18" cy="18" rx="6" ry="5" fill="url(#ccchip)"/>
    <ellipse cx="16" cy="16" rx="2" ry="1.3" fill="#7a4a24" opacity=".7"/>
    <ellipse cx="34" cy="-8" rx="4.5" ry="3.8" fill="url(#ccchip)"/>
    <!-- gloss dots -->
    <circle cx="-14" cy="-24" r="1.3" fill="#fff" opacity=".5"/>
    <circle cx="4" cy="24" r="1.2" fill="#fff" opacity=".45"/>
  </g>
  <!-- crumbs on the plate -->
  <circle cx="80" cy="150" r="2" fill="#a86a2e"/>
  <circle cx="240" cy="152" r="2.2" fill="#bd8442"/>
  <rect x="98" y="156" width="5" height="3" rx="1.4" fill="#8a5628" transform="rotate(18 100 157)"/>
  <rect x="222" y="154" width="5" height="3" rx="1.4" fill="#a86a2e" transform="rotate(-22 224 155)"/>
  <!-- sparkle accents (baked dessert, no steam arc) -->
  <path d="M92 58 l0 6 M89 61 l6 0" stroke="#fff" stroke-width="1.2" opacity=".4" stroke-linecap="round"/>
  <path d="M230 70 l0 5 M227.5 72.5 l5 0" stroke="#ffd60a" stroke-width="1.1" opacity=".4" stroke-linecap="round"/>
  <path d="M214 50 l0 4 M212 52 l4 0" stroke="#fff" stroke-width="1" opacity=".35" stroke-linecap="round"/>
</svg>
