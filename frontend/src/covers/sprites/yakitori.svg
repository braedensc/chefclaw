    <rect x="92" y="139" width="26" height="24" rx="7" fill="url(#ykchic)" stroke="#5a2c0c" stroke-width="1.3"/>
    <rect x="94" y="141" width="22" height="6" rx="3" fill="#e2a852" opacity=".6"/>
    <rect x="124" y="141" width="14" height="20" rx="4" fill="url(#ykleek)" stroke="#5f7a24" stroke-width="1.2"/>
    <rect x="126" y="143" width="10" height="4" rx="2" fill="#e0eaa0" opacity=".7"/>
    <rect x="146" y="138" width="26" height="24" rx="7" fill="url(#ykchic)" stroke="#5a2c0c" stroke-width="1.3"/>
    <rect x="148" y="140" width="22" height="6" rx="3" fill="#e2a852" opacity=".6"/>
    <rect x="178" y="140" width="14" height="20" rx="4" fill="url(#ykleek)" stroke="#5f7a24" stroke-width="1.2"/>
    <rect x="200" y="138" width="24" height="24" rx="7" fill="url(#ykchic)" stroke="#5a2c0c" stroke-width="1.3"/>
