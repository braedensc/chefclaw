    <path d="M70 134 L292 130" stroke="#b98a4e" stroke-width="4.5"/>
    <path d="M70 150 L292 152" stroke="#b98a4e" stroke-width="4.5"/>
    <path d="M70 118 L292 108" stroke="#8a6534" stroke-width="1.6" opacity=".6"/>
    <path d="M70 134 L292 130" stroke="#8a6534" stroke-width="1.6" opacity=".6"/>
    <path d="M70 150 L292 152" stroke="#8a6534" stroke-width="1.6" opacity=".6"/>
  </g>
  <!-- SKEWER 1 (top) chunks -->
  <g>
    <rect x="92" y="106" width="26" height="24" rx="7" fill="url(#ykchic)" stroke="#5a2c0c" stroke-width="1.3"/>
    <rect x="94" y="108" width="22" height="6" rx="3" fill="#e2a852" opacity=".6"/>
    <rect x="124" y="107" width="14" height="20" rx="4" fill="url(#ykleek)" stroke="#5f7a24" stroke-width="1.2"/>
