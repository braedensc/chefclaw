<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ykBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ykbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="ykchic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98a3e"/><stop offset="50%" stop-color="#9c5c1e"/><stop offset="100%" stop-color="#6e380d"/>
    </linearGradient>
    <linearGradient id="ykboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2814"/><stop offset="100%" stop-color="#22160a"/>
    </linearGradient>
    <linearGradient id="ykleek" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d67a"/><stop offset="100%" stop-color="#8fae3e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ykbg)"/>
  <!-- rising steam (hot grill) -->
  <path d="M118 52 C108 34 128 26 118 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ykBlur3)"/>
  <path d="M198 54 C190 38 208 30 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ykBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="20" fill="#000" opacity=".5"/>
