  <!-- tare glaze sheen + sesame -->
  <circle cx="106" cy="112" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="160" cy="110" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="212" cy="108" r="1.3" fill="#fff" opacity=".5"/>
