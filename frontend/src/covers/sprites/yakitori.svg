    <rect x="34" y="112" width="252" height="52" rx="14" fill="none" stroke="#4a3218" stroke-width="2.5"/>
    <!-- wood grain lines -->
    <path d="M46 126 L274 126 M46 138 L274 138 M46 150 L274 150" stroke="#4d3517" stroke-width="1.2" opacity=".5"/>
  </g>
  <!-- three negima skewers: alternating glazed chicken chunks + leek segments -->
