    <rect x="176" y="123" width="14" height="20" rx="4" fill="url(#ykleek)" stroke="#5f7a24" stroke-width="1.2"/>
    <rect x="198" y="120" width="24" height="24" rx="7" fill="url(#ykchic)" stroke="#5a2c0c" stroke-width="1.3"/>
    <rect x="200" y="122" width="20" height="6" rx="3" fill="#e2a852" opacity=".6"/>
    <path d="M96 138 L110 134 M152 137 L166 133 M204 136 L218 132" stroke="#3a1c08" stroke-width="2.4" opacity=".5" stroke-linecap="round"/>
