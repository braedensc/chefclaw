<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="csBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="csbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="cswok" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="csrice" cx="46%" cy="34%" r="76%">
      <stop offset="0%" stop-color="#fbf3df"/><stop offset="60%" stop-color="#efe1bf"/><stop offset="100%" stop-color="#d8c295"/>
    </radialGradient>
    <linearGradient id="cssiu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0532a"/><stop offset="40%" stop-color="#b8341a"/><stop offset="100%" stop-color="#7a1a0c"/>
    </linearGradient>
    <linearGradient id="cslean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f2f1a"/><stop offset="100%" stop-color="#5e1c0e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#csbg)"/>
  <!-- steam -->
  <path d="M122 56 C112 38 132 30 122 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#csBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#csBlur3)"/>
  <ellipse cx="160" cy="186" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate (dark ring) -->
  <ellipse cx="160" cy="130" rx="134" ry="46" fill="url(#cswok)"/>
  <ellipse cx="160" cy="130" rx="134" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="118" ry="37" fill="#0c0c0f"/>
  <!-- neon steam arc -->
  <path d="M58 116 Q106 86 168 84" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- rice bed underneath -->
  <path d="M70 132 C78 108 116 98 160 98 C204 98 242 108 250 132 C224 148 194 152 160 152 C126 152 96 148 70 132 Z" fill="url(#csrice)"/>
  <path d="M74 130 C82 108 118 100 160 100 C202 100 238 108 246 130" fill="none" stroke="#fff6d8" stroke-width="1.3" opacity=".3"/>
  <!-- a few rice-grain flecks peeking on the near edge -->
  <g stroke-linecap="round" opacity=".8">
    <path d="M92 140 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M112 146 l6 2" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M206 144 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M226 138 l-6 2" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M160 150 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
  </g>
  <!-- fanned char-siu slices: glossy red-glazed barbecue pork, caramelised edges + white fat streak + pale lean core -->
  <g>
    <!-- back slice -->
    <g transform="translate(108 108) rotate(-16)">
      <path d="M0 0 C2 -12 30 -13 44 -9 C50 -7 50 9 44 11 C30 15 2 12 0 0 Z" fill="url(#cssiu)" stroke="#5a1408" stroke-width="1.4" opacity=".95"/>
      <path d="M6 -3 C18 -6 34 -6 42 -3" stroke="#f6ddb2" stroke-width="2.4" fill="none" opacity=".85"/>
      <path d="M8 3 C20 1 34 1 40 4" stroke="#c0603a" stroke-width="1.6" fill="none" opacity=".6"/>
      <ellipse cx="16" cy="-6" rx="8" ry="2.4" fill="#ff8a4d" opacity=".45"/>
    </g>
    <!-- mid slice -->
    <g transform="translate(140 112) rotate(6)">
      <path d="M0 0 C2 -13 32 -14 47 -10 C53 -8 53 10 47 12 C32 16 2 13 0 0 Z" fill="url(#cssiu)" stroke="#5a1408" stroke-width="1.4"/>
      <path d="M6 -4 C20 -7 36 -7 45 -4" stroke="#f6ddb2" stroke-width="2.6" fill="none" opacity=".85"/>
      <path d="M8 4 C22 2 36 2 43 5" stroke="#c0603a" stroke-width="1.6" fill="none" opacity=".6"/>
      <ellipse cx="20" cy="-7" rx="10" ry="2.6" fill="#ff8a4d" opacity=".5"/>
    </g>
    <!-- front slice (largest, brightest) -->
    <g transform="translate(174 116) rotate(-6)">
      <path d="M0 0 C2 -14 34 -15 51 -11 C58 -9 58 11 51 13 C34 18 2 14 0 0 Z" fill="url(#cssiu)" stroke="#5a1408" stroke-width="1.5"/>
      <path d="M7 -4 C22 -8 40 -8 49 -4" stroke="#f6ddb2" stroke-width="2.8" fill="none" opacity=".9"/>
      <path d="M9 5 C24 3 40 3 47 6" stroke="#c0603a" stroke-width="1.6" fill="none" opacity=".6"/>
      <ellipse cx="22" cy="-8" rx="12" ry="3" fill="#ff9d5d" opacity=".55"/>
    </g>
  </g>
  <!-- glossy honey-glaze drizzle over the pork -->
  <path d="M104 120 C136 112 178 112 214 120" stroke="#ffb15a" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- scallion + sesame garnish -->
  <rect x="118" y="104" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 121 105)"/>
  <rect x="156" y="102" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 159 103)"/>
  <rect x="192" y="108" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-10 195 109)"/>
  <rect x="140" y="124" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 143 125)"/>
  <circle cx="130" cy="118" r="1.2" fill="#f8eed6"/>
  <circle cx="168" cy="110" r="1.2" fill="#f8eed6"/>
  <circle cx="200" cy="120" r="1.2" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="152" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="114" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="120" cy="116" r="1.2" fill="#fff" opacity=".5"/>
</svg>
