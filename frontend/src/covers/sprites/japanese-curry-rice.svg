    <path d="M120 110 l-6 2" stroke="#ded0b0" stroke-width="2.2"/>
    <path d="M72 128 l6 -2" stroke="#fffdf4" stroke-width="2.2"/>
    <path d="M96 124 l6 2" stroke="#ded0b0" stroke-width="2.2"/>
    <path d="M120 128 l-6 2" stroke="#fffdf4" stroke-width="2.2"/>
    <path d="M84 140 l6 -2" stroke="#ded0b0" stroke-width="2.2"/>
