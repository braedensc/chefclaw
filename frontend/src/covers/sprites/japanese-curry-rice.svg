  <g>
    <path d="M222 128 C218 122 228 118 236 122 C242 120 246 128 240 134 C242 140 232 144 226 140 C220 140 218 132 222 128 Z" fill="url(#jcrpotato)" stroke="#9a7638" stroke-width="1.2"/>
    <ellipse cx="229" cy="125" rx="6" ry="2.6" fill="#fbeecb" opacity=".8"/>
