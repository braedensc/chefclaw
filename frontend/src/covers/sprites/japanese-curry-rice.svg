    <path d="M240 140 C236 135 246 132 252 135 C257 133 261 140 256 145 C258 150 249 153 244 149 C239 150 237 143 240 140 Z" fill="url(#jcrbeef)" stroke="#2a1206" stroke-width="1.2"/>
