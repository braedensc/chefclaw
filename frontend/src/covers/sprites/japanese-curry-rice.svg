    <path d="M204 136 C201 131 210 129 216 132 C221 131 224 138 219 142 C221 147 212 150 207 146 C202 147 200 139 204 136 Z" fill="#e07520" stroke="#a84c10" stroke-width="1.2"/>
    <ellipse cx="210" cy="134" rx="5" ry="2.2" fill="#ff9d52" opacity=".7"/>
