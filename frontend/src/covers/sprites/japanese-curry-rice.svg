  <path d="M42 128 C48 102 78 92 108 92 C136 92 154 106 152 130 C136 148 96 152 74 150 C56 148 42 140 42 128 Z" fill="url(#jcrrice)"/>
  <path d="M44 126 C50 102 78 90 108 90" fill="none" stroke="#fffdf6" stroke-width="1.4" opacity=".4"/>
