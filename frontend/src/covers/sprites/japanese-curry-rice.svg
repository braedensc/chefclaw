  <g>
    <path d="M176 122 C172 116 182 112 190 116 C196 114 200 122 194 128 C196 134 186 138 180 134 C174 134 172 126 176 122 Z" fill="url(#jcrpotato)" stroke="#9a7638" stroke-width="1.2"/>
