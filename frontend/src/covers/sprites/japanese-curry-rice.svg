  <circle cx="200" cy="112" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="234" cy="118" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="180" cy="140" r="1.2" fill="#fff" opacity=".45"/>
  <rect x="212" y="150" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-16 215 151)"/>
