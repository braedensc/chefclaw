  </defs>
  <rect width="320" height="200" fill="url(#jcrbg)"/>
  <!-- steam -->
  <path d="M110 54 C100 36 120 28 110 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#jcrBlur3)"/>
