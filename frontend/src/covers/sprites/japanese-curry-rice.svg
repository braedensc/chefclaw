<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="jcrBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="jcrbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="jcrrice" cx="42%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#fffaf0"/><stop offset="60%" stop-color="#f4ecd9"/><stop offset="100%" stop-color="#dccbab"/>
    </radialGradient>
    <linearGradient id="jcrcurry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a4a1c"/><stop offset="50%" stop-color="#5e2f10"/><stop offset="100%" stop-color="#3d1c08"/>
    </linearGradient>
    <radialGradient id="jcrpotato" cx="40%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#f4e2b4"/><stop offset="60%" stop-color="#e2c384"/><stop offset="100%" stop-color="#bd9a55"/>
    </radialGradient>
    <linearGradient id="jcrbeef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3418"/><stop offset="100%" stop-color="#3d1a0a"/>
