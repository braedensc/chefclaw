<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="omBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ombg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <radialGradient id="omplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="ombody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe07a"/><stop offset="50%" stop-color="#ffca38"/><stop offset="100%" stop-color="#f0a41c"/>
    </linearGradient>
    <linearGradient id="omfold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd85f"/><stop offset="100%" stop-color="#e89a1c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ombg)"/>
  <!-- steam wisps -->
  <path d="M120 54 C110 38 128 30 118 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#omBlur3)"/>
  <path d="M198 52 C190 36 206 28 198 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#omBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="130" rx="142" ry="52" fill="url(#omplate)"/>
  <ellipse cx="160" cy="130" rx="142" ry="52" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="124" ry="44" fill="#0c0c0f"/>
  <!-- neon steam arc (cyan / savory) -->
  <path d="M56 114 Q108 82 172 80" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- folded omelette: half-moon body with a soft under-shadow -->
  <path d="M76 138 C70 112 96 92 160 92 C224 92 250 112 244 138 C214 150 106 150 76 138 Z" fill="#c07f16" opacity=".5"/>
  <!-- main fluffy folded body (top half of a folded oval) -->
  <path d="M74 132 C74 104 104 88 160 88 C216 88 246 104 246 132 C216 142 104 142 74 132 Z" fill="url(#ombody)"/>
  <!-- the front fold flap arcing over -->
  <path d="M74 132 C104 142 216 142 246 132 C246 118 214 128 160 128 C106 128 74 118 74 132 Z" fill="url(#omfold)"/>
  <!-- fold crease line -->
  <path d="M80 128 C112 118 208 118 240 128" fill="none" stroke="#b9760f" stroke-width="1.6" opacity=".6"/>
  <!-- soft browned-butter blush along the top ridge -->
  <path d="M96 100 C124 92 196 92 224 100" fill="none" stroke="#e8a94a" stroke-width="4" opacity=".35" stroke-linecap="round"/>
  <!-- fluffy surface sheen highlights -->
  <path d="M100 104 C128 96 192 96 220 104" fill="none" stroke="#fff0b8" stroke-width="2" opacity=".5" stroke-linecap="round"/>
  <ellipse cx="130" cy="108" rx="20" ry="6" fill="#fff3c8" opacity=".4"/>
  <ellipse cx="196" cy="110" rx="18" ry="5" fill="#fff3c8" opacity=".35"/>
  <!-- omelette body outline -->
  <path d="M74 132 C74 104 104 88 160 88 C216 88 246 104 246 132 C216 142 104 142 74 132 Z" fill="none" stroke="#a76a10" stroke-width="1.4" opacity=".5"/>
  <!-- a little melted-cheese / filling peeking from the open end -->
  <path d="M240 130 C246 128 250 132 248 136 C244 138 240 136 240 132 Z" fill="#ffe08a" opacity=".9"/>
  <!-- chive & herb garnish scattered on top -->
  <rect x="118" y="106" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-16 122 107)"/>
  <rect x="150" y="102" width="8" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(14 154 103)"/>
  <rect x="186" y="106" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-8 190 107)"/>
  <rect x="134" y="116" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(22 137 117)"/>
  <rect x="172" y="118" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-20 175 119)"/>
  <circle cx="160" cy="108" r="1.8" fill="#6abf5a"/>
  <!-- cracked black pepper flecks -->
  <circle cx="144" cy="112" r="1" fill="#260903"/>
  <circle cx="204" cy="114" r="1" fill="#260903"/>
  <circle cx="112" cy="116" r="1" fill="#260903"/>
  <!-- oil / butter gloss dots -->
  <circle cx="128" cy="100" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="190" cy="102" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="122" r="1.2" fill="#fff" opacity=".45"/>
</svg>
