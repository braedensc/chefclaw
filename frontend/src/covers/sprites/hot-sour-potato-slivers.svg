<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="hspBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="hspbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="hspplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="hspoil" cx="50%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#e6591f" stop-opacity=".55"/><stop offset="60%" stop-color="#b02408" stop-opacity=".38"/><stop offset="100%" stop-color="#7a1305" stop-opacity=".18"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#hspbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 36 128 28 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#hspBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#hspBlur3)"/>
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="url(#hspplate)"/>
  <ellipse cx="160" cy="132" rx="140" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="126" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (warm/local, hot-sour) -->
  <path d="M48 116 Q100 82 166 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- chili-oil sheen pooled under the julienne -->
  <ellipse cx="160" cy="128" rx="108" ry="30" fill="url(#hspoil)"/>
  <!-- POTATO SLIVERS: dense tangle of pale-gold julienne strands, tossed -->
  <g stroke-linecap="round" fill="none">
    <!-- shadow strands (back layer) -->
    <path d="M70 132 C110 118 170 120 224 128" stroke="#8a6a34" stroke-width="6" opacity=".55"/>
    <path d="M78 120 C126 108 186 112 232 122" stroke="#8a6a34" stroke-width="6" opacity=".5"/>
    <path d="M84 138 C128 130 182 132 226 138" stroke="#8a6a34" stroke-width="5.5" opacity=".5"/>
    <!-- body strands (pale gold) -->
    <path d="M66 126 C112 110 172 114 226 122" stroke="#efd79a" stroke-width="6"/>
    <path d="M74 134 C120 122 178 122 228 130" stroke="#e9cf8e" stroke-width="6"/>
    <path d="M82 116 C130 104 188 108 234 116" stroke="#f2dca4" stroke-width="5.6"/>
    <path d="M70 140 C116 132 174 134 220 140" stroke="#e6c988" stroke-width="5.6"/>
    <path d="M90 124 C136 114 190 116 232 124" stroke="#f0d896" stroke-width="5.4"/>
    <path d="M76 110 C122 100 178 102 220 108" stroke="#f4e0aa" stroke-width="5.2"/>
    <path d="M98 132 C142 124 192 126 228 132" stroke="#ecd090" stroke-width="5.2"/>
    <!-- top highlight strands -->
    <path d="M84 118 C128 108 184 110 226 116" stroke="#fff1c9" stroke-width="2" opacity=".8"/>
    <path d="M78 128 C122 118 178 120 222 126" stroke="#fff1c9" stroke-width="1.8" opacity=".7"/>
    <path d="M92 136 C136 128 188 130 224 136" stroke="#fff1c9" stroke-width="1.8" opacity=".6"/>
  </g>
  <!-- dried red chili slivers + diced chili tossed through -->
  <g stroke-linecap="round" fill="none">
    <path d="M108 120 C120 114 132 116 142 122" stroke="#d8341c" stroke-width="3"/>
    <path d="M170 128 C182 122 194 124 204 130" stroke="#c31f12" stroke-width="3"/>
    <path d="M130 138 C142 134 152 136 160 140" stroke="#d8341c" stroke-width="2.6"/>
  </g>
  <circle cx="118" cy="126" r="2.4" fill="#e0341f"/>
  <circle cx="188" cy="122" r="2.2" fill="#c31f12"/>
  <circle cx="152" cy="132" r="2" fill="#e0341f"/>
  <!-- scallion + coriander flecks -->
  <rect x="126" y="112" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 129 113)"/>
  <rect x="200" y="118" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 203 119)"/>
  <rect x="148" y="142" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 151 143)"/>
  <!-- Sichuan peppercorn dots + sesame -->
  <circle cx="140" cy="120" r="1.5" fill="#260903"/>
  <circle cx="176" cy="134" r="1.5" fill="#260903"/>
  <circle cx="112" cy="134" r="1.2" fill="#f8eed6"/>
  <circle cx="206" cy="128" r="1.2" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="118" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="116" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="156" cy="128" r="1.2" fill="#fff" opacity=".5"/>
</svg>
