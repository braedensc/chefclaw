<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="scpBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="scpbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="scpboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4222"/><stop offset="100%" stop-color="#3a2a13"/>
    </linearGradient>
    <radialGradient id="scpcake" cx="42%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#f5d99a"/><stop offset="48%" stop-color="#e0ad55"/><stop offset="100%" stop-color="#b47528"/>
    </radialGradient>
    <linearGradient id="scpwedge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e2af"/><stop offset="100%" stop-color="#c68e3c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#scpbg)"/>
  <!-- steam -->
  <path d="M126 54 C116 36 136 28 126 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#scpBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#scpBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- round wooden serving board -->
  <ellipse cx="160" cy="132" rx="140" ry="50" fill="url(#scpboard)"/>
  <ellipse cx="160" cy="132" rx="140" ry="50" fill="none" stroke="#2a1e0e" stroke-width="3"/>
  <!-- wood grain arcs -->
  <path d="M40 128 Q160 108 280 128" stroke="#4a341a" stroke-width="1.4" fill="none" opacity=".5"/>
  <path d="M50 142 Q160 122 270 142" stroke="#4a341a" stroke-width="1.4" fill="none" opacity=".45"/>
  <!-- neon steam arc -->
  <path d="M50 116 Q100 86 168 84" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- the round coiled scallion pancake (flat, golden, pan-fried) -->
  <ellipse cx="158" cy="126" rx="104" ry="42" fill="#7a5218" opacity=".55"/>
  <ellipse cx="158" cy="122" rx="104" ry="42" fill="url(#scpcake)" stroke="#8a5a1e" stroke-width="1.6"/>
  <!-- spiral coil lines showing the rolled flaky layers -->
  <g fill="none" stroke-linecap="round">
    <path d="M158 122 m0 -34 a72 30 0 1 1 -0.1 0" stroke="#9c6a24" stroke-width="1.6" opacity=".7"/>
    <path d="M158 122 m0 -24 a52 21 0 1 1 -0.1 0" stroke="#a9762c" stroke-width="1.5" opacity=".65"/>
    <path d="M158 122 m0 -14 a32 13 0 1 1 -0.1 0" stroke="#b98337" stroke-width="1.4" opacity=".6"/>
    <path d="M158 122 m0 -6 a14 6 0 1 1 -0.1 0" stroke="#c68e3c" stroke-width="1.3" opacity=".55"/>
  </g>
  <!-- blistered golden-brown toasted spots -->
  <ellipse cx="120" cy="110" rx="9" ry="5" fill="#a3661f" opacity=".55" transform="rotate(-10 120 110)"/>
  <ellipse cx="196" cy="112" rx="8" ry="4.5" fill="#a3661f" opacity=".5" transform="rotate(8 196 112)"/>
  <ellipse cx="150" cy="138" rx="10" ry="5" fill="#9c611c" opacity=".5"/>
  <ellipse cx="206" cy="132" rx="7" ry="4" fill="#a3661f" opacity=".5"/>
  <!-- one cut wedge slightly pulled out, showing flaky cross-section -->
  <g transform="rotate(-16 158 122)">
    <path d="M158 122 L232 100 A104 42 0 0 1 236 132 Z" fill="url(#scpwedge)" stroke="#8a5a1e" stroke-width="1.6"/>
    <!-- flaky inner layers on the cut face -->
    <path d="M158 122 L233 106 M158 122 L235 116 M158 122 L235 126" stroke="#a9762c" stroke-width="1.3" opacity=".7"/>
    <path d="M158 122 L232 100 A104 42 0 0 1 236 132" fill="none" stroke="#c68e3c" stroke-width="1.4" opacity=".6"/>
  </g>
  <!-- scallion greens embedded in the surface -->
  <rect x="112" y="108" width="9" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-24 116 109)"/>
  <rect x="150" y="102" width="9" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(12 154 103)"/>
  <rect x="180" y="118" width="9" height="2.8" rx="1.4" fill="#58c14a" transform="rotate(-8 184 119)"/>
  <rect x="132" y="128" width="8" height="2.6" rx="1.3" fill="#6abf5a" transform="rotate(28 136 129)"/>
  <rect x="170" y="132" width="8" height="2.6" rx="1.3" fill="#2f7d2b" transform="rotate(-18 174 133)"/>
  <rect x="200" y="122" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(16 203 123)"/>
  <rect x="140" y="114" width="7" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-32 143 115)"/>
  <!-- oil gloss dots -->
  <circle cx="134" cy="112" r="1.5" fill="#fff" opacity=".62"/>
  <circle cx="186" cy="108" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="162" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <!-- scattered sesame -->
  <circle cx="148" cy="118" r="1.2" fill="#f8eed6"/>
  <circle cx="192" cy="126" r="1.2" fill="#f8eed6"/>
</svg>
