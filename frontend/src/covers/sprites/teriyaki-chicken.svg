      <path d="M92 106 C86 96 102 90 118 92 C134 88 146 98 142 108 C146 118 130 126 114 122 C98 124 90 116 92 106 Z" fill="none" stroke="#3d1706" stroke-width="1.4" opacity=".55"/>
      <path d="M98 100 C112 94 130 94 138 102" stroke="url(#tyglaze)" stroke-width="3" fill="none" opacity=".7" stroke-linecap="round"/>
      <ellipse cx="106" cy="98" rx="9" ry="3.6" fill="#f0b26a" opacity=".75"/>
    </g>
    <g>
      <path d="M178 106 C172 96 188 90 204 92 C220 88 232 98 228 108 C232 118 216 126 200 122 C184 124 176 116 178 106 Z" fill="url(#tyskin)"/>
      <path d="M178 106 C172 96 188 90 204 92 C220 88 232 98 228 108 C232 118 216 126 200 122 C184 124 176 116 178 106 Z" fill="none" stroke="#3d1706" stroke-width="1.4" opacity=".55"/>
      <path d="M184 100 C198 94 216 94 224 102" stroke="url(#tyglaze)" stroke-width="3" fill="none" opacity=".7" stroke-linecap="round"/>
      <ellipse cx="192" cy="98" rx="9" ry="3.6" fill="#f0b26a" opacity=".75"/>
    </g>
    <!-- front pieces (larger, glossiest) -->
    <g>
      <path d="M124 120 C118 108 136 102 154 104 C172 100 186 110 182 122 C186 134 168 142 150 138 C132 140 122 132 124 120 Z" fill="url(#tyskin)"/>
      <path d="M124 120 C118 108 136 102 154 104 C172 100 186 110 182 122 C186 134 168 142 150 138 C132 140 122 132 124 120 Z" fill="none" stroke="#3d1706" stroke-width="1.5" opacity=".6"/>
      <path d="M130 113 C146 106 168 106 178 116" stroke="url(#tyglaze)" stroke-width="3.4" fill="none" opacity=".75" stroke-linecap="round"/>
      <ellipse cx="140" cy="112" rx="11" ry="4.2" fill="#f4bd76" opacity=".8"/>
    </g>
    <g>
      <path d="M180 124 C174 114 190 108 206 110 C222 106 234 116 230 126 C234 136 218 144 202 140 C186 142 178 134 180 124 Z" fill="url(#tyskin)"/>
      <path d="M180 124 C174 114 190 108 206 110 C222 106 234 116 230 126 C234 136 218 144 202 140 C186 142 178 134 180 124 Z" fill="none" stroke="#3d1706" stroke-width="1.5" opacity=".6"/>
      <path d="M186 117 C200 110 220 110 228 120" stroke="url(#tyglaze)" stroke-width="3.4" fill="none" opacity=".75" stroke-linecap="round"/>
      <ellipse cx="194" cy="116" rx="10" ry="4" fill="#f4bd76" opacity=".8"/>
    </g>
