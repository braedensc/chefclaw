    <g transform="translate(0 -2)">
      <path d="M118 96 C112 86 128 80 144 82 C160 78 172 88 168 98 C172 108 156 116 140 112 C124 114 116 106 118 96 Z" fill="url(#tyskin)"/>
      <path d="M118 96 C112 86 128 80 144 82 C160 78 172 88 168 98 C172 108 156 116 140 112 C124 114 116 106 118 96 Z" fill="none" stroke="#3d1706" stroke-width="1.4" opacity=".55"/>
      <path d="M124 90 C136 84 156 84 164 92" stroke="url(#tyglaze)" stroke-width="3" fill="none" opacity=".7" stroke-linecap="round"/>
      <ellipse cx="132" cy="88" rx="8" ry="3.4" fill="#f0b26a" opacity=".7"/>
