<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tyBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tybg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="tybowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="tyrice" cx="46%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#fdfaf2"/><stop offset="60%" stop-color="#efe8d6"/><stop offset="100%" stop-color="#d8ccb2"/>
    </radialGradient>
    <linearGradient id="tyskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cf7a2c"/><stop offset="48%" stop-color="#9a4d17"/><stop offset="100%" stop-color="#6e2f0d"/>
    </linearGradient>
    <linearGradient id="tyglaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a3f12"/><stop offset="100%" stop-color="#4c1c06"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tybg)"/>
  <!-- steam -->
  <path d="M120 48 C110 30 130 22 120 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#tyBlur3)"/>
  <path d="M198 46 C190 30 208 22 200 4" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tyBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (warm) -->
  <path d="M52 104 Q104 74 168 72" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- deep donburi bowl silhouette -->
  <path d="M56 118 C56 108 88 100 160 100 C232 100 264 108 264 118 C264 156 220 184 160 184 C100 184 56 156 56 118 Z" fill="url(#tybowl)"/>
  <path d="M56 118 C56 156 100 184 160 184 C220 184 264 156 264 118" fill="none" stroke="#26262e" stroke-width="3"/>
  <!-- bowl rim ellipse -->
  <ellipse cx="160" cy="116" rx="104" ry="20" fill="#0c0c0f"/>
  <ellipse cx="160" cy="116" rx="104" ry="20" fill="none" stroke="#2c2136" stroke-width="2.5" opacity=".8"/>
  <!-- rice mound filling the bowl -->
  <path d="M62 116 C74 100 112 94 160 94 C208 94 246 100 258 116 C240 130 204 138 160 138 C116 138 80 130 62 116 Z" fill="url(#tyrice)"/>
  <path d="M62 116 C74 100 112 94 160 94 C208 94 246 100 258 116" fill="none" stroke="#fffdf6" stroke-width="1.3" opacity=".4"/>
  <!-- rice-grain texture on the visible margins -->
  <g stroke-linecap="round" fill="none" opacity=".6">
    <path d="M84 112 l6 -2" stroke="#efe6cf" stroke-width="2"/>
    <path d="M108 118 l6 2" stroke="#d5c8a8" stroke-width="2"/>
    <path d="M204 116 l6 -2" stroke="#efe6cf" stroke-width="2"/>
    <path d="M232 112 l-6 2" stroke="#d5c8a8" stroke-width="2"/>
    <path d="M96 104 l6 -2" stroke="#efe6cf" stroke-width="2"/>
    <path d="M220 106 l-6 2" stroke="#d5c8a8" stroke-width="2"/>
  </g>
  <!-- glossy teriyaki chicken pieces mounded center: 5 glazed chunks -->
  <g>
