  <!-- glossy teriyaki glaze pooling drips -->
  <path d="M118 132 Q150 144 186 134" stroke="url(#tyglaze)" stroke-width="3" fill="none" opacity=".55" stroke-linecap="round"/>
  <!-- toasted sesame seeds scattered -->
  <g>
    <ellipse cx="138" cy="106" rx="2" ry="1.1" fill="#f8eed6" transform="rotate(18 138 106)"/>
    <ellipse cx="168" cy="112" rx="2" ry="1.1" fill="#e6d3ab" transform="rotate(-12 168 112)"/>
    <ellipse cx="150" cy="126" rx="2" ry="1.1" fill="#f8eed6" transform="rotate(24 150 126)"/>
    <ellipse cx="200" cy="120" rx="2" ry="1.1" fill="#e6d3ab" transform="rotate(-8 200 120)"/>
    <ellipse cx="118" cy="118" rx="1.8" ry="1" fill="#f8eed6" transform="rotate(14 118 118)"/>
    <ellipse cx="214" cy="128" rx="1.8" ry="1" fill="#e6d3ab" transform="rotate(-18 214 128)"/>
  </g>
  <!-- scallion greens on top -->
  <rect x="132" y="100" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-20 135 101)"/>
  <rect x="196" y="104" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(16 199 105)"/>
  <rect x="160" y="128" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-8 163 129)"/>
  <rect x="112" y="126" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(24 115 127)"/>
  <rect x="216" y="134" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-14 219 135)"/>
  <!-- gloss highlight dots -->
  <circle cx="142" cy="110" r="1.6" fill="#fff" opacity=".65"/>
  <circle cx="198" cy="114" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="156" cy="130" r="1.3" fill="#fff" opacity=".5"/>
</svg>
