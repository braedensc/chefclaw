<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="msmBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="msmbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="msmpot" cx="50%" cy="26%" r="88%">
      <stop offset="0%" stop-color="#6b4029"/><stop offset="55%" stop-color="#3d2113"/><stop offset="100%" stop-color="#1c0d06"/>
    </radialGradient>
    <radialGradient id="msmcurry" cx="44%" cy="32%" r="76%">
      <stop offset="0%" stop-color="#d98a3c"/><stop offset="52%" stop-color="#b0611e"/><stop offset="100%" stop-color="#7a3d10"/>
    </radialGradient>
    <linearGradient id="msmbeef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3a20"/><stop offset="100%" stop-color="#4a1c0e"/>
    </linearGradient>
    <linearGradient id="msmpotato" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d488"/><stop offset="100%" stop-color="#cfa64f"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#msmbg)"/>
  <!-- rising steam wisps -->
  <path d="M128 48 C120 32 136 24 128 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#msmBlur3)"/>
  <path d="M196 46 C188 30 204 22 196 4" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#msmBlur3)"/>
  <!-- cast shadow -->
