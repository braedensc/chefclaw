  <path d="M58 106 Q108 72 172 72" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- curved clay pot silhouette with two small side handles -->
  <path d="M54 100 C50 92 58 88 66 90 C60 98 62 104 68 106 Z" fill="url(#msmpot)"/>
  <path d="M266 100 C270 92 262 88 254 90 C260 98 258 104 252 106 Z" fill="url(#msmpot)"/>
  <path d="M60 104 C60 92 260 92 260 104 C256 156 218 176 160 176 C102 176 64 156 60 104 Z" fill="url(#msmpot)"/>
  <path d="M60 104 C60 92 260 92 260 104 C256 156 218 176 160 176 C102 176 64 156 60 104 Z" fill="none" stroke="#271b12" stroke-width="3"/>
  <!-- pot rim highlight -->
  <path d="M64 104 C64 96 256 96 256 104" fill="none" stroke="#8a5a34" stroke-width="1.6" opacity=".5"/>
  <!-- glossy curry surface -->
