<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="mlBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="mlbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123830"/><stop offset="45%" stop-color="#0a0b09"/><stop offset="100%" stop-color="#060706"/>
    </radialGradient>
    <linearGradient id="mlglass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".05"/><stop offset="18%" stop-color="#ffffff" stop-opacity=".16"/><stop offset="50%" stop-color="#ffffff" stop-opacity=".03"/><stop offset="82%" stop-color="#ffffff" stop-opacity=".10"/><stop offset="100%" stop-color="#ffffff" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="mlmilk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf4e6"/><stop offset="100%" stop-color="#efe2cb"/>
    </linearGradient>
    <linearGradient id="mlmatcha" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fc23a"/><stop offset="45%" stop-color="#6aa62a"/><stop offset="100%" stop-color="#4f861f"/>
    </linearGradient>
    <radialGradient id="mlfoam" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#f4f7e6"/><stop offset="60%" stop-color="#e2ecc3"/><stop offset="100%" stop-color="#cadd9e"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mlbg)"/>
  <!-- rising steam wisps -->
  <path d="M140 44 C132 28 148 22 140 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#mlBlur3)"/>
  <path d="M182 46 C176 30 190 24 184 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#mlBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="120" ry="18" fill="#000" opacity=".5"/>
  <!-- neon steam arc (cyan family) -->
  <path d="M96 74 Q132 48 176 50" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- saucer / dark ring under glass -->
  <ellipse cx="160" cy="176" rx="78" ry="16" fill="#12121a"/>
  <ellipse cx="160" cy="176" rx="78" ry="16" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <ellipse cx="160" cy="174" rx="60" ry="11" fill="#0c0c10"/>
  <!-- tall glass body: tapered tumbler -->
  <path d="M120 66 L200 66 L192 168 C186 174 134 174 128 168 Z" fill="#0e1512"/>
  <!-- matcha layer (bottom, deep green) -->
  <path d="M126 120 L194 120 L192 166 C186 172 134 172 128 166 Z" fill="url(#mlmatcha)"/>
  <!-- milk layer (upper) -->
  <path d="M121 78 L199 78 L194 122 L126 122 Z" fill="url(#mlmilk)"/>
  <!-- swirl/blend band where milk meets matcha -->
  <path d="M126 120 C142 114 160 126 176 118 C186 114 190 120 194 120 L192 128 C176 132 160 124 144 130 C136 133 130 128 126 128 Z" fill="#a7c66a" opacity=".75"/>
  <path d="M130 116 C148 121 168 111 190 117" stroke="#c7dd97" stroke-width="2" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- matcha foam art on top of milk surface -->
  <ellipse cx="160" cy="82" rx="38" ry="8" fill="url(#mlfoam)"/>
  <ellipse cx="160" cy="82" rx="38" ry="8" fill="none" stroke="#b9cf8a" stroke-width="1.1" opacity=".6"/>
  <!-- dusted matcha leaf latte-art -->
  <path d="M146 82 C154 78 166 78 174 82 C166 86 154 86 146 82 Z" fill="#6aa62a" opacity=".8"/>
  <path d="M150 82 L170 82" stroke="#4f861f" stroke-width="1.1" opacity=".7"/>
  <path d="M155 79 L157 85 M160 78 L160 86 M165 79 L163 85" stroke="#4f861f" stroke-width=".9" opacity=".6"/>
  <!-- matcha powder specks on foam -->
  <circle cx="140" cy="80" r="1.1" fill="#4f861f" opacity=".7"/>
  <circle cx="180" cy="84" r="1.1" fill="#4f861f" opacity=".7"/>
  <circle cx="150" cy="86" r=".9" fill="#5a921f" opacity=".6"/>
  <!-- glass overlay sheen + vertical highlight -->
  <path d="M120 66 L200 66 L192 168 C186 174 134 174 128 168 Z" fill="url(#mlglass)"/>
  <path d="M120 66 L200 66 L192 168 C186 174 134 174 128 168 Z" fill="none" stroke="#dfeef2" stroke-width="1.6" opacity=".35"/>
  <path d="M132 74 L128 162" stroke="#ffffff" stroke-width="3" opacity=".28" stroke-linecap="round"/>
  <path d="M188 74 L191 160" stroke="#ffffff" stroke-width="2" opacity=".18" stroke-linecap="round"/>
  <!-- rim highlight -->
  <path d="M122 67 Q160 62 198 67" stroke="#eaf6f8" stroke-width="2" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- gloss dots -->
  <circle cx="150" cy="78" r="1.3" fill="#fff" opacity=".6"/>
  <circle cx="172" cy="130" r="1.2" fill="#fff" opacity=".45"/>
</svg>
