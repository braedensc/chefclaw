    <radialGradient id="ccwbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="ccwplate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="ccwsauce" cx="48%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#7a2c0e"/><stop offset="50%" stop-color="#4e1706"/><stop offset="100%" stop-color="#2c0d04"/>
    </radialGradient>
    <linearGradient id="ccwwing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a54a16"/><stop offset="45%" stop-color="#7a2f0c"/><stop offset="100%" stop-color="#521c06"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ccwbg)"/>
  <!-- steam -->
  <path d="M124 58 C114 40 134 32 124 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ccwBlur3)"/>
  <path d="M198 54 C190 38 208 30 200 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ccwBlur3)"/>
