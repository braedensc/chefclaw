<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="pbfbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="pbfbeef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3a20"/><stop offset="45%" stop-color="#5e2410"/><stop offset="100%" stop-color="#3b1608"/>
    </linearGradient>
    <linearGradient id="pbfpep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94b2a"/><stop offset="100%" stop-color="#b32d10"/>
    </linearGradient>
    <radialGradient id="pbfplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pbfbg)"/>
  <!-- steam -->
  <path d="M120 58 C110 40 130 32 120 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M204 54 C196 38 214 30 206 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- oval plate -->
