    <path d="M86 128 C104 116 128 116 146 122" stroke="url(#pbfbeef)" stroke-width="9"/>
    <path d="M86 128 C104 116 128 116 146 122" stroke="#3b1608" stroke-width="9" opacity=".0"/>
    <path d="M92 124 C108 115 126 115 140 119" stroke="#a8623a" stroke-width="2" opacity=".55"/>
