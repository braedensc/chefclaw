    <path d="M116 140 C134 132 154 132 168 137" stroke="#b06a40" stroke-width="2.2" opacity=".6"/>
  </g>
  <g stroke-linecap="round" fill="none">
    <path d="M176 128 C194 118 218 118 234 126" stroke="url(#pbfbeef)" stroke-width="9"/>
    <path d="M182 124 C198 116 216 116 228 122" stroke="#a8623a" stroke-width="2" opacity=".5"/>
  </g>
  <g stroke-linecap="round" fill="none">
