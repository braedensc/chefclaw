  <!-- coarse black-pepper flecks -->
  <circle cx="112" cy="122" r="1.6" fill="#1a0d05"/><circle cx="140" cy="118" r="1.5" fill="#260903"/>
  <circle cx="170" cy="112" r="1.6" fill="#1a0d05"/><circle cx="196" cy="118" r="1.5" fill="#260903"/>
  <circle cx="126" cy="134" r="1.5" fill="#1a0d05"/><circle cx="158" cy="128" r="1.6" fill="#260903"/>
  <circle cx="186" cy="130" r="1.4" fill="#1a0d05"/><circle cx="148" cy="140" r="1.5" fill="#260903"/>
  <circle cx="214" cy="124" r="1.4" fill="#1a0d05"/><circle cx="100" cy="132" r="1.4" fill="#260903"/>
  <!-- scallion fleck -->
  <rect x="162" y="122" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-14 165 123)"/>
  <rect x="118" y="128" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 121 129)"/>
  <!-- oil gloss dots -->
  <circle cx="120" cy="120" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="116" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="152" cy="132" r="1.3" fill="#fff" opacity=".55"/>
</svg>
