  <path d="M104 130 C118 122 138 122 150 130" stroke="#3f9c37" stroke-width="5" fill="none" opacity=".9" stroke-linecap="round"/>
  <path d="M168 132 C182 124 202 124 214 132" stroke="#2f7d2b" stroke-width="5" fill="none" opacity=".85" stroke-linecap="round"/>
