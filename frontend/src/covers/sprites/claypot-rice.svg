<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="cpBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cpbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="cppot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4029"/><stop offset="50%" stop-color="#3d2113"/><stop offset="100%" stop-color="#1c0d06"/>
    </linearGradient>
    <radialGradient id="cprice" cx="46%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#fbf3df"/><stop offset="58%" stop-color="#eddfbc"/><stop offset="100%" stop-color="#d2bc8f"/>
    </radialGradient>
    <linearGradient id="cpsaus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a3311b"/><stop offset="100%" stop-color="#661408"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cpbg)"/>
  <!-- steam -->
  <path d="M120 54 C110 36 130 28 120 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#cpBlur3)"/>
  <path d="M202 52 C194 36 212 28 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#cpBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- clay pot body: curved dark clay walls -->
  <path d="M44 110 C44 156 100 178 160 178 C220 178 276 156 276 110 Z" fill="url(#cppot)"/>
  <path d="M44 110 C44 156 100 178 160 178 C220 178 276 156 276 110" fill="none" stroke="#824d2c" stroke-width="2" opacity=".5"/>
  <!-- little side handles -->
  <ellipse cx="40" cy="112" rx="8" ry="6" fill="#4d2c17"/>
  <ellipse cx="280" cy="112" rx="8" ry="6" fill="#4d2c17"/>
  <!-- pot rim (dark ring) -->
  <ellipse cx="160" cy="110" rx="120" ry="31" fill="#2a1710"/>
  <ellipse cx="160" cy="110" rx="120" ry="31" fill="none" stroke="#824d2c" stroke-width="3"/>
  <ellipse cx="160" cy="110" rx="107" ry="25" fill="#180b06"/>
  <!-- neon steam arc -->
  <path d="M58 100 Q106 74 166 72" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- rice mound inside pot -->
  <path d="M62 112 C68 90 110 80 160 80 C210 80 252 90 258 112 C232 128 196 132 160 132 C124 132 88 128 62 112 Z" fill="url(#cprice)"/>
  <path d="M66 110 C72 90 112 82 160 82 C208 82 248 90 254 110" fill="none" stroke="#fff6d8" stroke-width="1.3" opacity=".35"/>
  <!-- rice-grain texture -->
  <g stroke-linecap="round" opacity=".85">
    <path d="M92 100 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M114 110 l6 2" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M138 98 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M204 100 l6 -2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M226 108 l-6 2" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M100 118 l6 2" stroke="#dcc088" stroke-width="2.2"/>
    <path d="M218 118 l-6 2" stroke="#fffbe8" stroke-width="2.2"/>
    <path d="M84 108 l6 2" stroke="#fffbe8" stroke-width="2"/>
  </g>
  <!-- lap cheong (Chinese sausage) rounds fanned across the top -->
  <g>
    <ellipse cx="118" cy="98" rx="10" ry="7" fill="url(#cpsaus)" stroke="#4a1208" stroke-width="1.3" transform="rotate(-12 118 98)"/>
    <circle cx="115" cy="96" r="2.4" fill="#f0c39a" opacity=".7"/><circle cx="121" cy="99" r="1.8" fill="#f0c39a" opacity=".6"/>
    <ellipse cx="146" cy="94" rx="10.5" ry="7.5" fill="url(#cpsaus)" stroke="#4a1208" stroke-width="1.3" transform="rotate(8 146 94)"/>
    <circle cx="143" cy="92" r="2.4" fill="#f0c39a" opacity=".7"/><circle cx="149" cy="96" r="1.8" fill="#f0c39a" opacity=".6"/>
    <ellipse cx="176" cy="96" rx="11" ry="8" fill="url(#cpsaus)" stroke="#4a1208" stroke-width="1.4" transform="rotate(-6 176 96)"/>
    <circle cx="172" cy="94" r="2.6" fill="#f4cfa6" opacity=".75"/><circle cx="180" cy="98" r="2" fill="#f0c39a" opacity=".6"/>
    <ellipse cx="204" cy="100" rx="10" ry="7" fill="url(#cpsaus)" stroke="#4a1208" stroke-width="1.3" transform="rotate(14 204 100)"/>
    <circle cx="201" cy="98" r="2.4" fill="#f0c39a" opacity=".7"/><circle cx="207" cy="102" r="1.8" fill="#f0c39a" opacity=".6"/>
  </g>
  <!-- runny egg yolk nestled in the rice -->
  <circle cx="160" cy="116" r="9" fill="#ffc23a"/>
  <circle cx="160" cy="116" r="9" fill="none" stroke="#e39a1a" stroke-width="1.2"/>
  <ellipse cx="156" cy="112" rx="3.4" ry="2" fill="#fff3c8" opacity=".85"/>
  <!-- dark soy drizzle laps -->
  <path d="M88 122 C124 132 200 132 236 120" stroke="#2a1608" stroke-width="2.4" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- scallion greens on top -->
  <rect x="126" y="106" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 129 107)"/>
  <rect x="182" y="108" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(12 185 109)"/>
  <rect x="150" y="120" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(20 153 121)"/>
  <rect x="196" y="112" width="6" height="2.4" rx="1.2" fill="#6abf5a" transform="rotate(-8 199 113)"/>
  <!-- gloss dots -->
  <circle cx="130" cy="100" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="102" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="164" cy="112" r="1.2" fill="#fff" opacity=".5"/>
</svg>
