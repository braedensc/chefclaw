<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="bpbBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="bpbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="bpbsteamer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9843f"/><stop offset="55%" stop-color="#7c5c26"/><stop offset="100%" stop-color="#4d3b17"/>
    </linearGradient>
    <radialGradient id="bpbbun" cx="42%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fdfaf2"/><stop offset="58%" stop-color="#f4ecda"/><stop offset="100%" stop-color="#ddccae"/>
    </radialGradient>
    <linearGradient id="bpbfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cf5226"/><stop offset="55%" stop-color="#a4300f"/><stop offset="100%" stop-color="#7a1d07"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bpbbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 26 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bpbBlur3)"/>
  <path d="M204 50 C196 34 214 26 206 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#bpbBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- bamboo steamer body -->
  <ellipse cx="160" cy="150" rx="134" ry="34" fill="#3c2d12"/>
  <path d="M26 128 C26 156 86 176 160 176 C234 176 294 156 294 128 L294 150 C294 178 234 198 160 198 C86 198 26 178 26 150 Z" fill="url(#bpbsteamer)"/>
  <!-- bamboo slat lines on the rim wall -->
  <path d="M40 152 C70 170 118 180 160 180 C202 180 250 170 280 152" stroke="#3a2c12" stroke-width="1.6" fill="none" opacity=".7"/>
  <path d="M36 162 C68 182 118 191 160 191 C202 191 252 182 284 162" stroke="#3a2c12" stroke-width="1.6" fill="none" opacity=".6"/>
  <!-- steamer top rim -->
  <ellipse cx="160" cy="128" rx="134" ry="34" fill="#5c451d"/>
  <ellipse cx="160" cy="128" rx="134" ry="34" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="120" ry="28" fill="#120d08"/>
  <!-- neon steam arc -->
  <path d="M50 116 Q100 84 168 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- three char-siu-bao domes with the classic burst-open top revealing red filling -->
  <!-- back bun -->
  <g transform="translate(160 96) scale(.9)" opacity=".95">
    <ellipse cx="0" cy="18" rx="34" ry="14" fill="#c9b78f" opacity=".5"/>
    <path d="M-34 18 C-34 -8 -18 -24 0 -24 C18 -24 34 -8 34 18 C18 26 -18 26 -34 18 Z" fill="url(#bpbbun)" stroke="#c9b389" stroke-width="1.4"/>
    <!-- burst opening -->
    <path d="M-9 -18 C-4 -8 4 -8 9 -18 C13 -10 6 -2 0 -2 C-6 -2 -13 -10 -9 -18 Z" fill="url(#bpbfill)"/>
    <path d="M-14 -14 L-9 -18 M14 -14 L9 -18 M0 -24 L0 -18" stroke="#d9c9a6" stroke-width="1.3" opacity=".7"/>
    <ellipse cx="-12" cy="-6" rx="10" ry="4" fill="#fff" opacity=".35"/>
  </g>
  <!-- front-left bun -->
  <g transform="translate(108 118)">
    <path d="M-36 18 C-36 -10 -19 -26 0 -26 C19 -26 36 -10 36 18 C19 27 -19 27 -36 18 Z" fill="url(#bpbbun)" stroke="#c2ab7e" stroke-width="1.5"/>
    <path d="M-10 -20 C-5 -9 5 -9 10 -20 C15 -11 7 -2 0 -2 C-7 -2 -15 -11 -10 -20 Z" fill="url(#bpbfill)"/>
    <path d="M-3 -8 q3 4 6 0" stroke="#ffb27a" stroke-width="1.2" fill="none" opacity=".6"/>
    <path d="M-15 -16 L-10 -20 M15 -16 L10 -20 M0 -26 L0 -20" stroke="#d9c9a6" stroke-width="1.4" opacity=".7"/>
    <ellipse cx="-13" cy="-7" rx="12" ry="4.4" fill="#fff" opacity=".45"/>
  </g>
  <!-- front-right bun -->
  <g transform="translate(212 118)">
    <path d="M-36 18 C-36 -10 -19 -26 0 -26 C19 -26 36 -10 36 18 C19 27 -19 27 -36 18 Z" fill="url(#bpbbun)" stroke="#c2ab7e" stroke-width="1.5"/>
    <path d="M-10 -20 C-5 -9 5 -9 10 -20 C15 -11 7 -2 0 -2 C-7 -2 -15 -11 -10 -20 Z" fill="url(#bpbfill)"/>
    <path d="M-3 -8 q3 4 6 0" stroke="#ffb27a" stroke-width="1.2" fill="none" opacity=".6"/>
    <path d="M-15 -16 L-10 -20 M15 -16 L10 -20 M0 -26 L0 -20" stroke="#d9c9a6" stroke-width="1.4" opacity=".7"/>
    <ellipse cx="-13" cy="-7" rx="12" ry="4.4" fill="#fff" opacity=".45"/>
  </g>
  <!-- shiny char-siu glaze specks in the openings -->
  <circle cx="108" cy="100" r="1.4" fill="#ffcaa0" opacity=".8"/>
  <circle cx="212" cy="100" r="1.4" fill="#ffcaa0" opacity=".8"/>
  <circle cx="160" cy="80" r="1.3" fill="#ffcaa0" opacity=".75"/>
  <!-- gloss dots on bun tops -->
  <circle cx="96" cy="104" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="200" cy="104" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="84" r="1.3" fill="#fff" opacity=".5"/>
</svg>
