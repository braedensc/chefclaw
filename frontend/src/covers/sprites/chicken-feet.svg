<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="cfBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cfbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="cfsteamer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#caa25a"/><stop offset="50%" stop-color="#9c7638"/><stop offset="100%" stop-color="#6b4c1f"/>
    </linearGradient>
    <radialGradient id="cffoot" cx="42%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#cf5226"/><stop offset="52%" stop-color="#9c2b10"/><stop offset="100%" stop-color="#5e1608"/>
    </radialGradient>
    <radialGradient id="cfsauce" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#6b2f14"/><stop offset="70%" stop-color="#3b160a"/><stop offset="100%" stop-color="#210c05"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cfbg)"/>
  <!-- steam -->
  <path d="M120 52 C110 34 130 26 120 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#cfBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#cfBlur3)"/>
  <ellipse cx="160" cy="186" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (cyan/teal family) -->
  <path d="M50 114 Q104 82 168 80" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- bamboo steamer basket -->
  <ellipse cx="160" cy="132" rx="132" ry="50" fill="#7a5a2a"/>
  <ellipse cx="160" cy="132" rx="132" ry="50" fill="none" stroke="#4a3416" stroke-width="3"/>
  <!-- woven side slats of the basket -->
  <path d="M30 132 a132 50 0 0 0 260 0" fill="url(#cfsteamer)"/>
  <g stroke="#5c4020" stroke-width="1.4" opacity=".55">
    <path d="M30 138 a132 50 0 0 0 260 0" fill="none"/>
    <path d="M34 150 a128 46 0 0 0 252 0" fill="none"/>
    <path d="M40 162 a122 40 0 0 0 240 0" fill="none"/>
  </g>
  <!-- inner rim + dark interior -->
  <ellipse cx="160" cy="128" rx="116" ry="42" fill="#3a2814"/>
  <ellipse cx="160" cy="128" rx="116" ry="42" fill="none" stroke="#8a6630" stroke-width="2" opacity=".7"/>
  <!-- glossy dark braise sauce pool -->
  <ellipse cx="160" cy="130" rx="104" ry="36" fill="url(#cfsauce)"/>
  <!-- fermented black-bean specks in the sauce -->
  <g fill="#160804">
    <circle cx="96" cy="140" r="2.4"/><circle cx="120" cy="148" r="2.2"/><circle cx="150" cy="150" r="2.6"/>
    <circle cx="188" cy="146" r="2.3"/><circle cx="216" cy="138" r="2.4"/><circle cx="134" cy="134" r="2"/>
    <circle cx="202" cy="152" r="2.1"/><circle cx="170" cy="144" r="2.2"/>
  </g>
  <!-- CHICKEN FEET: knuckly glazed feet with splayed toes -->
  <!-- foot 1 -->
  <g transform="translate(84 104) rotate(-14)">
    <path d="M0 8 C-2 -2 8 -6 14 0 C18 -8 30 -8 32 2 C40 -4 48 4 44 12 C40 22 18 24 8 20 C-2 18 -2 14 0 8 Z" fill="url(#cffoot)" stroke="#3d0f04" stroke-width="1.3"/>
    <path d="M14 0 l-4 -12 M28 -2 l2 -13 M42 6 l10 -8 M4 14 l-13 4 M40 18 l11 6" stroke="#9c2b10" stroke-width="4.6" stroke-linecap="round"/>
    <path d="M14 0 l-4 -12 M28 -2 l2 -13 M42 6 l10 -8 M4 14 l-13 4 M40 18 l11 6" stroke="#cf5226" stroke-width="2.2" stroke-linecap="round"/>
    <ellipse cx="18" cy="6" rx="8" ry="4" fill="#ff9d5a" opacity=".45"/>
  </g>
  <!-- foot 2 (front, larger, brighter) -->
  <g transform="translate(148 116) rotate(6)">
    <path d="M0 8 C-2 -2 8 -6 14 0 C18 -8 30 -8 32 2 C40 -4 48 4 44 12 C40 22 18 24 8 20 C-2 18 -2 14 0 8 Z" fill="url(#cffoot)" stroke="#3d0f04" stroke-width="1.3"/>
    <path d="M14 0 l-4 -14 M28 -2 l2 -15 M42 6 l12 -9 M4 14 l-14 5 M40 18 l12 7" stroke="#9c2b10" stroke-width="4.8" stroke-linecap="round"/>
    <path d="M14 0 l-4 -14 M28 -2 l2 -15 M42 6 l12 -9 M4 14 l-14 5 M40 18 l12 7" stroke="#cf5226" stroke-width="2.4" stroke-linecap="round"/>
    <ellipse cx="18" cy="6" rx="9" ry="4.5" fill="#ffb070" opacity=".5"/>
  </g>
  <!-- foot 3 -->
  <g transform="translate(196 106) rotate(-6)">
    <path d="M0 8 C-2 -2 8 -6 14 0 C18 -8 30 -8 32 2 C40 -4 48 4 44 12 C40 22 18 24 8 20 C-2 18 -2 14 0 8 Z" fill="url(#cffoot)" stroke="#3d0f04" stroke-width="1.3"/>
    <path d="M14 0 l-4 -12 M28 -2 l2 -13 M42 6 l11 -8 M4 14 l-12 4 M40 18 l11 6" stroke="#9c2b10" stroke-width="4.6" stroke-linecap="round"/>
    <path d="M14 0 l-4 -12 M28 -2 l2 -13 M42 6 l11 -8 M4 14 l-12 4 M40 18 l11 6" stroke="#cf5226" stroke-width="2.2" stroke-linecap="round"/>
    <ellipse cx="18" cy="6" rx="8" ry="4" fill="#ff9d5a" opacity=".45"/>
  </g>
  <!-- diced red chili + scallion garnish -->
  <rect x="112" y="120" width="6" height="2.8" rx="1.4" fill="#e0341f" transform="rotate(-16 115 121)"/>
  <rect x="176" y="118" width="6" height="2.8" rx="1.4" fill="#e0341f" transform="rotate(20 179 119)"/>
  <rect x="140" y="106" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(12 143 107)"/>
  <rect x="206" y="126" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-10 209 127)"/>
  <circle cx="128" cy="138" r="1.8" fill="#f8eed6"/>
  <circle cx="182" cy="140" r="1.6" fill="#f8eed6"/>
  <!-- gloss dots -->
  <circle cx="102" cy="102" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="164" cy="112" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="210" cy="104" r="1.3" fill="#fff" opacity=".5"/>
</svg>
