<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="cpbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="cptomato" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ff7350"/><stop offset="60%" stop-color="#e33d24"/><stop offset="100%" stop-color="#c31f12"/>
    </radialGradient>
    <radialGradient id="cpmozz" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="60%" stop-color="#f6efe0"/><stop offset="100%" stop-color="#e3d9c4"/>
    </radialGradient>
    <radialGradient id="cpplate" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cpbg)"/>
  <!-- cold dish: no steam arc; condensation sparkle instead -->
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- wide shallow salad bowl / platter -->
  <ellipse cx="160" cy="132" rx="146" ry="48" fill="url(#cpplate)"/>
  <ellipse cx="160" cy="132" rx="146" ry="48" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="132" ry="40" fill="#0f0d13"/>
  <!-- CAPRESE: alternating overlapping tomato + mozzarella slices, fanned -->
  <g stroke-linejoin="round">
    <!-- tomato slice -->
    <g transform="translate(78 122) rotate(-6)">
      <ellipse cx="0" cy="0" rx="24" ry="21" fill="url(#cptomato)" stroke="#a3170c" stroke-width="1.3"/>
      <ellipse cx="0" cy="0" rx="15" ry="13" fill="#ff9d7d" opacity=".7"/>
      <path d="M0 -13 L0 13 M-11 -7 L11 7 M-11 7 L11 -7" stroke="#ffd9a2" stroke-width="1.6" opacity=".75"/>
      <circle cx="0" cy="0" r="3" fill="#ffd9a2"/>
    </g>
    <!-- mozzarella slice -->
    <g transform="translate(118 128) rotate(4)">
      <ellipse cx="0" cy="0" rx="24" ry="21" fill="url(#cpmozz)" stroke="#cabfa6" stroke-width="1.3"/>
      <ellipse cx="-7" cy="-7" rx="9" ry="6" fill="#ffffff" opacity=".8"/>
    </g>
    <!-- tomato slice -->
    <g transform="translate(160 122) rotate(-4)">
      <ellipse cx="0" cy="0" rx="24" ry="21" fill="url(#cptomato)" stroke="#a3170c" stroke-width="1.3"/>
      <ellipse cx="0" cy="0" rx="15" ry="13" fill="#ff9d7d" opacity=".7"/>
      <path d="M0 -13 L0 13 M-11 -7 L11 7 M-11 7 L11 -7" stroke="#ffd9a2" stroke-width="1.6" opacity=".75"/>
      <circle cx="0" cy="0" r="3" fill="#ffd9a2"/>
    </g>
    <!-- mozzarella slice -->
    <g transform="translate(200 128) rotate(6)">
      <ellipse cx="0" cy="0" rx="24" ry="21" fill="url(#cpmozz)" stroke="#cabfa6" stroke-width="1.3"/>
      <ellipse cx="-7" cy="-7" rx="9" ry="6" fill="#ffffff" opacity=".8"/>
    </g>
    <!-- tomato slice -->
    <g transform="translate(242 122) rotate(-8)">
      <ellipse cx="0" cy="0" rx="23" ry="20" fill="url(#cptomato)" stroke="#a3170c" stroke-width="1.3"/>
      <ellipse cx="0" cy="0" rx="14" ry="12" fill="#ff9d7d" opacity=".7"/>
      <path d="M0 -12 L0 12 M-10 -6 L10 6 M-10 6 L10 -6" stroke="#ffd9a2" stroke-width="1.5" opacity=".75"/>
      <circle cx="0" cy="0" r="2.8" fill="#ffd9a2"/>
    </g>
  </g>
  <!-- fresh basil leaves tucked between slices -->
  <g stroke-linejoin="round">
    <path d="M100 108 C104 96 118 96 122 108 C118 120 104 120 100 108 Z" fill="#3f9c37" stroke="#2f7d2b" stroke-width="1"/>
    <path d="M111 98 L111 118" stroke="#2f7d2b" stroke-width="1" opacity=".8"/>
    <path d="M140 110 C144 100 156 100 160 110 C156 120 144 120 140 110 Z" fill="#5ecb4e" stroke="#2f7d2b" stroke-width="1"/>
    <path d="M150 102 L150 118" stroke="#2f7d2b" stroke-width="1" opacity=".8"/>
    <path d="M182 108 C186 96 200 96 204 108 C200 120 186 120 182 108 Z" fill="#3f9c37" stroke="#2f7d2b" stroke-width="1"/>
    <path d="M193 98 L193 118" stroke="#2f7d2b" stroke-width="1" opacity=".8"/>
    <path d="M222 112 C226 102 238 102 242 112 C238 122 226 122 222 112 Z" fill="#58c14a" stroke="#2f7d2b" stroke-width="1"/>
  </g>
  <!-- balsamic drizzle + olive-oil pools -->
  <path d="M96 140 C120 148 150 138 176 146 C200 152 224 142 244 148" stroke="#3d1408" stroke-width="2.2" fill="none" opacity=".65" stroke-linecap="round"/>
  <path d="M110 150 C136 156 168 148 196 154" stroke="#4d1c0a" stroke-width="1.6" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- olive-oil / condensation gloss dots (cold-dish sparkle) -->
  <circle cx="88" cy="114" r="1.6" fill="#fff" opacity=".7"/>
  <circle cx="130" cy="120" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="170" cy="114" r="1.5" fill="#fff" opacity=".65"/>
  <circle cx="210" cy="120" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="248" cy="116" r="1.3" fill="#fff" opacity=".55"/>
  <!-- tiny sparkle cross (fresh/cold cue) -->
  <path d="M150 90 l0 8 M146 94 l8 0" stroke="#fff" stroke-width="1.3" opacity=".5" stroke-linecap="round"/>
  <path d="M226 96 l0 6 M223 99 l6 0" stroke="#fff" stroke-width="1.1" opacity=".4" stroke-linecap="round"/>
</svg>
