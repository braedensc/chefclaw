<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tbsBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tbsbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="tbsbowl" cx="50%" cy="28%" r="82%">
      <stop offset="0%" stop-color="#1c1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="tbsbroth" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ff7350"/><stop offset="55%" stop-color="#e0442a"/><stop offset="100%" stop-color="#a51f12"/>
    </radialGradient>
    <linearGradient id="tbstomato" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a63"/><stop offset="55%" stop-color="#e6462c"/><stop offset="100%" stop-color="#c31f12"/>
    </linearGradient>
    <linearGradient id="tbsbrisket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3a20"/><stop offset="50%" stop-color="#5e2410"/><stop offset="100%" stop-color="#3b0f06"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tbsbg)"/>
  <!-- rising steam wisps (hot soup) -->
  <path d="M126 50 C116 32 136 24 126 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#tbsBlur3)"/>
  <path d="M196 48 C188 32 206 24 198 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tbsBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="140" ry="20" fill="#000" opacity=".5"/>
  <!-- neon steam arc (rose family) -->
  <path d="M52 108 Q104 74 168 74" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- deep soup bowl silhouette -->
  <path d="M46 96 C46 90 62 88 160 88 C258 88 274 90 274 96 C274 138 224 172 160 172 C96 172 46 138 46 96 Z" fill="url(#tbsbowl)"/>
  <path d="M46 96 C46 90 62 88 160 88 C258 88 274 90 274 96 C274 138 224 172 160 172 C96 172 46 138 46 96 Z" fill="none" stroke="#3a2230" stroke-width="3"/>
  <!-- rich red tomato broth surface -->
  <ellipse cx="160" cy="98" rx="112" ry="26" fill="url(#tbsbroth)"/>
  <ellipse cx="160" cy="98" rx="112" ry="26" fill="none" stroke="#8a1c10" stroke-width="1.4" opacity=".5"/>
  <!-- broth sheen + oil pools -->
  <path d="M78 92 C104 84 150 84 176 90" stroke="#ffb08c" stroke-width="2" fill="none" opacity=".4" stroke-linecap="round"/>
  <circle cx="100" cy="96" r="3" fill="#ff9d5a" opacity=".55"/>
  <circle cx="212" cy="98" r="2.6" fill="#ff9d5a" opacity=".5"/>
  <!-- tomato wedges -->
  <g>
    <g transform="translate(84 100) rotate(-14)">
      <path d="M0 0 C-8 -8 -6 -18 4 -20 C14 -18 16 -8 8 0 C4 4 -4 4 0 0 Z" fill="url(#tbstomato)" stroke="#a4180d" stroke-width="1.3"/>
      <path d="M2 -16 C6 -12 6 -6 4 -1" stroke="#ffd9a2" stroke-width="2.2" fill="none" opacity=".7"/>
      <ellipse cx="0" cy="-9" rx="2.6" ry="4" fill="#ff9d7d" opacity=".7"/>
      <circle cx="-3" cy="-13" r="1.3" fill="#fff" opacity=".6"/>
    </g>
    <g transform="translate(214 104) rotate(16)">
      <path d="M0 0 C-8 -8 -6 -18 4 -20 C14 -18 16 -8 8 0 C4 4 -4 4 0 0 Z" fill="url(#tbstomato)" stroke="#a4180d" stroke-width="1.3"/>
      <path d="M2 -16 C6 -12 6 -6 4 -1" stroke="#ffd9a2" stroke-width="2.2" fill="none" opacity=".7"/>
      <ellipse cx="0" cy="-9" rx="2.6" ry="4" fill="#ff9d7d" opacity=".7"/>
      <circle cx="-3" cy="-13" r="1.3" fill="#fff" opacity=".6"/>
    </g>
    <g transform="translate(158 92) rotate(-4)">
      <path d="M0 0 C-7 -7 -5 -16 4 -18 C13 -16 15 -7 7 0 C4 3 -3 3 0 0 Z" fill="url(#tbstomato)" stroke="#a4180d" stroke-width="1.2"/>
      <path d="M2 -14 C5 -11 5 -6 4 -1" stroke="#ffd9a2" stroke-width="2" fill="none" opacity=".7"/>
      <ellipse cx="0" cy="-8" rx="2.2" ry="3.4" fill="#ff9d7d" opacity=".7"/>
    </g>
  </g>
  <!-- beef brisket chunks (dark tender cubes with fat lines) -->
  <g transform="translate(0 2)">
    <g transform="translate(112 110) rotate(-8)">
      <path d="M0 0 L22 -5 L28 12 L6 18 Z" fill="url(#tbsbrisket)" stroke="#240a03" stroke-width="1.3"/>
      <path d="M2 6 L24 1" stroke="#c8956a" stroke-width="2" opacity=".55" stroke-linecap="round"/>
      <path d="M4 12 L26 7" stroke="#a86f45" stroke-width="1.6" opacity=".5" stroke-linecap="round"/>
      <ellipse cx="12" cy="-1" rx="6" ry="2.4" fill="#8a5030" opacity=".55"/>
    </g>
    <g transform="translate(178 114) rotate(10)">
      <path d="M0 0 L20 -4 L26 11 L6 16 Z" fill="url(#tbsbrisket)" stroke="#240a03" stroke-width="1.3"/>
      <path d="M2 5 L22 1" stroke="#c8956a" stroke-width="2" opacity=".55" stroke-linecap="round"/>
      <path d="M4 11 L24 6" stroke="#a86f45" stroke-width="1.6" opacity=".5" stroke-linecap="round"/>
      <ellipse cx="11" cy="-1" rx="5" ry="2.2" fill="#8a5030" opacity=".55"/>
    </g>
    <g transform="translate(146 122) rotate(2)">
      <path d="M0 0 L18 -4 L23 9 L5 14 Z" fill="url(#tbsbrisket)" stroke="#240a03" stroke-width="1.2"/>
      <path d="M2 5 L20 1" stroke="#c8956a" stroke-width="1.8" opacity=".55" stroke-linecap="round"/>
    </g>
  </g>
  <!-- scallion + cilantro garnish float -->
  <rect x="124" y="90" width="8" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 128 91)"/>
  <rect x="188" y="96" width="8" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 192 97)"/>
  <rect x="106" y="118" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 109 119)"/>
  <circle cx="150" cy="102" r="2.2" fill="#6abf5a"/>
  <!-- gloss dots -->
  <circle cx="128" cy="94" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="100" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="106" r="1.2" fill="#fff" opacity=".5"/>
</svg>
