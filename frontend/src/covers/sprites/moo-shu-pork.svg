<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="msBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="msbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="mswok" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="mspork" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5030"/><stop offset="55%" stop-color="#5e3018"/><stop offset="100%" stop-color="#3d1c0d"/>
    </linearGradient>
    <linearGradient id="msegg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffeaa6"/><stop offset="55%" stop-color="#f6c23a"/><stop offset="100%" stop-color="#e39a1f"/>
    </linearGradient>
    <radialGradient id="mswood" cx="40%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#4a3524"/><stop offset="55%" stop-color="#241408"/><stop offset="100%" stop-color="#0f0703"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#msbg)"/>
  <!-- steam wisps -->
  <path d="M120 54 C110 36 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#msBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#msBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="130" rx="140" ry="48" fill="url(#mswok)"/>
  <ellipse cx="160" cy="130" rx="140" ry="48" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="122" ry="40" fill="#0c0c0f"/>
  <!-- neon steam arc (cyan, savory) -->
  <path d="M50 116 Q104 82 168 80" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy oil sheen pooled in plate -->
  <ellipse cx="160" cy="132" rx="112" ry="32" fill="#3a2410" opacity=".35"/>
  <!-- tossed mound of shredded pork + egg ribbons + wood-ear -->
  <!-- wood-ear fungus (dark irregular flaps) at back -->
  <g stroke="#0f0703" stroke-width="1.2" opacity=".95">
    <path d="M100 104 C92 98 96 90 106 90 C118 88 124 96 118 104 C124 110 112 116 104 112 C96 112 96 108 100 104 Z" fill="url(#mswood)"/>
    <path d="M186 100 C178 94 184 86 194 88 C206 86 210 96 204 102 C210 108 198 114 190 108 C182 108 182 104 186 100 Z" fill="url(#mswood)"/>
    <path d="M144 100 C138 94 144 88 152 90 C162 88 166 96 160 102 C164 108 154 112 148 108 C142 106 142 104 144 100 Z" fill="url(#mswood)"/>
  </g>
  <!-- golden egg ribbons (torn folds) -->
  <g stroke="#d98a17" stroke-width="1.2">
    <path d="M114 118 C108 110 118 104 130 106 C142 102 150 112 146 120 C150 128 138 132 128 128 C118 130 112 124 114 118 Z" fill="url(#msegg)"/>
    <ellipse cx="124" cy="110" rx="7" ry="3" fill="#fff3c8" opacity=".85"/>
    <path d="M172 116 C166 108 176 102 188 104 C200 100 208 110 204 118 C208 126 196 130 186 126 C176 128 170 122 172 116 Z" fill="url(#msegg)"/>
    <ellipse cx="182" cy="108" rx="7" ry="3" fill="#ffeaa6" opacity=".9"/>
  </g>
  <!-- shredded pork strips (warm brown batons, tossed angles) -->
  <g stroke-linejoin="round" stroke="#3d1c0d" stroke-width="1">
    <g transform="translate(86 122) rotate(-18)"><rect width="46" height="8" rx="4" fill="url(#mspork)"/><rect y="1.4" width="46" height="2" rx="1" fill="#b07040" opacity=".55"/></g>
    <g transform="translate(128 130) rotate(8)"><rect width="52" height="8" rx="4" fill="url(#mspork)"/><rect y="1.4" width="52" height="2" rx="1" fill="#b07040" opacity=".55"/></g>
    <g transform="translate(140 116) rotate(-6)"><rect width="48" height="7.5" rx="3.7" fill="url(#mspork)"/><rect y="1.3" width="48" height="1.9" rx="1" fill="#b07040" opacity=".5"/></g>
    <g transform="translate(176 128) rotate(22)"><rect width="44" height="7.5" rx="3.7" fill="url(#mspork)"/><rect y="1.3" width="44" height="1.9" rx="1" fill="#b07040" opacity=".5"/></g>
    <g transform="translate(96 134) rotate(14)"><rect width="42" height="7" rx="3.5" fill="url(#mspork)"/><rect y="1.2" width="42" height="1.8" rx="1" fill="#b07040" opacity=".5"/></g>
    <g transform="translate(150 132) rotate(-24)"><rect width="40" height="7" rx="3.5" fill="url(#mspork)"/><rect y="1.2" width="40" height="1.8" rx="1" fill="#b07040" opacity=".5"/></g>
  </g>
  <!-- more egg ribbon on top for gloss -->
  <g stroke="#d98a17" stroke-width="1.2">
    <path d="M142 128 C136 120 146 116 156 118 C166 116 172 124 168 130 C170 138 160 140 152 136 C144 138 140 134 142 128 Z" fill="url(#msegg)"/>
    <ellipse cx="152" cy="122" rx="6" ry="2.6" fill="#fff3c8" opacity=".85"/>
  </g>
  <!-- scallion greens garnish -->
  <rect x="112" y="112" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-16 116 113)"/>
  <rect x="162" y="108" width="8" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(18 166 109)"/>
  <rect x="128" y="138" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(24 131 139)"/>
  <rect x="192" y="118" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-12 195 119)"/>
  <rect x="94" y="120" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(30 97 121)"/>
  <!-- oil gloss dots -->
  <circle cx="118" cy="108" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="112" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="140" cy="138" r="1.2" fill="#fff" opacity=".45"/>
</svg>
