<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="mlBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="mlbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="mlloaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4022"/><stop offset="50%" stop-color="#5a2c15"/><stop offset="100%" stop-color="#3d1c0d"/>
    </linearGradient>
    <linearGradient id="mlglaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c94320"/><stop offset="55%" stop-color="#9c2b10"/><stop offset="100%" stop-color="#6e1808"/>
    </linearGradient>
    <linearGradient id="mlface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5030"/><stop offset="100%" stop-color="#5e2f18"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mlbg)"/>
  <!-- steam -->
  <path d="M120 54 C110 36 130 28 120 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#mlBlur3)"/>
  <path d="M194 52 C186 36 204 28 196 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#mlBlur3)"/>
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="134" rx="144" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="134" rx="144" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="130" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (cyan) -->
  <path d="M50 116 Q104 84 168 82" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- MEATLOAF: a chunky glazed brick loaf, one slice cut away -->
  <g transform="translate(0 2)">
    <!-- loaf body (top rounded slab) -->
    <path d="M64 118 C64 98 78 88 100 88 L228 88 C246 88 256 100 256 116 C256 134 240 144 214 144 L96 144 C76 144 64 134 64 118 Z" fill="url(#mlloaf)"/>
    <!-- glossy dark-red glaze coating the top/side -->
    <path d="M64 116 C64 98 78 88 100 88 L228 88 C246 88 256 100 256 114 C230 122 96 122 64 116 Z" fill="url(#mlglaze)"/>
    <!-- glaze drip laps down the side -->
    <path d="M92 118 C94 128 90 134 96 138 C100 130 100 124 100 118 Z" fill="#7a1c0a" opacity=".8"/>
    <path d="M170 120 C172 130 168 136 174 140 C178 132 178 126 178 120 Z" fill="#7a1c0a" opacity=".8"/>
    <path d="M232 116 C234 126 230 132 236 136 C240 128 240 122 240 116 Z" fill="#7a1c0a" opacity=".75"/>
    <!-- glaze sheen highlight -->
    <path d="M84 100 C120 92 210 92 240 100" stroke="#e0603a" stroke-width="2.4" fill="none" opacity=".5" stroke-linecap="round"/>
    <ellipse cx="150" cy="98" rx="46" ry="5" fill="#ff8a5a" opacity=".28"/>
    <!-- outline -->
    <path d="M64 118 C64 98 78 88 100 88 L228 88 C246 88 256 100 256 116 C256 134 240 144 214 144 L96 144 C76 144 64 134 64 118 Z" fill="none" stroke="#240a03" stroke-width="1.5" opacity=".5"/>
    <!-- CUT SLICE leaning at the front-left, showing meat strata cross-section -->
    <g transform="translate(50 108) rotate(-8)">
      <path d="M0 0 L34 0 L34 44 L0 44 Z" fill="url(#mlface)"/>
      <!-- glaze cap on the slice top edge -->
      <path d="M0 0 L34 0 L34 6 L0 6 Z" fill="#9c2b10"/>
      <!-- meat texture strata -->
      <path d="M4 16 L30 16 M4 26 L30 26 M4 36 L30 36" stroke="#3d1c0d" stroke-width="1.4" opacity=".55"/>
      <!-- ground-meat speckle -->
      <g fill="#a86a44" opacity=".7"><circle cx="10" cy="12" r="1.6"/><circle cx="22" cy="20" r="1.6"/><circle cx="14" cy="30" r="1.5"/><circle cx="26" cy="34" r="1.5"/><circle cx="18" cy="22" r="1.4"/></g>
      <g fill="#6b3a1e" opacity=".7"><circle cx="16" cy="14" r="1.4"/><circle cx="26" cy="26" r="1.4"/><circle cx="10" cy="36" r="1.3"/></g>
      <path d="M0 0 L34 0 L34 44 L0 44 Z" fill="none" stroke="#3d1c0d" stroke-width="1.4" opacity=".55"/>
    </g>
  </g>
  <!-- garnish: parsley sprig + gravy dab -->
  <rect x="196" y="130" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-16 199 131)"/>
  <rect x="210" y="136" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 213 137)"/>
  <ellipse cx="176" cy="138" rx="12" ry="4" fill="#6e1808" opacity=".55"/>
  <!-- gloss dots -->
  <circle cx="120" cy="98" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="100" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="150" r="1.2" fill="#fff" opacity=".5"/>
</svg>
