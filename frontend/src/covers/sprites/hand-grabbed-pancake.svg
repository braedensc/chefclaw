<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="hgBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="hgbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="hgpan" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1620"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="hgcake" cx="44%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#f7e0a4"/><stop offset="52%" stop-color="#e1b165"/><stop offset="100%" stop-color="#b17f2f"/>
    </radialGradient>
    <linearGradient id="hgegg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3c8"/><stop offset="60%" stop-color="#ffd45a"/><stop offset="100%" stop-color="#f6a41f"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#hgbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 26 118 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#hgBlur3)"/>
  <path d="M200 50 C192 34 210 26 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#hgBlur3)"/>
  <!-- cast shadow -->
