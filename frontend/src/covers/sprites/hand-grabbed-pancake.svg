  <g fill="none" stroke-linecap="round">
    <path d="M84 118 C86 104 116 94 158 93 C200 94 230 104 232 118 C230 132 202 142 158 142 C114 142 86 132 84 118" stroke="#a9741f" stroke-width="2" opacity=".7"/>
    <path d="M100 118 C102 108 128 100 158 99 C188 100 214 108 216 118 C214 128 190 136 158 136 C126 136 102 128 100 118" stroke="#c99742" stroke-width="1.8" opacity=".6"/>
    <path d="M116 118 C118 111 138 106 158 105 C178 106 198 111 200 118 C198 125 180 130 158 130 C136 130 118 125 116 118" stroke="#a9741f" stroke-width="1.6" opacity=".65"/>
    <path d="M132 118 C133 113 146 110 158 110 C170 110 183 113 184 118 C183 123 172 126 158 126 C144 126 133 123 132 118" stroke="#c99742" stroke-width="1.4" opacity=".55"/>
  </g>
  <!-- crispy flaky highlight ridges catching light -->
  <path d="M92 106 C118 96 200 96 224 106" stroke="#fff0cf" stroke-width="1.6" fill="none" opacity=".45"/>
  <path d="M104 132 C132 140 186 140 214 132" stroke="#fff0cf" stroke-width="1.3" fill="none" opacity=".3"/>
  <!-- crispy toasted flecks -->
  <circle cx="118" cy="104" r="1.4" fill="#7a4c14" opacity=".7"/>
  <circle cx="186" cy="106" r="1.5" fill="#7a4c14" opacity=".7"/>
  <circle cx="146" cy="136" r="1.3" fill="#7a4c14" opacity=".6"/>
  <circle cx="200" cy="128" r="1.3" fill="#7a4c14" opacity=".6"/>
  <!-- FRIED EGG cracked on top, sunny yolk -->
  <path d="M150 92 C138 90 130 98 134 108 C128 116 138 124 150 122 C160 128 176 124 178 114 C188 110 186 96 174 94 C168 86 156 86 150 92 Z" fill="#fff6e0" opacity=".95" stroke="#e8d8b0" stroke-width="1"/>
  <circle cx="156" cy="106" r="10" fill="url(#hgegg)"/>
  <ellipse cx="152" cy="102" rx="4" ry="2.4" fill="#fff3c8" opacity=".85"/>
  <!-- scallion + a little chili sauce garnish -->
  <rect x="120" y="120" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 123 121)"/>
  <rect x="188" y="118" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 191 119)"/>
  <rect x="138" y="128" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(24 141 129)"/>
  <path d="M170 128 C182 126 194 128 202 132" stroke="#c14a1e" stroke-width="1.8" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- gloss dots -->
  <circle cx="130" cy="100" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="204" cy="112" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="132" r="1.2" fill="#fff" opacity=".5"/>
</svg>
