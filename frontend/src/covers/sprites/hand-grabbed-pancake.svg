  <ellipse cx="158" cy="122" rx="92" ry="42" fill="#8a5c22" opacity=".55"/>
  <!-- main flaky disc, crinkled edge -->
  <path d="M70 118 C72 100 100 86 158 84 C216 86 244 100 246 118 C244 138 210 152 158 152 C106 152 72 138 70 118 Z" fill="url(#hgcake)" stroke="#8a5c22" stroke-width="1.4"/>
