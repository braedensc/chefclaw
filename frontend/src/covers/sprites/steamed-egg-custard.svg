<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="se1bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="se1bowl" cx="50%" cy="28%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="se1custard" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff3c8"/><stop offset="52%" stop-color="#ffe08f"/><stop offset="100%" stop-color="#f2c65e"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#se1bg)"/>
  <!-- steam (silky steamed dish reads soft/warm) -->
  <path d="M132 56 C122 38 142 30 132 10" stroke="#fff" stroke-width="7" fill="none" opacity=".11" filter="url(#nnBlur3)"/>
  <path d="M192 54 C184 38 200 30 192 10" stroke="#fff" stroke-width="6" fill="none" opacity=".09" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl (smaller, taller than a plate) -->
  <path d="M74 120 C74 158 112 178 160 178 C208 178 246 158 246 120 Z" fill="url(#se1bowl)"/>
  <ellipse cx="160" cy="120" rx="92" ry="28" fill="#0d0d10"/>
  <ellipse cx="160" cy="120" rx="92" ry="28" fill="none" stroke="#271b22" stroke-width="3"/>
  <ellipse cx="160" cy="120" rx="80" ry="22" fill="#0c0a0b"/>
  <!-- neon steam arc -->
  <path d="M74 112 Q112 88 166 86" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- silky smooth custard surface -->
  <ellipse cx="160" cy="120" rx="78" ry="21" fill="url(#se1custard)"/>
  <!-- glossy surface sheen (the trademark mirror-smooth top) -->
  <ellipse cx="142" cy="112" rx="34" ry="8" fill="#fff8dc" opacity=".55"/>
  <path d="M96 118 C120 108 200 108 224 118" stroke="#fff8dc" stroke-width="1.6" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- subtle set-jiggle edge shading where custard meets bowl -->
  <ellipse cx="160" cy="120" rx="78" ry="21" fill="none" stroke="#e0ad48" stroke-width="1.4" opacity=".5"/>
  <!-- soy sauce drizzle pooling on top -->
  <path d="M118 124 C140 118 180 118 202 124 C186 130 170 128 160 126 C148 128 132 130 118 124 Z" fill="#3d2510" opacity=".55"/>
  <path d="M130 120 C150 116 176 116 194 120" stroke="#2a1608" stroke-width="2.2" fill="none" opacity=".5" stroke-linecap="round"/>
  <!-- sesame-oil gloss sheen ring -->
  <ellipse cx="160" cy="124" rx="46" ry="9" fill="none" stroke="#ffe6a0" stroke-width="1.2" opacity=".4"/>
  <!-- finely chopped scallion greens sprinkled -->
  <rect x="126" y="114" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-18 129 115)"/>
  <rect x="150" y="112" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 153 113)"/>
  <rect x="176" y="116" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-8 179 117)"/>
  <rect x="140" y="124" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 143 125)"/>
  <rect x="182" y="122" width="6" height="2.4" rx="1.2" fill="#2f7d2b" transform="rotate(-24 185 123)"/>
  <rect x="160" y="118" width="6" height="2.4" rx="1.2" fill="#6abf5a" transform="rotate(6 163 119)"/>
  <!-- sesame seeds -->
  <ellipse cx="138" cy="118" rx="1.4" ry="1" fill="#f8eed6"/><ellipse cx="170" cy="120" rx="1.4" ry="1" fill="#f8eed6"/>
  <ellipse cx="154" cy="122" rx="1.4" ry="1" fill="#f8eed6"/>
  <!-- oil gloss dots -->
  <circle cx="134" cy="110" r="1.5" fill="#fff" opacity=".65"/>
  <circle cx="180" cy="114" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="158" cy="116" r="1.2" fill="#fff" opacity=".5"/>
</svg>
