<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="spBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="spbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="spshrimp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9d5a"/><stop offset="50%" stop-color="#ef6a26"/><stop offset="100%" stop-color="#c23f12"/>
    </linearGradient>
    <linearGradient id="spshrimp2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb07a"/><stop offset="50%" stop-color="#f47c34"/><stop offset="100%" stop-color="#cc4a15"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#spbg)"/>
  <!-- steam -->
  <path d="M122 56 C112 38 132 30 122 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#spBlur3)"/>
  <path d="M202 54 C194 38 212 30 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#spBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- wide oval plate -->
  <ellipse cx="160" cy="128" rx="142" ry="44" fill="#141018"/>
  <ellipse cx="160" cy="128" rx="142" ry="44" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="128" rx="128" ry="36" fill="#0e0c10"/>
  <!-- neon steam arc -->
  <path d="M48 116 Q100 86 166 84" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- light oil sheen on plate -->
  <ellipse cx="160" cy="132" rx="112" ry="24" fill="#2a1a0a" opacity=".5"/>
  <!-- crispy shrimp, curled C-shapes with segmented shells, shell-on with legs -->
  <!-- back shrimp (smaller) -->
  <g transform="translate(112 104) rotate(-18) scale(.88)">
    <path d="M-24 6 C-30 -14 -8 -26 12 -22 C30 -18 34 -2 26 10 C22 2 12 -4 2 -2 C-8 0 -14 8 -12 16 C-20 16 -22 12 -24 6 Z" fill="url(#spshrimp2)" stroke="#9a3610" stroke-width="1.3"/>
    <path d="M-18 0 M-10 -14 M2 -18 M14 -14" stroke="#c25320" stroke-width="1.1" fill="none"/>
    <path d="M-14 -6 q4 -6 10 -9 M-4 -13 q5 -4 11 -5 M8 -15 q6 -1 11 2" stroke="#b84a18" stroke-width="1.1" fill="none" opacity=".7"/>
    <circle cx="20" cy="-14" r="1.6" fill="#2a0f06"/>
    <path d="M26 -18 l6 -4 M28 -14 l7 -2" stroke="#c25320" stroke-width="1" opacity=".7"/>
  </g>
  <!-- front-left shrimp (hero, larger, brighter) -->
  <g transform="translate(126 128) rotate(8)">
    <path d="M-30 8 C-38 -16 -10 -32 16 -28 C40 -24 44 -2 32 14 C28 4 14 -4 2 -2 C-10 0 -18 10 -14 22 C-24 22 -28 16 -30 8 Z" fill="url(#spshrimp)" stroke="#8f3210" stroke-width="1.5"/>
    <!-- shell segment ridges -->
    <path d="M-18 -2 q3 -8 11 -13 M-6 -16 q6 -5 14 -7 M10 -20 q8 -1 15 3" stroke="#a3300f" stroke-width="1.3" fill="none" opacity=".75"/>
    <path d="M-24 4 q2 -5 6 -9" stroke="#a3300f" stroke-width="1.2" fill="none" opacity=".7"/>
    <!-- salt-crust speckle highlight -->
    <ellipse cx="4" cy="-16" rx="10" ry="5" fill="#ffcf9a" opacity=".55"/>
    <circle cx="24" cy="-18" r="2" fill="#2a0f06"/>
    <path d="M30 -22 l7 -5 M32 -17 l8 -3" stroke="#b84a18" stroke-width="1.1" opacity=".7"/>
  </g>
  <!-- front-right shrimp -->
  <g transform="translate(196 126) rotate(-10)">
    <path d="M28 8 C36 -16 8 -32 -18 -28 C-42 -24 -46 -2 -34 14 C-30 4 -16 -4 -4 -2 C8 0 16 10 12 22 C22 22 26 16 28 8 Z" fill="url(#spshrimp)" stroke="#8f3210" stroke-width="1.5"/>
    <path d="M16 -2 q-3 -8 -11 -13 M4 -16 q-6 -5 -14 -7 M-12 -20 q-8 -1 -15 3" stroke="#a3300f" stroke-width="1.3" fill="none" opacity=".75"/>
    <ellipse cx="-4" cy="-16" rx="10" ry="5" fill="#ffcf9a" opacity=".55"/>
    <circle cx="-26" cy="-18" r="2" fill="#2a0f06"/>
    <path d="M-32 -22 l-7 -5 M-34 -17 l-8 -3" stroke="#b84a18" stroke-width="1.1" opacity=".7"/>
  </g>
  <!-- salt & pepper: black peppercorn specks + white salt dots + fried garlic bits scattered -->
  <circle cx="96" cy="118" r="1.6" fill="#260903"/>
  <circle cx="150" cy="112" r="1.6" fill="#260903"/>
  <circle cx="176" cy="140" r="1.5" fill="#260903"/>
  <circle cx="222" cy="118" r="1.5" fill="#260903"/>
  <circle cx="130" cy="146" r="1.4" fill="#260903"/>
  <circle cx="204" cy="146" r="1.4" fill="#260903"/>
  <!-- fried garlic / salt flecks -->
  <rect x="112" y="120" width="5" height="4" rx="1.2" fill="#e8cf8e" transform="rotate(20 114 122)"/>
  <rect x="168" y="118" width="5" height="4" rx="1.2" fill="#d8b86a" transform="rotate(-16 170 120)"/>
  <rect x="212" y="132" width="4.6" height="3.6" rx="1.1" fill="#e8cf8e" transform="rotate(10 214 134)"/>
  <rect x="140" y="140" width="4.6" height="3.6" rx="1.1" fill="#d8b86a" transform="rotate(-24 142 142)"/>
  <!-- red chili + green scallion rings -->
  <rect x="118" y="108" width="8" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(-22 122 109)"/>
  <rect x="182" y="110" width="8" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(16 186 111)"/>
  <rect x="150" y="150" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-8 153 151)"/>
  <rect x="200" y="150" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 203 151)"/>
  <!-- salt crystals as tiny white dots -->
  <circle cx="140" cy="120" r="1" fill="#fff" opacity=".8"/>
  <circle cx="190" cy="122" r="1" fill="#fff" opacity=".8"/>
  <circle cx="164" cy="132" r="1" fill="#fff" opacity=".75"/>
  <!-- oil gloss -->
  <circle cx="120" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="204" cy="112" r="1.3" fill="#fff" opacity=".55"/>
</svg>
