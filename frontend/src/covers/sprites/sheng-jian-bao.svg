<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="sjBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="sjbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="sjpan" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="sjbun" cx="44%" cy="26%" r="82%">
      <stop offset="0%" stop-color="#fdf6e6"/><stop offset="58%" stop-color="#f0e2c4"/><stop offset="100%" stop-color="#d8c398"/>
    </radialGradient>
    <linearGradient id="sjbase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c17232"/><stop offset="55%" stop-color="#94481a"/><stop offset="100%" stop-color="#6e2f0d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sjbg)"/>
  <!-- steam -->
  <path d="M116 50 C106 32 126 24 116 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#sjBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#sjBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- neon steam arc (warm/local) -->
  <path d="M50 114 Q104 82 168 80" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- flat skillet the buns are fried in -->
  <ellipse cx="160" cy="134" rx="142" ry="48" fill="url(#sjpan)"/>
  <ellipse cx="160" cy="134" rx="142" ry="48" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="126" ry="40" fill="#0d0d10"/>
  <!-- oily browned-bottom sheen where the buns crisp -->
  <ellipse cx="160" cy="140" rx="108" ry="26" fill="#3a1e0c" opacity=".8"/>
  <!-- SHENG JIAN BAO: plump white buns with pleated tops + golden fried bottoms -->
  <!-- back bun -->
  <g transform="translate(126 88)">
    <ellipse cx="0" cy="18" rx="24" ry="10" fill="url(#sjbase)"/>
    <path d="M-24 18 C-24 2 -12 -8 0 -8 C12 -8 24 2 24 18 C16 24 -16 24 -24 18 Z" fill="url(#sjbun)" stroke="#c9b487" stroke-width="1.2"/>
    <path d="M0 -8 C-6 -2 -8 6 -4 12 M0 -8 C4 -2 6 6 3 12 M0 -8 l0 12" stroke="#c9b083" stroke-width="1.1" fill="none" opacity=".7"/>
    <circle cx="0" cy="-6" r="2.6" fill="#8a6a3a"/>
    <ellipse cx="-8" cy="2" rx="7" ry="4" fill="#fff" opacity=".35"/>
    <g fill="#f8eed6"><circle cx="-6" cy="0" r="1" opacity=".9"/><circle cx="8" cy="4" r="1" opacity=".9"/></g>
    <rect x="-4" y="-4" width="7" height="2.2" rx="1.1" fill="#5ecb4e" transform="rotate(-20 0 -3)"/>
  </g>
  <!-- back-right bun -->
  <g transform="translate(196 90)">
    <ellipse cx="0" cy="18" rx="23" ry="10" fill="url(#sjbase)"/>
    <path d="M-23 18 C-23 2 -12 -8 0 -8 C12 -8 23 2 23 18 C15 24 -15 24 -23 18 Z" fill="url(#sjbun)" stroke="#c9b487" stroke-width="1.2"/>
    <path d="M0 -8 C-6 -2 -8 6 -4 12 M0 -8 C4 -2 6 6 3 12 M0 -8 l0 12" stroke="#c9b083" stroke-width="1.1" fill="none" opacity=".7"/>
    <circle cx="0" cy="-6" r="2.4" fill="#8a6a3a"/>
    <ellipse cx="-7" cy="2" rx="7" ry="4" fill="#fff" opacity=".35"/>
    <g fill="#f8eed6"><circle cx="-5" cy="1" r="1" opacity=".9"/><circle cx="7" cy="5" r="1" opacity=".9"/></g>
    <rect x="2" y="-4" width="7" height="2.2" rx="1.1" fill="#3f9c37" transform="rotate(14 5 -3)"/>
  </g>
  <!-- front bun (larger, brighter) -->
  <g transform="translate(160 112)">
    <ellipse cx="0" cy="22" rx="30" ry="12" fill="url(#sjbase)"/>
    <ellipse cx="0" cy="26" rx="30" ry="7" fill="#5c2408"/>
    <path d="M-30 22 C-30 2 -15 -12 0 -12 C15 -12 30 2 30 22 C20 30 -20 30 -30 22 Z" fill="url(#sjbun)" stroke="#c9b487" stroke-width="1.3"/>
    <path d="M0 -12 C-8 -4 -10 8 -5 16 M0 -12 C8 -4 10 8 5 16 M0 -12 l0 16 M0 -12 C-3 -4 -12 2 -16 8 M0 -12 C3 -4 12 2 16 8" stroke="#c9b083" stroke-width="1.2" fill="none" opacity=".75"/>
    <circle cx="0" cy="-9" r="3.2" fill="#8a6a3a"/>
    <ellipse cx="-10" cy="0" rx="9" ry="5" fill="#fff" opacity=".38"/>
    <g fill="#f8eed6"><circle cx="-8" cy="-2" r="1.2" opacity=".95"/><circle cx="9" cy="2" r="1.2" opacity=".95"/><circle cx="2" cy="6" r="1.1" opacity=".9"/><circle cx="-2" cy="-6" r="1" opacity=".9"/></g>
    <rect x="-6" y="-8" width="8" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 -2 -7)"/>
    <rect x="6" y="0" width="7" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(22 9 1)"/>
  </g>
  <!-- gloss dots -->
  <circle cx="118" cy="82" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="188" cy="84" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="104" r="1.6" fill="#fff" opacity=".6"/>
</svg>
