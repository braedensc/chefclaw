    <g transform="translate(102 124) rotate(-12)">
      <rect x="-24" y="-18" width="48" height="36" rx="5" fill="url(#rvpasta)" stroke="#b78a4a" stroke-width="1.4"/>
      <path d="M-20 -18 v5 M-10 -18 v5 M0 -18 v5 M10 -18 v5 M20 -18 v5 M-20 18 v-5 M-10 18 v-5 M0 18 v-5 M10 18 v-5 M20 18 v-5" stroke="#c69a55" stroke-width="1.2" opacity=".75"/>
      <path d="M-24 -12 h5 M-24 -2 h5 M-24 8 h5 M24 -12 h-5 M24 -2 h-5 M24 8 h-5" stroke="#c69a55" stroke-width="1.2" opacity=".75"/>
