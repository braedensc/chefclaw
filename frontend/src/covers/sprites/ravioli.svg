  <path d="M50 116 Q102 84 166 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- light butter-sage sheen pool -->
  <ellipse cx="160" cy="130" rx="112" ry="34" fill="url(#rvsauce)"/>
  <!-- RAVIOLI: square stuffed cushions with crimped fork-edges, plump middles -->
  <g stroke-linejoin="round">
