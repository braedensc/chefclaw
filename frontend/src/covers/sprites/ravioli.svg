  <!-- fried sage + parmesan + pepper garnish -->
  <path d="M110 102 C114 92 124 92 128 100 C126 110 114 112 110 102 Z" fill="#5ecb4e"/>
  <path d="M119 94 L120 108" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  <path d="M188 138 C192 130 200 130 203 137 C201 144 192 145 188 138 Z" fill="#3f9c37"/>
