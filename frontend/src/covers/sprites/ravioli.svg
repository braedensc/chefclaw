    <g transform="translate(102 96) rotate(-8) scale(.86)">
      <rect x="-19" y="-14" width="38" height="28" rx="4" fill="url(#rvpasta)" stroke="#b78a4a" stroke-width="1.2" opacity=".9"/>
      <path d="M-16 -14 v4 M-8 -14 v4 M0 -14 v4 M8 -14 v4 M16 -14 v4 M-16 14 v-4 M-8 14 v-4 M0 14 v-4 M8 14 v-4 M16 14 v-4" stroke="#c69a55" stroke-width="1" opacity=".7"/>
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fff1c9" opacity=".35"/>
    </g>
    <g transform="translate(160 92) rotate(6) scale(.85)">
      <rect x="-19" y="-14" width="38" height="28" rx="4" fill="url(#rvpasta)" stroke="#b78a4a" stroke-width="1.2" opacity=".9"/>
      <path d="M-16 -14 v4 M-8 -14 v4 M0 -14 v4 M8 -14 v4 M16 -14 v4 M-16 14 v-4 M-8 14 v-4 M0 14 v-4 M8 14 v-4 M16 14 v-4" stroke="#c69a55" stroke-width="1" opacity=".7"/>
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fff1c9" opacity=".35"/>
    </g>
