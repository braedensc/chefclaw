    </g>
    <g transform="translate(164 130) rotate(8)">
      <rect x="-24" y="-18" width="48" height="36" rx="5" fill="url(#rvpasta)" stroke="#b78a4a" stroke-width="1.4"/>
      <path d="M-20 -18 v5 M-10 -18 v5 M0 -18 v5 M10 -18 v5 M20 -18 v5 M-20 18 v-5 M-10 18 v-5 M0 18 v-5 M10 18 v-5 M20 18 v-5" stroke="#c69a55" stroke-width="1.2" opacity=".75"/>
      <path d="M-24 -12 h5 M-24 -2 h5 M-24 8 h5 M24 -12 h-5 M24 -2 h-5 M24 8 h-5" stroke="#c69a55" stroke-width="1.2" opacity=".75"/>
      <ellipse cx="-6" cy="-6" rx="9" ry="5" fill="#fff6d8" opacity=".55"/>
    </g>
    <g transform="translate(210 122) rotate(18)">
      <rect x="-22" y="-16" width="44" height="32" rx="5" fill="url(#rvpasta)" stroke="#b78a4a" stroke-width="1.4"/>
      <path d="M-18 -16 v5 M-9 -16 v5 M0 -16 v5 M9 -16 v5 M18 -16 v5 M-18 16 v-5 M-9 16 v-5 M0 16 v-5 M9 16 v-5 M18 16 v-5" stroke="#c69a55" stroke-width="1.2" opacity=".75"/>
      <ellipse cx="-5" cy="-5" rx="8" ry="4" fill="#fff6d8" opacity=".5"/>
    </g>
