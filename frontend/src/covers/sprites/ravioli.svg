<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="rvBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="rvbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="rvpasta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdeaba"/><stop offset="55%" stop-color="#f0d089"/><stop offset="100%" stop-color="#d6ac5c"/>
    </linearGradient>
    <radialGradient id="rvplate" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="rvsauce" cx="48%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#f6cf6a" stop-opacity=".5"/><stop offset="100%" stop-color="#c8912e" stop-opacity=".22"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#rvbg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 26 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#rvBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#rvBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- shallow oval plate -->
