<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="wnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="wnbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <radialGradient id="wnbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="wnbroth" cx="46%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#e7c98a"/><stop offset="55%" stop-color="#cba760"/><stop offset="100%" stop-color="#9c7d3f"/>
    </radialGradient>
    <radialGradient id="wnskin" cx="42%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#fdeec2"/><stop offset="58%" stop-color="#f2d998"/><stop offset="100%" stop-color="#d8b76a"/>
    </radialGradient>
    <radialGradient id="wnshrimp" cx="40%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ff9d7d"/><stop offset="60%" stop-color="#ff7350"/><stop offset="100%" stop-color="#dd3320"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#wnbg)"/>
  <!-- rising steam wisps -->
  <path d="M122 48 C112 30 132 24 122 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#wnBlur3)"/>
  <path d="M198 50 C190 34 208 26 200 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#wnBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="142" ry="22" fill="#000" opacity=".5"/>
  <!-- deep soup bowl -->
  <ellipse cx="160" cy="126" rx="130" ry="56" fill="url(#wnbowl)"/>
  <ellipse cx="160" cy="126" rx="130" ry="56" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="124" rx="114" ry="46" fill="#0c0c0f"/>
  <!-- neon steam arc (cyan, savory) -->
  <path d="M50 110 Q104 78 170 76" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- clear golden broth pool -->
  <ellipse cx="160" cy="126" rx="106" ry="42" fill="url(#wnbroth)"/>
  <ellipse cx="160" cy="120" rx="90" ry="30" fill="#f0d99b" opacity=".4"/>
  <!-- submerged pale noodle nest, dim under the broth (back layer) -->
  <g stroke-linecap="round" fill="none" opacity=".5">
    <path d="M84 132 C114 118 154 116 200 122" stroke="#cdb078" stroke-width="6"/>
    <path d="M88 140 C120 126 158 124 206 130" stroke="#d9bd85" stroke-width="6"/>
    <path d="M96 146 C126 134 160 132 200 138" stroke="#e6cf9d" stroke-width="5.5"/>
    <path d="M92 137 C124 124 158 122 200 128" stroke="#fff1c9" stroke-width="1.8" opacity=".6"/>
  </g>
  <!-- plump wontons floating (hero) -->
  <!-- wonton back-left -->
  <g transform="translate(112 116) rotate(-8)">
    <path d="M-22 6 C-24 -8 -8 -16 8 -14 C24 -16 34 -6 30 6 C36 14 20 22 2 20 C-16 22 -20 14 -22 6 Z" fill="url(#wnskin)" stroke="#c89a4a" stroke-width="1.3"/>
    <!-- gathered pleats on top -->
    <path d="M-4 -10 C-6 -2 -2 6 4 8 M6 -12 C6 -2 10 6 14 8 M-14 -4 C-14 4 -8 10 0 12" stroke="#d8b76a" stroke-width="1.4" fill="none" opacity=".8"/>
    <!-- shrimp glow through the wrapper -->
    <ellipse cx="4" cy="4" rx="10" ry="6" fill="url(#wnshrimp)" opacity=".7"/>
    <ellipse cx="-2" cy="-2" rx="7" ry="3" fill="#fdeec2" opacity=".7"/>
  </g>
  <!-- wonton front-center (biggest) -->
  <g transform="translate(160 126) rotate(6)">
    <path d="M-26 8 C-28 -10 -10 -20 8 -18 C28 -20 40 -8 36 8 C42 18 24 26 2 24 C-18 26 -24 18 -26 8 Z" fill="url(#wnskin)" stroke="#c89a4a" stroke-width="1.4"/>
    <path d="M-6 -12 C-8 -2 -2 8 6 10 M8 -14 C8 -2 12 8 18 10 M-18 -4 C-18 6 -10 12 0 14" stroke="#d8b76a" stroke-width="1.5" fill="none" opacity=".8"/>
    <ellipse cx="6" cy="6" rx="13" ry="8" fill="url(#wnshrimp)" opacity=".72"/>
    <ellipse cx="0" cy="-2" rx="9" ry="4" fill="#fdeec2" opacity=".75"/>
    <ellipse cx="-4" cy="-6" rx="5" ry="2.2" fill="#fff" opacity=".55"/>
  </g>
  <!-- wonton back-right -->
  <g transform="translate(208 116) rotate(12)">
    <path d="M-22 6 C-24 -8 -8 -16 8 -14 C24 -16 34 -6 30 6 C36 14 20 22 2 20 C-16 22 -20 14 -22 6 Z" fill="url(#wnskin)" stroke="#c89a4a" stroke-width="1.3"/>
    <path d="M-4 -10 C-6 -2 -2 6 4 8 M6 -12 C6 -2 10 6 14 8" stroke="#d8b76a" stroke-width="1.4" fill="none" opacity=".8"/>
    <ellipse cx="4" cy="4" rx="10" ry="6" fill="url(#wnshrimp)" opacity=".68"/>
    <ellipse cx="-1" cy="-2" rx="7" ry="3" fill="#fdeec2" opacity=".7"/>
  </g>
  <!-- garnish: scallion greens + a leaf of choy sum -->
  <path d="M96 108 C104 96 108 90 106 82 C112 90 112 100 106 110 Z" fill="#3f9c37" opacity=".9"/>
  <path d="M106 96 L106 108" stroke="#5ecb4e" stroke-width="1.4" opacity=".7"/>
  <rect x="132" y="104" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-16 136 105)"/>
  <rect x="182" y="102" width="8" height="2.8" rx="1.4" fill="#3f9c37" transform="rotate(18 186 103)"/>
  <rect x="150" y="112" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-8 153 113)"/>
  <rect x="200" y="132" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(24 203 133)"/>
  <!-- broth gloss dots -->
  <circle cx="120" cy="132" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="190" cy="138" r="1.3" fill="#fff" opacity=".45"/>
  <circle cx="146" cy="140" r="1.2" fill="#fff" opacity=".5"/>
</svg>
