<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="dfbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="dfbbean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6abf5a"/><stop offset="50%" stop-color="#3f8c33"/><stop offset="100%" stop-color="#2a5e22"/>
    </linearGradient>
    <radialGradient id="dfbplate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dfbbg)"/>
  <!-- steam -->
  <path d="M122 56 C112 38 132 30 122 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M200 54 C192 38 210 30 202 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="21" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="130" rx="138" ry="43" fill="url(#dfbplate)"/>
  <ellipse cx="160" cy="130" rx="138" ry="43" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="123" ry="35" fill="#0f0d13"/>
  <!-- neon steam arc -->
  <path d="M50 118 Q100 88 166 84" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- faint dry-fried oil sheen (very little sauce for 干煸) -->
  <ellipse cx="160" cy="136" rx="102" ry="16" fill="#2a1c08" opacity=".38"/>
  <!-- long blistered green beans, tangled at slight angles. Body stroke + darker blister spots + pale highlight -->
  <g fill="none" stroke-linecap="round">
    <!-- back layer beans (dimmer/thinner) -->
    <path d="M74 138 C120 116 200 116 246 132" stroke="#2f7d2b" stroke-width="6.5" opacity=".85"/>
    <path d="M82 120 C128 104 206 104 244 118" stroke="#357a2c" stroke-width="6.5" opacity=".85"/>
    <!-- front hero beans (brighter, thicker) -->
    <path d="M70 130 C118 110 204 110 250 126" stroke="url(#dfbbean)" stroke-width="8"/>
    <path d="M86 144 C132 126 208 126 244 140" stroke="url(#dfbbean)" stroke-width="8"/>
    <path d="M78 112 C124 96 202 96 240 108" stroke="url(#dfbbean)" stroke-width="7.5"/>
    <path d="M100 150 C140 138 196 138 226 148" stroke="url(#dfbbean)" stroke-width="7.5"/>
  </g>
  <!-- pale highlight ridge on each hero bean for form -->
  <g fill="none" stroke="#a4e88f" stroke-width="1.6" stroke-linecap="round" opacity=".6">
    <path d="M84 127 C126 110 198 110 238 123"/>
    <path d="M98 141 C138 125 202 125 236 137"/>
    <path d="M90 109 C130 95 198 95 232 105"/>
  </g>
  <!-- charred blister spots (干煸 wrinkle char) -->
  <g fill="#243d16">
    <ellipse cx="112" cy="118" rx="3" ry="1.8" transform="rotate(-8 112 118)"/>
    <ellipse cx="150" cy="112" rx="3.2" ry="1.9" transform="rotate(4 150 112)"/>
    <ellipse cx="188" cy="116" rx="3" ry="1.8" transform="rotate(-6 188 116)"/>
    <ellipse cx="128" cy="132" rx="3.2" ry="1.9" transform="rotate(6 128 132)"/>
    <ellipse cx="176" cy="128" rx="3" ry="1.8" transform="rotate(-4 176 128)"/>
    <ellipse cx="210" cy="126" rx="2.8" ry="1.7" transform="rotate(8 210 126)"/>
    <ellipse cx="140" cy="144" rx="3" ry="1.8" transform="rotate(-6 140 144)"/>
    <ellipse cx="196" cy="140" rx="2.8" ry="1.7" transform="rotate(6 196 140)"/>
  </g>
  <!-- minced pork bits + ya cai (dark savory crumbs) tucked among beans -->
  <g>
    <ellipse cx="122" cy="124" rx="3.4" ry="2.4" fill="#7c3a20" transform="rotate(-14 122 124)"/>
    <ellipse cx="162" cy="120" rx="3.6" ry="2.5" fill="#6b2f16" transform="rotate(10 162 120)"/>
    <ellipse cx="200" cy="122" rx="3.2" ry="2.2" fill="#7c3a20" transform="rotate(-8 200 122)"/>
    <ellipse cx="146" cy="136" rx="3.4" ry="2.3" fill="#5e2410" transform="rotate(16 146 136)"/>
    <ellipse cx="184" cy="134" rx="3" ry="2.1" fill="#6b2f16" transform="rotate(-10 184 134)"/>
    <ellipse cx="108" cy="132" rx="3" ry="2.1" fill="#4d3b17" transform="rotate(12 108 132)"/>
  </g>
  <!-- dried chili slivers + peppercorns (Sichuan) -->
  <rect x="132" y="116" width="9" height="2.6" rx="1.3" fill="#c31f12" transform="rotate(-20 136 117)"/>
  <rect x="178" y="124" width="9" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(12 182 125)"/>
  <rect x="154" y="140" width="8" height="2.4" rx="1.2" fill="#c31f12" transform="rotate(26 158 141)"/>
  <circle cx="118" cy="128" r="1.4" fill="#260903"/><circle cx="170" cy="132" r="1.4" fill="#260903"/>
  <circle cx="204" cy="130" r="1.3" fill="#260903"/>
  <!-- oil gloss dots -->
  <circle cx="126" cy="120" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="118" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="130" r="1.2" fill="#fff" opacity=".5"/>
</svg>
