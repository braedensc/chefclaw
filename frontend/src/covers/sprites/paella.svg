<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="paBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="pabg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="parice" cx="48%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#ffd873"/><stop offset="55%" stop-color="#f0b53f"/><stop offset="100%" stop-color="#cf8c22"/>
    </radialGradient>
    <radialGradient id="papan" cx="50%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="pashrimp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a5a"/><stop offset="100%" stop-color="#e0532a"/>
    </linearGradient>
    <radialGradient id="pamussel" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3a2530"/><stop offset="60%" stop-color="#241019"/><stop offset="100%" stop-color="#140a10"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pabg)"/>
  <!-- steam -->
  <path d="M118 52 C108 34 128 26 118 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#paBlur3)"/>
  <path d="M204 50 C196 34 214 26 206 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#paBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- wide shallow paella pan -->
  <ellipse cx="160" cy="130" rx="150" ry="52" fill="url(#papan)"/>
  <ellipse cx="160" cy="130" rx="150" ry="52" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- little side handles -->
  <ellipse cx="14" cy="130" rx="10" ry="6" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="306" cy="130" rx="10" ry="6" fill="none" stroke="#2c2136" stroke-width="3"/>
  <!-- neon steam arc (amber/warm) -->
  <path d="M46 112 Q104 80 168 78" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- saffron rice bed -->
  <ellipse cx="160" cy="128" rx="134" ry="42" fill="url(#parice)"/>
  <ellipse cx="160" cy="128" rx="134" ry="42" fill="none" stroke="#b3781c" stroke-width="1.4" opacity=".5"/>
  <!-- rice grain speckle -->
  <g stroke-linecap="round" opacity=".85">
    <path d="M70 124 l6 -2" stroke="#ffe9a0" stroke-width="2.2"/>
    <path d="M96 138 l6 2" stroke="#c98f22" stroke-width="2.2"/>
    <path d="M120 118 l6 -2" stroke="#ffe9a0" stroke-width="2.2"/>
    <path d="M210 122 l-6 2" stroke="#ffe9a0" stroke-width="2.2"/>
    <path d="M236 134 l6 -2" stroke="#c98f22" stroke-width="2.2"/>
    <path d="M186 142 l-6 2" stroke="#c98f22" stroke-width="2.2"/>
    <path d="M84 148 l6 -2" stroke="#ffe9a0" stroke-width="2"/>
    <path d="M250 116 l-6 2" stroke="#ffe9a0" stroke-width="2"/>
  </g>
  <!-- red bell-pepper strips -->
  <path d="M108 112 C120 108 138 108 150 112 C138 116 120 116 108 112 Z" fill="#e0341f" opacity=".9"/>
  <path d="M176 118 C190 114 206 116 216 120 C204 124 188 124 176 118 Z" fill="#e0341f" opacity=".85"/>
  <!-- peas dotted through -->
  <circle cx="130" cy="130" r="3" fill="#5ecb4e"/>
  <circle cx="150" cy="140" r="3" fill="#3f9c37"/>
  <circle cx="196" cy="132" r="3" fill="#5ecb4e"/>
  <circle cx="112" cy="140" r="2.6" fill="#58c14a"/>
  <circle cx="224" cy="140" r="2.6" fill="#3f9c37"/>
  <!-- mussels (dark shells fanned in) -->
  <g>
    <path d="M92 116 C86 106 96 98 108 100 C114 104 112 114 104 120 C98 122 94 120 92 116 Z" fill="url(#pamussel)" stroke="#0a0508" stroke-width="1.2"/>
    <path d="M97 108 C100 106 106 108 106 112" stroke="#e0a060" stroke-width="1.6" fill="none" opacity=".7"/>
    <path d="M228 118 C234 108 224 100 212 102 C206 106 208 116 216 122 C222 124 226 122 228 118 Z" fill="url(#pamussel)" stroke="#0a0508" stroke-width="1.2"/>
    <path d="M223 110 C220 108 214 110 214 114" stroke="#e0a060" stroke-width="1.6" fill="none" opacity=".7"/>
  </g>
  <!-- prawns arched on top (hero seafood) -->
  <g>
    <path d="M132 104 C138 92 156 90 166 98 C160 100 154 100 150 104 C146 108 140 110 132 104 Z" fill="url(#pashrimp)" stroke="#b83f1e" stroke-width="1.2"/>
    <path d="M138 100 l-6 -4 M144 98 l-5 -5" stroke="#c85030" stroke-width="1.3" stroke-linecap="round"/>
    <ellipse cx="150" cy="98" rx="6" ry="2.4" fill="#ffb890" opacity=".7"/>
  </g>
  <g>
    <path d="M182 108 C188 96 206 94 216 102 C210 104 204 104 200 108 C196 112 190 114 182 108 Z" fill="url(#pashrimp)" stroke="#b83f1e" stroke-width="1.2"/>
    <path d="M188 104 l-6 -4 M194 102 l-5 -5" stroke="#c85030" stroke-width="1.3" stroke-linecap="round"/>
    <ellipse cx="200" cy="102" rx="6" ry="2.4" fill="#ffb890" opacity=".7"/>
  </g>
  <!-- lemon wedge front-center -->
  <path d="M150 142 C158 138 172 138 178 146 C170 152 156 152 150 148 Z" fill="#ffe15a"/>
  <path d="M150 142 C158 138 172 138 178 146" fill="none" stroke="#f8f2d0" stroke-width="1.3" opacity=".7"/>
  <path d="M156 145 l16 1 M158 148 l14 -1" stroke="#e8c53a" stroke-width="1" opacity=".8"/>
  <!-- parsley + gloss -->
  <rect x="122" y="122" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-18 125 123)"/>
  <rect x="208" y="126" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(20 211 127)"/>
  <circle cx="148" cy="120" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="128" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="168" cy="140" r="1.2" fill="#fff" opacity=".5"/>
</svg>
