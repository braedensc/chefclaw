<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="ojbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="ojglass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".05"/><stop offset="20%" stop-color="#ffffff" stop-opacity=".16"/><stop offset="50%" stop-color="#ffffff" stop-opacity=".03"/><stop offset="80%" stop-color="#ffffff" stop-opacity=".11"/><stop offset="100%" stop-color="#ffffff" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="ojjuice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb02e"/><stop offset="45%" stop-color="#ff8f1e"/><stop offset="100%" stop-color="#e46a10"/>
    </linearGradient>
    <radialGradient id="ojslice" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#ffd77a"/><stop offset="60%" stop-color="#ffab33"/><stop offset="100%" stop-color="#f08a1c"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ojbg)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="104" ry="17" fill="#000" opacity=".5"/>
  <!-- neon sparkle accent (cold drink, no steam arc) -->
  <g stroke="#ffe9c9" stroke-width="2.2" stroke-linecap="round" opacity=".5">
    <path d="M96 52 l0 12 M90 58 l12 0"/>
  </g>
  <path d="M214 40 l0 9 M209.5 44.5 l9 0" stroke="#ffd60a" stroke-width="1.8" stroke-linecap="round" opacity=".55"/>
  <!-- dark ring base under glass -->
  <ellipse cx="160" cy="178" rx="60" ry="12" fill="#141018"/>
  <ellipse cx="160" cy="178" rx="60" ry="12" fill="none" stroke="#2c2136" stroke-width="2.5"/>
  <ellipse cx="160" cy="176" rx="46" ry="8" fill="#0c0c10"/>
  <!-- tall straight glass body -->
  <path d="M122 62 L198 62 L192 172 C188 177 132 177 128 172 Z" fill="#0f0d12"/>
  <!-- juice fill -->
  <path d="M126 84 L194 84 L189 170 C185 174 135 174 131 170 Z" fill="url(#ojjuice)"/>
  <!-- pulpy surface ellipse at top of juice -->
  <ellipse cx="160" cy="84" rx="34" ry="6" fill="#ffc857"/>
  <ellipse cx="160" cy="84" rx="34" ry="6" fill="none" stroke="#e88a1a" stroke-width="1" opacity=".5"/>
  <!-- pulp flecks suspended in juice -->
  <circle cx="146" cy="104" r="1.6" fill="#ffd77a" opacity=".8"/>
  <circle cx="172" cy="118" r="1.6" fill="#ffd77a" opacity=".7"/>
  <circle cx="152" cy="134" r="1.5" fill="#ffcf6a" opacity=".7"/>
  <circle cx="176" cy="148" r="1.5" fill="#ffd77a" opacity=".6"/>
  <circle cx="140" cy="150" r="1.4" fill="#ffcf6a" opacity=".6"/>
  <circle cx="162" cy="100" r="1.3" fill="#ffe0a0" opacity=".7"/>
  <!-- glass sheen overlay -->
  <path d="M122 62 L198 62 L192 172 C188 177 132 177 128 172 Z" fill="url(#ojglass)"/>
  <path d="M122 62 L198 62 L192 172 C188 177 132 177 128 172 Z" fill="none" stroke="#f2e2c8" stroke-width="1.5" opacity=".28"/>
  <path d="M133 70 L131 166" stroke="#ffffff" stroke-width="3" opacity=".28" stroke-linecap="round"/>
  <path d="M188 70 L189 162" stroke="#ffffff" stroke-width="2" opacity=".16" stroke-linecap="round"/>
  <!-- orange slice on the rim (hero garnish) -->
  <g transform="translate(196 60) rotate(18)">
    <circle cx="0" cy="0" r="22" fill="url(#ojslice)"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#c96e12" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#fff0cf" stroke-width="1.6" opacity=".85"/>
    <!-- segment dividers -->
    <g stroke="#fff0cf" stroke-width="1.4" opacity=".8">
      <path d="M0 0 L0 -18 M0 0 L15.6 -9 M0 0 L15.6 9 M0 0 L0 18 M0 0 L-15.6 9 M0 0 L-15.6 -9"/>
    </g>
    <circle cx="0" cy="0" r="3.2" fill="#ffe6b0"/>
    <!-- notch where it sits on the rim -->
    <path d="M-4 20 L0 6 L4 20 Z" fill="#0f0d12"/>
  </g>
  <!-- gloss dots -->
  <circle cx="148" cy="92" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="174" cy="128" r="1.3" fill="#fff" opacity=".45"/>
  <circle cx="156" cy="160" r="1.2" fill="#fff" opacity=".45"/>
</svg>
