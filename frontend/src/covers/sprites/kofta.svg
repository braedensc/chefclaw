<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="kofBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="kofbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="kofplate" cx="50%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="kofmeat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a4a24"/><stop offset="45%" stop-color="#6b2f16"/><stop offset="100%" stop-color="#48200e"/>
    </linearGradient>
    <linearGradient id="kofchar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5602e"/><stop offset="100%" stop-color="#5e2410"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kofbg)"/>
  <!-- grill steam wisps -->
  <path d="M116 52 C106 34 126 26 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#kofBlur3)"/>
  <path d="M200 50 C192 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#kofBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="142" ry="46" fill="url(#kofplate)"/>
  <ellipse cx="160" cy="132" rx="142" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="128" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (cyan) -->
  <path d="M50 116 Q104 84 168 82" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- kofta cylinders / seekh: grilled spiced lamb logs, piled -->
  <!-- back-layer log -->
  <g transform="translate(0 0)">
    <g transform="translate(112 100) rotate(-14) scale(.88)">
      <rect x="-42" y="-11" width="84" height="22" rx="11" fill="url(#kofmeat)"/>
      <rect x="-42" y="-11" width="84" height="22" rx="11" fill="none" stroke="#240a03" stroke-width="1.4" opacity=".5"/>
      <path d="M-34 -8 L-38 8 M-18 -9 L-22 9 M-2 -9 L-6 9 M14 -9 L10 9 M30 -8 L26 8" stroke="#1c0d06" stroke-width="3" opacity=".45" stroke-linecap="round"/>
      <rect x="-40" y="-9" width="80" height="6" rx="3" fill="#a5602e" opacity=".45"/>
    </g>
  </g>
  <!-- mid log -->
  <g transform="translate(196 104) rotate(10) scale(.94)">
    <rect x="-44" y="-11.5" width="88" height="23" rx="11.5" fill="url(#kofmeat)"/>
    <rect x="-44" y="-11.5" width="88" height="23" rx="11.5" fill="none" stroke="#240a03" stroke-width="1.4" opacity=".5"/>
    <path d="M-36 -8 L-40 8 M-20 -9 L-24 9 M-4 -9 L-8 9 M12 -9 L8 9 M28 -8 L24 8" stroke="#1c0d06" stroke-width="3" opacity=".45" stroke-linecap="round"/>
    <rect x="-42" y="-9.5" width="84" height="6" rx="3" fill="#a5602e" opacity=".45"/>
  </g>
  <!-- front log (largest, brightest) -->
  <g transform="translate(148 128) rotate(-6)">
    <rect x="-50" y="-13" width="100" height="26" rx="13" fill="url(#kofmeat)"/>
    <rect x="-50" y="-13" width="100" height="26" rx="13" fill="none" stroke="#240a03" stroke-width="1.6" opacity=".55"/>
    <path d="M-40 -10 L-44 10 M-22 -11 L-26 11 M-4 -11 L-8 11 M14 -11 L10 11 M32 -10 L28 10" stroke="#1c0d06" stroke-width="3.4" opacity=".5" stroke-linecap="round"/>
    <rect x="-46" y="-11" width="92" height="7" rx="3.5" fill="#b56a34" opacity=".5"/>
    <ellipse cx="-18" cy="-6" rx="14" ry="4" fill="#c78a4a" opacity=".4"/>
  </g>
  <!-- red spice / sumac dusting flecks -->
  <g fill="#c31f12">
    <circle cx="128" cy="118" r="1.6" opacity=".85"/><circle cx="176" cy="112" r="1.4" opacity=".8"/>
    <circle cx="200" cy="122" r="1.5" opacity=".85"/><circle cx="150" cy="134" r="1.4" opacity=".8"/>
  </g>
  <!-- fresh parsley / mint garnish -->
  <rect x="120" y="106" width="8" height="3" rx="1.5" fill="#5ecb4e" transform="rotate(-22 124 107)"/>
  <rect x="186" y="118" width="8" height="3" rx="1.5" fill="#3f9c37" transform="rotate(16 190 119)"/>
  <rect x="152" y="146" width="7" height="2.8" rx="1.4" fill="#58c14a" transform="rotate(-10 155 147)"/>
  <rect x="98" y="130" width="6" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(24 101 131)"/>
  <rect x="222" y="130" width="6" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 225 131)"/>
  <!-- a wedge of lemon on the plate -->
  <path d="M228 148 A14 14 0 0 1 250 152 L239 158 Z" fill="#f6d94a" opacity=".9"/>
  <path d="M228 148 A14 14 0 0 1 250 152" fill="none" stroke="#c9a520" stroke-width="1.2" opacity=".7"/>
  <!-- sesame + gloss dots -->
  <circle cx="132" cy="122" r="1.4" fill="#f8eed6" opacity=".85"/>
  <circle cx="180" cy="126" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="204" cy="116" r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="120" r="1.2" fill="#fff" opacity=".5"/>
</svg>
