<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="mbc-bg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="mbc-plate" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="mbc-caketop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef1c6"/><stop offset="55%" stop-color="#dbe19c"/><stop offset="100%" stop-color="#c3cd7a"/>
    </linearGradient>
    <linearGradient id="mbc-cakeside" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cdd488"/><stop offset="100%" stop-color="#a8b25e"/>
    </linearGradient>
    <linearGradient id="mbc-caketop2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f4d2"/><stop offset="55%" stop-color="#e2e6ac"/><stop offset="100%" stop-color="#cbd488"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mbc-bg)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="134" rx="128" ry="44" fill="url(#mbc-plate)"/>
  <ellipse cx="160" cy="134" rx="128" ry="44" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="112" ry="36" fill="#0c0c0f"/>
  <!-- cool sparkle arc (dry pressed dessert — subtle, not steamy) -->
  <path d="M58 118 Q110 90 172 88" stroke="#ffe9c9" stroke-width="2.2" fill="none" opacity=".3" stroke-linecap="round"/>
  <!-- pressed mung-bean cakes: square/rounded blocks with molded pattern -->
  <!-- back cake (left) -->
  <g transform="translate(96 96)">
    <path d="M0 22 L0 12 C0 6 4 2 10 2 L44 2 C50 2 54 6 54 12 L54 22 C54 26 50 30 44 30 L10 30 C4 30 0 26 0 22 Z" fill="url(#mbc-cakeside)"/>
    <path d="M2 12 C2 6 6 2 12 2 L42 2 C48 2 52 6 52 12 C52 16 48 20 42 20 L12 20 C6 20 2 16 2 12 Z" fill="url(#mbc-caketop)"/>
    <path d="M2 12 C2 6 6 2 12 2 L42 2 C48 2 52 6 52 12 C52 16 48 20 42 20 L12 20 C6 20 2 16 2 12 Z" fill="none" stroke="#aeb968" stroke-width="1.2" opacity=".7"/>
    <!-- molded floral imprint -->
    <circle cx="27" cy="11" r="3.2" fill="none" stroke="#a6b05e" stroke-width="1.2" opacity=".8"/>
    <path d="M20 8 l-3 -2 M34 8 l3 -2 M20 15 l-3 2 M34 15 l3 2" stroke="#a6b05e" stroke-width="1" opacity=".7" stroke-linecap="round"/>
    <ellipse cx="20" cy="6" rx="10" ry="2.4" fill="#fbfce0" opacity=".55"/>
  </g>
  <!-- back cake (right) -->
  <g transform="translate(170 98)">
    <path d="M0 22 L0 12 C0 6 4 2 10 2 L44 2 C50 2 54 6 54 12 L54 22 C54 26 50 30 44 30 L10 30 C4 30 0 26 0 22 Z" fill="url(#mbc-cakeside)"/>
    <path d="M2 12 C2 6 6 2 12 2 L42 2 C48 2 52 6 52 12 C52 16 48 20 42 20 L12 20 C6 20 2 16 2 12 Z" fill="url(#mbc-caketop)"/>
    <path d="M2 12 C2 6 6 2 12 2 L42 2 C48 2 52 6 52 12 C52 16 48 20 42 20 L12 20 C6 20 2 16 2 12 Z" fill="none" stroke="#aeb968" stroke-width="1.2" opacity=".7"/>
    <circle cx="27" cy="11" r="3.2" fill="none" stroke="#a6b05e" stroke-width="1.2" opacity=".8"/>
    <path d="M20 8 l-3 -2 M34 8 l3 -2 M20 15 l-3 2 M34 15 l3 2" stroke="#a6b05e" stroke-width="1" opacity=".7" stroke-linecap="round"/>
    <ellipse cx="20" cy="6" rx="10" ry="2.4" fill="#fbfce0" opacity=".55"/>
  </g>
  <!-- front hero cake (center, larger, brighter) -->
  <g transform="translate(126 116)">
    <path d="M0 26 L0 14 C0 7 5 2 12 2 L56 2 C63 2 68 7 68 14 L68 26 C68 31 63 36 56 36 L12 36 C5 36 0 31 0 26 Z" fill="url(#mbc-cakeside)"/>
    <path d="M2 14 C2 7 7 2 14 2 L54 2 C61 2 66 7 66 14 C66 19 61 24 54 24 L14 24 C7 24 2 19 2 14 Z" fill="url(#mbc-caketop2)"/>
    <path d="M2 14 C2 7 7 2 14 2 L54 2 C61 2 66 7 66 14 C66 19 61 24 54 24 L14 24 C7 24 2 19 2 14 Z" fill="none" stroke="#aeb968" stroke-width="1.3" opacity=".75"/>
    <!-- molded flower stamp -->
    <circle cx="34" cy="13" r="4" fill="none" stroke="#9ba954" stroke-width="1.4" opacity=".85"/>
    <circle cx="34" cy="13" r="1.6" fill="#9ba954" opacity=".7"/>
    <path d="M25 9 l-4 -2 M43 9 l4 -2 M25 18 l-4 2 M43 18 l4 2 M34 6 l0 -3 M34 20 l0 3" stroke="#9ba954" stroke-width="1.1" opacity=".75" stroke-linecap="round"/>
    <ellipse cx="26" cy="7" rx="14" ry="3" fill="#fcfde6" opacity=".6"/>
  </g>
  <!-- powdered-sugar dusting flecks -->
  <circle cx="118" cy="104" r="1.2" fill="#fdfde8" opacity=".8"/>
  <circle cx="204" cy="106" r="1.1" fill="#fdfde8" opacity=".75"/>
  <circle cx="150" cy="122" r="1.2" fill="#fdfde8" opacity=".8"/>
  <circle cx="188" cy="126" r="1" fill="#fdfde8" opacity=".7"/>
  <!-- subtle dry sparkle -->
  <path d="M100 100 l2 -3 M102 100 l-2 -1" stroke="#fff" stroke-width="1" opacity=".5" stroke-linecap="round"/>
  <path d="M214 104 l2 -3 M216 104 l-2 -1" stroke="#fff" stroke-width="1" opacity=".45" stroke-linecap="round"/>
  <circle cx="160" cy="128" r="1.3" fill="#fff" opacity=".5"/>
</svg>
