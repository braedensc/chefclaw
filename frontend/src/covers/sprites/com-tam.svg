<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ctBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ctbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="ctrice" cx="46%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#fbf5e6"/><stop offset="58%" stop-color="#f0e6cf"/><stop offset="100%" stop-color="#d9c8a2"/>
    </radialGradient>
    <linearGradient id="ctchop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c5024"/><stop offset="50%" stop-color="#743717"/><stop offset="100%" stop-color="#4c210c"/>
    </linearGradient>
    <linearGradient id="ctsear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c17a38"/><stop offset="100%" stop-color="#8a4a1e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ctbg)"/>
  <!-- steam -->
  <path d="M116 54 C106 36 126 28 116 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ctBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ctBlur3)"/>
  <ellipse cx="160" cy="186" rx="154" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="134" rx="144" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="134" rx="144" ry="46" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="130" ry="38" fill="#0f0d11"/>
  <!-- neon steam arc (warm/local) -->
  <path d="M48 116 Q100 84 164 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- BROKEN-RICE mound on the LEFT half (small irregular grains) -->
  <g>
    <path d="M40 138 C46 112 74 102 104 102 C134 102 158 112 162 134 C144 150 118 156 100 156 C74 156 50 152 40 138 Z" fill="#b8a577" opacity=".6"/>
    <path d="M42 134 C48 108 74 100 102 100 C130 100 154 110 158 132 C142 146 116 152 98 152 C74 152 52 146 42 134 Z" fill="url(#ctrice)"/>
    <path d="M42 134 C48 108 74 100 102 100 C130 100 154 110 158 132" fill="none" stroke="#fffbe8" stroke-width="1.3" opacity=".4"/>
    <!-- broken (short, cracked) grain texture -->
    <g stroke-linecap="round" fill="none">
      <path d="M60 120 l4 -1" stroke="#fffbe8" stroke-width="2.4"/>
      <path d="M74 128 l4 2" stroke="#d9c49a" stroke-width="2.4"/>
      <path d="M88 116 l4 -1" stroke="#fffbe8" stroke-width="2.4"/>
      <path d="M100 126 l-4 2" stroke="#d9c49a" stroke-width="2.4"/>
      <path d="M114 118 l4 1" stroke="#fffbe8" stroke-width="2.4"/>
      <path d="M126 128 l4 -2" stroke="#d9c49a" stroke-width="2.4"/>
      <path d="M70 140 l4 1" stroke="#fffbe8" stroke-width="2.2"/>
      <path d="M96 142 l4 -1" stroke="#d9c49a" stroke-width="2.2"/>
      <path d="M120 140 l-4 2" stroke="#fffbe8" stroke-width="2.2"/>
      <path d="M84 132 l4 1" stroke="#d9c49a" stroke-width="2.2"/>
      <path d="M108 134 l4 -2" stroke="#fffbe8" stroke-width="2.2"/>
      <path d="M138 126 l4 1" stroke="#d9c49a" stroke-width="2.2"/>
    </g>
    <!-- scallion-oil glisten on rice -->
    <ellipse cx="90" cy="118" rx="12" ry="4" fill="#e9d9ad" opacity=".4"/>
  </g>
  <!-- GRILLED PORK CHOP on the RIGHT half (thin, charred, grill-marked) -->
  <g transform="translate(4 0)">
    <path d="M178 108 C186 100 214 98 234 102 C256 106 262 118 258 128 C252 142 222 148 198 144 C176 140 168 118 178 108 Z" fill="url(#ctchop)"/>
    <!-- seared top surface -->
    <path d="M182 108 C192 102 216 100 234 104 C250 108 254 116 250 122 C232 128 200 128 186 122 C176 118 176 112 182 108 Z" fill="url(#ctsear)"/>
    <!-- grill-mark char lines -->
    <path d="M192 106 L206 124 M206 104 L220 122 M220 104 L234 120" stroke="#2a1206" stroke-width="2.6" opacity=".55" stroke-linecap="round"/>
    <!-- outline -->
    <path d="M178 108 C186 100 214 98 234 102 C256 106 262 118 258 128 C252 142 222 148 198 144 C176 140 168 118 178 108 Z" fill="none" stroke="#240a03" stroke-width="1.4" opacity=".5"/>
    <!-- caramel glaze sheen -->
    <ellipse cx="214" cy="112" rx="18" ry="5" fill="#e5a256" opacity=".4"/>
  </g>
  <!-- side garnish: cucumber slices + scallion + fried shallot -->
  <ellipse cx="150" cy="152" rx="8" ry="4.5" fill="#6abf5a" opacity=".9"/>
  <ellipse cx="150" cy="152" rx="4.5" ry="2.5" fill="#c9e8b0"/>
  <ellipse cx="132" cy="156" rx="7" ry="4" fill="#5ecb4e" opacity=".85"/>
  <rect x="112" y="150" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(-16 115 151)"/>
  <rect x="170" y="146" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(20 173 147)"/>
  <!-- fried shallot flecks over rice -->
  <rect x="86" y="112" width="5" height="2.4" rx="1.2" fill="#6b5420" transform="rotate(30 88 113)"/>
  <rect x="108" y="124" width="5" height="2.2" rx="1.1" fill="#4d3b17" transform="rotate(-20 110 125)"/>
  <!-- gloss dots -->
  <circle cx="94" cy="112" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="214" cy="110" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="200" cy="130" r="1.2" fill="#fff" opacity=".5"/>
</svg>
