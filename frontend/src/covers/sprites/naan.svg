  <g>
    <ellipse cx="128" cy="114" rx="4" ry="2" fill="#f4e4c2" transform="rotate(-24 128 114)"/>
    <ellipse cx="164" cy="122" rx="4.4" ry="2" fill="#f8ecd0" transform="rotate(14 164 122)"/>
