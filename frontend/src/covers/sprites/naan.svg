<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="nnnbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="nnnbread" cx="42%" cy="34%" r="82%">
      <stop offset="0%" stop-color="#f2d59a"/><stop offset="55%" stop-color="#e0b672"/><stop offset="100%" stop-color="#c2914c"/>
    </radialGradient>
    <linearGradient id="nnnboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3620"/><stop offset="100%" stop-color="#2c1f11"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#nnnbg)"/>
  <!-- faint warm aroma wisp (baked bread, subtle) -->
  <path d="M150 46 C142 30 158 24 150 8" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#nnnBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="184" rx="146" ry="22" fill="#000" opacity=".5"/>
  <!-- wooden serving board -->
  <ellipse cx="160" cy="140" rx="140" ry="44" fill="url(#nnnboard)"/>
  <ellipse cx="160" cy="140" rx="140" ry="44" fill="none" stroke="#5a4228" stroke-width="2.5"/>
  <path d="M40 132 Q160 118 280 132" stroke="#6b4e2e" stroke-width="1.5" fill="none" opacity=".5"/>
  <path d="M46 150 Q160 164 274 150" stroke="#3a2915" stroke-width="1.4" fill="none" opacity=".5"/>
  <!-- warm-white steam arc -->
  <path d="M58 112 Q112 84 176 84" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- teardrop naan (classic tandoor shape: rounded top, tapered point) -->
  <path d="M160 78 C110 78 68 96 68 120 C68 144 108 156 148 158 C150 168 156 176 160 178 C164 176 170 168 172 158 C214 156 252 144 252 120 C252 96 210 78 160 78 Z" fill="url(#nnnbread)"/>
  <path d="M160 78 C110 78 68 96 68 120 C68 144 108 156 148 158 C150 168 156 176 160 178 C164 176 170 168 172 158 C214 156 252 144 252 120 C252 96 210 78 160 78 Z" fill="none" stroke="#a06f38" stroke-width="1.6" opacity=".6"/>
  <!-- puffy bubbled surface highlight -->
  <path d="M92 108 C120 96 200 96 228 108" stroke="#fce9c2" stroke-width="2" fill="none" opacity=".45" stroke-linecap="round"/>
  <!-- tandoor char blisters (dark bubbled spots) -->
