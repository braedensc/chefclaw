    <circle cx="104" cy="118" r="2.4"/>
    <circle cx="176" cy="112" r="2.6"/>
    <circle cx="212" cy="120" r="2.2"/>
    <circle cx="150" cy="132" r="2"/>
  </g>
  <!-- glossy melted butter/ghee brush sheen -->
  <ellipse cx="150" cy="104" rx="40" ry="10" fill="#ffe9b0" opacity=".28"/>
