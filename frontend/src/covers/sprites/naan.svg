    <ellipse cx="104" cy="118" rx="7" ry="4.5" transform="rotate(-16 104 118)"/>
    <ellipse cx="138" cy="106" rx="6" ry="4" transform="rotate(12 138 106)"/>
    <ellipse cx="176" cy="112" rx="7.5" ry="4.5" transform="rotate(-8 176 112)"/>
    <ellipse cx="212" cy="120" rx="6.5" ry="4" transform="rotate(18 212 120)"/>
    <ellipse cx="150" cy="132" rx="6" ry="4" transform="rotate(-14 150 132)"/>
    <ellipse cx="192" cy="138" rx="5.5" ry="3.6" transform="rotate(10 192 138)"/>
    <ellipse cx="120" cy="140" rx="5.5" ry="3.6" transform="rotate(6 120 140)"/>
  </g>
  <!-- darkest char cores -->
