  <rect x="140" y="124" width="6" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 143 125)"/>
  <rect x="184" y="126" width="6" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(22 187 127)"/>
  <rect x="112" y="128" width="5.5" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(10 115 129)"/>
