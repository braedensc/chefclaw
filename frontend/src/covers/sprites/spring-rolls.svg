<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="sprBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="sprbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="sprwrap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4c766"/><stop offset="45%" stop-color="#dc9c34"/><stop offset="100%" stop-color="#a9661b"/>
    </linearGradient>
    <linearGradient id="sprwrapb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6b04c"/><stop offset="100%" stop-color="#915414"/>
    </linearGradient>
    <radialGradient id="sprend" cx="42%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#f7e2ad"/><stop offset="60%" stop-color="#d9a84f"/><stop offset="100%" stop-color="#9c631c"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sprbg)"/>
  <!-- steam (hot fried) -->
  <path d="M118 52 C110 36 126 28 118 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#sprBlur3)"/>
  <path d="M200 50 C192 34 208 26 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#sprBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="150" ry="21" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="134" rx="140" ry="44" fill="#141018"/>
  <ellipse cx="160" cy="134" rx="140" ry="44" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="126" ry="37" fill="#0f0d12"/>
  <!-- neon steam arc (warm white) -->
  <path d="M50 118 Q104 86 168 84" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- STACK of golden crispy spring rolls (crossed like firewood) -->
  <!-- bottom two rolls laid horizontally -->
  <g transform="translate(160 138) rotate(-6)">
    <rect x="-86" y="6" width="172" height="26" rx="13" fill="url(#sprwrapb)"/>
    <rect x="-86" y="6" width="172" height="26" rx="13" fill="none" stroke="#7d4a12" stroke-width="1.3" opacity=".5"/>
    <ellipse cx="-86" cy="19" rx="8" ry="13" fill="url(#sprend)" stroke="#8a530f" stroke-width="1.1"/>
    <ellipse cx="86" cy="19" rx="8" ry="13" fill="url(#sprend)" stroke="#8a530f" stroke-width="1.1"/>
    <!-- flaky wrapper seams -->
    <path d="M-70 12 L74 12 M-72 26 L72 26" stroke="#b57e26" stroke-width="1.2" opacity=".5"/>
    <path d="M-40 8 C-38 18 -38 22 -40 30 M12 8 C14 18 14 22 12 30 M52 8 C54 18 54 22 52 30" stroke="#a06b1c" stroke-width="1" opacity=".4" fill="none"/>
  </g>
  <g transform="translate(160 132) rotate(5)">
    <rect x="-88" y="6" width="176" height="26" rx="13" fill="url(#sprwrap)"/>
    <rect x="-88" y="6" width="176" height="26" rx="13" fill="none" stroke="#7d4a12" stroke-width="1.3" opacity=".55"/>
    <ellipse cx="-88" cy="19" rx="8.5" ry="13.5" fill="url(#sprend)" stroke="#8a530f" stroke-width="1.1"/>
    <ellipse cx="88" cy="19" rx="8.5" ry="13.5" fill="url(#sprend)" stroke="#8a530f" stroke-width="1.1"/>
    <path d="M-72 12 L76 12 M-74 26 L74 26" stroke="#c78a2a" stroke-width="1.2" opacity=".55"/>
    <path d="M-44 8 C-42 18 -42 22 -44 30 M8 8 C10 18 10 22 8 30 M50 8 C52 18 52 22 50 30" stroke="#b57e26" stroke-width="1" opacity=".45" fill="none"/>
    <path d="M-70 11 L74 11" stroke="#ffe9b8" stroke-width="2" opacity=".55" stroke-linecap="round"/>
  </g>
  <!-- top roll resting diagonally across -->
  <g transform="translate(158 112) rotate(-20)">
    <rect x="-80" y="0" width="160" height="24" rx="12" fill="url(#sprwrap)"/>
    <rect x="-80" y="0" width="160" height="24" rx="12" fill="none" stroke="#7d4a12" stroke-width="1.3" opacity=".55"/>
    <ellipse cx="-80" cy="12" rx="7.5" ry="12.5" fill="url(#sprend)" stroke="#8a530f" stroke-width="1.1"/>
    <ellipse cx="80" cy="12" rx="7.5" ry="12.5" fill="url(#sprend)" stroke="#8a530f" stroke-width="1.1"/>
    <path d="M-64 6 L66 6 M-66 18 L64 18" stroke="#c78a2a" stroke-width="1.2" opacity=".55"/>
    <path d="M-40 2 C-38 10 -38 14 -40 22 M6 2 C8 10 8 14 6 22 M44 2 C46 10 46 14 44 22" stroke="#b57e26" stroke-width="1" opacity=".45" fill="none"/>
    <path d="M-62 5 L66 5" stroke="#ffe9b8" stroke-width="2.2" opacity=".6" stroke-linecap="round"/>
    <!-- crispy blistered highlight bubbles -->
    <circle cx="-30" cy="9" r="1.6" fill="#ffedbf" opacity=".7"/>
    <circle cx="18" cy="11" r="1.4" fill="#ffedbf" opacity=".65"/>
    <circle cx="52" cy="9" r="1.5" fill="#ffedbf" opacity=".7"/>
  </g>
  <!-- scallion + a small dip garnish on the plate -->
  <rect x="118" y="150" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-14 121 151)"/>
  <rect x="196" y="150" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(18 199 151)"/>
  <circle cx="160" cy="156" r="6" fill="#7a1305" opacity=".85"/>
  <circle cx="158" cy="154" r="1.6" fill="#ef5520" opacity=".8"/>
  <!-- gloss / oil dots -->
  <circle cx="120" cy="118" r="1.6" fill="#fff" opacity=".65"/>
  <circle cx="196" cy="120" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="138" r="1.3" fill="#fff" opacity=".5"/>
</svg>
