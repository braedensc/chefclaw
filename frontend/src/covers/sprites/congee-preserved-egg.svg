<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ceBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cebg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <linearGradient id="cebowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="cecongee" cx="48%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#fbf6ec"/><stop offset="60%" stop-color="#efe7d4"/><stop offset="100%" stop-color="#d9cdb2"/>
    </radialGradient>
    <radialGradient id="ceyolk" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#4f6b4a"/><stop offset="55%" stop-color="#33482f"/><stop offset="100%" stop-color="#1e2c1a"/>
    </radialGradient>
    <linearGradient id="cewhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a5a38"/><stop offset="100%" stop-color="#453820"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cebg)"/>
  <!-- steam -->
  <path d="M120 58 C110 40 130 32 120 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ceBlur3)"/>
  <path d="M200 54 C192 38 210 30 202 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ceBlur3)"/>
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl body -->
  <path d="M50 108 C50 154 102 178 160 178 C218 178 270 154 270 108 Z" fill="url(#cebowl)"/>
  <!-- bowl rim (dark ring) -->
  <ellipse cx="160" cy="108" rx="120" ry="31" fill="#0d0d10"/>
  <ellipse cx="160" cy="108" rx="120" ry="31" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="108" rx="107" ry="25" fill="#0f0d13"/>
  <!-- neon steam arc -->
  <path d="M58 100 Q106 74 166 72" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- creamy congee surface -->
  <ellipse cx="160" cy="110" rx="102" ry="23" fill="url(#cecongee)"/>
  <!-- porridge ripple sheen -->
  <path d="M74 106 C114 96 206 96 246 106" stroke="#fffaf0" stroke-width="2" fill="none" opacity=".45" stroke-linecap="round"/>
  <ellipse cx="118" cy="102" rx="24" ry="4.5" fill="#fffaf0" opacity=".3" transform="rotate(-6 118 102)"/>

  <!-- shredded pork strands scattered across the surface (drawn under the egg pieces) -->
  <g stroke-linecap="round" fill="none" opacity=".9">
    <path d="M92 118 C104 113 118 113 130 117" stroke="#c79a72" stroke-width="2.4"/>
    <path d="M124 100 C136 96 150 96 160 100" stroke="#d3ab84" stroke-width="2"/>
    <path d="M170 118 C182 113 196 114 208 118" stroke="#b98a60" stroke-width="2.4"/>
    <path d="M196 104 C206 101 216 101 224 104" stroke="#c79a72" stroke-width="2.2"/>
    <path d="M100 108 C110 105 120 105 128 108" stroke="#b98a60" stroke-width="2"/>
    <path d="M148 114 C158 111 168 111 176 114" stroke="#d3ab84" stroke-width="2"/>
  </g>

  <!-- CENTURY-EGG (皮蛋) wedges — 3 pieces, OFF-CENTER + asymmetric so they never pair as eyes -->
  <!-- piece 1: left-forward, large -->
  <g transform="translate(96 116) rotate(-22)">
    <path d="M0 0 C-3 -15 20 -20 31 -8 C26 5 11 9 0 0 Z" fill="url(#cewhite)" stroke="#2e2413" stroke-width="1.2"/>
    <path d="M0 0 C-3 -15 20 -20 31 -8" fill="none" stroke="#7a6636" stroke-width="1.2" opacity=".7"/>
    <ellipse cx="12" cy="-6" rx="8.5" ry="6.5" fill="url(#ceyolk)"/>
    <ellipse cx="9" cy="-8" rx="2.6" ry="1.6" fill="#6f8a63" opacity=".6"/>
    <path d="M2 -3 l4 2 M23 -11 l3 2 M27 -3 l-3 -2" stroke="#8a7440" stroke-width=".7" opacity=".6"/>
  </g>
  <!-- piece 2: upper-right, mid, tilted opposite -->
  <g transform="translate(184 96) rotate(16)">
    <path d="M0 0 C-2 -12 18 -16 26 -5 C21 4 9 7 0 0 Z" fill="url(#cewhite)" stroke="#2e2413" stroke-width="1.2"/>
    <path d="M0 0 C-2 -12 18 -16 26 -5" fill="none" stroke="#7a6636" stroke-width="1.2" opacity=".7"/>
    <ellipse cx="12" cy="-5" rx="7" ry="5.5" fill="url(#ceyolk)"/>
    <ellipse cx="9.5" cy="-6.5" rx="2.2" ry="1.4" fill="#6f8a63" opacity=".6"/>
    <path d="M3 -2 l3 2 M20 -9 l2 2" stroke="#8a7440" stroke-width=".7" opacity=".6"/>
  </g>
  <!-- piece 3: lower-center-right, small, nearly side-on -->
  <g transform="translate(150 122) rotate(-4)">
    <path d="M0 0 C-2 -10 15 -13 22 -4 C18 4 8 6 0 0 Z" fill="url(#cewhite)" stroke="#2e2413" stroke-width="1.1"/>
    <path d="M0 0 C-2 -10 15 -13 22 -4" fill="none" stroke="#7a6636" stroke-width="1" opacity=".7"/>
    <ellipse cx="10" cy="-4" rx="5.6" ry="4.4" fill="url(#ceyolk)"/>
    <ellipse cx="8" cy="-5.2" rx="1.8" ry="1.2" fill="#6f8a63" opacity=".6"/>
    <path d="M3 -1 l3 2" stroke="#8a7440" stroke-width=".7" opacity=".6"/>
  </g>

  <!-- pork strands laid OVER a couple egg pieces to fold them into the porridge -->
  <g stroke-linecap="round" fill="none" opacity=".85">
    <path d="M112 110 C122 107 132 108 142 112" stroke="#d3ab84" stroke-width="2"/>
    <path d="M176 108 C186 105 196 106 206 110" stroke="#c79a72" stroke-width="2"/>
  </g>

  <!-- scallion confetti + fried-shallot garnish scattered asymmetrically -->
  <rect x="112" y="98" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-18 115 99)"/>
  <rect x="146" y="94" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(20 149 95)"/>
  <rect x="202" y="98" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-10 205 99)"/>
  <rect x="128" y="120" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(28 131 121)"/>
  <rect x="216" y="112" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-30 219 113)"/>
  <rect x="170" y="126" width="6" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(12 173 127)"/>
  <rect x="100" y="122" width="5" height="2.2" rx="1.1" fill="#6b5420" transform="rotate(34 102 123)"/>
  <rect x="224" y="104" width="5" height="2.2" rx="1.1" fill="#4d3b17" transform="rotate(-22 226 105)"/>

  <!-- sesame-oil drizzle: a thin dark-amber ribbon across the surface -->
  <path d="M84 112 C118 122 150 96 182 112 C204 122 224 104 240 112" stroke="#8a5a1e" stroke-width="1.6" fill="none" opacity=".55" stroke-linecap="round"/>

  <!-- white pepper / oil gloss dots -->
  <circle cx="134" cy="112" r="1.2" fill="#fff" opacity=".55"/>
  <circle cx="196" cy="116" r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="118" cy="118" r="1.1" fill="#fff" opacity=".5"/>
  <circle cx="210" cy="106" r="1.1" fill="#fff" opacity=".5"/>
</svg>
