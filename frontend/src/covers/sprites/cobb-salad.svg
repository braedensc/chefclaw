<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="cbBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="cbbowl" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="cbleaf" cx="46%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#6fce4e"/><stop offset="60%" stop-color="#3f9c37"/><stop offset="100%" stop-color="#256b22"/>
    </radialGradient>
    <linearGradient id="cbegg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf6ea"/><stop offset="100%" stop-color="#e7dcc6"/>
    </linearGradient>
    <linearGradient id="cbyolk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdb5a"/><stop offset="100%" stop-color="#f2a417"/>
    </linearGradient>
    <linearGradient id="cbavo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7d24e"/><stop offset="100%" stop-color="#6c9a2e"/>
    </linearGradient>
    <linearGradient id="cbchk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d4a2"/><stop offset="100%" stop-color="#cf9c58"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cbbg)"/>
  <!-- steam wisps -->
  <path d="M122 54 C112 38 132 30 122 12" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#cbBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 10" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#cbBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- wide shallow bowl -->
  <ellipse cx="160" cy="124" rx="140" ry="52" fill="url(#cbbowl)"/>
  <ellipse cx="160" cy="124" rx="140" ry="52" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="122" rx="126" ry="44" fill="#0e0e12"/>
  <!-- neon steam arc -->
  <path d="M48 112 Q100 82 166 80" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- bed of leaves (romaine/greens) filling the bowl -->
  <g>
    <path d="M60 118 C68 96 96 92 116 100 C104 112 88 124 66 126 Z" fill="url(#cbleaf)"/>
    <path d="M94 128 C100 104 128 100 150 108 C136 122 118 134 96 134 Z" fill="url(#cbleaf)"/>
    <path d="M150 130 C156 106 186 102 206 110 C192 124 174 136 152 136 Z" fill="url(#cbleaf)"/>
    <path d="M200 122 C208 100 236 98 256 106 C244 120 226 130 204 130 Z" fill="url(#cbleaf)"/>
    <path d="M78 132 C86 112 112 110 130 118 C118 130 100 138 80 138 Z" fill="#347f2b" opacity=".9"/>
    <path d="M172 136 C182 116 210 116 228 124 C214 136 196 142 176 140 Z" fill="#347f2b" opacity=".9"/>
    <!-- leaf vein hints -->
    <path d="M72 116 L100 106 M110 126 L138 114 M166 128 L192 116 M214 120 L242 110" stroke="#bfe89a" stroke-width="1.1" opacity=".45"/>
  </g>
  <!-- COBB signature rows: distinct ingredient stripes on top -->
  <!-- egg halves row -->
  <g>
    <ellipse cx="98" cy="104" rx="12" ry="9" fill="url(#cbegg)" stroke="#d8c9ac" stroke-width="1.1"/>
    <ellipse cx="98" cy="104" rx="5.5" ry="4.5" fill="url(#cbyolk)"/>
    <ellipse cx="96" cy="102" rx="2" ry="1.4" fill="#fff2b0" opacity=".8"/>
    <ellipse cx="126" cy="112" rx="12" ry="9" fill="url(#cbegg)" stroke="#d8c9ac" stroke-width="1.1"/>
    <ellipse cx="126" cy="112" rx="5.5" ry="4.5" fill="url(#cbyolk)"/>
    <ellipse cx="124" cy="110" rx="2" ry="1.4" fill="#fff2b0" opacity=".8"/>
  </g>
  <!-- avocado fan slices -->
  <g transform="translate(158 100) rotate(-8)">
    <path d="M0 0 C10 -3 20 -1 26 4 C20 7 10 7 0 4 Z" fill="url(#cbavo)" stroke="#4f7320" stroke-width="1"/>
    <path d="M2 8 C12 5 22 7 28 12 C22 15 12 15 2 12 Z" fill="url(#cbavo)" stroke="#4f7320" stroke-width="1"/>
    <path d="M0 0 C10 -3 20 -1 26 4" stroke="#c9e88f" stroke-width="1.2" fill="none" opacity=".6"/>
  </g>
  <!-- grilled chicken cubes -->
  <g>
    <rect x="188" y="106" width="15" height="12" rx="2.5" fill="url(#cbchk)" transform="rotate(-12 195 112)" stroke="#a97636" stroke-width="1"/>
    <rect x="206" y="114" width="14" height="11" rx="2.5" fill="url(#cbchk)" transform="rotate(8 213 119)" stroke="#a97636" stroke-width="1"/>
    <path d="M190 108 l11 -2 M208 116 l10 -1" stroke="#8a5a24" stroke-width="1" opacity=".6"/>
  </g>
  <!-- cherry tomato halves -->
  <g>
    <ellipse cx="230" cy="106" rx="8" ry="7" fill="#e5361f"/>
    <ellipse cx="230" cy="106" rx="4.5" ry="3.6" fill="#ff7a5c" opacity=".85"/>
    <ellipse cx="82" cy="124" rx="7.5" ry="6.5" fill="#d92e1a"/>
    <ellipse cx="82" cy="124" rx="4" ry="3.2" fill="#ff7a5c" opacity=".8"/>
  </g>
  <!-- crispy bacon bits + blue-cheese crumbles -->
  <rect x="140" y="120" width="9" height="3.4" rx="1.4" fill="#a83820" transform="rotate(-16 144 121)"/>
  <rect x="168" y="122" width="9" height="3.4" rx="1.4" fill="#8f2e16" transform="rotate(18 172 123)"/>
  <rect x="112" y="126" width="8" height="3.2" rx="1.4" fill="#a83820" transform="rotate(24 116 127)"/>
  <circle cx="150" cy="112" r="2.4" fill="#f2efe2"/>
  <circle cx="184" cy="116" r="2.2" fill="#eae6d6"/>
  <circle cx="120" cy="118" r="2" fill="#f2efe2"/>
  <!-- fresh-oil gloss dots -->
  <circle cx="108" cy="106" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="200" cy="110" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="150" cy="126" r="1.2" fill="#fff" opacity=".5"/>
</svg>
