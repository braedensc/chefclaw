<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="czbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#153524"/><stop offset="45%" stop-color="#0a0b09"/><stop offset="100%" stop-color="#060706"/>
    </radialGradient>
    <radialGradient id="czbowl" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="czleafA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2f7d2b"/><stop offset="55%" stop-color="#4ba13c"/><stop offset="100%" stop-color="#7ec95c"/>
    </linearGradient>
    <linearGradient id="czleafB" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4ea23f"/><stop offset="50%" stop-color="#77c956"/><stop offset="100%" stop-color="#a9e27f"/>
    </linearGradient>
    <linearGradient id="czleafC" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#86bf52"/><stop offset="60%" stop-color="#b4e185"/><stop offset="100%" stop-color="#d8f2b0"/>
    </linearGradient>
    <linearGradient id="czcrouton" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d18a"/><stop offset="100%" stop-color="#c9873a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#czbg)"/>
  <!-- fresh-air wisps -->
  <path d="M120 56 C110 38 130 30 120 12" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <path d="M200 54 C192 38 210 30 202 12" stroke="#fff" stroke-width="6" fill="none" opacity=".06" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="22" fill="#000" opacity=".5"/>
  <!-- wide shallow bowl -->
  <ellipse cx="160" cy="132" rx="140" ry="52" fill="url(#czbowl)"/>
  <ellipse cx="160" cy="132" rx="140" ry="52" fill="none" stroke="#26262e" stroke-width="3"/>
  <ellipse cx="160" cy="130" rx="124" ry="43" fill="#0d1210"/>
  <!-- neon steam arc (cyan for fresh/savory) -->
  <path d="M50 118 Q104 86 168 84" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".38" stroke-linecap="round"/>

  <!--
    ROMAINE LEAVES: distinct elongated blades, each a stem base fanning to a
    ruffled serrated tip, radiating outward from the bowl so they read as
    SEPARATE leaves, not one silhouette. Pale central rib runs up each leaf.
  -->
  <g stroke-linejoin="round">
    <!-- back-left leaf (dark, tip pointing up-left) -->
    <g transform="translate(70 132) rotate(-32)">
      <path d="M0 0 C-8 -18 -6 -40 2 -58 C6 -50 12 -52 15 -44 C20 -30 18 -14 12 2 C8 6 3 6 0 0 Z" fill="url(#czleafA)"/>
      <path d="M4 -4 C3 -22 5 -38 7 -52" stroke="#d6efb0" stroke-width="1.6" fill="none" opacity=".55" stroke-linecap="round"/>
      <path d="M5 -18 l-7 3 M6 -30 l7 2 M6 -42 l-6 3" stroke="#2b6f26" stroke-width="1.2" opacity=".55"/>
    </g>
    <!-- back-right leaf (dark, tip up-right) -->
    <g transform="translate(250 130) rotate(30)">
      <path d="M0 0 C8 -18 6 -40 -2 -58 C-6 -50 -12 -52 -15 -44 C-20 -30 -18 -14 -12 2 C-8 6 -3 6 0 0 Z" fill="url(#czleafA)"/>
      <path d="M-4 -4 C-3 -22 -5 -38 -7 -52" stroke="#d6efb0" stroke-width="1.6" fill="none" opacity=".55" stroke-linecap="round"/>
      <path d="M-5 -18 l7 3 M-6 -30 l-7 2 M-6 -42 l6 3" stroke="#2b6f26" stroke-width="1.2" opacity=".55"/>
    </g>
    <!-- mid-left leaf (medium green) -->
    <g transform="translate(108 138) rotate(-14)">
      <path d="M0 0 C-9 -20 -8 -46 4 -66 C9 -56 17 -58 20 -48 C25 -32 22 -12 14 4 C9 8 3 7 0 0 Z" fill="url(#czleafB)"/>
      <path d="M5 -3 C5 -24 7 -44 10 -60" stroke="#eafbe0" stroke-width="2" fill="none" opacity=".6" stroke-linecap="round"/>
      <path d="M6 -16 l-8 4 M7 -30 l9 3 M8 -44 l-8 4 M9 -54 l8 3" stroke="#3f9c37" stroke-width="1.2" opacity=".55"/>
    </g>
    <!-- mid-right leaf (medium green) -->
    <g transform="translate(212 138) rotate(14)">
      <path d="M0 0 C9 -20 8 -46 -4 -66 C-9 -56 -17 -58 -20 -48 C-25 -32 -22 -12 -14 4 C-9 8 -3 7 0 0 Z" fill="url(#czleafB)"/>
      <path d="M-5 -3 C-5 -24 -7 -44 -10 -60" stroke="#eafbe0" stroke-width="2" fill="none" opacity=".6" stroke-linecap="round"/>
      <path d="M-6 -16 l8 4 M-7 -30 l-9 3 M-8 -44 l8 4 M-9 -54 l-8 3" stroke="#3f9c37" stroke-width="1.2" opacity=".55"/>
    </g>
    <!-- front-center leaf (bright, tall, ruffled tip) -->
    <g transform="translate(160 148) rotate(-3)">
      <path d="M0 0 C-11 -24 -10 -54 3 -80 C7 -72 12 -76 15 -70 C18 -76 24 -72 24 -64 C31 -46 26 -16 15 6 C9 10 3 8 0 0 Z" fill="url(#czleafC)"/>
      <path d="M6 -2 C6 -28 9 -52 12 -72" stroke="#f4fbe6" stroke-width="2.4" fill="none" opacity=".72" stroke-linecap="round"/>
      <path d="M7 -18 l-9 5 M9 -34 l10 4 M9 -50 l-9 5 M11 -64 l9 3" stroke="#8ac96a" stroke-width="1.3" opacity=".6"/>
    </g>
    <!-- front-left short leaf (bright, tip up) -->
    <g transform="translate(126 150) rotate(-22)">
      <path d="M0 0 C-8 -16 -8 -38 2 -54 C6 -47 12 -49 14 -42 C18 -30 15 -12 9 2 C5 6 2 5 0 0 Z" fill="url(#czleafC)" opacity=".97"/>
      <path d="M4 -3 C4 -22 6 -38 8 -48" stroke="#f4fbe6" stroke-width="1.8" fill="none" opacity=".6" stroke-linecap="round"/>
    </g>
    <!-- front-right short leaf (medium-bright, tip up) -->
    <g transform="translate(196 150) rotate(20)">
      <path d="M0 0 C8 -16 8 -38 -2 -54 C-6 -47 -12 -49 -14 -42 C-18 -30 -15 -12 -9 2 C-5 6 -2 5 0 0 Z" fill="url(#czleafB)" opacity=".97"/>
      <path d="M-4 -3 C-4 -22 -6 -38 -8 -48" stroke="#eafbe0" stroke-width="1.8" fill="none" opacity=".55" stroke-linecap="round"/>
    </g>
  </g>

  <!-- croutons: golden bread cubes nestled among the leaves -->
  <g stroke="#9c6a2c" stroke-width="1.1">
    <rect x="98" y="120" width="15" height="13" rx="2.4" fill="url(#czcrouton)" transform="rotate(-16 105 126)"/>
    <rect x="178" y="116" width="14" height="13" rx="2.4" fill="url(#czcrouton)" transform="rotate(13 185 122)"/>
    <rect x="144" y="128" width="15" height="13" rx="2.4" fill="url(#czcrouton)" transform="rotate(-6 151 134)"/>
    <rect x="206" y="128" width="13" height="12" rx="2.2" fill="url(#czcrouton)" transform="rotate(20 212 134)"/>
    <rect x="122" y="112" width="12" height="11" rx="2.2" fill="url(#czcrouton)" transform="rotate(6 128 117)"/>
  </g>
  <!-- crouton toasted highlights -->
  <rect x="100" y="121" width="6" height="4" rx="1" fill="#fbeecb" opacity=".7" transform="rotate(-16 103 123)"/>
  <rect x="180" y="117" width="6" height="4" rx="1" fill="#fbeecb" opacity=".7" transform="rotate(13 183 119)"/>
  <rect x="146" y="129" width="6" height="4" rx="1" fill="#fbeecb" opacity=".65" transform="rotate(-6 149 131)"/>

  <!-- shaved parmesan curls (pale, thin) -->
  <path d="M132 104 C142 98 154 100 158 107 C149 110 139 109 132 104 Z" fill="#f7edcf" stroke="#d8c79a" stroke-width="1" opacity=".95"/>
  <path d="M170 124 C181 119 192 123 194 130 C185 130 176 128 170 124 Z" fill="#f7edcf" stroke="#d8c79a" stroke-width="1" opacity=".95"/>
  <!-- grated parmesan flecks -->
  <circle cx="142" cy="114" r="1.4" fill="#f7edcf"/>
  <circle cx="176" cy="112" r="1.3" fill="#f7edcf"/>
  <circle cx="118" cy="130" r="1.3" fill="#f7edcf"/>
  <circle cx="200" cy="116" r="1.2" fill="#f7edcf"/>
  <!-- cracked black pepper -->
  <circle cx="152" cy="108" r="1.1" fill="#221a14"/>
  <circle cx="188" cy="130" r="1.1" fill="#221a14"/>
  <circle cx="128" cy="122" r="1" fill="#221a14"/>
  <!-- creamy dressing sheen pooling in the bowl -->
  <path d="M112 140 C142 150 190 150 210 138" stroke="#f4ecd6" stroke-width="2.6" fill="none" opacity=".42" stroke-linecap="round"/>
  <circle cx="158" cy="120" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="198" cy="128" r="1.3" fill="#fff" opacity=".5"/>
</svg>
