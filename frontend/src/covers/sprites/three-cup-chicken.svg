<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="tcBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="tcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <radialGradient id="tcpot" cx="50%" cy="28%" r="86%">
      <stop offset="0%" stop-color="#2a2028"/><stop offset="55%" stop-color="#181218"/><stop offset="100%" stop-color="#0b0810"/>
    </radialGradient>
    <radialGradient id="tcsauce" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#6b3410"/><stop offset="55%" stop-color="#431c0a"/><stop offset="100%" stop-color="#230d04"/>
    </radialGradient>
    <linearGradient id="tcchick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5591f"/><stop offset="52%" stop-color="#7a3812"/><stop offset="100%" stop-color="#4c2109"/>
    </linearGradient>
    <linearGradient id="tcglaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c97a2e"/><stop offset="100%" stop-color="#8a4718"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tcbg)"/>
  <!-- rising steam -->
  <path d="M124 50 C116 34 132 28 124 8" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#tcBlur3)"/>
  <path d="M196 52 C188 36 204 30 196 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#tcBlur3)"/>
  <ellipse cx="160" cy="188" rx="140" ry="21" fill="#000" opacity=".5"/>
  <!-- neon steam arc (cyan savory/braise) -->
  <path d="M62 96 Q118 62 178 64" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- CAST-IRON / DARK CLAY POT (shallower, wider than the knuckle pot) -->
  <path d="M58 116 C58 150 100 172 160 172 C220 172 262 150 262 116 Z" fill="url(#tcpot)"/>
  <path d="M58 116 C58 150 100 172 160 172 C220 172 262 150 262 116" fill="none" stroke="#33283c" stroke-width="3"/>
  <!-- pot rim lip -->
  <ellipse cx="160" cy="116" rx="104" ry="30" fill="#241c26"/>
  <ellipse cx="160" cy="116" rx="104" ry="30" fill="none" stroke="#3a2f42" stroke-width="2.5"/>
  <ellipse cx="160" cy="118" rx="92" ry="25" fill="#120d14"/>
  <!-- side handles -->
  <ellipse cx="54" cy="128" rx="9" ry="14" fill="none" stroke="#241c26" stroke-width="7"/>
  <ellipse cx="266" cy="128" rx="9" ry="14" fill="none" stroke="#241c26" stroke-width="7"/>
  <!-- glossy soy-sesame-oil sauce pool -->
  <ellipse cx="160" cy="118" rx="86" ry="22" fill="url(#tcsauce)"/>
  <ellipse cx="130" cy="110" rx="28" ry="6" fill="#8a4a1e" opacity=".4"/>

  <!-- CHICKEN CHUNKS — smaller glossy mahogany-glazed bone-in pieces -->
  <g transform="translate(0 0)">
    <path d="M96 98 C92 90 106 86 118 90 C130 88 138 96 134 104 C138 112 124 118 112 114 C100 116 92 106 96 98 Z" fill="url(#tcchick)" stroke="#3a1808" stroke-width="1.3"/>
    <ellipse cx="106" cy="94" rx="9" ry="4" fill="#d98a48" opacity=".5"/>
    <path d="M118 90 l6 -4" stroke="#f3e6cf" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <g transform="translate(0 0)">
    <path d="M150 96 C146 88 160 84 172 88 C184 86 192 94 188 102 C192 110 178 116 166 112 C154 114 146 104 150 96 Z" fill="url(#tcchick)" stroke="#3a1808" stroke-width="1.3"/>
    <ellipse cx="160" cy="92" rx="9" ry="4" fill="#d98a48" opacity=".5"/>
  </g>
  <g transform="translate(0 0)">
    <path d="M198 100 C194 92 208 88 220 92 C232 90 240 98 236 106 C240 114 226 120 214 116 C202 118 194 108 198 100 Z" fill="url(#tcchick)" stroke="#3a1808" stroke-width="1.3"/>
    <ellipse cx="208" cy="96" rx="8" ry="3.6" fill="#d98a48" opacity=".5"/>
    <path d="M220 92 l5 -3" stroke="#f3e6cf" stroke-width="2.4" stroke-linecap="round"/>
  </g>
  <g transform="translate(0 4)">
    <path d="M118 112 C114 104 128 100 140 104 C152 102 160 110 156 118 C160 126 146 132 134 128 C122 130 114 120 118 112 Z" fill="url(#tcglaze)" stroke="#3a1808" stroke-width="1.4"/>
    <ellipse cx="128" cy="108" rx="10" ry="4" fill="#e89a55" opacity=".55"/>
  </g>
  <g transform="translate(0 4)">
    <path d="M170 114 C166 106 180 102 192 106 C204 104 212 112 208 120 C212 128 198 134 186 130 C174 132 166 122 170 114 Z" fill="url(#tcglaze)" stroke="#3a1808" stroke-width="1.4"/>
    <ellipse cx="180" cy="110" rx="10" ry="4" fill="#e89a55" opacity=".55"/>
  </g>

  <!-- SIGNATURE THAI-BASIL LEAVES scattered over the top -->
  <g>
    <path d="M110 88 C104 82 106 74 114 74 C118 80 116 88 110 88 Z" fill="#3f9c37"/>
    <path d="M114 74 L110 88" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
    <path d="M114 74 L110 88" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  </g>
  <g>
    <path d="M156 82 C150 76 152 68 160 68 C164 74 162 82 156 82 Z" fill="#58c14a"/>
    <path d="M160 68 L156 82" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  </g>
  <g>
    <path d="M204 90 C198 84 200 76 208 76 C212 82 210 90 204 90 Z" fill="#3f9c37"/>
    <path d="M208 76 L204 90" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  </g>
  <g transform="rotate(24 138 122)">
    <path d="M132 122 C126 116 128 108 136 108 C140 114 138 122 132 122 Z" fill="#5ecb4e"/>
    <path d="M136 108 L132 122" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  </g>
  <g transform="rotate(-18 190 124)">
    <path d="M184 124 C178 118 180 110 188 110 C192 116 190 124 184 124 Z" fill="#3f9c37"/>
    <path d="M188 110 L184 124" stroke="#2f7d2b" stroke-width="1" opacity=".7"/>
  </g>

  <!-- dried red chilies + ginger slices + garlic cloves -->
  <path d="M136 100 C148 98 160 100 170 104 C160 106 148 106 138 104 Z" fill="#c0210f" opacity=".9"/>
  <rect x="88" y="112" width="9" height="3" rx="1.5" fill="#c0210f" transform="rotate(28 92 113)"/>
  <ellipse cx="176" cy="106" rx="6" ry="4" fill="#f2ddb0" opacity=".92"/>
  <ellipse cx="176" cy="106" rx="6" ry="4" fill="none" stroke="#c9a97a" stroke-width=".8" opacity=".6"/>
  <ellipse cx="150" cy="112" rx="5" ry="3.6" fill="#f2ddb0" opacity=".9"/>
  <!-- sesame-oil gloss dots -->
  <circle cx="106" cy="94" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="100" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="146" cy="118" r="1.3" fill="#fff" opacity=".5"/>
</svg>
