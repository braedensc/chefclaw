<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="blBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="blbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="blbagel" cx="42%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#e5b877"/><stop offset="55%" stop-color="#c8934a"/><stop offset="100%" stop-color="#9a6a2b"/>
    </radialGradient>
    <linearGradient id="bllox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9a70"/><stop offset="55%" stop-color="#f26f45"/><stop offset="100%" stop-color="#cc4d2a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#blbg)"/>
  <!-- steam (subtle, room-temp-ish brunch) -->
  <path d="M128 54 C120 40 136 32 128 14" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#blBlur3)"/>
  <path d="M198 56 C192 42 206 34 200 16" stroke="#fff" stroke-width="5" fill="none" opacity=".06" filter="url(#blBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="146" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="134" rx="130" ry="50" fill="#141018"/>
  <ellipse cx="160" cy="134" rx="130" ry="50" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="114" ry="42" fill="#0f0d13"/>
  <!-- neon steam arc (warm white) -->
  <path d="M54 114 Q106 84 168 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".38" stroke-linecap="round"/>
  <!-- BAGEL: fat torus, sliced open, seen slightly from above -->
  <g transform="translate(160 128)">
    <!-- bagel body outer -->
    <ellipse cx="0" cy="8" rx="86" ry="52" fill="#7a531f"/>
    <ellipse cx="0" cy="2" rx="86" ry="52" fill="url(#blbagel)"/>
    <!-- cream cheese layer on cut face -->
    <ellipse cx="0" cy="0" rx="80" ry="46" fill="#fbf3e0"/>
    <ellipse cx="0" cy="-2" rx="80" ry="46" fill="none" stroke="#e6d6b4" stroke-width="1.4" opacity=".6"/>
    <!-- the bagel hole -->
    <ellipse cx="0" cy="4" rx="24" ry="14" fill="#0d0b11"/>
    <ellipse cx="0" cy="2" rx="24" ry="14" fill="#161219"/>
    <!-- everything-bagel seeds on the top ring rim -->
    <g>
      <circle cx="-64" cy="-14" r="1.6" fill="#260903"/>
      <ellipse cx="-40" cy="-30" rx="1.8" ry="1.1" fill="#f8eed6"/>
      <circle cx="-12" cy="-36" r="1.5" fill="#260903"/>
      <ellipse cx="20" cy="-34" rx="1.8" ry="1.1" fill="#f8eed6"/>
      <circle cx="48" cy="-26" r="1.6" fill="#260903"/>
      <ellipse cx="66" cy="-10" rx="1.7" ry="1.1" fill="#f8eed6"/>
      <circle cx="-52" cy="-24" r="1.3" fill="#3f9c37"/>
      <circle cx="34" cy="-32" r="1.3" fill="#3f9c37"/>
    </g>
    <!-- LOX: ribboned smoked-salmon slices draped over -->
    <path d="M-56 -6 C-40 -18 -14 -12 -6 -2 C-18 2 -46 6 -56 -6 Z" fill="url(#bllox)"/>
    <path d="M-8 -8 C10 -20 34 -12 44 -4 C30 2 2 4 -8 -8 Z" fill="url(#bllox)"/>
    <path d="M-40 6 C-22 -4 4 0 14 10 C-2 14 -30 16 -40 6 Z" fill="url(#bllox)"/>
    <!-- salmon marbling stripes -->
    <path d="M-50 -6 C-38 -12 -18 -10 -10 -4" stroke="#ffd0b8" stroke-width="1.6" fill="none" opacity=".7"/>
    <path d="M-4 -6 C12 -14 30 -10 40 -4" stroke="#ffd0b8" stroke-width="1.6" fill="none" opacity=".7"/>
    <path d="M-34 6 C-20 0 0 2 10 8" stroke="#ffd0b8" stroke-width="1.5" fill="none" opacity=".65"/>
    <!-- capers + red onion + dill -->
    <circle cx="-30" cy="10" r="2.4" fill="#3f5c1e"/>
    <circle cx="26" cy="6" r="2.4" fill="#3f5c1e"/>
    <path d="M-16 14 C-8 10 2 10 10 14" stroke="#c98fd6" stroke-width="2.6" fill="none" opacity=".8" stroke-linecap="round"/>
    <rect x="-46" y="0" width="7" height="2.4" rx="1.2" fill="#5ecb4e" transform="rotate(-20 -42 1)"/>
    <rect x="36" y="-2" width="6" height="2.2" rx="1.1" fill="#3f9c37" transform="rotate(24 39 -1)"/>
  </g>
  <!-- gloss dots -->
  <circle cx="128" cy="118" r="1.5" fill="#fff" opacity=".55"/>
  <circle cx="194" cy="122" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="160" cy="112" r="1.2" fill="#fff" opacity=".5"/>
</svg>
