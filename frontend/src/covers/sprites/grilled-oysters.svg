<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="goBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="gobg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#102e35"/><stop offset="45%" stop-color="#0b090b"/><stop offset="100%" stop-color="#060507"/>
    </radialGradient>
    <radialGradient id="goshell" cx="44%" cy="34%" r="82%">
      <stop offset="0%" stop-color="#cfd3d0"/><stop offset="55%" stop-color="#9aa19c"/><stop offset="100%" stop-color="#6b716c"/>
    </radialGradient>
    <radialGradient id="goflesh" cx="46%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#f6e6c2"/><stop offset="60%" stop-color="#e6c98e"/><stop offset="100%" stop-color="#c99a52"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gobg)"/>
  <!-- steam -->
  <path d="M120 56 C110 38 130 30 120 12" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#goBlur3)"/>
  <path d="M202 54 C194 38 212 30 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#goBlur3)"/>
  <ellipse cx="160" cy="188" rx="156" ry="20" fill="#000" opacity=".5"/>
  <!-- grill rack board under the shells -->
  <rect x="30" y="104" width="260" height="60" rx="10" fill="#100b0d"/>
  <rect x="30" y="104" width="260" height="60" rx="10" fill="none" stroke="#2c2136" stroke-width="2.6"/>
  <g stroke-linecap="round" opacity=".75">
    <path d="M48 156 H272" stroke="#2e1710" stroke-width="3.4"/>
    <path d="M48 156 H272" stroke="#e2541a" stroke-width="1.4" opacity=".4"/>
    <path d="M48 148 H272" stroke="#241209" stroke-width="2.6"/>
  </g>
  <circle cx="76" cy="156" r="2.2" fill="#ff6a24" opacity=".5"/>
  <circle cx="160" cy="158" r="2" fill="#ff7a34" opacity=".45"/>
  <circle cx="244" cy="156" r="2.2" fill="#ff6a24" opacity=".5"/>
  <!-- neon steam arc -->
  <path d="M48 98 Q104 72 168 74" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- three oysters on the half-shell -->
  <!-- back-left oyster (smaller) -->
  <g transform="translate(78 100) rotate(-8) scale(.86)">
    <path d="M-30 6 C-30 -14 -8 -24 12 -22 C34 -20 40 -4 34 12 C24 26 -6 28 -22 20 C-30 16 -30 12 -30 6 Z" fill="url(#goshell)" stroke="#4a4f4a" stroke-width="1.3"/>
    <path d="M-24 6 C-24 -10 -6 -18 10 -16 C28 -14 32 -2 28 10 C20 20 -4 22 -18 16 C-24 12 -24 10 -24 6 Z" fill="#1c1a16"/>
    <!-- oyster flesh -->
    <path d="M-16 4 C-16 -8 -2 -13 10 -11 C22 -9 24 0 20 8 C14 15 -2 16 -12 11 C-16 9 -16 7 -16 4 Z" fill="url(#goflesh)"/>
    <ellipse cx="-2" cy="-2" rx="6" ry="3" fill="#fbeecb" opacity=".7"/>
    <!-- garlic + scallion topping -->
    <circle cx="-8" cy="4" r="1.6" fill="#f2ddb0"/><circle cx="2" cy="0" r="1.6" fill="#f8ecc9"/><circle cx="8" cy="6" r="1.5" fill="#f2ddb0"/><circle cx="-2" cy="8" r="1.4" fill="#e9d6a4"/>
    <rect x="-6" y="-2" width="6" height="2.2" rx="1.1" fill="#5ecb4e" transform="rotate(18 -3 -1)"/>
    <rect x="4" y="4" width="6" height="2.2" rx="1.1" fill="#3f9c37" transform="rotate(-14 7 5)"/>
    <circle cx="12" cy="2" r="1" fill="#e0341f"/>
  </g>
  <!-- back-right oyster (smaller) -->
  <g transform="translate(238 100) rotate(10) scale(.86)">
    <path d="M-34 -4 C-40 -18 -20 -26 2 -22 C22 -18 30 -2 24 12 C16 24 -12 26 -26 16 C-34 10 -32 4 -34 -4 Z" fill="url(#goshell)" stroke="#4a4f4a" stroke-width="1.3"/>
    <path d="M-28 -4 C-32 -14 -16 -20 0 -16 C18 -12 24 0 20 10 C12 18 -10 20 -22 12 C-28 8 -26 2 -28 -4 Z" fill="#1c1a16"/>
    <path d="M-18 -2 C-20 -10 -8 -14 6 -11 C18 -8 22 0 18 8 C12 14 -6 15 -14 9 C-18 6 -18 4 -18 -2 Z" fill="url(#goflesh)"/>
    <ellipse cx="-2" cy="-4" rx="6" ry="3" fill="#fbeecb" opacity=".7"/>
    <circle cx="-8" cy="0" r="1.6" fill="#f8ecc9"/><circle cx="2" cy="-2" r="1.6" fill="#f2ddb0"/><circle cx="6" cy="4" r="1.5" fill="#f8ecc9"/><circle cx="-2" cy="6" r="1.4" fill="#e9d6a4"/>
    <rect x="-6" y="-4" width="6" height="2.2" rx="1.1" fill="#3f9c37" transform="rotate(-16 -3 -3)"/>
    <rect x="2" y="4" width="6" height="2.2" rx="1.1" fill="#5ecb4e" transform="rotate(20 5 5)"/>
    <circle cx="10" cy="0" r="1" fill="#e0341f"/>
  </g>
  <!-- front-center hero oyster (largest, brightest) -->
  <g transform="translate(160 116) scale(1.12)">
    <path d="M-40 8 C-42 -16 -14 -30 12 -28 C40 -26 48 -4 40 16 C28 32 -8 34 -28 24 C-38 18 -40 14 -40 8 Z" fill="url(#goshell)" stroke="#4a4f4a" stroke-width="1.5"/>
    <!-- shell ridge lines -->
    <path d="M-32 4 C-20 -18 20 -20 34 4 M-30 12 C-14 -4 22 -6 36 12" stroke="#787e78" stroke-width="1" fill="none" opacity=".5"/>
    <!-- shell inner cavity -->
    <path d="M-32 8 C-34 -12 -10 -23 12 -21 C34 -19 40 -2 33 14 C22 27 -8 28 -24 20 C-32 16 -32 12 -32 8 Z" fill="#191713"/>
    <!-- plump grilled oyster flesh -->
    <path d="M-22 6 C-24 -10 -6 -18 12 -16 C30 -14 34 -1 28 11 C20 21 -4 22 -16 15 C-22 12 -22 9 -22 6 Z" fill="url(#goflesh)"/>
    <ellipse cx="0" cy="-4" rx="10" ry="4.4" fill="#fbeecb" opacity=".7"/>
    <!-- browned garlic-butter crust patches -->
    <path d="M-14 8 C-8 4 6 4 14 8" stroke="#a5741f" stroke-width="2.2" fill="none" opacity=".55" stroke-linecap="round"/>
    <!-- minced garlic mound + crispy shallot -->
    <circle cx="-12" cy="4" r="2" fill="#f2ddb0"/><circle cx="-4" cy="-2" r="2.2" fill="#f8ecc9"/><circle cx="4" cy="2" r="2" fill="#f2ddb0"/><circle cx="10" cy="6" r="1.8" fill="#e9d6a4"/><circle cx="-2" cy="8" r="1.8" fill="#f8ecc9"/><circle cx="14" cy="0" r="1.6" fill="#f2ddb0"/>
    <circle cx="-8" cy="10" r="1.4" fill="#6b5420"/><circle cx="6" cy="-2" r="1.3" fill="#4d3b17"/>
    <!-- scallion greens + red chili confetti -->
    <rect x="-14" y="-4" width="8" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 -10 -3)"/>
    <rect x="2" y="-4" width="8" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(14 6 -3)"/>
    <rect x="-6" y="10" width="7" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(22 -2 11)"/>
    <rect x="8" y="8" width="7" height="2.4" rx="1.2" fill="#6abf5a" transform="rotate(-10 11 9)"/>
    <circle cx="0" cy="4" r="1.2" fill="#e0341f"/><circle cx="12" cy="10" r="1.1" fill="#e0341f"/>
    <!-- oily gloss -->
    <circle cx="-6" cy="-4" r="1.5" fill="#fff" opacity=".6"/>
    <circle cx="8" cy="2" r="1.3" fill="#fff" opacity=".55"/>
  </g>
</svg>
