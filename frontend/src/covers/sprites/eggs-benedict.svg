<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ebBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ebbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="ebmuffin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c188"/><stop offset="55%" stop-color="#cf9d5c"/><stop offset="100%" stop-color="#a5762f"/>
    </linearGradient>
    <linearGradient id="ebham" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e08a8f"/><stop offset="100%" stop-color="#b85860"/>
    </linearGradient>
    <radialGradient id="ebhol" cx="44%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#ffe79a"/><stop offset="55%" stop-color="#f7c74e"/><stop offset="100%" stop-color="#e29a1c"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ebbg)"/>
  <!-- steam -->
  <path d="M118 50 C108 34 128 26 118 6" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ebBlur3)"/>
  <path d="M198 52 C190 36 208 28 200 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ebBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="186" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- round plate -->
  <ellipse cx="160" cy="134" rx="132" ry="50" fill="#141018"/>
  <ellipse cx="160" cy="134" rx="132" ry="50" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="116" ry="42" fill="#0f0d13"/>
  <!-- neon steam arc (warm white) -->
  <path d="M52 116 Q104 84 168 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- LEFT stack -->
  <g transform="translate(-42 6)">
    <!-- english muffin base -->
    <ellipse cx="160" cy="150" rx="46" ry="17" fill="#8a6329"/>
    <path d="M114 150 C114 138 134 130 160 130 C186 130 206 138 206 150 C206 162 186 170 160 170 C134 170 114 162 114 150 Z" fill="url(#ebmuffin)"/>
    <ellipse cx="160" cy="140" rx="44" ry="12" fill="#f0d29a" opacity=".5"/>
    <!-- ham slice draped -->
    <path d="M118 136 C122 128 140 124 160 124 C180 124 198 128 202 136 C196 144 178 148 160 148 C142 148 124 144 118 136 Z" fill="url(#ebham)"/>
    <path d="M128 132 C140 129 180 129 192 132" stroke="#8f3f47" stroke-width="1.4" fill="none" opacity=".5"/>
    <!-- poached egg white mound -->
    <path d="M126 120 C126 106 142 98 160 98 C178 98 194 106 194 120 C194 132 178 138 160 138 C142 138 126 132 126 120 Z" fill="#fdf6e6"/>
    <path d="M126 120 C126 106 142 98 160 98 C178 98 194 106 194 120" fill="none" stroke="#e6d3a8" stroke-width="1.3" opacity=".6"/>
    <!-- hollandaise pooling over -->
    <path d="M132 112 C136 100 148 94 160 94 C172 94 184 100 188 112 C182 122 172 126 160 126 C148 126 138 122 132 112 Z" fill="url(#ebhol)"/>
    <!-- runny yolk peeking -->
    <ellipse cx="160" cy="110" rx="15" ry="11" fill="#f6a020"/>
    <ellipse cx="155" cy="105" rx="6" ry="4" fill="#ffd873" opacity=".85"/>
    <!-- hollandaise drips -->
    <path d="M138 122 C136 130 134 134 132 136 M182 122 C184 130 186 134 188 136" stroke="#f2bd44" stroke-width="4" fill="none" opacity=".8" stroke-linecap="round"/>
  </g>
  <!-- RIGHT stack (slightly smaller, back) -->
  <g transform="translate(46 10) scale(.9)">
    <ellipse cx="160" cy="150" rx="46" ry="17" fill="#8a6329"/>
    <path d="M114 150 C114 138 134 130 160 130 C186 130 206 138 206 150 C206 162 186 170 160 170 C134 170 114 162 114 150 Z" fill="url(#ebmuffin)"/>
    <path d="M118 136 C122 128 140 124 160 124 C180 124 198 128 202 136 C196 144 178 148 160 148 C142 148 124 144 118 136 Z" fill="url(#ebham)"/>
    <path d="M126 120 C126 106 142 98 160 98 C178 98 194 106 194 120 C194 132 178 138 160 138 C142 138 126 132 126 120 Z" fill="#fdf6e6"/>
    <path d="M132 112 C136 100 148 94 160 94 C172 94 184 100 188 112 C182 122 172 126 160 126 C148 126 138 122 132 112 Z" fill="url(#ebhol)"/>
    <ellipse cx="160" cy="110" rx="15" ry="11" fill="#f6a020"/>
    <ellipse cx="155" cy="105" rx="6" ry="4" fill="#ffd873" opacity=".85"/>
    <path d="M138 122 C136 130 134 134 132 136 M182 122 C184 130 186 134 188 136" stroke="#f2bd44" stroke-width="4" fill="none" opacity=".8" stroke-linecap="round"/>
  </g>
  <!-- chive/parsley garnish + paprika dust -->
  <rect x="112" y="112" width="7" height="2.6" rx="1.3" fill="#5ecb4e" transform="rotate(-16 115 113)"/>
  <rect x="204" y="118" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(20 207 119)"/>
  <circle cx="128" cy="118" r="1.4" fill="#c0431a" opacity=".8"/>
  <circle cx="196" cy="112" r="1.3" fill="#c0431a" opacity=".8"/>
  <!-- gloss dots -->
  <circle cx="120" cy="110" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="206" cy="112" r="1.3" fill="#fff" opacity=".5"/>
</svg>
