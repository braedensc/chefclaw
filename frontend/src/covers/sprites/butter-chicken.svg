  </g>
  <g>
    <path d="M160 108 C156 100 168 96 178 100 C188 96 196 104 192 112 C196 120 184 126 174 122 C164 124 156 116 160 108 Z" fill="url(#bcchick)" stroke="#8a4a18" stroke-width="1.3"/>
