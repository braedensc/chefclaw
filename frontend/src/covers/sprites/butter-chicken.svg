  </g>
  <g>
    <path d="M126 132 C122 124 134 120 144 124 C154 120 162 128 158 136 C162 144 150 150 140 146 C130 148 122 140 126 132 Z" fill="url(#bcchick)" stroke="#8a4a18" stroke-width="1.3"/>
    <ellipse cx="138" cy="128" rx="7" ry="3" fill="#ffce8f" opacity=".65"/>
  </g>
  <g>
    <path d="M186 130 C182 122 194 118 204 122 C214 118 222 126 218 134 C222 142 210 148 200 144 C190 146 182 138 186 130 Z" fill="url(#bcchick)" stroke="#8a4a18" stroke-width="1.3"/>
