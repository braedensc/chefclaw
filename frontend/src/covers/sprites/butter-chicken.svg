    <radialGradient id="bcbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="bcgravy" cx="48%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#f2823a"/><stop offset="48%" stop-color="#d95a20"/><stop offset="100%" stop-color="#a83512"/>
    </radialGradient>
    <linearGradient id="bcchick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2a25a"/><stop offset="100%" stop-color="#b56a2a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bcbg)"/>
  <!-- steam -->
  <path d="M122 56 C112 38 132 30 122 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#bcBlur3)"/>
