  <rect x="118" y="116" width="6" height="2.4" rx="1.2" fill="#3f9c37" transform="rotate(-18 121 117)"/>
  <rect x="150" y="118" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(16 153 119)"/>
  <rect x="182" y="120" width="6" height="2.4" rx="1.2" fill="#2f7d2b" transform="rotate(-10 185 121)"/>
