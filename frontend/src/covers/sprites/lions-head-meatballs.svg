<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="lhBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="lhbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#113036"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="lhpot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4029"/><stop offset="45%" stop-color="#3d2113"/><stop offset="100%" stop-color="#1c0d06"/>
    </linearGradient>
    <radialGradient id="lhliquid" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#9c2b10"/><stop offset="55%" stop-color="#661408"/><stop offset="100%" stop-color="#3b0b05"/>
    </radialGradient>
    <radialGradient id="lhball" cx="42%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#a85a34"/><stop offset="45%" stop-color="#7c3a20"/><stop offset="80%" stop-color="#5e2410"/><stop offset="100%" stop-color="#401608"/>
    </radialGradient>
    <radialGradient id="lhball2" cx="42%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#96502a"/><stop offset="55%" stop-color="#6b2f16"/><stop offset="100%" stop-color="#3a1408"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#lhbg)"/>
  <!-- steam wisps -->
  <path d="M124 48 C114 30 134 22 124 4" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#lhBlur3)"/>
  <path d="M196 50 C188 34 206 26 198 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#lhBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="140" ry="22" fill="#000" opacity=".5"/>
  <!-- curved clay pot silhouette -->
  <path d="M46 118 C46 92 100 78 160 78 C220 78 274 92 274 118 C274 156 226 176 160 176 C94 176 46 156 46 118 Z" fill="url(#lhpot)"/>
  <path d="M46 118 C46 92 100 78 160 78 C220 78 274 92 274 118 C274 156 226 176 160 176 C94 176 46 156 46 118 Z" fill="none" stroke="#271b16" stroke-width="3"/>
  <!-- pot inner rim -->
  <ellipse cx="160" cy="106" rx="112" ry="32" fill="#2a160c"/>
  <ellipse cx="160" cy="106" rx="112" ry="32" fill="none" stroke="#7c3a20" stroke-width="2" opacity=".6"/>
  <!-- neon steam arc (cyan, braise) -->
  <path d="M54 100 Q108 68 172 68" stroke="#35e0ff" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
  <!-- glossy dark braising liquid pooled -->
  <ellipse cx="160" cy="112" rx="104" ry="28" fill="url(#lhliquid)"/>
  <ellipse cx="160" cy="110" rx="98" ry="24" fill="none" stroke="#c14a20" stroke-width="1.4" opacity=".4"/>
  <!-- bok choy leaves cradling the meatballs (green nest) -->
  <g stroke="#1f5a1c" stroke-width="1.2">
    <path d="M64 116 C56 104 72 96 88 100 C96 92 108 96 108 106 C104 118 84 124 72 120 C66 122 62 120 64 116 Z" fill="#3f9c37"/>
    <path d="M68 112 C78 108 92 110 98 116" stroke="#6abf5a" stroke-width="1.4" fill="none" opacity=".7"/>
    <path d="M232 118 C224 106 240 98 254 102 C262 96 272 102 268 112 C262 122 244 126 234 122 C228 124 226 122 232 118 Z" fill="#3f9c37"/>
    <path d="M238 114 C248 110 260 112 266 118" stroke="#6abf5a" stroke-width="1.4" fill="none" opacity=".7"/>
    <path d="M148 128 C138 120 152 112 166 116 C176 110 186 116 182 124 C176 132 158 136 150 132 C144 132 144 130 148 128 Z" fill="#358a2e"/>
  </g>
  <!-- LION'S HEAD: big glossy braised pork meatballs (irregular, coarse-ground) -->
  <!-- Each ball gets exactly ONE off-center gloss crescent — never paired eye-dots, never a mouth arc. Coarse minced-pork specks read as ground meat, not a face. -->
  <!-- back-left meatball -->
  <g transform="translate(94 94)">
    <path d="M-29 5 C-31 -13 -16 -26 4 -27 C24 -28 39 -14 38 6 C37 24 22 33 1 32 C-17 31 -28 21 -29 5 Z" fill="url(#lhball2)" stroke="#3a1408" stroke-width="1.4"/>
    <!-- single upper-left gloss crescent -->
    <path d="M-20 -8 C-16 -16 -4 -20 6 -18 C-2 -15 -12 -10 -18 -3 C-20 -4 -21 -6 -20 -8 Z" fill="#c88a52" opacity=".45"/>
    <ellipse cx="-13" cy="-13" rx="6" ry="2.6" fill="#f2c583" opacity=".55"/>
    <!-- coarse ground-pork specks -->
    <circle cx="-2" cy="8" r="1.3" fill="#4a1c0a" opacity=".5"/><circle cx="12" cy="2" r="1.1" fill="#4a1c0a" opacity=".45"/>
    <circle cx="6" cy="16" r="1.2" fill="#4a1c0a" opacity=".5"/><circle cx="-14" cy="12" r="1" fill="#4a1c0a" opacity=".4"/>
    <circle cx="18" cy="14" r="1" fill="#5e2410" opacity=".45"/>
  </g>
  <!-- back-right meatball -->
  <g transform="translate(214 96)">
    <path d="M-28 6 C-30 -12 -14 -26 5 -27 C26 -28 40 -13 38 7 C36 25 21 33 0 32 C-18 31 -27 21 -28 6 Z" fill="url(#lhball2)" stroke="#3a1408" stroke-width="1.4"/>
    <!-- single upper-right gloss crescent -->
    <path d="M2 -18 C12 -20 24 -16 28 -8 C22 -12 12 -15 4 -13 C0 -14 -1 -16 2 -18 Z" fill="#c88a52" opacity=".45"/>
    <ellipse cx="16" cy="-13" rx="6" ry="2.6" fill="#f2c583" opacity=".55"/>
    <!-- coarse ground-pork specks -->
    <circle cx="-4" cy="6" r="1.3" fill="#4a1c0a" opacity=".5"/><circle cx="10" cy="12" r="1.1" fill="#4a1c0a" opacity=".45"/>
    <circle cx="-12" cy="14" r="1.2" fill="#4a1c0a" opacity=".5"/><circle cx="4" cy="18" r="1" fill="#4a1c0a" opacity=".4"/>
    <circle cx="-18" cy="4" r="1" fill="#5e2410" opacity=".45"/>
  </g>
  <!-- front hero meatball (largest, brightest) -->
  <g transform="translate(158 118)">
    <path d="M-43 7 C-45 -17 -24 -34 2 -35 C32 -36 52 -18 50 11 C48 35 27 46 -2 44 C-28 43 -42 29 -43 7 Z" fill="url(#lhball)" stroke="#3a1408" stroke-width="1.6"/>
    <!-- ONE single off-center gloss crescent (upper-left), no paired dots -->
    <path d="M-30 -6 C-24 -20 -8 -28 10 -26 C-2 -21 -16 -14 -26 -2 C-29 -3 -31 -4 -30 -6 Z" fill="#e0a060" opacity=".42"/>
    <ellipse cx="-18" cy="-16" rx="11" ry="4.2" fill="#ffd9a2" opacity=".6"/>
    <!-- coarse minced-pork texture (scattered specks, no symmetry) -->
    <circle cx="-2" cy="10" r="1.6" fill="#4a1c0a" opacity=".5"/><circle cx="16" cy="4" r="1.4" fill="#4a1c0a" opacity=".45"/>
    <circle cx="10" cy="20" r="1.5" fill="#4a1c0a" opacity=".5"/><circle cx="-16" cy="16" r="1.4" fill="#4a1c0a" opacity=".45"/>
    <circle cx="26" cy="14" r="1.3" fill="#5e2410" opacity=".5"/><circle cx="-8" cy="24" r="1.3" fill="#4a1c0a" opacity=".4"/>
    <circle cx="22" cy="26" r="1.2" fill="#5e2410" opacity=".45"/><circle cx="2" cy="0" r="1.2" fill="#5e2410" opacity=".4"/>
    <!-- sauce laps over the bottom edge -->
    <path d="M-43 7 C-44 23 -25 40 3 42 C-3 33 -5 23 -1 15 C-21 19 -35 17 -43 7 Z" fill="#7a1c0a" opacity=".55"/>
  </g>
  <!-- sauce drizzle laps + gloss -->
  <path d="M118 130 C138 138 182 138 202 130" stroke="#8a2410" stroke-width="3" fill="none" opacity=".5" stroke-linecap="round"/>
  <circle cx="146" cy="104" r="1.6" fill="#fff" opacity=".6"/>
  <circle cx="176" cy="110" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="100" cy="88" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="216" cy="90" r="1.3" fill="#fff" opacity=".5"/>
</svg>
