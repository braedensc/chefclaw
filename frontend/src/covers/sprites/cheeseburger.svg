<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="cbtopbun" cx="46%" cy="24%" r="82%">
      <stop offset="0%" stop-color="#f2c274"/><stop offset="55%" stop-color="#dda155"/><stop offset="100%" stop-color="#b9762f"/>
    </radialGradient>
    <linearGradient id="cbbotbun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2ab5f"/><stop offset="100%" stop-color="#b9772f"/>
    </linearGradient>
    <linearGradient id="cbpatty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e3d24"/><stop offset="55%" stop-color="#4d2716"/><stop offset="100%" stop-color="#331709"/>
    </linearGradient>
    <linearGradient id="cbcheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcf5a"/><stop offset="100%" stop-color="#f4a221"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cbbg)"/>
  <!-- steam -->
  <path d="M118 46 C108 28 128 20 118 4" stroke="#fff" stroke-width="7" fill="none" opacity=".09" filter="url(#nnBlur3)"/>
  <path d="M204 44 C196 28 214 20 206 4" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- plate / round board -->
  <ellipse cx="160" cy="156" rx="140" ry="30" fill="#141018"/>
  <ellipse cx="160" cy="156" rx="140" ry="30" fill="none" stroke="#271b22" stroke-width="3"/>
  <ellipse cx="160" cy="156" rx="122" ry="23" fill="#0f0d13"/>
  <!-- neon steam arc (warm/local) -->
  <path d="M56 130 Q106 96 168 92" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>

  <!-- ===== stacked burger, side profile, centered x=160 ===== -->
  <!-- bottom bun -->
  <path d="M96 150 C96 138 118 132 160 132 C202 132 224 138 224 150 C224 158 200 162 160 162 C120 162 96 158 96 150 Z" fill="url(#cbbotbun)" stroke="#8a5622" stroke-width="1.4"/>
  <path d="M100 146 C120 152 200 152 220 146" stroke="#a06d33" stroke-width="1.4" fill="none" opacity=".5"/>

  <!-- beef patty (thick, textured) -->
  <path d="M92 132 C92 120 118 114 160 114 C202 114 228 120 228 132 C228 142 202 146 160 146 C118 146 92 142 92 132 Z" fill="url(#cbpatty)" stroke="#241009" stroke-width="1.4"/>
  <path d="M100 124 C120 130 200 130 220 124" stroke="#2a130a" stroke-width="1.2" fill="none" opacity=".6"/>
  <!-- grill char flecks -->
  <circle cx="120" cy="128" r="1.4" fill="#1c0d06"/><circle cx="150" cy="132" r="1.3" fill="#1c0d06"/>
  <circle cx="188" cy="128" r="1.4" fill="#1c0d06"/><circle cx="168" cy="126" r="1.1" fill="#1c0d06"/>
  <circle cx="134" cy="134" r="1.1" fill="#1c0d06"/>

  <!-- melted cheese draped over patty edges -->
  <path d="M96 116 C118 108 202 108 224 116 C220 122 214 122 210 118
           C208 130 204 132 200 122 C196 132 192 132 188 122
           C182 132 178 132 174 122 C170 132 166 132 162 122
           C158 132 154 132 150 122 C146 132 142 132 138 122
           C134 130 130 132 126 120 C120 124 110 124 104 118 Z"
        fill="url(#cbcheese)" stroke="#c9821a" stroke-width="1.2"/>
  <path d="M104 114 C126 108 194 108 216 114" stroke="#ffe9a8" stroke-width="1.6" fill="none" opacity=".55"/>

  <!-- tomato slice -->
  <path d="M104 108 C122 102 198 102 216 108 C198 114 122 114 104 108 Z" fill="#e0492c" stroke="#b3271a" stroke-width="1.2"/>
  <path d="M112 108 C130 104 190 104 208 108" stroke="#ff9d7d" stroke-width="1.4" fill="none" opacity=".6"/>

  <!-- lettuce ruffle -->
  <path d="M92 104 C104 94 118 106 132 96 C146 106 160 94 174 104 C188 94 202 106 228 100
           C224 110 200 114 160 114 C120 114 96 110 92 104 Z" fill="#6abf5a" stroke="#3f9c37" stroke-width="1.2"/>
  <path d="M104 100 C116 94 128 104 140 98 C152 104 164 96 176 102 C188 96 200 104 214 100" stroke="#8fd66a" stroke-width="1.4" fill="none" opacity=".6"/>

  <!-- top bun (domed, sesame seeds) -->
  <path d="M92 96 C92 66 120 48 160 48 C200 48 228 66 228 96 C204 104 194 104 160 104 C126 104 116 104 92 96 Z" fill="url(#cbtopbun)" stroke="#8a5622" stroke-width="1.4"/>
  <ellipse cx="140" cy="66" rx="34" ry="12" fill="#fff" opacity=".16"/>
  <!-- sesame seeds -->
  <g fill="#fbeecb" stroke="#d8b878" stroke-width=".6">
    <ellipse cx="128" cy="72" rx="3" ry="1.8" transform="rotate(-18 128 72)"/>
    <ellipse cx="150" cy="64" rx="3" ry="1.8" transform="rotate(12 150 64)"/>
    <ellipse cx="172" cy="70" rx="3" ry="1.8" transform="rotate(-8 172 70)"/>
    <ellipse cx="140" cy="82" rx="3" ry="1.8" transform="rotate(20 140 82)"/>
    <ellipse cx="188" cy="80" rx="3" ry="1.8" transform="rotate(-14 188 80)"/>
    <ellipse cx="162" cy="80" rx="3" ry="1.8" transform="rotate(6 162 80)"/>
    <ellipse cx="112" cy="84" rx="3" ry="1.8" transform="rotate(24 112 84)"/>
    <ellipse cx="204" cy="90" rx="2.8" ry="1.7" transform="rotate(-20 204 90)"/>
  </g>

  <!-- side garnish: a couple fries leaning on the plate -->
  <g transform="translate(238 138) rotate(-24)">
    <rect x="0" y="0" width="7" height="30" rx="2" fill="#f2c463" stroke="#c99334" stroke-width="1"/>
    <rect x="9" y="4" width="7" height="28" rx="2" fill="#e6b34f" stroke="#c99334" stroke-width="1"/>
  </g>
  <!-- gloss dots -->
  <circle cx="132" cy="62" r="1.6" fill="#fff" opacity=".6"/>
  <circle cx="196" cy="112" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="122" r="1.3" fill="#fff" opacity=".45"/>
</svg>
