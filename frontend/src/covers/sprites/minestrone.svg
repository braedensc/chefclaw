<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="minBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="minbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="minbowl" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <radialGradient id="minbroth" cx="44%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#e8623a"/><stop offset="52%" stop-color="#c53a1e"/><stop offset="100%" stop-color="#8f2210"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#minbg)"/>
  <!-- rising steam wisps -->
