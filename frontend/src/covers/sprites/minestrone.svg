  <path d="M196 50 C188 34 206 26 198 6" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#minBlur3)"/>
  <ellipse cx="160" cy="188" rx="140" ry="20" fill="#000" opacity=".5"/>
