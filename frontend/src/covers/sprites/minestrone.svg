  <ellipse cx="176" cy="96" rx="1.8" ry="1.4" fill="#c53a1e"/>
  <ellipse cx="132" cy="110" rx="4.6" ry="3.6" fill="#eeddad" stroke="#c9a86e" stroke-width="1.2"/>
