<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ssrBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="ssrbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="ssrsauce" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#b83a12"/><stop offset="55%" stop-color="#7a1c08"/><stop offset="100%" stop-color="#480d05"/>
    </radialGradient>
    <linearGradient id="ssrrib" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8622a"/><stop offset="45%" stop-color="#a03c12"/><stop offset="100%" stop-color="#66220c"/>
    </linearGradient>
    <linearGradient id="ssrglaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2954a"/><stop offset="100%" stop-color="#c85e20"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ssrbg)"/>
  <!-- rising steam wisps -->
  <path d="M120 54 C110 36 130 30 120 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#ssrBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#ssrBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- oval plate -->
  <ellipse cx="160" cy="132" rx="144" ry="46" fill="#141018"/>
  <ellipse cx="160" cy="132" rx="144" ry="46" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="132" rx="130" ry="38" fill="#0f0d13"/>
  <!-- neon steam arc (rose family) -->
  <path d="M48 116 Q100 84 164 82" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- sticky sweet-sour glaze pool -->
  <ellipse cx="160" cy="130" rx="114" ry="30" fill="url(#ssrsauce)"/>
  <ellipse cx="128" cy="122" rx="20" ry="6" fill="#e06a2a" opacity=".5"/>
  <ellipse cx="198" cy="126" rx="16" ry="5" fill="#e06a2a" opacity=".45"/>
  <!-- rib pieces: short chopped ribs (bone dot at one end), glossy caramel glaze -->
  <!-- back row (smaller, darker) -->
  <g transform="translate(98 100) rotate(-14) scale(.85)">
    <rect x="0" y="0" width="42" height="20" rx="8" fill="url(#ssrrib)" stroke="#3a1207" stroke-width="1.3"/>
    <rect x="4" y="3" width="34" height="6" rx="3" fill="url(#ssrglaze)" opacity=".8"/>
    <circle cx="6" cy="10" r="3.6" fill="#f4e6cc"/><circle cx="6" cy="10" r="1.6" fill="#d8c39e"/>
  </g>
  <g transform="translate(182 100) rotate(12) scale(.85)">
    <rect x="0" y="0" width="42" height="20" rx="8" fill="url(#ssrrib)" stroke="#3a1207" stroke-width="1.3"/>
    <rect x="4" y="3" width="34" height="6" rx="3" fill="url(#ssrglaze)" opacity=".8"/>
    <circle cx="36" cy="10" r="3.6" fill="#f4e6cc"/><circle cx="36" cy="10" r="1.6" fill="#d8c39e"/>
  </g>
  <!-- front row (larger, glossy stacked) -->
  <g transform="translate(74 116) rotate(-6)">
    <rect x="0" y="0" width="54" height="24" rx="10" fill="url(#ssrrib)" stroke="#3a1207" stroke-width="1.4"/>
    <rect x="5" y="4" width="44" height="8" rx="4" fill="url(#ssrglaze)" opacity=".85"/>
    <circle cx="8" cy="12" r="4.4" fill="#f6ead2"/><circle cx="8" cy="12" r="2" fill="#dcc7a2"/>
    <ellipse cx="30" cy="6" rx="12" ry="3.4" fill="#ffb877" opacity=".55"/>
    <circle cx="20" cy="10" r="1.6" fill="#fff" opacity=".6"/>
  </g>
  <g transform="translate(156 120) rotate(9)">
    <rect x="0" y="0" width="54" height="24" rx="10" fill="url(#ssrrib)" stroke="#3a1207" stroke-width="1.4"/>
    <rect x="5" y="4" width="44" height="8" rx="4" fill="url(#ssrglaze)" opacity=".85"/>
    <circle cx="46" cy="12" r="4.4" fill="#f6ead2"/><circle cx="46" cy="12" r="2" fill="#dcc7a2"/>
    <ellipse cx="24" cy="6" rx="12" ry="3.4" fill="#ffb877" opacity=".55"/>
    <circle cx="34" cy="10" r="1.5" fill="#fff" opacity=".55"/>
  </g>
  <g transform="translate(120 128) rotate(-1)">
    <rect x="0" y="0" width="50" height="22" rx="9" fill="url(#ssrrib)" stroke="#3a1207" stroke-width="1.4"/>
    <rect x="5" y="4" width="40" height="7" rx="3.5" fill="url(#ssrglaze)" opacity=".85"/>
    <circle cx="8" cy="11" r="4" fill="#f6ead2"/><circle cx="8" cy="11" r="1.8" fill="#dcc7a2"/>
    <ellipse cx="28" cy="5" rx="11" ry="3" fill="#ffb877" opacity=".5"/>
  </g>
  <!-- toasted sesame seeds scattered over the glaze -->
  <g fill="#f8eed6">
    <ellipse cx="106" cy="118" rx="1.8" ry="1" transform="rotate(20 106 118)"/>
    <ellipse cx="150" cy="112" rx="1.8" ry="1" transform="rotate(-14 150 112)"/>
    <ellipse cx="188" cy="120" rx="1.8" ry="1" transform="rotate(30 188 120)"/>
    <ellipse cx="132" cy="132" rx="1.8" ry="1" transform="rotate(-8 132 132)"/>
    <ellipse cx="172" cy="134" rx="1.8" ry="1" transform="rotate(16 172 134)"/>
    <ellipse cx="118" cy="140" rx="1.6" ry=".9" transform="rotate(24 118 140)"/>
    <ellipse cx="204" cy="130" rx="1.6" ry=".9" transform="rotate(-20 204 130)"/>
  </g>
  <!-- scallion greens -->
  <rect x="146" y="122" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-14 150 123)"/>
  <rect x="178" y="128" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(18 181 129)"/>
  <rect x="112" y="130" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-20 115 131)"/>
  <!-- gloss dots -->
  <circle cx="140" cy="120" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="126" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="108" cy="126" r="1.2" fill="#fff" opacity=".5"/>
</svg>
