<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="pfBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="pfbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#3a1120"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="pfplate" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="100%" stop-color="#0b0b0d"/>
    </radialGradient>
    <linearGradient id="pfcake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4cf88"/><stop offset="55%" stop-color="#e0a955"/><stop offset="100%" stop-color="#b97a2c"/>
    </linearGradient>
    <linearGradient id="pfsyrup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b56a1f"/><stop offset="100%" stop-color="#7e4310"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pfbg)"/>
  <!-- steam wisps -->
  <path d="M124 50 C114 34 134 26 124 8" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#pfBlur3)"/>
  <path d="M202 52 C194 36 212 28 204 10" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#pfBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="21" fill="#000" opacity=".5"/>
  <!-- round breakfast plate -->
  <ellipse cx="160" cy="150" rx="134" ry="34" fill="url(#pfplate)"/>
  <ellipse cx="160" cy="150" rx="134" ry="34" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="150" rx="118" ry="26" fill="#0e0d11"/>
  <!-- neon steam arc (rose sweet family) -->
  <path d="M56 132 Q108 96 168 92" stroke="#ff4d6d" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- STACK of 3 round pancakes, each an ellipse disc with a lit top -->
  <g>
    <!-- bottom pancake -->
    <ellipse cx="160" cy="140" rx="72" ry="20" fill="url(#pfcake)"/>
    <ellipse cx="160" cy="138" rx="72" ry="16" fill="#eeba64"/>
    <ellipse cx="160" cy="140" rx="72" ry="20" fill="none" stroke="#9c661f" stroke-width="1.3" opacity=".5"/>
    <!-- middle pancake -->
    <ellipse cx="160" cy="122" rx="68" ry="19" fill="url(#pfcake)"/>
    <ellipse cx="160" cy="120" rx="68" ry="15" fill="#f0bd66"/>
    <ellipse cx="160" cy="122" rx="68" ry="19" fill="none" stroke="#9c661f" stroke-width="1.3" opacity=".5"/>
    <!-- top pancake -->
    <ellipse cx="160" cy="104" rx="64" ry="18" fill="url(#pfcake)"/>
    <ellipse cx="160" cy="101" rx="64" ry="14" fill="#f6c976"/>
    <!-- lit crown highlight -->
    <ellipse cx="150" cy="96" rx="30" ry="7" fill="#ffe1a0" opacity=".7"/>
    <ellipse cx="160" cy="104" rx="64" ry="18" fill="none" stroke="#9c661f" stroke-width="1.3" opacity=".5"/>
  </g>
  <!-- glossy syrup drizzle pouring down the front of the stack -->
  <path d="M108 100 C104 116 106 132 100 146
           C118 148 132 140 128 128
           C150 138 176 138 196 128
           C196 140 214 148 226 142
           C214 128 216 112 214 100
           C190 116 130 116 108 100 Z" fill="url(#pfsyrup)" opacity=".8"/>
  <path d="M132 106 C130 122 132 136 128 148" stroke="#8a4d12" stroke-width="2" fill="none" opacity=".5"/>
  <path d="M192 106 C194 122 192 136 196 146" stroke="#8a4d12" stroke-width="2" fill="none" opacity=".5"/>
  <!-- a pat of butter melting on top -->
  <path d="M150 92 L172 92 L170 100 L152 100 Z" fill="#ffe9a0" stroke="#e8c060" stroke-width="1"/>
  <path d="M150 92 L172 92" stroke="#fff4c8" stroke-width="1.4" opacity=".8"/>
  <!-- FRUIT crown: berries + a strawberry -->
  <!-- strawberry -->
  <g transform="translate(180 84) rotate(12)">
    <path d="M0 0 C8 -2 14 2 12 10 C10 16 4 18 0 16 C-4 18 -10 16 -12 10 C-14 2 -8 -2 0 0 Z" fill="#e5301f"/>
    <path d="M-6 2 L-2 -2 L4 -2 L8 2" stroke="#4a8c2c" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-3" cy="6" r="0.8" fill="#ffd76a"/><circle cx="3" cy="8" r="0.8" fill="#ffd76a"/><circle cx="0" cy="12" r="0.8" fill="#ffd76a"/>
  </g>
  <!-- blueberries -->
  <circle cx="132" cy="86" r="6" fill="#3a4a8c"/>
  <circle cx="132" cy="86" r="6" fill="none" stroke="#6a7ac0" stroke-width="1" opacity=".6"/>
  <circle cx="130" cy="84" r="1.6" fill="#8a9ad8" opacity=".8"/>
  <circle cx="146" cy="92" r="5.5" fill="#3a4a8c"/>
  <circle cx="144" cy="90" r="1.4" fill="#8a9ad8" opacity=".8"/>
  <circle cx="162" cy="88" r="5.5" fill="#43539c"/>
  <circle cx="160" cy="86" r="1.4" fill="#8a9ad8" opacity=".8"/>
  <!-- raspberry -->
  <g transform="translate(200 96)">
    <circle cx="0" cy="0" r="3" fill="#c8264a"/><circle cx="4" cy="1" r="3" fill="#d43458"/>
    <circle cx="2" cy="4" r="3" fill="#c8264a"/><circle cx="-2" cy="3" r="3" fill="#d43458"/>
    <circle cx="1" cy="1" r="1.2" fill="#f07090" opacity=".7"/>
  </g>
  <!-- mint leaf accent -->
  <path d="M164 78 C170 72 178 72 182 76 C176 80 168 80 164 78 Z" fill="#4aa83a"/>
  <path d="M166 78 L180 76" stroke="#2f7d2b" stroke-width="0.9" opacity=".7"/>
  <!-- syrup gloss dots -->
  <circle cx="120" cy="132" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="200" cy="130" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="100" r="1.4" fill="#fff" opacity=".6"/>
</svg>
