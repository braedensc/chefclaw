<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="nnBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="hsbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <linearGradient id="hsbowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1420"/><stop offset="55%" stop-color="#100b0d"/><stop offset="100%" stop-color="#070506"/>
    </linearGradient>
    <radialGradient id="hsbroth" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#7a4a1c"/><stop offset="52%" stop-color="#4f2c10"/><stop offset="100%" stop-color="#301809"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#hsbg)"/>
  <!-- steam -->
  <path d="M118 60 C108 42 128 34 118 14" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#nnBlur3)"/>
  <path d="M200 56 C192 40 210 32 202 12" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#nnBlur3)"/>
  <ellipse cx="160" cy="188" rx="158" ry="22" fill="#000" opacity=".5"/>
  <!-- deep round bowl -->
  <path d="M46 106 C46 152 100 178 160 178 C220 178 274 152 274 106 Z" fill="url(#hsbowl)"/>
  <ellipse cx="160" cy="106" rx="120" ry="31" fill="#0d0d10"/>
  <ellipse cx="160" cy="106" rx="120" ry="31" fill="none" stroke="#26262e" stroke-width="3"/>
