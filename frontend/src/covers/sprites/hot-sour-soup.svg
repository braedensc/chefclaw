  <rect x="132" y="106" width="7" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(-18 135 107)"/>
  <rect x="186" y="118" width="7" height="2.6" rx="1.3" fill="#e0341f" transform="rotate(14 189 119)"/>
  <rect x="158" y="104" width="6" height="2.4" rx="1.2" fill="#e0341f" transform="rotate(24 161 105)"/>
