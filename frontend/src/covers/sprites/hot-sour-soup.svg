    <path d="M110 114 C126 108 138 112 154 108 C168 104 182 110 198 106" stroke="#ffe89a" stroke-width="3" opacity=".8"/>
    <path d="M150 118 C166 114 180 118 196 114 C208 111 218 114 226 112" stroke="#f2cf6a" stroke-width="2.8" opacity=".75"/>
  </g>
