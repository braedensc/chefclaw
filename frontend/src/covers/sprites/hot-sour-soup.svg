  <rect x="170" y="114" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(12 173 115)"/>
  <rect x="204" y="106" width="6" height="2.4" rx="1.2" fill="#58c14a" transform="rotate(-8 207 107)"/>
