    <rect x="108" y="102" width="26" height="7" rx="2.2" fill="#f4ecd8" stroke="#d9c9a6" stroke-width="1" opacity=".95" transform="rotate(-12 121 105)"/>
    <rect x="150" y="110" width="28" height="7" rx="2.2" fill="#f9f2df" stroke="#dccca8" stroke-width="1" opacity=".95" transform="rotate(8 164 113)"/>
