  <circle cx="128" cy="112" r="1" fill="#f4ecd0" opacity=".8"/>
  <circle cx="176" cy="108" r="1" fill="#f4ecd0" opacity=".8"/>
  <circle cx="118" cy="102" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="184" cy="106" r="1.4" fill="#fff" opacity=".55"/>
  <circle cx="152" cy="114" r="1.2" fill="#fff" opacity=".5"/>
