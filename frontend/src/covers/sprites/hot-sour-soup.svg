    <path d="M168 96 C176 90 186 92 188 98 C182 104 172 104 168 96 Z" transform="rotate(12 178 97)"/>
    <path d="M142 122 C150 116 160 118 162 124 C156 130 146 130 142 122 Z" transform="rotate(-6 152 123)"/>
    <path d="M196 114 C204 108 214 110 216 116 C210 122 200 122 196 114 Z" transform="rotate(8 206 115)"/>
