<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="cbBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cbbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="cbtop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdf8f"/><stop offset="50%" stop-color="#f6c862"/><stop offset="100%" stop-color="#e6ab3d"/>
    </linearGradient>
    <linearGradient id="cbcrust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d18c34"/><stop offset="100%" stop-color="#9c5e1c"/>
    </linearGradient>
    <linearGradient id="cbcrumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe6a2"/><stop offset="100%" stop-color="#f2cd72"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cbbg)"/>
  <!-- steam -->
  <path d="M124 56 C114 38 134 30 124 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#cbBlur3)"/>
  <path d="M196 52 C188 36 206 28 198 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#cbBlur3)"/>
  <ellipse cx="160" cy="188" rx="150" ry="22" fill="#000" opacity=".5"/>
  <!-- plate -->
  <ellipse cx="160" cy="134" rx="140" ry="44" fill="#141018"/>
  <ellipse cx="160" cy="134" rx="140" ry="44" fill="none" stroke="#2c2136" stroke-width="3"/>
  <ellipse cx="160" cy="134" rx="126" ry="36" fill="#0f0d13"/>
  <!-- neon steam arc (warm) -->
  <path d="M50 116 Q104 84 168 82" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- BACK WEDGE (smaller, dimmer) -->
  <g transform="translate(196 96) scale(.86)" opacity=".95">
    <path d="M0 44 L44 44 L26 4 Z" fill="url(#cbtop)"/>
    <path d="M0 44 L44 44 L44 58 L4 58 Z" fill="url(#cbcrust)"/>
    <path d="M26 4 L44 44 L44 58 Z" fill="#8a5117"/>
    <path d="M0 44 L44 44 L26 4 Z" fill="none" stroke="#a06a1e" stroke-width="1.4" opacity=".55"/>
    <!-- crumb dots -->
    <circle cx="16" cy="34" r="1.6" fill="#c98f2e" opacity=".7"/>
    <circle cx="28" cy="24" r="1.4" fill="#c98f2e" opacity=".7"/>
    <circle cx="22" cy="40" r="1.4" fill="#fff2c8" opacity=".6"/>
  </g>
  <!-- FRONT MAIN WEDGE (a fat triangular slab, golden dome top, crumbly cut face) -->
  <g transform="translate(76 90)">
    <!-- domed top crust -->
    <path d="M4 44 C6 20 30 6 62 6 C96 6 118 20 120 44 C90 40 34 40 4 44 Z" fill="url(#cbcrust)"/>
    <!-- crackly bake highlight -->
    <path d="M18 30 C34 20 92 20 106 30" stroke="#ffd884" stroke-width="2" fill="none" opacity=".55" stroke-linecap="round"/>
    <path d="M30 22 l8 4 M56 18 l0 6 M84 22 l-8 4" stroke="#7a4712" stroke-width="1.4" opacity=".5" stroke-linecap="round"/>
    <!-- left cut face (pale crumb) -->
    <path d="M4 44 C34 40 90 40 120 44 L110 78 C82 84 34 84 14 78 Z" fill="url(#cbtop)"/>
    <!-- crumb interior on the front-facing cut -->
    <path d="M14 52 C40 48 84 48 108 52 L104 74 C80 79 40 79 18 74 Z" fill="url(#cbcrumb)"/>
    <!-- crumb speckle (corn flecks) -->
    <g fill="#e2a53a" opacity=".8">
      <circle cx="30" cy="58" r="1.7"/><circle cx="52" cy="64" r="1.7"/><circle cx="74" cy="58" r="1.7"/>
      <circle cx="92" cy="64" r="1.6"/><circle cx="42" cy="70" r="1.6"/><circle cx="66" cy="70" r="1.6"/>
      <circle cx="84" cy="70" r="1.5"/><circle cx="24" cy="66" r="1.4"/>
    </g>
    <g fill="#fff3cc" opacity=".7">
      <circle cx="40" cy="60" r="1.2"/><circle cx="60" cy="58" r="1.2"/><circle cx="80" cy="62" r="1.2"/><circle cx="54" cy="72" r="1.1"/>
    </g>
    <!-- outline -->
    <path d="M4 44 C6 20 30 6 62 6 C96 6 118 20 120 44 L110 78 C82 84 34 84 14 78 Z" fill="none" stroke="#9c5e1c" stroke-width="1.5" opacity=".55"/>
    <!-- melting butter pat on top -->
    <path d="M46 22 C50 16 66 16 70 23 C66 30 50 30 46 24 Z" fill="#ffe7a0" opacity=".9"/>
    <ellipse cx="56" cy="20" rx="7" ry="2.6" fill="#fff6d4" opacity=".8"/>
  </g>
  <!-- gloss dots -->
  <circle cx="128" cy="104" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="212" cy="112" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="150" r="1.2" fill="#fff" opacity=".5"/>
</svg>
