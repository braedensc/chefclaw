<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- chefclaw favicon: the storybook puppy chef reduced to head + toque so it
       still reads at 16px. Portrait colors (direction A): cream fur, tan
       floppy ears, pale-blue eyes, ink outline, on the night-market black. -->
  <rect width="96" height="96" rx="22" fill="#050505"/>
  <!-- floppy tan ears, behind the head -->
  <path d="M28 40 C13 46 11 68 26 76 C36 79 42 62 37 46 Z" fill="#b3a284" stroke="#2e2a24" stroke-width="3"/>
  <path d="M68 40 C83 46 85 68 70 76 C60 79 54 62 59 46 Z" fill="#b3a284" stroke="#2e2a24" stroke-width="3"/>
  <!-- head -->
  <circle cx="48" cy="55" r="25" fill="#f8f2e6" stroke="#2e2a24" stroke-width="3"/>
  <!-- three-puff toque -->
  <circle cx="37" cy="20" r="8" fill="#fdf7ea" stroke="#2e2a24" stroke-width="3"/>
  <circle cx="48" cy="16" r="9" fill="#fdf7ea" stroke="#2e2a24" stroke-width="3"/>
  <circle cx="59" cy="20" r="8" fill="#fdf7ea" stroke="#2e2a24" stroke-width="3"/>
  <rect x="31" y="22" width="34" height="11" rx="5.5" fill="#fdf7ea" stroke="#2e2a24" stroke-width="3"/>
  <!-- pale-blue eyes with glints -->
  <circle cx="39" cy="53" r="4.6" fill="#5f8aa3"/>
  <circle cx="57" cy="53" r="4.6" fill="#5f8aa3"/>
  <circle cx="40.5" cy="51.5" r="1.5" fill="#fff"/>
  <circle cx="58.5" cy="51.5" r="1.5" fill="#fff"/>
  <!-- muzzle -->
  <ellipse cx="48" cy="66" rx="11" ry="8" fill="#fdfaf2"/>
  <ellipse cx="48" cy="63" rx="4.4" ry="3.4" fill="#2e2a24"/>
  <path d="M48 66.5 Q48 70.5 43.5 71.5" stroke="#2e2a24" stroke-width="2.6" stroke-linecap="round" fill="none"/>
  <path d="M48 66.5 Q48 70.5 52.5 71.5" stroke="#2e2a24" stroke-width="2.6" stroke-linecap="round" fill="none"/>
</svg>
